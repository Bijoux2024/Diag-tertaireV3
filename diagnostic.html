                                                { val: 'closed_doors', label: 'Fermés', color: '#16A34A', bg: '#F0FDF4', border: '#BBF7D0' },
                                                { val: 'mixed', label: 'Mixte', color: '#F59E0B', bg: '#FFFBEB', border: '#FDE68A' },
                                                { val: 'none', label: 'Aucun', color: '#6B7280', bg: '#F9FAFB', border: '#D1D5DB' },
                                            ].map(opt => (
                                                <button key={opt.val} type="button"
                                                    onClick={() => setFormData(p => ({ ...p, coldEquipmentType: opt.val }))}
                                                    style={formData.coldEquipmentType === opt.val ? { borderColor: opt.border, backgroundColor: opt.bg, color: opt.color } : {}}
                                                    className={`py-2 px-3 rounded-lg border text-sm font-medium transition-all ${formData.coldEquipmentType === opt.val ? 'border-2' : 'border-[#E2E8F0] text-[#475569] hover:border-[#1D4ED8]'}`}
                                                >{opt.label}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="mb-3">
                                        <label className="block text-sm font-medium text-[#475569] mb-2">Depuis quand avez-vous ces équipements ?</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {[
                                                { val: 'under5', label: 'Moins de 5 ans', color: '#16A34A', bg: '#F0FDF4', border: '#BBF7D0' },
                                                { val: '5to15', label: '5 à 15 ans', color: '#F59E0B', bg: '#FFFBEB', border: '#FDE68A' },
                                                { val: 'over15', label: 'Plus de 15 ans', color: '#EF4444', bg: '#FEF2F2', border: '#FECACA' },
                                            ].map(opt => (
                                                <button key={opt.val} type="button"
                                                    onClick={() => setFormData(p => ({ ...p, coldEquipmentAge: opt.val }))}
                                                    style={formData.coldEquipmentAge === opt.val ? { borderColor: opt.border, backgroundColor: opt.bg, color: opt.color } : {}}
                                                    className={`py-2 px-3 rounded-lg border text-sm font-medium transition-all ${formData.coldEquipmentAge === opt.val ? 'border-2' : 'border-[#E2E8F0] text-[#475569] hover:border-[#1D4ED8]'}`}
                                                >{opt.label}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-[#475569] mb-1">Entretien de la réfrigération</label>
                                        <select
                                            value={formData.coldMaintenanceStatus}
                                            onChange={e => setFormData(p => ({ ...p, coldMaintenanceStatus: e.target.value }))}
                                            className="new-diagnostic-select-surface w-full border border-[#E2E8F0] rounded-lg p-2.5 text-sm text-[#0F172A] focus:outline-none focus:ring-2 focus:ring-[#1D4ED8]"
                                        >
                                            <option value="">-- Sélectionner --</option>
                                            <option value="contract">Contrat de maintenance</option>
                                            <option value="occasional">Occasionnelle</option>
                                            <option value="none">Aucune</option>
                                        </select>
                                    </div>
                                </div>
                            )}
                            {formData.activity === 'restaurant' && (
                                <div className="pb-4 mb-4 border-b border-[#E2E8F0]">
                                    <p className="text-xs font-semibold text-[#475569] uppercase tracking-wide mb-3">Cuisine</p>
                                    <div className="mb-3">
                                        <label className="block text-sm font-medium text-[#475569] mb-2">Type de cuisson</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {[
                                                { val: 'gas_intensive', label: 'Gaz dominant' },
                                                { val: 'electric', label: 'Électrique' },
                                                { val: 'mixed', label: 'Mixte' },
                                            ].map(opt => (
                                                <button key={opt.val} type="button"
                                                    onClick={() => setFormData(p => ({ ...p, kitchenType: opt.val }))}
                                                    className={`py-2 px-3 rounded-lg border text-sm font-medium transition-all ${formData.kitchenType === opt.val ? 'bg-[#EFF6FF] border-[#1D4ED8] text-[#1D4ED8] border-2' : 'border-[#E2E8F0] text-[#475569] hover:border-[#1D4ED8]'}`}
                                                >{opt.label}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-[#475569] mb-1">Entretien du froid en cuisine</label>
                                        <select
                                            value={formData.coldMaintenanceStatus}
                                            onChange={e => setFormData(p => ({ ...p, coldMaintenanceStatus: e.target.value }))}
                                            className="new-diagnostic-select-surface w-full border border-[#E2E8F0] rounded-lg p-2.5 text-sm text-[#0F172A] focus:outline-none focus:ring-2 focus:ring-[#1D4ED8]"
                                        >
                                            <option value="">-- Sélectionner --</option>
                                            <option value="contract">Contrat de maintenance</option>
                                            <option value="occasional">Occasionnelle</option>
                                            <option value="none">Aucune</option>
                                        </select>
                                    </div>
                                </div>
                            )}
                            {formData.activity === 'hotel' && (
                                <div className="pb-4 mb-4 border-b border-[#E2E8F0]">
                                    <p className="text-xs font-semibold text-[#475569] uppercase tracking-wide mb-3">Hôtel</p>
                                    <label className="flex items-center gap-3 cursor-pointer">
                                        <div
                                            onClick={() => setFormData(p => ({ ...p, hasLaundry: !p.hasLaundry }))}
                                            className={`relative w-10 h-6 rounded-full transition-colors flex-shrink-0 ${formData.hasLaundry ? 'bg-[#1D4ED8]' : 'bg-gray-300'}`}
                                        >
                                            <span className={`absolute top-1 w-4 h-4 bg-white rounded-full shadow transition-transform ${formData.hasLaundry ? 'left-5' : 'left-1'}`}></span>
                                        </div>
                                        <span className="text-sm font-medium text-[#475569]">Blanchisserie sur site</span>

                    )}

                    <div className="mt-10 flex flex-col-reverse sm:flex-row sm:justify-between gap-3">
                        <button
                            onClick={onBack}
                            className="px-6 py-3 text-neutral-500 hover:text-neutral-900 font-semibold transition-colors text-sm"
                        >
                            Retour
                        </button>
                        <button
                            onClick={handleNext}
                            className="flex items-center justify-center gap-2 px-8 py-4 bg-[#1D4ED8] text-white font-semibold rounded-xl hover:bg-[#1E40AF] active:scale-[0.98] transition-all duration-150 shadow-md text-base"
                        >
                            Continuer
                            <Icon icon="solar:arrow-right-bold" className="text-lg" />
                        </button>
                    </div>
                </div>
            );
        };

        // Étape 3 : Énergies (suite dans le prochain fichier car limite de taille)

        /* ═══════════════════════════════════════════════════════════════════════════
           PHASE 2 : FORMULAIRE (PARTIE 2)
           
           Étape 3 : Énergies
           Étape 4 : Travaux déjà réalisés
           ═══════════════════════════════════════════════════════════════════════════ */

        // Etape 3 : Consommations
        const NewDiagnosticStep3Energy = ({ formData, setFormData, onNext, onBack }) => {
            const [errors, setErrors] = useState([]);

            // Estimations dynamiques selon activité, surface et type de chauffage
            // Utilise les vraies données engine : benchmarks intensité + répartition par poste
            const estimations = React.useMemo(() => {
                const activity = formData.activity || 'offices';
                const surface = parseFloat(formData.surface) || 200;
                const heating = formData.mainHeating || 'gas';

                // Intensité médiane kWh/m2/an par activité (engine)
                const bench = window.NEW_DIAGNOSTIC_BENCHMARKS_INTENSITY
                    && window.NEW_DIAGNOSTIC_BENCHMARKS_INTENSITY[activity];
                const median = bench ? bench.median_kwh_m2_an : 135;
                const totalKwh = Math.round(median * surface);

                // Répartition par poste selon activité (engine)
                const bd = window.NEW_DIAGNOSTIC_USAGE_BREAKDOWNS
                    && window.NEW_DIAGNOSTIC_USAGE_BREAKDOWNS[activity];
                const heatingPct = bd ? (bd.heating_pct || 0) : 40;
                const dhwPct = bd ? (bd.dhw_pct || 0) : 5;
                const ecsSameSystem = formData.ecsSameSystem !== false;

                // Le gaz/fioul ne couvre que chauffage + ECS (si même système)
                // L'électricité couvre tout le reste (éclairage, clim, ventilation, usages spécifiques)
                const isElecHeating = heating === 'electric_convector'
                    || heating === 'electric_pac' || heating === 'electric';
                const isGasHeating = heating === 'gas' || heating === 'fuel';
                const isNetwork = heating === 'network';

                // ECS sur un système séparé : déterminer si gaz, réseau ou élec
                const ecsIsGas = !ecsSameSystem && formData.ecsSystem === 'gas_boiler';
                const ecsIsNetwork = !ecsSameSystem && formData.ecsSystem === 'network_dedicated';

                let elecShare, gasShare, networkShare;
                if (isElecHeating) {
                    // Chauffage élec : tout sur élec par défaut
                    // Mais si ECS gaz séparé, le dhwPct va sur le gaz
                    gasShare = ecsIsGas ? (dhwPct / 100) : 0;
                    networkShare = ecsIsNetwork ? (dhwPct / 100) : 0;
                    elecShare = 1 - gasShare - networkShare;
                } else if (isGasHeating) {
                    const gasPosts = heatingPct + (ecsSameSystem ? dhwPct : 0);
                    gasShare = gasPosts / 100;
                    // Si ECS séparé réseau
                    networkShare = ecsIsNetwork ? (dhwPct / 100) : 0;
                    elecShare = 1 - gasShare - networkShare;
                } else if (isNetwork) {
                    const networkPosts = heatingPct + (ecsSameSystem ? dhwPct : 0);
                    networkShare = networkPosts / 100;
                    // Si ECS séparé gaz
                    gasShare = ecsIsGas ? (dhwPct / 100) : 0;
                    elecShare = 1 - networkShare - gasShare;
                } else {
                    elecShare = 0.60;
                    gasShare = 0.40;
                    networkShare = 0;
                }

                // Si l'utilisateur coche "J'utilise du gaz" avec chauffage élec et pas d'ECS gaz,
                // fournir un minimum réaliste (cuisson/autres usages gaz)
                if (formData.gasUsed && gasShare === 0 && !ecsIsGas) {
                    gasShare = 0.05;
                    elecShare = Math.max(0, elecShare - 0.05);
                }

                const elecKwh = Math.round(totalKwh * elecShare);
                const gasKwh = Math.round(totalKwh * gasShare);
                const elecEuro = Math.round(elecKwh * 0.196);
                const gasEuro = Math.round(gasKwh * 0.108);
                const networkKwh = Math.round(totalKwh * networkShare);
                const networkEuro = Math.round(networkKwh * 0.095);
                return { elecKwh, elecEuro, gasKwh, gasEuro, networkKwh, networkEuro, totalKwh, median };
            }, [formData.activity, formData.surface, formData.mainHeating, formData.ecsSameSystem, formData.ecsSystem, formData.gasUsed]);

            const validate = () => {
                const validationErrors = newDiagnosticValidateEnergyData(formData);

                // Filtrer seulement les erreurs bloquantes
                const blockingErrors = validationErrors.filter(e => typeof e === 'string');

                setErrors(validationErrors);
                return blockingErrors.length === 0;
            };

            const handleNext = () => {
                if (validate()) {
                    newDiagnosticTrack('diagnostic_step3_completed', {
                        elec_used: formData.elecUsed,
                        gas_used: formData.gasUsed
                    });
                    onNext();
                }
            };

            const warnings = errors.filter(e => typeof e === 'object' && e.type === 'warning');
            const blockingErrors = errors.filter(e => typeof e === 'string');


            return (
                <div className="max-w-3xl mx-auto">
                    <div className="mb-8">
                        <h2 className="mb-2" style={{ fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: 'clamp(1.625rem, 4vw, 2rem)', color: '#102A43', letterSpacing: '-0.01em' }}>Vos consommations</h2>
                        <p className="text-[#475569] text-base leading-relaxed">Entrez vos chiffres, même approximatifs</p>
                    </div>

                    <div className="mb-8 p-4 bg-[#EFF6FF] border-2 border-[#BFDBFE] rounded-xl flex items-start gap-3">
                        <Icon icon="solar:info-circle-bold" className="text-[#1D4ED8] text-xl shrink-0 mt-0.5" />
                        <div>
                            <p className="text-sm font-semibold text-[#1D4ED8] mb-0.5">kWh ou euros, un seul suffit</p>
                            <p className="text-xs text-slate-600">Retrouvez ces chiffres sur votre facture annuelle ou votre espace client (EDF, Engie, TotalEnergies...).</p>
                        </div>
                    </div>

                    {/* Erreurs bloquantes */}
                    {blockingErrors.length > 0 && (
                        <div className="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
                            <p className="text-sm font-semibold text-red-800 mb-2">Erreurs à corriger :</p>
                            <ul className="list-disc list-inside text-sm text-red-700 space-y-1">
                                {blockingErrors.map((err, i) => (
                                    <li key={i}>{err}</li>
                                ))}
                            </ul>
                        </div>
                    )}

                    {/* Warnings */}
                    {warnings.length > 0 && (
                        <div className="mb-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
                            <p className="text-sm font-semibold text-yellow-800 mb-2">Avertissements :</p>
                            <ul className="list-disc list-inside text-sm text-yellow-700 space-y-1">
                                {warnings.map((warn, i) => (
                                    <li key={i}>{warn.message}</li>
                                ))}
                            </ul>
                        </div>
                    )}


                    {/* Réseau de chaleur (conditionnel si mainHeating = 'network') */}
                    {formData.mainHeating === 'network' && (
                        <div className="mb-8 p-6 bg-white border border-[#0EA5E9] rounded-xl">
                            <p className="text-sm font-semibold text-[#0369A1] mb-4">
                                Réseau de chaleur
                            </p>
                            <div className="grid md:grid-cols-2 gap-4">
                                <NewDiagnosticFormInput
                                    label="Consommation annuelle réseau"
                                    value={formData.networkKwh}
                                    onChange={(v) => setFormData({ ...formData, networkKwh: v, networkUsed: true })}
                                    type="number"
                                    placeholder={String(estimations.networkKwh)}
                                    suffix="kWh/an"
                                    helper={`Estimation pour votre profil : ~${estimations.networkKwh.toLocaleString('fr-FR')} kWh/an`}
                                />
                                <NewDiagnosticFormInput
                                    label="Montant annuel payé (toutes taxes)"
                                    value={formData.networkEuro}
                                    onChange={(v) => setFormData({ ...formData, networkEuro: v, networkUsed: true })}
                                    type="number"
                                    placeholder={String(estimations.networkEuro)}
                                    suffix="€/an"
                                    helper={`Estimation pour votre profil : ~${estimations.networkEuro.toLocaleString('fr-FR')} €/an`}
                                />
                            </div>
                        </div>
                    )}

                    {/* Électricité */}
                    <div className="mb-8 p-6 bg-white border border-neutral-200 rounded-xl">
                        <NewDiagnosticCheckbox
                            label="J'utilise de l'électricité"
                            checked={formData.elecUsed}
                            onChange={(v) => setFormData({ ...formData, elecUsed: v })}
                        />

                        {formData.elecUsed && (
                            <div className="mt-6 pl-8 border-l-4 border-[#1D4ED8]">
                                <div className="flex flex-col md:flex-row md:items-start gap-0 md:gap-2">
                                    <div className="flex-1 min-w-0">
                                        <NewDiagnosticFormInput
                                            label="Consommation annuelle"
                                            value={formData.elecKwh}
                                            onChange={(v) => setFormData({ ...formData, elecKwh: v })}
                                            type="number"
                                            placeholder={String(estimations.elecKwh)}
                                            suffix="kWh/an"
                                            helper={`Ref. votre profil : ~${estimations.elecKwh.toLocaleString('fr-FR')} kWh/an`}
                                        />
                                    </div>
                                    <div className="hidden md:flex shrink-0 justify-center" style={{ width: '48px', paddingTop: '36px' }}>
                                        <div style={{ width: '34px', height: '34px', background: 'white', border: '2px solid #e2e8f0', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '11px', fontWeight: 700, color: '#94a3b8', flexShrink: 0 }}>OU</div>
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <NewDiagnosticFormInput
                                            label="Montant annuel payé"
                                            value={formData.elecEuro}
                                            onChange={(v) => setFormData({ ...formData, elecEuro: v })}
                                            type="number"
                                            placeholder={String(estimations.elecEuro)}
                                            suffix="€/an"
                                            helper={`Ref. votre profil : ~${estimations.elecEuro.toLocaleString('fr-FR')} €/an`}
                                        />
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Gaz (masqué si mainHeating = network, car le gaz n'est pas le vecteur de chauffage) */}
                    {formData.mainHeating !== 'network' && (
                        <div className="mb-8 p-6 bg-white border border-neutral-200 rounded-xl">
                            <NewDiagnosticCheckbox
                                label="J'utilise du gaz"
                                checked={formData.gasUsed}
                                onChange={(v) => setFormData({ ...formData, gasUsed: v })}
                            />

                            {formData.gasUsed && (
                                <div className="mt-6 pl-8 border-l-4 border-[#F59E0B]">
                                    <div className="flex flex-col md:flex-row md:items-start gap-0 md:gap-2">
                                        <div className="flex-1 min-w-0">
                                            <NewDiagnosticFormInput
                                                label="Consommation annuelle"
                                                value={formData.gasKwh}
                                                onChange={(v) => setFormData({ ...formData, gasKwh: v })}
                                                type="number"
                                                placeholder={String(estimations.gasKwh)}
                                                suffix="kWh/an"
                                                helper={`Ref. votre profil : ~${estimations.gasKwh.toLocaleString('fr-FR')} kWh/an`}
                                            />
                                        </div>
                                        <div className="hidden md:flex shrink-0 justify-center" style={{ width: '48px', paddingTop: '36px' }}>
                                            <div style={{ width: '34px', height: '34px', background: 'white', border: '2px solid #e2e8f0', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '11px', fontWeight: 700, color: '#94a3b8', flexShrink: 0 }}>OU</div>
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <NewDiagnosticFormInput
                                                label="Montant annuel payé"
                                                value={formData.gasEuro}
                                                onChange={(v) => setFormData({ ...formData, gasEuro: v })}
                                                type="number"
                                                placeholder={String(estimations.gasEuro)}
                                                suffix="€/an"
                                                helper={`Ref. votre profil : ~${estimations.gasEuro.toLocaleString('fr-FR')} €/an`}
                                            />
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {(() => {
                        const activity = formData.activity || 'offices';
                        const surface = parseFloat(formData.surface) || 100;
                        const bench = NEW_DIAGNOSTIC_BENCHMARKS_INTENSITY[activity];
                        if (!bench) return null;
                        const medianeKwh = bench.median_kwh_m2_an * surface;
                        const elecVal = parseFloat(formData.elecKwh) || (parseFloat(formData.elecEuro) || 0) / 0.196;
                        const gasVal = parseFloat(formData.gasKwh) || (parseFloat(formData.gasEuro) || 0) / 0.108;
                        const totalEstime = elecVal + gasVal;
                        if (totalEstime <= 0) return null;
                        if (totalEstime > medianeKwh * 2.5) {
                            return React.createElement('p', { className: 'text-amber-600 text-xs mt-2 flex items-center gap-1' },
                                React.createElement(Icon, { icon: 'solar:danger-triangle-linear', className: 'shrink-0' }),
                                'Vérifiez que le montant correspond bien à une facture annuelle (et non mensuelle)'
                            );
                        }
                        if (totalEstime < medianeKwh * 0.3) {
                            return React.createElement('p', { className: 'text-amber-600 text-xs mt-2 flex items-center gap-1' },
                                React.createElement(Icon, { icon: 'solar:danger-triangle-linear', className: 'shrink-0' }),
                                'Cette consommation semble faible pour votre surface et activité'
                            );
                        }
                        return null;
                    })()}

                    <div className="mt-10 flex flex-col-reverse sm:flex-row sm:justify-between gap-3">
                        <button
                            onClick={onBack}
                            className="px-6 py-3 text-neutral-500 hover:text-neutral-900 font-semibold transition-colors text-sm"
                        >
                            Retour
                        </button>
                        <button
                            onClick={handleNext}
                            className="flex items-center justify-center gap-2 px-8 py-4 bg-[#1D4ED8] text-white font-semibold rounded-xl hover:bg-[#1E40AF] active:scale-[0.98] transition-all duration-150 shadow-md text-base"
                        >
                            Continuer
                            <Icon icon="solar:arrow-right-bold" className="text-lg" />

                const domainName = domain.split('.')[0].replace(/-/g, ' ');

                    const res = await fetch(
                        `https://recherche-entreprises.api.gouv.fr/search?q=${encodeURIComponent(domainName)}&per_page=1&page=1`

                        const data = await res.json();

        function newDiagnosticComputeSectorLabel(intensityValue, medianValue) {
            const safeIntensity = Math.max(0, Number(intensityValue) || 0);
            const safeMedian = Math.max(1, Number(medianValue) || 1);
            const ratio = safeIntensity / safeMedian;

            let label = 'E';
            if (ratio < 0.6) label = 'A';
            else if (ratio < 0.9) label = 'B';
            else if (ratio < 1.2) label = 'C';
            else if (ratio < 1.7) label = 'D';

            const config = NEW_DIAGNOSTIC_SECTOR_LABEL_CONFIG[label] || NEW_DIAGNOSTIC_SECTOR_LABEL_CONFIG.C;
            return {
                label,
                positioning: config.positioning,
                ratio: Math.round(ratio * 100) / 100,
                color: config.color,
                bg: config.bg
            };
        }

        function newDiagnosticGetSectorThresholds(medianValue) {
            const med = Math.max(1, Number(medianValue) || 1);
            const aMax = Math.round(med * 0.6);
            const bMin = aMax;
            const bMax = Math.round(med * 0.9);
            const cMin = bMax;
            const cMax = Math.round(med * 1.2);
            const dMin = cMax;
            const dMax = Math.round(med * 1.7);
            const eMin = dMax;

            return {
                A: { min: 0, max: aMax },
                B: { min: bMin, max: bMax },
                C: { min: cMin, max: cMax },
                D: { min: dMin, max: dMax },
                E: { min: eMin, max: null }
            };
        }

            const safe = Number(value);
            const numericValue = Number.isFinite(safe) ? safe : 0;
            const maximumFractionDigits = typeof options.maximumFractionDigits === 'number' ? options.maximumFractionDigits : 0;
            const minimumFractionDigits = typeof options.minimumFractionDigits === 'number' ? options.minimumFractionDigits : 0;
            return numericValue.toLocaleString('fr-FR', {
                minimumFractionDigits,
                maximumFractionDigits
            });
        }

        function newDiagnosticFormatDecimal(value, maximumFractionDigits = 1) {
            return newDiagnosticFormatNumber(value, { minimumFractionDigits: 0, maximumFractionDigits });
        }

        function newDiagnosticFormatCurrency(value, maximumFractionDigits = 0) {
            return `${newDiagnosticFormatNumber(value, { minimumFractionDigits: 0, maximumFractionDigits })} €`;
        }

        function newDiagnosticFormatUnitValue(value, unit, options = {}) {
            const maximumFractionDigits = typeof options.maximumFractionDigits === 'number' ? options.maximumFractionDigits : 0;
            return `${newDiagnosticFormatNumber(value, { minimumFractionDigits: 0, maximumFractionDigits })} ${unit}`.trim();

                'assets/diagtertiaire.svg'
            ]
        };

        function newDiagnosticLoadImageAsDataUrl(src) {
            return new Promise(resolve => {
                if (!src) {
                    resolve(null);
                    return;
                }

                const image = new Image();
                image.crossOrigin = 'anonymous';
                image.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = image.naturalWidth || image.width;
                        canvas.height = image.naturalHeight || image.height;
                        const context = canvas.getContext('2d');
                        context.drawImage(image, 0, 0);
                        resolve(canvas.toDataURL('image/png'));
                    } catch (error) {
                        resolve(null);
                    }
                };
                image.onerror = () => resolve(null);
                image.src = src;
            });
        }

        async function newDiagnosticResolveBrandLogoDataUrl() {
            for (const candidate of NEW_DIAGNOSTIC_BRAND.logoCandidates) {
                const dataUrl = await newDiagnosticLoadImageAsDataUrl(candidate);
                if (dataUrl) {
                    return { src: candidate, dataUrl };
                }
            }
            return { src: null, dataUrl: null };
        }

        function newDiagnosticGetCO2Equivalences(co2KgEvite) {
            const safe = Math.max(0, Number(co2KgEvite) || 0);
            return {
                arbres: Math.round(safe / NEW_DIAGNOSTIC_CO2_ARBRE_KG_AN),
                voitures: Math.round((safe / NEW_DIAGNOSTIC_CO2_VOITURE_KG_AN) * 10) / 10,
                km: Math.round(safe / NEW_DIAGNOSTIC_CO2_VOITURE_KM)
            };
        }

            }
            if (robustness.level === 'low' || index >= 2) {
                return { label: 'À confirmer', className: 'bg-slate-100 text-slate-700 border-slate-200' };
            }
            return { label: 'Priorité utile', className: 'bg-amber-50 text-amber-700 border-amber-200' };

        const NEW_DIAGNOSTIC_CATEGORY_LABELS = {

            dhw: 'Eau chaude',
            envelope: 'Enveloppe',

        const NEW_DIAGNOSTIC_CATEGORY_TO_BREAKDOWN_KEY = {
            heating: 'heating_pct',
            cooling: 'cooling_pct',
            ventilation: 'vent_aux_pct',

            dhw: 'dhw_pct',

        };

        function newDiagnosticGetBreakdownPctValue(breakdownPct, key) {
            if (!breakdownPct || !key) return 0;
            if (Array.isArray(breakdownPct)) {
                const found = breakdownPct.find(item => item && item.key === key);
                return found && typeof found.value === 'number' ? found.value : 0;
            }
            return typeof breakdownPct[key] === 'number' ? breakdownPct[key] : 0;
        }

        function newDiagnosticEstimateAides(actions) {
            let aidesTotal = 0;
            for (const action of (actions || [])) {
                const capVal = action && action.capex ? (action.capex.value || 0) : 0;
                aidesTotal += capVal * (0.20 - 0.055) / 1.20; // TVA 5.5%
                if (action && action.aid_tags && action.aid_tags.includes('CEE')) {
                    aidesTotal += capVal * 0.015; // CEE plancher
                }
            }
            return Math.max(0, Math.round(aidesTotal));
        }

        function newDiagnosticGetActionRobustness(action) {
            const roi = action && action.roi_years ? action.roi_years.value : null;
            const capex = action && action.capex ? action.capex.value || 0 : 0;
            const gainLevel = action ? action.source_level_gain : null;
            const capexLevel = action ? action.source_level_capex : null;

            const weakData = (gainLevel === 'hypothesis' || gainLevel === 'pending_expert')
                + (capexLevel === 'hypothesis' || capexLevel === 'pending_expert');

            if (roi !== null && roi <= 3 && capex <= 15000 && weakData === 0) {
                return {
                    level: 'strong',
                    label: 'Forte probabilité',
                    className: 'bg-green-50 text-green-700 border-green-200'
                };
            }
            if (roi !== null && roi <= 7 && capex <= 40000 && weakData <= 1) {
                return {
                    level: 'medium',
                    label: 'Probable',
                    className: 'bg-yellow-50 text-yellow-800 border-yellow-200'
                };
            }
            return {
                level: 'low',
                label: 'À confirmer sur site',
                className: 'bg-orange-50 text-orange-700 border-orange-200'
            };
        }

        function newDiagnosticGetActionEffort(action) {
            const capex = action && action.capex ? action.capex.value || 0 : 0;
            const roi = action && action.roi_years ? action.roi_years.value : null;
            const category = action && action.category ? action.category : '';

            if (capex <= 3000 && (roi === null || roi <= 4) && category !== 'envelope') {
                return { key: 'low', label: 'Faible', className: 'bg-emerald-50 text-emerald-700 border-emerald-200' };
            }
            if (capex <= 15000 && (roi === null || roi <= 8) && category !== 'envelope') {
                return { key: 'medium', label: 'Modere', className: 'bg-amber-50 text-amber-700 border-amber-200' };
            }
            return { key: 'high', label: 'Structurant', className: 'bg-purple-50 text-purple-700 border-purple-200' };
        }

        function newDiagnosticGetActionPriorityReason(action, breakdown) {
            const category = action ? action.category : null;
            const categoryLabel = NEW_DIAGNOSTIC_CATEGORY_LABELS[category] || 'Usage principal';
            const breakdownKey = NEW_DIAGNOSTIC_CATEGORY_TO_BREAKDOWN_KEY[category] || 'other_specific_pct';
            const postePct = newDiagnosticGetBreakdownPctValue(
                breakdown && breakdown.breakdown_pct ? breakdown.breakdown_pct : breakdown,
                breakdownKey
            );

            const roi = action && action.roi_years ? action.roi_years.value : null;
            const gainEuro = action && action.gain_euro_an ? action.gain_euro_an.value || 0 : 0;
            const capex = action && action.capex ? action.capex.value || 0 : 0;

            let why = 'Cette action remonte car elle active un levier concret sans complexité excessive.';
            if (roi !== null && roi <= 3) {
                why = 'Cette action remonte car elle agit vite sur un poste utile avec un investissement limité.';
            } else if (gainEuro >= 2500) {
                why = 'Cette action est prioritaire pour capter un gain annuel significatif sur un poste déjà lourd.';
            } else if (capex <= 2000) {
                why = "Cette action permet d'enclencher des gains sans engager de chantier lourd.";
            } else if (roi !== null && roi > 7) {
                why = 'Cette action a du sens mais doit être validée techniquement avant arbitrage budgétaire.';
            }

            const posteText = postePct > 0
                ? `${categoryLabel} (~${Math.round(postePct)}% des usages estimés).`
                : `${categoryLabel} (part à confirmer sur site).`;

            return { why, posteText };
        }

        function newDiagnosticBuildDecisionReadout(reportPayload) {
            const benchmark = reportPayload.benchmark_result || {};
            const composite = reportPayload.composite_savings || {};
            const confidence = reportPayload.confidence || {};
            const totalPct = composite.total_pct ? composite.total_pct.value || 0 : 0;
            const position = benchmark.position || 'in_range';

            let diagnostic = 'Le site est globalement dans la référence du secteur, avec des gains encore accessibles.';
            if (position === 'far_above_range') {
                diagnostic = 'Le site est nettement au-dessus des références du secteur et doit être repriorisé.';
            } else if (position === 'above_range') {
                diagnostic = 'Le site se situe au-dessus de la référence sectorielle, sans être hors contrôle.';
            } else if (position === 'below_range') {
                diagnostic = 'Le site est bien positionné ; la suite repose surtout sur une optimisation ciblée.';
            }

            let risk = "Le risque principal est de laisser des gains rapides non captés faute d'ordre d'action.";
            if (position === 'far_above_range' || position === 'above_range') {
                risk = 'Sans plan gradué, la hausse des charges peut repousser les arbitrages utiles.';
            } else if (position === 'below_range') {
                risk = 'Le risque est surtout de perdre ce niveau de performance sans pilotage continu.';
            }
            if (confidence.level === 'low') {
                risk = 'Le risque immédiat est de décider sur des données encore trop approximatives.';
            }

            let opportunity = `Un plan progressif peut capter environ ${Math.round(totalPct)}% d'économies estimées, sans engager d'emblée des travaux lourds.`;
            if (totalPct >= 30) {
                opportunity = `Le potentiel est élevé (~${Math.round(totalPct)}%) ; un échange expert permet surtout de confirmer le bon ordre d'action.`;
            } else if (totalPct <= 15) {
                opportunity = "Le potentiel est ciblé ; la valeur vient surtout d'un tri fin des actions sans regret.";
            }

            return { diagnostic, risk, opportunity };
        }

        function newDiagnosticBuildProgramBudget(actions, annualSavings) {
            const safeActions = actions || [];
            const capexBrut = safeActions.reduce((sum, action) => sum + ((action.capex && action.capex.value) || 0), 0);
            const aides = newDiagnosticEstimateAides(safeActions);
            const capexNet = Math.max(0, capexBrut - aides);
            const annual = Math.max(0, annualSavings || 0);
            const roi = annual > 0 ? capexNet / annual : null;

            return {
                capex_brut: Math.round(capexBrut),
                aides: Math.round(aides),
                capex_net: Math.round(capexNet),
                annual_savings: Math.round(annual),
                roi_global_years: roi !== null ? Math.round(roi * 10) / 10 : null

        };

        /* ─────────────────────────────────────────────────────────────────────────
           CONTENEUR PRINCIPAL FORMULAIRE
           ───────────────────────────────────────────────────────────────────────── */

        /* ─── Transition premium formulaire → rapport ───────────────────── */
        const REVEAL_MESSAGES = [
            'Analyse du site en cours…',
            'Structuration des recommandations…',
            'Votre rapport est prêt.',
        ];

        const ReportRevealTransition = ({ onDone }) => {
            const [msgIdx, setMsgIdx] = React.useState(0);
            const [fadeOut, setFadeOut] = React.useState(false);
            const prefersReduced = typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            React.useEffect(() => {
                if (prefersReduced) { onDone(); return; }
                const timers = [
                    setTimeout(() => setMsgIdx(1), 250),
                    setTimeout(() => setMsgIdx(2), 550),
                    setTimeout(() => setFadeOut(true), 750),
                    setTimeout(() => onDone(), 950),
                ];
                return () => timers.forEach(clearTimeout);
            }, []);

            return (
                <div
                    style={{
                        position: 'fixed', inset: 0, zIndex: 9999,
                        background: 'linear-gradient(135deg, #0A1928 0%, #1D4ED8 60%, #0F2236 100%)',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        flexDirection: 'column', gap: 20,
                        opacity: fadeOut ? 0 : 1,
                        transition: 'opacity 200ms ease',
                        pointerEvents: 'none',

                >
                    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>

                            <circle cx="16" cy="16" r="14" stroke="rgba(255,255,255,0.25)" strokeWidth="2" />
                            <circle cx="16" cy="16" r="14" stroke="white" strokeWidth="2"
                                strokeDasharray="88" strokeDashoffset="22"
                                style={{ transformOrigin: 'center', animation: 'spin 1.2s linear infinite' }} />
                        </svg>
                        <span style={{ fontSize: 13, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.6)' }}>DiagTertiaire</span>
                    </div>
                    <p style={{
                        fontSize: 22, fontWeight: 900, color: '#fff',
                        letterSpacing: '-0.5px', textAlign: 'center', maxWidth: 320,
                        transition: 'opacity 200ms ease',
                        opacity: 1,
                    }}>
                        {REVEAL_MESSAGES[msgIdx]}
                    </p>
                    <div style={{ display: 'flex', gap: 6, marginTop: 4 }}>
                        {REVEAL_MESSAGES.map((_, i) => (
                            <div key={i} style={{
                                width: i === msgIdx ? 20 : 6, height: 6,
                                borderRadius: 3,
                                background: i === msgIdx ? '#fff' : 'rgba(255,255,255,0.3)',
                                transition: 'all 200ms ease',
                            }} />

        const NewDiagnosticForm = ({ onComplete }) => {
            const [currentStep, setCurrentStep] = useState(1);
            const [formData, setFormData] = useState(NEW_DIAGNOSTIC_DEFAULT_FORM_DATA);
            const [reportPayload, setReportPayload] = useState(null);
            const [submitError, setSubmitError] = useState(null);
            const [isTransitioning, setIsTransitioning] = useState(false);

            useEffect(() => {
                newDiagnosticTrack('start_diagnostic');
                try {
                    const saved = window.localStorage.getItem('newDiagnosticLatestReport');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed && parsed.report_id) {
                            setReportPayload(parsed);
                        }
                    }
                } catch (e) { /* silent */ }
            }, []);

            const handleComplete = async () => {
                setSubmitError(null);

                try {
                    newDiagnosticTrack('submit_form', {
                        activity: formData.activity,
                        role: formData.role,
                        surface: formData.surface
                    });

                    const payload = newDiagnosticBuildReportData(formData);
                    const leadPayload = newDiagnosticBuildDiagnosticLeadPayload(formData, payload);
                    const insertedLead = await newDiagnosticSubmitLead(leadPayload);
                    const leadSubmissionId = insertedLead && insertedLead.id ? insertedLead.id : null;
                    const nextReportPayload = leadSubmissionId
                        ? { ...payload, lead_submission_id: leadSubmissionId }
                        : payload;

                    if (leadPayload.partnerConsent) {
                        await newDiagnosticSubmitPartnerLead(leadPayload, leadSubmissionId);
                    } else {
                        console.log('partner consent false, no partner insert');
                    }

                    setReportPayload(nextReportPayload);
                    setIsTransitioning(true);

                    // Appel silencieux — ne jamais bloquer l'affichage du rapport
                    const notifyAndSavePdf = async (rp, fd, lsId) => {
                        try {
                            if (!rp || !lsId) return;
                            const response = await fetch('/api/public-report-pdf', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    lead_submission_id: lsId,
                                    report_payload: rp
                                })
                            });
                            if (!response.ok) return;
                            const result = await response.json();
                            const pdfUrl = result && (result.report_url || result.pdf_url);

                            if (pdfUrl) {
                                setReportPayload((prev) => {
                                    const next = prev ? { ...prev, pdf_url: pdfUrl } : prev;

                                    try {
                                        if (next) {
                                            window.localStorage.setItem('newDiagnosticLatestReport', JSON.stringify(next));
                                        }
                                    } catch (_) {
                                        // no-op
                                    }

                                    return next;
                                });
                            }
                        } catch (_) {
                            // Silencieux — le fallback local reste disponible
                        }
                    };
                    notifyAndSavePdf(nextReportPayload, formData, leadSubmissionId);

                    if (typeof onComplete === 'function') {
                        onComplete(formData, nextReportPayload);
                    }

                    try {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } catch (error) {
                        window.scrollTo(0, 0);
                    }
                } catch (error) {
                    console.error('Erreur lors de la génération du rapport du nouveau formulaire :', error);
                    setSubmitError("Impossible de générer le rapport. Vérifiez les données saisies puis réessayez.");
                }
            };

            const handleReset = () => {
                setFormData(NEW_DIAGNOSTIC_DEFAULT_FORM_DATA);
                setCurrentStep(1);
                setReportPayload(null);
                setSubmitError(null);

                try {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (error) {
                    window.scrollTo(0, 0);
                }
            };

            const handleEdit = (targetStep = 1, overrides = null) => {
                try {
                    const saved = window.localStorage.getItem('newDiagnosticLatestSubmission');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
                            setFormData({
                                ...NEW_DIAGNOSTIC_DEFAULT_FORM_DATA,
                                ...parsed,
                                ...(overrides && typeof overrides === 'object' ? overrides : {})
                            });
                        } else {
                            setFormData({
                                ...NEW_DIAGNOSTIC_DEFAULT_FORM_DATA,
                                ...(overrides && typeof overrides === 'object' ? overrides : {})
                            });
                        }
                    } else {
                        setFormData({
                            ...NEW_DIAGNOSTIC_DEFAULT_FORM_DATA,
                            ...(overrides && typeof overrides === 'object' ? overrides : {})
                        });
                    }
                } catch (e) {
                    setFormData({
                        ...NEW_DIAGNOSTIC_DEFAULT_FORM_DATA,
                        ...(overrides && typeof overrides === 'object' ? overrides : {})
                    });
                }
                setCurrentStep(targetStep);
                setReportPayload(null);
                setSubmitError(null);
                try {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (e) {
                    window.scrollTo(0, 0);
                }
            };

            if (reportPayload) {
                return (
                    <div className="new-diagnostic-report-shell">
                        {isTransitioning && (

                                setIsTransitioning(false);

                                </button>
                                <button

                                    onClick={() => handleEdit(1)}

                                >
                                    <Icon icon="solar:pen-bold" className="text-base" />
                                    Modifier mon rapport
                                </button>
                                <span className="ml-auto text-[11px] text-slate-400 hidden sm:block">Votre comparatif énergétique · DiagTertiaire</span>
                            </div>
                        </div>

                        <NewDiagnosticReportScreen
                            reportPayload={reportPayload}
                            userEmail={formData.email}
                            formData={formData}
                            setFormData={setFormData}
                            setReportPayload={setReportPayload}
                            onLeadSubmissionCreated={(leadSubmissionId) => {
                                setReportPayload((prev) => {
                                    if (!prev || prev.lead_submission_id === leadSubmissionId) {
                                        return prev;
                                    }

                                    return { ...prev, lead_submission_id: leadSubmissionId };
                                });
                            }}
                        />
                    </div>
                );
            }

            return (
                <div className="new-diagnostic-form fade-in py-12 px-4">
                    <div className="max-w-4xl mx-auto">
                        {submitError && (
                            <div className="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
                                {submitError}
                            </div>
                        )}

                        <NewDiagnosticStepper currentStep={currentStep} totalSteps={5} />

                        {currentStep === 1 && (
                            <NewDiagnosticStep1Building
                                formData={formData}
                                setFormData={setFormData}
                                onNext={() => { setCurrentStep(2); window.scrollTo({ top: 0, behavior: 'smooth' }); }}

                        {currentStep === 2 && (
                            <NewDiagnosticStep2Equipment

                        {currentStep === 3 && (

                                onBack={() => { setCurrentStep(3); window.scrollTo({ top: 0, behavior: 'smooth' }); }}

                        {currentStep === 5 && (
                            <NewDiagnosticStep5Contact
                                formData={formData}
                                setFormData={setFormData}
                                onNext={handleComplete}
                                onBack={() => { setCurrentStep(4); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                            />

        // ===== LOGO INLINE SVG — partagé nav + rapports =====
        const DIAGTERTIAIRE_LOGO_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="7" fill="#1D4ED8"/><path d="M6 25V11l10-3.5L26 11v14" stroke="white" stroke-width="1.9" stroke-linejoin="round" fill="none"/><rect x="13" y="17" width="6" height="8" rx="1.2" fill="white" opacity="0.95"/><path d="M6 14h20" stroke="white" stroke-width="1.1" opacity="0.35"/><circle cx="10" cy="18" r="1.1" fill="white" opacity="0.65"/><circle cx="22" cy="18" r="1.1" fill="white" opacity="0.65"/></svg>';

            )

            return 'diagnostic';

            return (

                                <a

                                        <NavLink key={item.page} page={item.page} label={item.label} href={item.href} />

                                </div>

                                <div className="hidden md:block">

                                        href="/diagnostic"
                                        onClick={(e) => { e.preventDefault(); navigate('diagnostic'); }}

                                <button
                                    type="button"

                            </div>
                        </div>

                        {isMobileMenuOpen && (
                            <div className="md:hidden border-t border-[#E2E8F0] bg-white">
                                <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4">
                                    <div className="flex flex-col gap-2">
                                        {headerPages.map((item) => (
                                            <NavLink key={`mobile-${item.page}`} page={item.page} label={item.label} href={item.href} mobile />
                                        ))}
                                    </div>
                                    <a
                                        href="/diagnostic"
                                        onClick={(e) => { e.preventDefault(); navigate('diagnostic'); }}

                                            window.localStorage.setItem('newDiagnosticLatestSubmission', JSON.stringify(data));

                                                window.localStorage.setItem('newDiagnosticLatestReport', JSON.stringify(reportPayload));
                                            }

                                            console.warn('Impossible de sauvegarder la soumission du nouveau formulaire.', error);

    <!-- Scroll Reveal Observer -->
    <script>
        (function() {
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

            function observeAll() {
                document.querySelectorAll('.sr').forEach(function(el) {
                    observer.observe(el);
                });
            }

            // Initial observation + re-observe on SPA navigation
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', observeAll);
            } else {
                observeAll();
            }

            // MutationObserver to catch React re-renders
            var mo = new MutationObserver(function() {
                document.querySelectorAll('.sr:not(.visible)').forEach(function(el) {
                    observer.observe(el);
                });
            });
            mo.observe(document.getElementById('root') || document.body, { childList: true, subtree: true });
        })();
    </script>
