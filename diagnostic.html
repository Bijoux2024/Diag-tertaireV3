        const newDiagnosticGenerateSubmissionId = () => {
            const cryptoObject = typeof globalThis !== 'undefined' ? globalThis.crypto : null;

            if (cryptoObject && typeof cryptoObject.randomUUID === 'function') {
                return cryptoObject.randomUUID();
            }

            if (cryptoObject && typeof cryptoObject.getRandomValues === 'function') {
                const bytes = new Uint8Array(16);
                cryptoObject.getRandomValues(bytes);
                bytes[6] = (bytes[6] & 0x0f) | 0x40;
                bytes[8] = (bytes[8] & 0x3f) | 0x80;
                const hex = Array.from(bytes, (byte) => byte.toString(16).padStart(2, '0')).join('');
                return `${hex.slice(0, 8)}-${hex.slice(8, 12)}-${hex.slice(12, 16)}-${hex.slice(16, 20)}-${hex.slice(20)}`;
            }

            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (char) => {
                const randomValue = Math.random() * 16 | 0;

        const NEW_DIAGNOSTIC_ANTISPAM_STORAGE_PREFIX = 'diagtertiaire_antispam';
        const NEW_DIAGNOSTIC_ANTISPAM_HONEYPOT_STYLE = {
            position: 'absolute',
            left: '-9999px',

        const newDiagnosticGetStorage = (type = 'session') => {
            if (typeof window === 'undefined') {

            } catch (error) {
                return null;

        const newDiagnosticGetAntiSpamStorageKey = (kind, formKey) => `${NEW_DIAGNOSTIC_ANTISPAM_STORAGE_PREFIX}:${kind}:${formKey}`;

        const newDiagnosticReadStoredTimestamp = (kind, formKey, type = 'session') => {
            const storage = newDiagnosticGetStorage(type);
            if (!storage) {
                return null;
            }

            const rawValue = storage.getItem(newDiagnosticGetAntiSpamStorageKey(kind, formKey));
            const parsedValue = Number(rawValue);
            return Number.isFinite(parsedValue) && parsedValue > 0 ? parsedValue : null;
        };

        const newDiagnosticWriteStoredTimestamp = (kind, formKey, value, type = 'session') => {
            const storage = newDiagnosticGetStorage(type);
            if (!storage) {
                return;
            }

            const storageKey = newDiagnosticGetAntiSpamStorageKey(kind, formKey);

            if (value === null || typeof value === 'undefined') {

            storage.setItem(storageKey, String(value));

                    ok: false,

                console.log('lead submit response', response.status);

                const responseText = await response.text().catch(() => '');
                let responseData = null;

                if (responseText) {
                    try {
                        const parsed = JSON.parse(responseText);
                        responseData = Array.isArray(parsed) ? (parsed[0] || null) : parsed;
                    } catch (parseError) {
                        responseData = null;
                    }
                }

                if (!response.ok) {
                    newDiagnosticWarnSupabaseSchemaMismatch(
                        tableName,
                        `Erreur Supabase ${tableName}: ${response.status}${responseText ? ` ${responseText}` : ''}`
                    );
                    return {
                        ok: false,
                        status: response.status,
                        data: responseData,
                        error: `Erreur Supabase ${tableName}: ${response.status}${responseText ? ` ${responseText}` : ''}`
                    };
                }

                return {
                    ok: true,
                    status: response.status,
                    data: responseData,
                    error: null
                };
            } catch (err) {
                console.error('Erreur lors de la sauvegarde du lead :', err);
                return {
                    ok: false,
                    status: 0,
                    data: null,
                    error: err && err.message ? err.message : `Erreur réseau lors de la sauvegarde dans ${tableName}.`
                };
            }

        /* ─────────────────────────────────────────────────────────────────────────

        const newDiagnosticValidateEmail = (email) => {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        };

        const newDiagnosticValidatePostalCode = (code) => {
            return /^\d{5}$/.test(code);
        };

        const newDiagnosticValidateNumber = (value, min = 0, max = Infinity) => {
            const num = parseFloat(value);
            return !isNaN(num) && num >= min && num <= max;
        };

        const newDiagnosticValidateMixUsage = (officesPct, retailPct) => {
            const total = parseFloat(officesPct || 0) + parseFloat(retailPct || 0);
            // Tolérance arrondi <= 0.5 puis normalisation
            return Math.abs(total - 100) <= 0.5;
        };

        const newDiagnosticNormalizeMixUsage = (officesPct, retailPct) => {
            const total = parseFloat(officesPct || 0) + parseFloat(retailPct || 0);
            if (total === 0) return { officesPct: 50, retailPct: 50 };
            return {
                officesPct: Math.round((officesPct / total) * 100 * 10) / 10,
                retailPct: Math.round((retailPct / total) * 100 * 10) / 10
            };
        };

        const newDiagnosticValidateEnergyData = (formData) => {
            const errors = [];
            const isNetwork = formData.mainHeating === 'network';

            // Au moins une énergie doit être renseignée
            if (isNetwork) {
                // Pour réseau de chaleur : kWh réseau obligatoire
                if (!formData.networkKwh && !formData.networkEuro) {
                    errors.push('Réseau de chaleur : renseignez au moins les kWh ou le montant en €');
                    return errors;
                }
            } else if (!formData.elecUsed && !formData.gasUsed) {
                errors.push('Au moins une énergie (électricité ou gaz) doit être renseignée');
                return errors;
            }

            // Si élec utilisée, au moins kWh ou €
            if (formData.elecUsed) {
                const hasElecData = formData.elecKwh || formData.elecEuro;
                if (!hasElecData) {
                    errors.push('Électricité : renseignez au moins les kWh ou le montant en €');
                }
            }

            // Si gaz utilisé, au moins kWh ou €
            if (formData.gasUsed) {
                const hasGasData = formData.gasKwh || formData.gasEuro;
                if (!hasGasData) {
                    errors.push('Gaz : renseignez au moins les kWh ou le montant en €');
                }
            }

            // Validation cohérence prix implicite (warning, non bloquant)
            if (formData.elecKwh && formData.elecEuro) {
                const implicitPrice = parseFloat(formData.elecEuro) / parseFloat(formData.elecKwh);
                if (implicitPrice < 0.10 || implicitPrice > 0.35) {
                    errors.push({
                        type: 'warning',
                        code: 'PRICE_IMPLIED_OUT_OF_RANGE',
                        message: 'Électricité : le prix au kWh calculé semble inhabituel. Vérifiez vos chiffres.'
                    });
                }
            }

            if (formData.gasKwh && formData.gasEuro) {
                const implicitPrice = parseFloat(formData.gasEuro) / parseFloat(formData.gasKwh);
                if (implicitPrice < 0.05 || implicitPrice > 0.20) {
                    errors.push({
                        type: 'warning',
                        code: 'PRICE_IMPLIED_OUT_OF_RANGE',
                        message: 'Gaz : le prix au kWh calculé semble inhabituel. Vérifiez vos chiffres.'
                    });
                }
            }

            return errors;
        };

        // Auto-complétion Raison sociale via API Recherche Entreprises (gouv.fr)
        const NewDiagnosticCompanyAutocomplete = ({ value, onChange, onSelect, error, helper }) => {
            const [suggestions, setSuggestions] = React.useState([]);
            const [isOpen, setIsOpen] = React.useState(false);
            const [loading, setLoading] = React.useState(false);
            const debounceRef = React.useRef(null);
            const wrapperRef = React.useRef(null);

            // Fermer la dropdown quand on clique en dehors
            React.useEffect(() => {
                const handleClickOutside = (e) => {
                    if (wrapperRef.current && !wrapperRef.current.contains(e.target)) {
                        setIsOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            const searchCompanies = React.useCallback((query) => {
                if (!query || query.length < 3) {
                    setSuggestions([]);
                    setIsOpen(false);
                    return;
                }
                clearTimeout(debounceRef.current);
                debounceRef.current = setTimeout(async () => {
                    setLoading(true);
                    try {
                        const res = await fetch(
                            `https://recherche-entreprises.api.gouv.fr/search?q=${encodeURIComponent(query)}&per_page=5&page=1`
                        );
                        if (res.ok) {
                            const data = await res.json();
                            const results = (data.results || []).map(r => ({
                                nom: r.nom_complet || r.nom_raison_sociale || '',
                                siret: r.siege && r.siege.siret ? r.siege.siret : '',
                                siren: r.siren || '',
                                adresse: r.siege ? [r.siege.libelle_voie, r.siege.code_postal, r.siege.libelle_commune].filter(Boolean).join(' ') : '',
                                naf: r.activite_principale || '',
                                tranche: r.tranche_effectif_salarie || ''
                            }));
                            setSuggestions(results);
                            setIsOpen(results.length > 0);
                        }
                    } catch (e) {
                        // Silencieux : le champ reste un simple input texte si l'API est indisponible
                    }
                    setLoading(false);
                }, 300);
            }, []);

            const handleSelect = (company) => {
                onChange(company.nom);
                onSelect(company);
                setIsOpen(false);
                setSuggestions([]);
            };

            const fieldId = 'ndf-raison-sociale';
            const errorId = fieldId + '-err';

            return (
                <div className="mb-5 relative group" ref={wrapperRef}>
                    <label htmlFor={fieldId} className="block text-[13px] font-bold tracking-wide uppercase text-slate-500 mb-2 transition-colors group-focus-within:text-[#1D4ED8]">
                        Raison sociale

                        <input
                            id={fieldId}
                            type="text"
                            value={value}
                            onChange={(e) => {
                                onChange(e.target.value);

                            aria-describedby={error ? errorId : undefined}

        const NewDiagnosticMixSlider = ({ officesPct, retailPct, onChange }) => {
