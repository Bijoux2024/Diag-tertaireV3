                            {/* Custom style for the slider to look punchy */}
                            <input
                                type="range"
                                min="0"
                                max="100"
                                step="1"
                                value={officesPct}
                                onChange={(e) => handleOfficeChange(e.target.value)}
                                className="w-full h-3 rounded-full appearance-none bg-slate-200 focus:outline-none focus:ring-4 focus:ring-blue-500/10 cursor-pointer"
                                style={{
                                    background: `linear-gradient(to right, #3B82F6 0%, #3B82F6 ${officesPct}%, #F59E0B ${officesPct}%, #F59E0B 100%)`
                                }}
                            />
                        </div>

                        <div className="grid grid-cols-2 gap-5 mt-4">
                            <div className="p-4 bg-white rounded-xl text-center border-2 border-transparent shadow-sm">
                                <div className="text-3xl font-black text-[#1D4ED8]">{Math.round(officesPct)}%</div>
                                <div className="text-[13px] font-semibold text-slate-500 mt-1">Bureaux</div>
                            </div>
                            <div className="p-4 bg-white rounded-xl text-center border-2 border-transparent shadow-sm">
                                <div className="text-3xl font-black text-[#F59E0B]">{Math.round(retailPct)}%</div>
                                <div className="text-[13px] font-semibold text-slate-500 mt-1">Commerce</div>
                            </div>
                        </div>

                        {!isValid && (
                            <div className="flex items-center justify-center gap-2 mt-2 text-red-500 bg-red-50 p-2 rounded-lg">
                                <Icon icon="solar:danger-triangle-bold" />
                                <span className="text-xs font-semibold">La somme doit être égale à 100%</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        /* ─────────────────────────────────────────────────────────────────────────
           ÉTAPES FORMULAIRE
           ───────────────────────────────────────────────────────────────────────── */

        // Composant facultatif Visuel du Bâtiment
        // Composant facultatif Visuel du Bâtiment
        const newDiagnosticIsDirectReportImageUrl = (value) => {
            const path = String(value || '').trim();
            return !!path && (/^https?:\/\//i.test(path) || path.startsWith('/api/') || path.startsWith('/'));
        };

        const newDiagnosticGetCoverModeFromSource = (source) => {
            if (source === 'ign_ortho') return 'ign_ortho';
            if (source === 'ign_plan') return 'ign_plan';
            if (source === 'upload') return 'upload';
            return 'panoramax';
        };

        const NEW_DIAGNOSTIC_COVER_STATE_KEYS = [
            'coverMode',
            'coverImageStatus',
            'coverImageError',
            'coverImageSource',
            'coverImagePath',
            'coverImageSignedUrl',
            'coverImageSelected',
            'coverSelectionManuallyDisabled',
            'coverStepDismissed',
            'coverParcelRef',
            'coverCoordinates',
            'coverBBox',
            'coverGeneratedAt',
            'coverUploadFileName',
            'coverUploadPreviewUrl',
            'coverPanX',
            'coverPanY',
            'coverZoom',
            'coverIsPanoramic',
            'coverCandidates',
            'coverSelectedCandidateId',
            'coverStreetViewHeading',
            'coverStreetViewPitch',
            'coverStreetViewFov',
            'coverStreetViewPanoId',
            'coverStreetViewAvailable',
            'coverIsManual'
        ];

        const newDiagnosticPickCoverState = (source) => NEW_DIAGNOSTIC_COVER_STATE_KEYS.reduce((acc, key) => {
            if (source && Object.prototype.hasOwnProperty.call(source, key)) {
                acc[key] = source[key];
            }
            return acc;
        }, {});

        const newDiagnosticBuildReportCoverPreviewFromState = (source) => ({
            selected: !!source?.coverImageSelected,
            url: source?.coverImageSelected ? String(source?.coverImageSignedUrl || '').trim() : '',
            source: String(source?.coverImageSource || '').trim(),
            manuallyDisabled: !!source?.coverSelectionManuallyDisabled
        });

        const NewDiagnosticCoverPreview = ({
            formData,
            setFormData,
            forceVisible = false,
            onDismiss = null,
            dismissLabel = 'Passer',
            surface = 'inline'
        }) => {
            const isModalSurface = surface === 'modal';
            const handleDismiss = () => {
                if (typeof onDismiss === 'function') {
                    onDismiss();
                    return;
                }
                setFormData(prev => ({ ...prev, coverStepDismissed: true }));
            };
            const handleModeChange = (newMode) => {
                if (newMode === formData.coverMode) return;
                setFormData(prev => ({
                    ...prev,
                    coverMode: newMode,
                    // Reset visuel du composant précédent
                    coverImageStatus: 'initial',
                    coverImageError: null,
                    coverImageSelected: false,
                    coverSelectionManuallyDisabled: false,
                    coverStepDismissed: false,
                    coverImageSource: '',
                    coverImagePath: '',
                    coverImageSignedUrl: '',
                    coverParcelRef: '',
                    coverCoordinates: null,
                    coverBBox: null,
                    coverGeneratedAt: '',
                    coverUploadFileName: '',
                    coverUploadPreviewUrl: '',
                    coverPanX: 50,
                    coverZoom: 1,
                    coverIsPanoramic: false,
                    coverPanY: 50,
                    coverCandidates: [],
                    coverSelectedCandidateId: null,
                    coverStreetViewHeading: 0,
                    coverStreetViewPitch: 0,
                    coverStreetViewFov: 90,
                    coverStreetViewPanoId: null,
                    coverStreetViewAvailable: false
                }));
            };

            useEffect(() => {
                if (
                    formData.coverImageStatus !== 'ready'
                    || !formData.coverImageSignedUrl
                    || formData.coverImageSelected
                    || formData.coverSelectionManuallyDisabled
                ) {
                    return;
                }

                setFormData(prev => {
                    if (
                        prev.coverImageStatus !== 'ready'
                        || !prev.coverImageSignedUrl
                        || prev.coverImageSelected
                        || prev.coverSelectionManuallyDisabled
                    ) {
                        return prev;
                    }

                    return {
                        ...prev,
                        coverImageSelected: true
                    };
                });
            }, [
                formData.coverImageStatus,
                formData.coverImageSignedUrl,
                formData.coverImageSelected,
                formData.coverSelectionManuallyDisabled,
                setFormData
            ]);

            // --- Street View Control Debouncer ---
            // Évite de déclencher la facturation Google Image au moindre changement de valeur de range.
            React.useEffect(() => {
                if (formData.coverMode !== 'panoramax' || formData.coverImageSource !== 'google_streetview' || !formData.coverStreetViewAvailable || !formData.lat || !formData.lon) return;

                const url = `/api/public-report-google-streetview?action=image&lat=${formData.lat}&lon=${formData.lon}&heading=${formData.coverStreetViewHeading}&pitch=${formData.coverStreetViewPitch}&fov=${formData.coverStreetViewFov}`;

                if (formData.coverImageSignedUrl === url) return;

                const timerId = setTimeout(() => {
                    setFormData(prev => ({ ...prev, coverImageSignedUrl: url }));
                }, 400);

                return () => clearTimeout(timerId);
            }, [
                formData.coverMode,
                formData.coverImageSource,
                formData.coverStreetViewAvailable,
                formData.coverStreetViewHeading,
                formData.coverStreetViewPitch,
                formData.coverStreetViewFov,
                formData.lat,
                formData.lon,
                formData.coverImageSignedUrl
            ]);

            const handleFileUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;

                const validTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/webp'];
                if (!validTypes.includes(file.type)) {
                    setFormData(prev => ({
                        ...prev,
                        coverImageStatus: 'error',
                        coverImageError: 'Format non supporté (JPG, PNG, WEBP uniquement).',
                        coverImageSource: '',
                        coverImagePath: '',
                        coverImageSignedUrl: '',
                        coverSelectionManuallyDisabled: false,
                        coverParcelRef: '',
                        coverCoordinates: null,
                        coverBBox: null,
                        coverGeneratedAt: '',
                        coverPanX: 50,
                        coverZoom: 1,
                        coverIsPanoramic: false,
                        coverPanY: 50,
                        coverCandidates: [],
                        coverSelectedCandidateId: null,
                        coverStreetViewHeading: 0,
                        coverStreetViewPitch: 0,
                        coverStreetViewFov: 90,
                        coverStreetViewPanoId: null,
                        coverStreetViewAvailable: false
                    }));
                    return;
                }

                if (file.size > 3 * 1024 * 1024) {
                    setFormData(prev => ({
                        ...prev,
                        coverImageStatus: 'error',
                        coverImageError: 'Fichier trop lourd (max 3 Mo).',
                        coverImageSource: '',
                        coverImagePath: '',
                        coverImageSignedUrl: '',
                        coverSelectionManuallyDisabled: false,
                        coverParcelRef: '',
                        coverCoordinates: null,
                        coverBBox: null,
                        coverGeneratedAt: '',
                        coverPanX: 50,
                        coverZoom: 1,
                        coverIsPanoramic: false,
                        coverPanY: 50,
                        coverCandidates: [],
                        coverSelectedCandidateId: null,
                        coverStreetViewHeading: 0,
                        coverStreetViewPitch: 0,
                        coverStreetViewFov: 90,
                        coverStreetViewPanoId: null,
                        coverStreetViewAvailable: false
                    }));
                    return;
                }

                // Activation de l'état loading
                setFormData(prev => ({
                    ...prev,
                    coverMode: 'upload',
                    coverImageStatus: 'loading',
                    coverImageError: null,
                    coverImageSelected: false,
                    coverSelectionManuallyDisabled: false,
                    coverStepDismissed: false,
                    coverImageSource: '',
                    coverImagePath: '',
                    coverImageSignedUrl: '',
                    coverParcelRef: '',
                    coverCoordinates: null,
                    coverBBox: null,
                    coverGeneratedAt: '',
                    coverUploadFileName: file.name,
                    coverUploadPreviewUrl: '',
                    coverPanX: 50,
                    coverZoom: 1,
                    coverIsPanoramic: false,
                    coverPanY: 50,
                    coverCandidates: [],
                    coverSelectedCandidateId: null,
                    coverStreetViewHeading: 0,
                    coverStreetViewPitch: 0,
                    coverStreetViewFov: 90,
                    coverStreetViewPanoId: null,
                    coverStreetViewAvailable: false
                }));

                try {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);

                    const base64String = await new Promise((resolve, reject) => {
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = error => reject(error);
                    });

                    const payload = {
                        file_name: file.name,
                        file_base64: base64String,
                        report_id: formData.publicReportId || null
                    };

                    const res = await fetch('/api/public-report-cover-upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const textContent = await res.text();
                    let data;
                    try { data = JSON.parse(textContent); }
                    catch (e) { throw new Error('Le service a renvoyé une réponse invalide'); }

                    if (!res.ok || !data.ok) {
                        throw new Error(data.error || 'Erreur lors du téléversement du fichier');
                    }

                    if (!data.cover_image_signed_url) {
                        throw new Error("L'aperçu premium n'est pas disponible.");
                    }

                    setFormData(prev => ({
                        ...prev,
                        coverImageStatus: 'ready',
                        coverImageSource: data.cover_image_source || 'upload',
                        coverImagePath: data.cover_image_path || '',
                        coverImageSignedUrl: data.cover_image_signed_url || '',
                        coverImageSelected: true,
                        coverSelectionManuallyDisabled: false,
                        coverUploadFileName: data.cover_original_filename || file.name,
                        coverUploadPreviewUrl: data.cover_image_signed_url, // Vraie source distante
                        coverImageError: null,
                        coverPanX: 50,
                        coverZoom: 1,
                        coverIsPanoramic: false,
                        coverPanY: 50,
                        coverCandidates: [],
                        coverSelectedCandidateId: null,
                        coverStreetViewHeading: 0,
                        coverStreetViewPitch: 0,
                        coverStreetViewFov: 90,
                        coverStreetViewPanoId: null,
                        coverStreetViewAvailable: false,
                        coverIsManual: true
                    }));
                } catch (err) {
                    console.error('[cover-upload] error:', err.message);
                    setFormData(prev => ({
                        ...prev,
                        coverImageStatus: 'error',
                        coverImageError: err.message || 'Impossible de téléverser la photo.',
                        coverImageSource: '',
                        coverImagePath: '',
                        coverImageSignedUrl: '',
                        coverSelectionManuallyDisabled: false,
                        coverUploadFileName: '',
                        coverUploadPreviewUrl: '',
                        coverPanX: 50,
                        coverZoom: 1,
                        coverIsPanoramic: false,
                        coverPanY: 50,
                        coverCandidates: [],
                        coverSelectedCandidateId: null
                    }));
                }
            };

            const handleGenerate = async () => {
                setFormData(prev => ({
                    ...prev,
                    coverImageStatus: 'loading',
                    coverImageError: null,
                    coverImageSelected: false,
                    coverSelectionManuallyDisabled: false,
                    coverStepDismissed: false,
                    coverImageSource: '',
                    coverImagePath: '',
                    coverImageSignedUrl: '',
                    coverParcelRef: '',
                    coverCoordinates: null,
                    coverBBox: null,
                    coverGeneratedAt: '',
                    coverPanX: 50,
                    coverZoom: 1,
                    coverIsPanoramic: false,
                    coverPanY: 50,
                    coverCandidates: [],
                    coverSelectedCandidateId: null
                }));
                try {
                    const payload = {
                        address: formData.fullAddress || formData.address,
                        preferred_source: formData.coverMode
                    };
                    if (formData.postalCode) payload.postalCode = formData.postalCode;
                    if (formData.city) payload.city = formData.city;
                    if (formData.lat) payload.lat = formData.lat;
                    if (formData.lon) payload.lon = formData.lon;

                    if (formData.coverMode === 'panoramax') {
                        if (!formData.lat || !formData.lon) {
                            throw new Error("Impossible de localiser l'adresse pour charger Street View.");
                        }
                        const svRes = await fetch(`/api/public-report-google-streetview?action=meta&lat=${formData.lat}&lon=${formData.lon}`);
                        let svData;
                        try { svData = await svRes.json(); } catch (e) { throw new Error('Le service Street View a renvoyé une réponse invalide'); }

                        if (!svRes.ok || !svData.ok) {
                            if (svData && svData.fallback_recommended) {
                                throw new Error(`${svData.error} Veuillez privilégier la Vue aérienne, le Plan, ou Téléverser.`);
                            }
                            throw new Error(svData?.error || "Le service Google Street View est indisponible.");
                        }
                        if (!svData.streetview_available) {
                            throw new Error("Aucune vue Google Street View n'est disponible pour cette adresse.");
                        }

                        const initialHeading = svData.heading || 0;
                        const initialPitch = svData.pitch || 0;
                        const initialFov = svData.fov || 90;
                        const proxyUrl = `/api/public-report-google-streetview?action=image&lat=${formData.lat}&lon=${formData.lon}&heading=${initialHeading}&pitch=${initialPitch}&fov=${initialFov}`;

                        setFormData(prev => ({
                            ...prev,
                            coverImageStatus: 'ready',
                            coverImageSource: 'google_streetview',
                            coverImagePath: proxyUrl, // L'URL proxy ne sera insérée que temporairement localement
                            coverImageSignedUrl: proxyUrl, // Utilisée uniquement pour la preview localement
                            coverImageSelected: true,
                            coverSelectionManuallyDisabled: false,
                            coverStreetViewAvailable: true,
                            coverStreetViewHeading: initialHeading,
                            coverStreetViewPitch: initialPitch,
                            coverStreetViewFov: initialFov,
                            coverStreetViewPanoId: svData.pano_id || null,
                            coverImageError: null
                        }));
                    } else {
                        const res = await fetch('/api/public-report-cover', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        const contentType = res.headers.get('content-type') || '';
                        const status = res.status;
                        const textContent = await res.text();

                        if (!contentType.includes('application/json')) {
                            if (status === 404) throw new Error('Le service de génération du visuel est introuvable');
                            if (status >= 500) throw new Error('Le service est temporairement indisponible');
                            throw new Error('Le service a renvoyé une réponse invalide');
                        }

                        let data;
                        try { data = JSON.parse(textContent); } catch (e) { throw new Error('Réponse invalide'); }

                        if (!res.ok || !data.ok) {
                            if (status === 404) throw new Error('Service introuvable');
                            if (status >= 500) throw new Error('Service indisponible');
                            throw new Error(data.error || 'Réponse invalide');
                        }

                        if (!data.cover_image_signed_url || data.cover_image_signed_url.trim() === '') {
                            throw new Error("L'aperçu du visuel n'est pas disponible.");
                        }

                        setFormData(prev => ({
                            ...prev,
                            coverImageStatus: 'ready',
                            coverImageSource: data.cover_image_source || '',
                            coverImagePath: data.cover_image_path || '',
                            coverImageSignedUrl: data.cover_image_signed_url || '',
                            coverImageSelected: true,
                            coverSelectionManuallyDisabled: false,
                            coverParcelRef: data.cover_parcel_ref || '',
                            coverCoordinates: data.coordinates || null,
                            coverBBox: data.bbox || null,
                            coverGeneratedAt: data.cover_generated_at || '',
                            coverImageError: null,
                            coverPanX: 50,
                            coverZoom: 1,
                            coverIsPanoramic: false,
                            coverPanY: 50,
                            coverCandidates: data.cover_candidates || [],
                            coverSelectedCandidateId: (data.cover_candidates && data.cover_candidates.length > 0) ? data.cover_candidates[0].id : null
                        }));
                    }

                } catch (err) {
                    console.error('[cover-preview] fetch error details:', err.message);

                    let finalErrorMessage = err.message;
                    if (err.name === 'TypeError' || err.message === 'Failed to fetch') {
                        finalErrorMessage = 'Impossible de contacter le service de génération du visuel';
                    }

                    setFormData(prev => ({
                        ...prev,
                        coverImageStatus: 'error',
                        coverImageError: finalErrorMessage || 'Impossible de générer le visuel du bâtiment.',
                        coverImageSource: '',
                        coverImagePath: '',
                        coverImageSignedUrl: '',
                        coverSelectionManuallyDisabled: false,
                        coverParcelRef: '',
                        coverCoordinates: null,
                        coverBBox: null,
                        coverGeneratedAt: '',
                        coverPanX: 50,
                        coverZoom: 1,
                        coverIsPanoramic: false,
                        coverPanY: 50,
                        coverCandidates: [],
                        coverSelectedCandidateId: null
                    }));
                }
            };

            const handleImageError = () => {
                const errorMsg = formData.coverImageSource === 'google_streetview'
                    ? "L'image Street View n'a pas pu être chargée (quota périodique potentiel). Veuillez privilégier la Vue aérienne ou le Plan."
                    : "L'aperçu du visuel n'a pas pu être chargé. Vous pouvez réessayer.";

                setFormData(prev => ({
                    ...prev,
                    coverImageStatus: 'error',
                    coverImageError: errorMsg,
                    coverImageSource: '',
                    coverImagePath: '',
                    coverImageSignedUrl: '',
                    coverSelectionManuallyDisabled: false,
                    coverParcelRef: '',
                    coverCoordinates: null,
                    coverBBox: null,
                    coverGeneratedAt: '',
                    coverPanX: 50,
                    coverZoom: 1,
                    coverIsPanoramic: false,
                    coverPanY: 50,
                    coverCandidates: [],
                    coverSelectedCandidateId: null
                }));
            };

            const handleImageLoad = (e) => {
                const { naturalWidth, naturalHeight } = e.target;
                if (formData.coverImageSource === 'panoramax' && (naturalWidth > naturalHeight * 1.5)) {
                    setFormData(prev => ({ ...prev, coverIsPanoramic: true }));
                } else {
                    setFormData(prev => ({ ...prev, coverIsPanoramic: false }));
                }
            };

            const sourceLabels = {
                'google_streetview': 'Google Street View',
                'panoramax': 'Panoramax (Vue au sol)',
                'ign_ortho': 'IGN (Vue aérienne)',
                'ign_plan': 'IGN (Plan interactif)',
                'upload': 'Photo importée'
            };

            const modes = [
                { id: 'panoramax', label: 'Façade rue' },
                { id: 'ign_ortho', label: 'Vue aérienne' },
                { id: 'ign_plan', label: 'Plan' },
                { id: 'upload', label: 'Téléverser' }
            ];

            if (!forceVisible && formData.coverStepDismissed) return null;

            return (
                <div className={isModalSurface ? 'bg-[#F8FAFC] border border-[#E2E8F0] rounded-[24px] p-5 md:p-6 shadow-sm overflow-hidden relative' : 'mt-8 mb-6 bg-[#F8FAFC] border border-[#E2E8F0] rounded-xl p-6 shadow-sm overflow-hidden relative fade-in'}>
                    <div className="flex items-start gap-4 mb-4">
                        <div className="w-10 h-10 rounded-full bg-blue-100 text-[#1D4ED8] flex items-center justify-center shrink-0">
                            <Icon icon="solar:gallery-add-bold-duotone" className="text-xl" />
                        </div>
                        <div className="flex-1">
                            <h3 className="text-lg font-bold text-neutral-800">Image pour la couverture du rapport</h3>
                            <p className="text-sm text-neutral-500 mt-1">Sélectionnez la source de l'image de couverture. Le processus prend en compte votre saisie adresse. (Étape facultative)</p>
                        </div>
                    </div>

                    <div className="flex gap-2 mb-6 border-b border-neutral-200 pb-2 overflow-x-auto no-scrollbar">
                        {modes.map(m => (
                            <button
                                key={m.id}
                                type="button"
                                onClick={() => handleModeChange(m.id)}
                                className={`px-4 py-2 text-sm font-semibold rounded-lg shrink-0 transition-colors ${formData.coverMode === m.id
                                    ? 'bg-blue-50 text-[#1D4ED8]'
                                    : 'text-neutral-500 hover:bg-neutral-50 hover:text-neutral-700'
                                    }`}
                            >
                                {m.label}
                            </button>
                        ))}
                    </div>

                    {formData.coverImageStatus === 'initial' && formData.coverMode !== 'upload' && (
                        <div className="flex gap-3 mt-4">
                            <button
                                type="button"
                                onClick={handleGenerate}
                                className="flex items-center gap-2 bg-white text-[#1D4ED8] px-4 py-2 rounded-lg font-semibold border border-[#DBEAFE] hover:bg-[#EFF6FF] transition-colors"
                            >
                                <Icon icon="solar:magic-stick-3-linear" className="text-lg" />
                                Générer une image
                            </button>
                            <button
                                type="button"
                                onClick={handleDismiss}
                                className="flex items-center gap-2 text-neutral-500 px-4 py-2 hover:text-neutral-700 transition-colors text-sm font-medium"
                            >
                                {dismissLabel}
                            </button>
                        </div>
                    )}

                    {formData.coverImageStatus === 'initial' && formData.coverMode === 'upload' && (
                        <div className="flex gap-3 mt-4">
                            <label className="flex items-center gap-2 bg-white text-[#1D4ED8] px-4 py-2 rounded-lg font-semibold border border-[#DBEAFE] hover:bg-[#EFF6FF] transition-colors cursor-pointer">
                                <Icon icon="solar:upload-linear" className="text-lg" />
                                Sélectionner une photo
                                <input type="file" className="hidden" accept="image/jpeg,image/png,image/webp" onChange={handleFileUpload} />
                            </label>
                            <button
                                type="button"
                                onClick={handleDismiss}
                                className="flex items-center gap-2 text-neutral-500 px-4 py-2 hover:text-neutral-700 transition-colors text-sm font-medium"
                            >
                                {dismissLabel}
                            </button>
                        </div>
                    )}

                    {formData.coverImageStatus === 'loading' && (
                        <div role="status" aria-live="polite" aria-busy="true" className="flex items-center gap-3 mt-4 text-[#1D4ED8] bg-blue-50/50 p-4 rounded-lg border border-blue-100">
                            <Icon icon="solar:spinner-linear" aria-hidden="true" className="animate-spin text-xl" />
                            <span className="text-sm font-medium">Génération en cours...</span>
                        </div>
                    )}

                    {formData.coverImageStatus === 'error' && (
                        <div className="mt-4">
                            <div role="alert" className="flex items-center gap-2 text-amber-600 bg-amber-50 p-3 rounded-lg text-sm border border-amber-100 mb-3">
                                <Icon icon="solar:danger-triangle-linear" aria-hidden="true" className="text-lg shrink-0" />
                                {formData.coverImageError}
                            </div>
                            {formData.coverMode !== 'upload' ? (
                                <button
                                    type="button"
                                    onClick={handleGenerate}
                                    className="flex items-center gap-2 text-sm font-semibold text-[#1D4ED8] hover:underline"
                                >
                                    <Icon icon="solar:refresh-linear" />
                                    Réessayer
                                </button>
                            ) : (
                                <label className="flex w-max items-center gap-2 text-sm font-semibold text-[#1D4ED8] hover:underline cursor-pointer">
                                    <Icon icon="solar:upload-linear" />
                                    Téléverser un autre fichier
                                    <input type="file" className="hidden" accept="image/jpeg,image/png,image/webp" onChange={handleFileUpload} />
                                </label>
                            )}
                        </div>
                    )}

                    {formData.coverImageStatus === 'ready' && formData.coverImageSignedUrl && (
                        <div className="mt-4 animate-fade-in relative">
                            {formData.coverImageSelected && (
                                <div className="absolute -top-3 -right-3 z-10 bg-green-500 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-md flex items-center gap-1">
                                    <Icon icon="solar:check-circle-bold" className="text-sm" />
                                    Sélectionné
                                </div>
                            )}
                            <div className={`relative rounded-lg overflow-hidden border ${formData.coverImageSelected ? 'border-green-400 ring-2 ring-green-100' : 'border-neutral-200'} bg-neutral-100 aspect-video max-h-64 object-cover transition-all duration-300`}>
                                <img
                                    src={formData.coverImageSignedUrl}
                                    alt="Aperçu du bâtiment"
                                    className="w-full h-full object-cover transition-transform duration-300"
                                    style={{
                                        objectPosition: `${formData.coverPanX ?? 50}% ${formData.coverPanY ?? 50}%`,
                                        transform: `scale(${formData.coverZoom ?? 1})`
                                    }}
                                    onError={handleImageError}
                                    onLoad={handleImageLoad}
                                />
                                <div className="absolute bottom-2 right-2 bg-black/60 backdrop-blur-sm text-white text-[10px] font-semibold px-2 py-1 rounded shadow-sm">
                                    Source : {sourceLabels[formData.coverImageSource] || 'IGN'}
                                </div>
                            </div>

                            {formData.coverMode === 'panoramax' && formData.coverImageSource === 'google_streetview' && formData.coverStreetViewAvailable && (
                                <div className="mt-3 bg-white border border-neutral-200 p-3 rounded-lg shadow-sm">
                                    <div className="text-sm font-semibold text-neutral-700 mb-2">Ajuster le cadrage</div>
                                    <div className="flex flex-col gap-3">
                                        <div>
                                            <label className="text-xs text-neutral-500 mb-1 flex justify-between">
                                                <span>Orientation (Gauche / Droite)</span>
                                            </label>
                                            <input
                                                type="range"
                                                min="0" max="360"
                                                value={formData.coverStreetViewHeading ?? 0}
                                                onChange={(e) => setFormData(prev => ({ ...prev, coverStreetViewHeading: parseInt(e.target.value, 10) }))}
                                                className="w-full h-1.5 bg-neutral-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-xs text-neutral-500 mb-1 flex justify-between">
                                                <span>Inclinaison (Haut / Bas)</span>
                                            </label>
                                            <input
                                                type="range"
                                                min="-30" max="30"
                                                value={formData.coverStreetViewPitch ?? 0}
                                                onChange={(e) => setFormData(prev => ({ ...prev, coverStreetViewPitch: parseInt(e.target.value, 10) }))}
                                                className="w-full h-1.5 bg-neutral-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-xs text-neutral-500 mb-1 flex justify-between">
                                                <span>Zoom (Champ de vision)</span>
                                            </label>
                                            <input
                                                type="range"
                                                min="20" max="90"
                                                value={formData.coverStreetViewFov ?? 90}
                                                onChange={(e) => setFormData(prev => ({ ...prev, coverStreetViewFov: parseInt(e.target.value, 10) }))}
                                                className="w-full h-1.5 bg-neutral-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                            />
                                        </div>
                                        <div className="flex justify-end mt-1">
                                            <button
                                                type="button"
                                                onClick={() => {
                                                    const url = `/api/public-report-google-streetview?action=image&lat=${formData.lat}&lon=${formData.lon}&heading=0&pitch=0&fov=90`;
                                                    setFormData(prev => ({ ...prev, coverStreetViewHeading: 0, coverStreetViewPitch: 0, coverStreetViewFov: 90, coverImageSignedUrl: url }));
                                                }}
                                                className="text-xs text-neutral-500 hover:text-neutral-800 transition-colors font-medium border border-neutral-200 px-2 py-1 rounded bg-neutral-50"
                                            >
                                                Réinitialiser le cadrage
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                            <div className="flex flex-wrap items-center gap-3 mt-4">
                                {!formData.coverImageSelected ? (
                                    <button
                                        type="button"
                                        onClick={() => setFormData(prev => ({ ...prev, coverImageSelected: true, coverSelectionManuallyDisabled: false }))}
                                        className="flex items-center gap-2 bg-[#1D4ED8] text-white px-5 py-2.5 rounded-lg font-semibold shadow-sm hover:bg-blue-800 transition-colors"
                                    >
                                        <Icon icon="solar:check-circle-linear" className="text-lg" />
                                        {formData.coverMode === 'upload' ? 'Utiliser cette photo' : 'Utiliser ce visuel'}
                                    </button>
                                ) : (
                                    <button
                                        type="button"
                                        onClick={() => setFormData(prev => ({ ...prev, coverImageSelected: false, coverSelectionManuallyDisabled: true }))}
                                        className="flex items-center gap-2 bg-white text-neutral-600 border border-neutral-200 px-4 py-2.5 rounded-lg font-medium hover:bg-neutral-50 transition-colors text-sm shadow-sm"
                                    >
                                        <Icon icon="solar:close-circle-linear" />
                                        Ne pas utiliser
                                    </button>
                                )}

                                {formData.coverMode !== 'upload' ? (
                                    <button
                                        type="button"
                                        onClick={handleGenerate}
                                        className="flex items-center gap-2 bg-white text-neutral-600 border border-neutral-200 px-4 py-2.5 rounded-lg font-medium hover:bg-neutral-50 transition-colors text-sm shadow-sm"
                                    >
                                        <Icon icon="solar:refresh-linear" />
                                        Actualiser
                                    </button>
                                ) : (
                                    <label className="flex items-center gap-2 bg-white text-neutral-600 border border-neutral-200 px-4 py-2.5 rounded-lg font-medium hover:bg-neutral-50 transition-colors text-sm cursor-pointer shadow-sm">
                                        <Icon icon="solar:upload-minimalistic-linear" />
                                        Changer de photo
                                        <input type="file" className="hidden" accept="image/jpeg,image/png,image/webp" onChange={handleFileUpload} />
                                    </label>
                                )}

                                {!formData.coverImageSelected && formData.coverMode === 'upload' && (
                                    <button
                                        type="button"
                                        onClick={() => handleModeChange('upload')}
                                        className="flex items-center gap-2 text-red-500 bg-red-50 px-3 py-2.5 rounded-lg hover:bg-red-100 transition-colors text-sm font-medium ml-auto"
                                    >
                                        <Icon icon="solar:trash-bin-trash-linear" />
                                        Supprimer
                                    </button>
                                )}

                                {!formData.coverImageSelected && formData.coverMode !== 'upload' && (
                                    <button
                                        type="button"
                                        onClick={handleDismiss}
                                        className="flex items-center gap-2 text-neutral-500 px-3 py-2.5 hover:text-neutral-700 transition-colors text-sm font-medium ml-auto"
                                    >
                                        {dismissLabel}
                                    </button>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Étape 1 : Identification
        const NewDiagnosticStep1Building = ({ formData, setFormData, onNext }) => {
            const [errors, setErrors] = useState({});
            const [mixedTab, setMixedTab] = useState(0); // 0 = Usage 1, 1 = Usage 2

            // AUTOCOMPLETION IGN
            const [query, setQuery] = useState(formData.address || '');
            const [suggestions, setSuggestions] = useState([]);
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [isLoadingSuggestions, setIsLoadingSuggestions] = useState(false);
            const [highlightedIndex, setHighlightedIndex] = useState(-1);
            const autocompleteRef = React.useRef(null);

            // Clic en dehors des suggestions
            React.useEffect(() => {
                const handleClickOutside = (event) => {
                    if (autocompleteRef.current && !autocompleteRef.current.contains(event.target)) {
                        setShowSuggestions(false);
                        setHighlightedIndex(-1);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, []);

            // Debouncer pour l'API
            React.useEffect(() => {
                const fetchSuggestions = async () => {
                    if (query.length < 3) {
                        setSuggestions([]);
                        setShowSuggestions(false);
                        return;
                    }
                    if (formData.addressIsValid && query === formData.address) {
                        return;
                    }

                    setIsLoadingSuggestions(true);
                    try {
                        const url = `https://data.geopf.fr/geocodage/search?q=${encodeURIComponent(query)}&limit=5&autocomplete=1`;
                        const response = await fetch(url);
                        if (response.ok) {
                            const data = await response.json();
                            if (data && data.features) {
                                const mapped = data.features.map(f => {
                                    const p = f.properties;
                                    const coords = f.geometry?.coordinates || [null, null];
                                    let typeMap = 'unknown';
                                    if (p.type === 'housenumber' || p.type === 'street') typeMap = 'StreetAddress';
                                    else if (p.type === 'municipality') typeMap = 'Municipality';
                                    else typeMap = 'PositionOfInterest';

                                    return {
                                        fulltext: p.label,
                                        zipcode: p.postcode,
                                        city: p.city,
                                        x: coords[0],
                                        y: coords[1],
                                        classification: p.score,
                                        type: typeMap,
                                        number: p.housenumber,
                                        street: p.street || p.name
                                    };
                                });
                                setSuggestions(mapped);
                                setShowSuggestions(true);
                                setHighlightedIndex(-1);
                            }
                        }
                    } catch (error) {
                        console.error('Erreur autocomplétion:', error);
                    } finally {
                        setIsLoadingSuggestions(false);
                    }
                };

                const timeoutId = setTimeout(fetchSuggestions, 350);
                return () => clearTimeout(timeoutId);
            }, [query, formData.addressIsValid, formData.address]);

            const verifyAddressPrecisionWithSearch = async (searchText) => {
                try {
                    const url = `https://data.geopf.fr/geocodage/search?q=${encodeURIComponent(searchText)}&limit=3`;
                    const res = await fetch(url);
                    if (!res.ok) return null;
                    const data = await res.json();

                    if (data && data.features && data.features.length > 0) {
                        const preciseMatch = data.features.find(f => f.properties && f.properties.type === 'housenumber');
                        if (preciseMatch) {
                            return {
                                fulltext: preciseMatch.properties.label,
                                zipcode: preciseMatch.properties.postcode,
                                city: preciseMatch.properties.city,
                                y: preciseMatch.geometry.coordinates[1],
                                x: preciseMatch.geometry.coordinates[0],
                                classification: preciseMatch.properties.score,
                                type: 'StreetAddress',
                                number: preciseMatch.properties.housenumber,
                                street: preciseMatch.properties.street
                            };
                        }
                    }
                } catch (err) {
                    console.error('Erreur geocoding search additionnel:', err);
                }
                return null;
            };

            const handleAddressSelect = async (suggestion) => {
                let fullAddress = suggestion.fulltext;
                let finalSuggestion = suggestion;
                setQuery(fullAddress);
                setShowSuggestions(false);
                setHighlightedIndex(-1);

                // Analyse métier de la précision
                let isStreetMatch = finalSuggestion.type === 'StreetAddress';
                let hasNumber = !!finalSuggestion.number;
                const isPoi = finalSuggestion.type === 'PositionOfInterest';

                let precision = 'unknown';
                let isValid = false;

                if (isStreetMatch && hasNumber) {
                    precision = 'housenumber';
                    isValid = true;
                } else if (isStreetMatch && !hasNumber) {
                    setIsLoadingSuggestions(true);
                    const preciseSuggestion = await verifyAddressPrecisionWithSearch(query);
                    setIsLoadingSuggestions(false);

                    if (preciseSuggestion) {
                        finalSuggestion = preciseSuggestion;
                        fullAddress = preciseSuggestion.fulltext;
                        setQuery(fullAddress);
                        precision = 'housenumber';
                        isValid = true;
                    } else {
                        precision = 'street';
                        isValid = false; // Bloquant : rue sans numéro
                    }
                } else if (isPoi) {
                    precision = 'poi';
                    isValid = true; // Toléré pour les lieux-dits/POI
                } else if (finalSuggestion.type === 'Municipality') {
                    precision = 'municipality';
                    isValid = false;
                }

                // Forme fonctionnelle pour éviter les closures périmées après await
                setFormData(prev => ({
                    ...prev,
                    address: fullAddress,
                    addressObj: finalSuggestion,
                    postalCode: finalSuggestion.zipcode || '',
                    city: finalSuggestion.city || '',
                    lat: finalSuggestion.y || null,
                    lon: finalSuggestion.x || null,
                    addressSource: 'IGN_Geoplateforme',
                    addressScore: finalSuggestion.classification || null,
                    addressType: finalSuggestion.type || '',
                    addressPrecision: precision,
                    streetNumber: finalSuggestion.number || '',
                    streetLabel: finalSuggestion.street || '',
                    addressIsValid: isValid,

                    // Reset du visuel
                    coverImageStatus: 'initial',
                    coverImageSource: '',
                    coverImagePath: '',
                    coverImageSignedUrl: '',
                    coverImageSelected: false,
                    coverSelectionManuallyDisabled: false,
                    coverImageError: null,
                    coverStepDismissed: false,
                    coverParcelRef: '',
                    coverCoordinates: null,
                    coverBBox: null,
                    coverGeneratedAt: '',
                    coverMode: 'panoramax',
                    coverUploadFileName: '',
                    coverUploadPreviewUrl: '',
                    coverPanX: 50,
                    coverZoom: 1,
                    coverIsPanoramic: false,
                    coverPanY: 50,
                    coverCandidates: [],
                    coverSelectedCandidateId: null,
                    coverStreetViewHeading: 0,
                    coverStreetViewPitch: 0,
                    coverStreetViewFov: 90,
                    coverStreetViewPanoId: null,
                    coverStreetViewAvailable: false
                }));

                if (isValid) {
                    setErrors(prev => ({ ...prev, address: null, postalCode: null, city: null }));
                } else {
                    setErrors(prev => ({ ...prev, address: 'Merci d\'entrer l\'adresse complète avec le numéro' }));
                }
            };



            const handleAddressChange = (e) => {
                const val = e.target.value;
                setQuery(val);
                if (formData.addressIsValid && val !== formData.address) {
                    setFormData({
                        ...formData,
                        address: val,
                        addressObj: null,
                        postalCode: '',
                        city: '',
                        lat: null,
                        lon: null,
                        addressSource: '',
                        addressScore: null,
                        addressType: '',
                        addressPrecision: '',
                        streetNumber: '',
                        streetLabel: '',
                        addressIsValid: false,

                        // Reset du visuel
                        coverImageStatus: 'initial',
                        coverImageSource: '',
                        coverImagePath: '',
                        coverImageSignedUrl: '',
                        coverImageSelected: false,
                        coverSelectionManuallyDisabled: false,
                        coverImageError: null,
                        coverStepDismissed: false,
                        coverParcelRef: '',
                        coverCoordinates: null,
                        coverBBox: null,
                        coverGeneratedAt: '',
                        coverMode: 'panoramax',
                        coverUploadFileName: '',
                        coverUploadPreviewUrl: '',
                        coverPanX: 50,
                        coverZoom: 1,
                        coverIsPanoramic: false,
                        coverPanY: 50,
                        coverCandidates: [],
                        coverSelectedCandidateId: null,
                        coverStreetViewHeading: 0,
                        coverStreetViewPitch: 0,
                        coverStreetViewFov: 90,
                        coverStreetViewPanoId: null,
                        coverStreetViewAvailable: false
                    });
                } else if (!formData.addressIsValid) {
                    setFormData({ ...formData, address: val });
                }
            };

            const handleAddressKeyDown = (e) => {
                if (!showSuggestions || suggestions.length === 0) return;
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    setHighlightedIndex(prev => (prev < suggestions.length - 1 ? prev + 1 : 0));
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    setHighlightedIndex(prev => (prev > 0 ? prev - 1 : suggestions.length - 1));
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (highlightedIndex >= 0 && highlightedIndex < suggestions.length) {
                        handleAddressSelect(suggestions[highlightedIndex]);
                    } else if (suggestions.length > 0) {
                        handleAddressSelect(suggestions[0]);
                    }
                } else if (e.key === 'Escape') {
                    setShowSuggestions(false);
                    setHighlightedIndex(-1);
                }
            };

            const handleAddressBlur = async () => {
                if (!showSuggestions || suggestions.length === 0 || formData.addressIsValid) {
                    setShowSuggestions(false);
                    return;
                }

                const normalize = str => str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim() : '';
                const q = normalize(query);

                const exactMatch = suggestions.find(s => {
                    const full = normalize(s.fulltext);
                    const streetOnly = s.street ? normalize(`${s.number ? s.number + ' ' : ''}${s.street}`) : null;
                    return full === q || streetOnly === q;
                });

                if (exactMatch) {
                    await handleAddressSelect(exactMatch);
                } else if (suggestions.length === 1 && query.length >= 5) {
                    await handleAddressSelect(suggestions[0]);
                } else {
                    // Si on soupçonne une adresse complète (débute par un chiffre), on tente direct un search
                    if (/^\d+/.test(query.trim())) {
                        setIsLoadingSuggestions(true);
                        const preciseSuggestion = await verifyAddressPrecisionWithSearch(query);
                        setIsLoadingSuggestions(false);
                        if (preciseSuggestion) {
                            await handleAddressSelect(preciseSuggestion);
                            return;
                        }
                    }
                    setShowSuggestions(false);
                }
            };

            const isMixed = formData.activity === 'mixed';

            // Non-mixed activities for the mixed tabs
            const nonMixedActivities = NEW_DIAGNOSTIC_ACTIVITIES.filter(a => a.id !== 'mixed');

            const validate = () => {
                const newErrors = {};

                if (!formData.addressIsValid || !formData.address) {
                    newErrors.address = 'Sélectionnez votre adresse dans la liste';
                } else if (formData.addressPrecision === 'street') {
                    newErrors.address = 'Merci d\'entrer l\'adresse complète avec le numéro';
                }
                if (!newDiagnosticValidatePostalCode(formData.postalCode)) {
                    newErrors.postalCode = 'Code postal invalide (5 chiffres)';
                }
                if (!formData.activity) {
                    newErrors.activity = 'Veuillez sélectionner une activité';
                }
                if (!newDiagnosticValidateNumber(formData.surface, 1)) {
                    newErrors.surface = 'Surface invalide (doit être > 0)';
                }
                if (formData.activity === 'mixed') {
                    if (!formData.mixedUsage1) newErrors.mixedUsage1 = 'Veuillez choisir le premier type d\'activité';
                    if (!formData.mixedUsage2) newErrors.mixedUsage2 = 'Veuillez choisir le deuxième type d\'activité';
                    if (formData.mixedUsage1 && formData.mixedUsage2 && formData.mixedUsage1 === formData.mixedUsage2) {
                        newErrors.mixedUsage2 = 'Ces deux activités doivent être différentes';
                    }
                }

                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const handleNext = () => {
                if (validate()) {
                    newDiagnosticTrack('diagnostic_step1_completed');
                    onNext();
                }
            };

            return (
                <div className="max-w-2xl mx-auto">
                    <div className="mb-8">
                        <h2 className="mb-2" style={{ fontFamily: 'var(--font-display)', fontWeight: 400, fontSize: 'clamp(1.625rem, 4vw, 2rem)', color: '#102A43', letterSpacing: '-0.01em' }}>Votre bâtiment</h2>
                        <p className="text-[#475569] text-base leading-relaxed">3 informations suffisent pour démarrer votre diagnostic</p>
                    </div>

                    <div className="mb-6 relative" ref={autocompleteRef}>
                        <label htmlFor="diag-address" className="block text-sm font-semibold text-neutral-700 mb-1">
                            Adresse du bâtiment <span className="text-red-500">*</span>
                        </label>
                        <p className="text-xs text-slate-400 mb-4">Commencez par le numéro, ex : 12 rue de la Paix, Paris</p>
                        <div className="relative">
                            <input
                                id="diag-address"
                                type="text"
                                value={query}
                                onChange={handleAddressChange}
                                onKeyDown={handleAddressKeyDown}
                                onBlur={handleAddressBlur}
                                onFocus={() => { if (!formData.addressIsValid && query.length >= 3) setShowSuggestions(true); }}
                                placeholder="Commencez à saisir l'adresse..."
                                autoComplete="off"
                                role="combobox"
                                aria-required="true"
                                aria-expanded={showSuggestions && suggestions.length > 0}
                                aria-autocomplete="list"
                                aria-controls="address-suggestions-list"
                                aria-activedescendant={highlightedIndex >= 0 ? `address-suggestion-${highlightedIndex}` : undefined}
                                aria-invalid={errors.address ? true : undefined}
                                aria-describedby={errors.address ? 'diag-address-err' : undefined}
                                className={`w-full px-4 py-3 border rounded-xl bg-white text-sm shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-blue-500 ${errors.address ? 'border-red-400' : formData.addressIsValid ? 'border-green-400 bg-green-50/30' : 'border-neutral-300'}`}
                            />
                            {isLoadingSuggestions && (
                                <div className="absolute right-3 top-1/2 -translate-y-1/2">
                                    <Icon icon="solar:spinner-linear" className="animate-spin text-neutral-400 text-lg" />
                                </div>
                            )}
                            {formData.addressIsValid && !isLoadingSuggestions && (
                                <div className="absolute right-3 top-1/2 -translate-y-1/2">
                                    <Icon icon="solar:check-circle-bold" className="text-green-500 text-lg" />
                                </div>
                            )}
                        </div>
                        {errors.address && <p id="diag-address-err" role="alert" className="text-xs text-red-500 mt-1">{errors.address}</p>}

                        {/* Liste de suggestions */}
                        {showSuggestions && suggestions.length > 0 && (
                            <ul id="address-suggestions-list" role="listbox" className="absolute z-50 w-full mt-1 bg-white border border-neutral-200 rounded-xl shadow-lg max-h-60 overflow-auto divide-y divide-neutral-100">
                                {suggestions.map((s, index) => (
                                    <li
                                        key={index}
                                        id={`address-suggestion-${index}`}
                                        role="option"
                                        aria-selected={highlightedIndex === index}
                                        onMouseDown={(e) => {
                                            e.preventDefault(); // Empêche le onBlur de l'input
                                            handleAddressSelect(s);
                                        }}
                                        className={`px-4 py-2.5 text-sm cursor-pointer flex flex-col transition-colors ${highlightedIndex === index ? 'bg-blue-100' : 'hover:bg-blue-50'}`}
                                    >
                                        <span className="font-semibold text-neutral-800">{s.street ? `${s.number ? s.number + ' ' : ''}${s.street}` : s.fulltext}</span>
                                        <span className="text-xs text-neutral-500">{s.zipcode} {s.city}</span>
                                    </li>
                                ))}
                            </ul>
                        )}
                        {!formData.addressIsValid && query.length >= 3 && !showSuggestions && !isLoadingSuggestions && suggestions.length === 0 && (
                            <div className="text-xs text-amber-600 mt-2 flex items-center gap-1">
                                <Icon icon="solar:info-circle-linear" />
                                Sélectionnez votre adresse dans la liste.
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-[120px_1fr] gap-2">
                        <NewDiagnosticFormInput
                            label="Code postal *"
                            value={formData.postalCode}
                            onChange={(v) => { if (!formData.addressIsValid) setFormData({ ...formData, postalCode: v }); }}
                            placeholder="75001"
                            error={errors.postalCode}
                            disabled={formData.addressIsValid}
                        />
                        <NewDiagnosticFormInput
                            label="Ville"
                            value={formData.city}
                            onChange={(v) => { if (!formData.addressIsValid) setFormData({ ...formData, city: v }); }}
                            placeholder="Paris"
                            disabled={formData.addressIsValid}
                        />
                    </div>

                    {formData.addressIsValid && (
                        <NewDiagnosticCoverPreview formData={formData} setFormData={setFormData} />
                    )}

                    {/* Sélecteur d'activité — cartes visuelles */}
                    <div className="mb-8">
                        <label className="block text-sm font-semibold text-neutral-700 mb-1">
                            Type d'activité <span className="text-red-500">*</span>
                        </label>
                        <p className="text-xs text-slate-400 mb-5">Choisissez ce qui correspond le mieux à votre local</p>
                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-2.5">
                            {NEW_DIAGNOSTIC_ACTIVITIES.map(act => {
                                const activityCardIcons = {
                                    offices: 'solar:buildings-2-bold-duotone',
                                    retail: 'solar:shop-bold-duotone',
                                    hotel: 'solar:bed-bold-duotone',
                                    restaurant: 'solar:cup-hot-bold',
                                    commerce_alim: 'solar:fridge-bold',
                                    health_local: 'solar:heart-angle-bold',
                                    education: 'solar:book-bold-duotone',
                                    light_warehouse: 'solar:box-bold-duotone',
                                    mixed: 'solar:widget-bold'
                                };
                                const activityCardLabels = {
                                    commerce_alim: 'Commerce alim.',
                                    health_local: 'Cabinet santé',
                                    light_warehouse: 'Entrepôt',

                                </div>
                                <div>
                                    <label className="flex items-center gap-3 cursor-pointer">

                                            onClick={() => setFormData(p => ({ ...p, hasGtb: !p.hasGtb }))}

                                        >
                                            <span className={`absolute top-1 w-4 h-4 bg-white rounded-full shadow transition-transform ${formData.hasGtb ? 'left-5' : 'left-1'}`}></span>
                                        </div>
                                        <span className="text-sm font-medium text-[#475569]">Pilotage automatique (chauffage/éclairage programmés)</span>
                                    </label>
                                </div>
                                <div>
                                    <label className="flex items-center gap-3 cursor-pointer">
                                        <div
                                            onClick={() => setFormData(p => ({ ...p, hasExteriorLighting: !p.hasExteriorLighting }))}
                                            className={`relative w-10 h-6 rounded-full transition-colors flex-shrink-0 ${formData.hasExteriorLighting ? 'bg-[#1D4ED8]' : 'bg-gray-300'}`}
                                        >
                                            <span className={`absolute top-1 w-4 h-4 bg-white rounded-full shadow transition-transform ${formData.hasExteriorLighting ? 'left-5' : 'left-1'}`}></span>

                                        <span className="text-sm font-medium text-[#475569]">Éclairage extérieur / parking présent</span>

                                </div>
                            </div>
                        )}
                    </div>

                    {/* Équipements spécifiques a l'activité */}
                    {['commerce_alim', 'restaurant', 'hotel'].includes(formData.activity) && (
                        <div role="group" aria-labelledby="bloc-equipements-title" className="p-5 bg-white border border-[#E2E8F0] rounded-xl shadow-sm mb-6">
                            <div className="flex items-center gap-2 mb-4">
                                <Icon icon="solar:widget-bold" aria-hidden="true" className="text-[#1D4ED8] text-xl" />
                                <h3 id="bloc-equipements-title" className="font-semibold text-[#102A43]">Équipements spécifiques à l'activité</h3>
                            </div>
                            {formData.activity === 'commerce_alim' && (
                                <div className="pb-4 mb-4 border-b border-[#E2E8F0]">
                                    <p className="text-xs font-semibold text-[#475569] uppercase tracking-wide mb-3">Réfrigération</p>
