    function getZoneClimatique(cp) {
      if (!cp || cp.length < 2) return '';
      const dep = cp.substring(0, 2);
      const H1 = ['01', '02', '03', '04', '05', '08', '10', '21', '25', '26', '38', '39', '42', '43', '52', '54', '55', '56', '57', '63', '67', '68', '69', '70', '73', '74', '88', '90'];
      const H3 = ['06', '11', '13', '30', '34', '66', '83', '84', '2A', '2B', '20'];
      if (H1.includes(dep)) return 'H1';
      if (H3.includes(dep)) return 'H3';
      return 'H2';
    }

    function calculerConsommation(fd) {
      const surf = parseFloat(fd.surface) || 0;
      const activite = fd.activite || 'bureaux';
      const bench = BENCHMARKS[activite] || BENCHMARKS.bureaux;
      let dataSource = 'estimation';

      // Try real data
      let total_kwh = 0;
      let elec = parseFloat(fd.conso_elec_kwh) || 0;
      let gaz = parseFloat(fd.conso_gaz_kwh) || 0;
      let fioul = parseFloat(fd.conso_fioul) || 0;
      let rc = parseFloat(fd.conso_rc_kwh) || 0;
      let bois = parseFloat(fd.conso_bois) || 0;

      // Gas unit conversion
      if (fd.gaz_unite === 'm3') gaz = gaz * 10.55;
      if (fd.gaz_unite === 'mwh') gaz = gaz * 1000;

      if (elec > 0 || gaz > 0 || fioul > 0 || rc > 0 || bois > 0) {
        total_kwh = elec + gaz + fioul + rc + bois;
        dataSource = fd.periode_donnees === '12mois' ? 'reel_12mois' :
          fd.periode_donnees === 'partielle' ? 'reel_partiel' : 'estime';
        // Extrapolation if partial period
        if (fd.periode_donnees === 'partielle' && fd.nb_mois_saisis) {
          const n = parseFloat(fd.nb_mois_saisis) || 12;
          total_kwh = total_kwh * (12 / n);
        }
      } else {
        // Fallback sectoriel
        total_kwh = bench.med * surf;
        dataSource = 'sectoriel';
      }

      // Determine main energy by proportion
      const energies = [{ k: 'electricite', v: elec }, { k: 'gaz', v: gaz }, { k: 'fioul', v: fioul }, { k: 'reseau_chaleur', v: rc }, { k: 'bois_granules', v: bois }];
      energies.sort((a, b) => b.v - a.v);
      const energie_principale = energies[0].v > 0 ? energies[0].k : 'electricite';

      return { total_kwh, surf, dataSource, energie_principale, elec, gaz, fioul, rc, bois };
    }

    function appliquerCorrectifs(fd, conso) {
      const activite = fd.activite || 'bureaux';
      const zone = fd.zone_climatique || 'H2';
      const postes_pct = { ...POSTES[activite] };

      // Apply zone correctifs to proportions (re-weight)
      const cz_chauf = CORRECTIFS_ZONE.chauffage[zone] || 1;
      const cz_clim = CORRECTIFS_ZONE.clim[zone] || 1;
      postes_pct.chauffage = postes_pct.chauffage * cz_chauf;
      postes_pct.clim = postes_pct.clim * cz_clim;

      // Age correctif on chauffage
      const ageMap = {
        'avant_1948': 'avant_1948', '1948_1974': '1948_1974', '1975_1988': '1975_1988',
        '1989_2000': '1989_2000', '2001_2012': '2001_2012', 'apres_2012': 'apres_2012'
      };
      const ageKey = ageMap[fd.annee_construction] || '2001_2012';
      const isEntrepot = activite.startsWith('entrepot');
      const corr_age = isEntrepot ? (CORRECTIFS_AGE_ENTREPOT[ageKey] || 1) : (CORRECTIFS_AGE_GENERAL[ageKey] || 1);
      postes_pct.chauffage = postes_pct.chauffage * corr_age;

      // Normalize to 100
      const total_pct = Object.values(postes_pct).reduce((s, v) => s + v, 0);
      const factor = 100 / total_pct;
      Object.keys(postes_pct).forEach(k => postes_pct[k] = postes_pct[k] * factor);

      // Compute kWh per poste from normalized %
      let postes_kwh = {};
      Object.keys(postes_pct).forEach(k => postes_kwh[k] = conso.total_kwh * postes_pct[k] / 100);

      // System correctifs
      function applyCorr(corr) {
        if (corr.all) Object.keys(postes_kwh).forEach(k => postes_kwh[k] *= corr.all);
        Object.keys(corr).forEach(k => { if (k !== 'all' && postes_kwh[k] !== undefined) postes_kwh[k] *= corr[k]; });
      }

      if (fd.eclairage_type === 'led_complet') applyCorr(CORRECTIFS_SYSTEMES.eclairage_led_complet);
      if (fd.eclairage_detecteurs) applyCorr(CORRECTIFS_SYSTEMES.eclairage_detecteurs);
      if (fd.vmc_type === 'df_hr') applyCorr(CORRECTIFS_SYSTEMES.vmc_df_hr);
      if (fd.vmc_horloge) applyCorr(CORRECTIFS_SYSTEMES.vmc_horloge);
      if (fd.ecs_systeme === 'thermodynamique') applyCorr(CORRECTIFS_SYSTEMES.ecs_thermodynamique);
      if (fd.ecs_systeme === 'solaire') applyCorr(CORRECTIFS_SYSTEMES.ecs_solaire);
      if (fd.ecs_calorifugeage === 'partiel') applyCorr(CORRECTIFS_SYSTEMES.ecs_calorifugeage_partiel);
      if (fd.chauffage_regulation && fd.chauffage_regulation.includes('gtb')) applyCorr(CORRECTIFS_SYSTEMES.chauffage_regulation_complete);
      else if (fd.chauffage_regulation && fd.chauffage_regulation.includes('robinets')) applyCorr(CORRECTIFS_SYSTEMES.chauffage_robinets_thermos);
      if (fd.vitrage === 'simple') applyCorr(CORRECTIFS_SYSTEMES.vitrage_simple);
      if (fd.vitrage === 'triple') applyCorr(CORRECTIFS_SYSTEMES.vitrage_triple);
      if (fd.intensite_usage === 'intensif') applyCorr(CORRECTIFS_SYSTEMES.usage_intensif);
      if (fd.intensite_usage === 'leger') applyCorr(CORRECTIFS_SYSTEMES.usage_leger);

      const total_corrige = Object.values(postes_kwh).reduce((s, v) => s + v, 0);
      return { postes_kwh, postes_pct, total_corrige: total_corrige || conso.total_kwh };
    }

    function calculerScore(intensite, activite) {
      const b = BENCHMARKS[activite] || BENCHMARKS.bureaux;
      if (intensite <= b.q1 * 0.85) return 'A';
      if (intensite <= b.q1) return 'B';
      if (intensite <= b.med) return 'C';
      if (intensite <= b.q3) return 'D';
      return 'E';
    }

    function selectActions(fd, conso, postes_kwh) {
      const travaux = fd.travaux_realises || [];
      const activite = fd.activite || 'bureaux';
      const energie_principale = conso.energie_principale || 'electricite';

      const applicable = ACTIONS.filter(action => {
        if (action.exclu_si_travaux.some(t => travaux.includes(t))) return false;
        for (const req of action.prerequis) {
          switch (req) {
            case 'chauffage_reseau_eau':
              if (fd.chauffage_reseau !== 'eau') return false; break;
            case 'chauffage_age_sup_10_ans':
              if (fd.chauffage_age === 'moins_10') return false; break;
            case 'chauffage_regulation_horloge':
              if (!fd.chauffage_regulation || !fd.chauffage_regulation.includes('horloge')) return false; break;
            case 'eclairage_non_led':
              if (fd.eclairage_type === 'led_complet') return false; break;
            case 'vmc_simple_flux':
              if (!['simple_auto', 'simple_hygro_a', 'simple_hygro_b'].includes(fd.vmc_type)) return false; break;
            case 'vmc_presente':
              if (fd.vmc_type === 'naturelle') return false; break;
            case 'vmc_sans_recuperation':
              if (fd.vmc_type === 'df_hr') return false; break;
            case 'ecs_presente':
              if (!fd.ecs_presente) return false; break;
            case 'ecs_calorifugeage_absent_ou_partiel':
              if (fd.ecs_calorifugeage === 'oui') return false; break;
            case 'toiture_non_isolee_ou_partielle':
              if (fd.isolation_toiture === 'oui') return false; break;
            case 'chaudiere_presente':
              if (['convecteurs', 'plancher_elec', 'pas_chauffage'].includes(fd.chauffage_type)) return false; break;
          }
        }
        return true;
      });

      const actionsCalc = applicable.map(action => {
        const poste_kwh = postes_kwh[action.poste_cible] || 0;
        const gain_kwh = poste_kwh * action.gain_pct.med;
        const gain_eur = gain_kwh * (PRIX_ENERGIE[energie_principale] || PRIX_ENERGIE.electricite);
        const capex = action.capex ? action.capex.med : (action.capex_m2 * (parseFloat(fd.surface) || 100));
        const roi = capex > 0 && gain_eur > 0 ? capex / gain_eur : 0;
        return { ...action, poste_kwh, gain_kwh, gain_eur, capex, roi };
      });

      actionsCalc.sort((a, b) => a.roi - b.roi);
      const plafond = PLAFONDS_GAINS[activite] || 0.65;
      let gains_cumules = 0;
      const top = [];
      for (const a of actionsCalc) {
        if (gains_cumules + a.gain_pct.med <= plafond) {
          top.push(a);
          gains_cumules += a.gain_pct.med;
        }
        if (top.length >= 5) break;
      }
      return { actions: top, gains_pct_cumules: gains_cumules };
    }

    function projection10ans(cout_annuel, economies, capex_total) {
      const inflation = 0.03;
      const data = [];
      let cumul_sq = 0;
      let cumul_at = capex_total;
      for (let i = 0; i <= 10; i++) {
        const f = Math.pow(1 + inflation, i);
        const cout_i = cout_annuel * f;
        const eco_i = economies * f;
        if (i > 0) { cumul_sq += cout_i; cumul_at += (cout_i - eco_i); }
        data.push({
          annee: i === 0 ? 'Auj.' : `A+${i}`,
          statu_quo: Math.round(cumul_sq),
          avec_travaux: Math.round(cumul_at),
          economies_nettes: Math.round(cumul_sq - cumul_at)
        });
      }
      const roi_pt = data.find(d => d.economies_nettes > 0);
      return { data, annee_roi: roi_pt?.annee || 'N/A' };
    }

      const ep = conso.energie_principale || 'electricite';
      const facteur = CO2_FACTEURS[ep] || CO2_FACTEURS.electricite;
      const co2_avant = Math.round(conso.total_kwh * facteur);
      const co2_apres = Math.round((conso.total_kwh - economies_kwh) * facteur);
      const co2_evite = co2_avant - co2_apres;
      const voitures = Math.round(co2_evite / 2100);
      const vols = Math.round(co2_evite / 1800);

      const data = [
        { name: 'Situation actuelle', co2: Math.round(co2_avant / 1000 * 10) / 10, fill: '#EF4444' },
        { name: 'Après travaux', co2: Math.round(co2_apres / 1000 * 10) / 10, fill: '#10B981' }
      ];

      return (
        <div className="card mb-6">
          <h3 className="font-bold text-gray-800 mb-1" style={{ fontFamily: 'Syne,sans-serif' }}>Impact environnemental</h3>
          <div className="flex flex-col md:flex-row gap-6 items-center">
            <div className="w-full md:w-64">
              <ResponsiveContainer width="100%" height={160}>
                <BarChart data={data} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                  <XAxis dataKey="name" tick={{ fontSize: 11 }} />
                  <YAxis tick={{ fontSize: 11 }} unit=" t" />
                  <RTooltip formatter={(v) => [`${v} tCO₂/an`]} />
                  <Bar dataKey="co2" radius={[6, 6, 0, 0]} label={{ position: 'top', fontSize: 12, fontWeight: 700, formatter: v => `${v}t` }}>
                    {data.map((e, i) => <Cell key={i} fill={e.fill} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div className="flex-1">
              <div className="text-3xl font-black text-green-600 num mb-1">{formatNum(Math.round(co2_evite / 1000 * 10) / 10)} tCO₂/an évitées</div>
              <div className="flex flex-col gap-2 mt-3 text-sm">
                {voitures > 0 && <div className="flex items-center gap-2"><span className="text-xl">🚗</span><span>≡ <strong>{formatNum(voitures)}</strong> voiture{voitures > 1 ? 's' : ''} retirée{voitures > 1 ? 's' : ''} de la route</span></div>}
                {vols > 0 && <div className="flex items-center gap-2"><span className="text-xl">✈</span><span>≡ <strong>{formatNum(vols)}</strong> A/R Paris–New York évité{vols > 1 ? 's' : ''}</span></div>}
              </div>
              <p className="text-xs text-gray-400 mt-3">Source : Base Carbone ADEME 2023 — périmètre direct (scope 1+2)</p>
            </div>
          </div>
        </div>
      );
    }

    function DecretTertiaire({ onContinue }) {
      const [fd, setFd] = useState({ activite: 'bureaux', surface: '', conso_ref_connue: true });
      const [result, setResult] = useState(null);
      const update = (k, v) => setFd(p => ({ ...p, [k]: v }));

      const calcul = () => {
        const surf = parseFloat(fd.surface) || 0;
        const bench = (window.BENCHMARKS || BENCHMARKS)[fd.activite] || (window.BENCHMARKS || BENCHMARKS).bureaux;
        const ref = fd.conso_ref_connue && fd.conso_ref ? parseFloat(fd.conso_ref) :
          (bench.med * surf);
        const actuel = parseFloat(fd.conso_actuelle) || 0;
        const intensite_ref = surf > 0 ? ref / surf : bench.med;
        const intensite_act = surf > 0 ? actuel / surf : 0;
        const obj2030 = intensite_ref * 0.60;
        const obj2040 = intensite_ref * 0.50;
        const obj2050 = intensite_ref * 0.40;
        const ecart2030 = Math.max(0, intensite_act - obj2030);
        const ecart_pct = obj2030 > 0 ? (ecart2030 / intensite_act * 100) : 0;
        setResult({ intensite_act, obj2030, obj2040, obj2050, ecart2030, ecart_pct, valeur_ref_estimee: !fd.conso_ref_connue });
      };

      const chartData = result ? [
        { name: 'Actuel', value: Math.round(result.intensite_act), fill: result.intensite_act > result.obj2030 ? '#EF4444' : '#10B981' },
        { name: 'Objectif 2030 (-40%)', value: Math.round(result.obj2030), fill: '#F59E0B' },
        { name: 'Objectif 2040 (-50%)', value: Math.round(result.obj2040), fill: '#3B82F6' },
        { name: 'Objectif 2050 (-60%)', value: Math.round(result.obj2050), fill: '#059669' },
      ] : [];

      return (
        <div className="max-w-3xl mx-auto px-4 py-8">
          <div className="text-center mb-8">
            <div className="inline-flex items-center gap-2 bg-blue-100 text-blue-800 px-4 py-1.5 rounded-full text-sm font-semibold mb-4">🏛 Mode Beta</div>
            <h1 className="text-3xl font-black text-gray-800 mb-2" style={{ fontFamily: 'Syne,sans-serif' }}>Ce bâtiment est soumis au<br />Décret Tertiaire (DEET)</h1>
            <p className="text-gray-500 max-w-lg mx-auto">Surface supérieure à 1 000 m² — obligations de réduction des consommations énergétiques</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            {[['2030', 'Réduction -40%', '#F59E0B'], ['2040', 'Réduction -50%', '#3B82F6'], ['2050', 'Réduction -60%', '#059669']].map(([an, txt, c]) => (
              <div key={an} className="card text-center border-t-4" style={{ borderTopColor: c }}>
                <div className="text-2xl font-black" style={{ color: c }}>{an}</div>
                <div className="text-sm font-semibold text-gray-700 mt-1">{txt}</div>
                <div className="text-xs text-gray-400 mt-0.5">vs. référence 2010</div>
              </div>
            ))}
          </div>

          <div className="card mb-6 bg-blue-50 border-blue-200">
            <p className="text-sm text-blue-800">
              <strong>Obligation :</strong> Déclaration annuelle sur la plateforme <a href="https://operat.ademe.fr" target="_blank" rel="noopener" className="underline">OPERAT</a> (ADEME).
              Sanctions : publication sur le tableau de mise en demeure officiel.
            </p>
          </div>

          <div className="card mb-6">
            <h2 className="font-bold text-gray-800 mb-4" style={{ fontFamily: 'Syne,sans-serif' }}>Calcul de votre trajectoire</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <FieldInput label="Activité principale">
                <select className="field-input" value={fd.activite} onChange={e => update('activite', e.target.value)}>
                  {Object.entries(ACTIVITE_LABELS).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
                </select>
              </FieldInput>
              <FieldInput label="Surface utile (m²)">
                <input type="number" className="field-input" value={fd.surface} onChange={e => update('surface', e.target.value)} placeholder="ex : 2 500" />
              </FieldInput>
              <div className="md:col-span-2">
                <Toggle checked={!!fd.conso_ref_connue} onChange={v => update('conso_ref_connue', v)} label="Je connais ma consommation de référence 2010" />
              </div>
              {fd.conso_ref_connue ? (
                <FieldInput label="Consommation de référence 2010 (kWh EF/an)">
                  <input type="number" className="field-input" value={fd.conso_ref || ''} onChange={e => update('conso_ref', e.target.value)} placeholder="ex : 450 000" />
                </FieldInput>
              ) : (
                <div className="card bg-amber-50 border-amber-200">
                  <p className="text-xs text-amber-700">Valeur estimée automatiquement : {formatNum((BENCHMARKS[fd.activite]?.med || 180) * (parseFloat(fd.surface) || 0))} kWh EF/an</p>
                  <p className="text-xs text-amber-500 mt-1">Badge "Valeur estimée" — la valeur réelle est disponible sur OPERAT</p>
                </div>
              )}
              <FieldInput label="Consommation actuelle N-1 (kWh EF/an)" required>
                <input type="number" className="field-input" value={fd.conso_actuelle || ''} onChange={e => update('conso_actuelle', e.target.value)} placeholder="ex : 380 000" />
              </FieldInput>
            </div>
            <button type="button" onClick={calcul}
              className="mt-4 px-6 py-2.5 rounded-xl font-bold text-white transition"
              style={{ background: 'linear-gradient(135deg,#1B4FD8,#3B82F6)' }}>
              Calculer ma trajectoire →
            </button>
          </div>

          {result && (
            <div className="card mb-6">
              <h3 className="font-bold text-gray-800 mb-4" style={{ fontFamily: 'Syne,sans-serif' }}>Votre trajectoire DEET</h3>
              {result.valeur_ref_estimee && (
                <div className="mb-3 px-3 py-2 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-700">
                  ⚠ Valeur de référence estimée — consultez OPERAT pour la valeur réelle.
                </div>
              )}
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                {[['Actuel', `${formatNum(Math.round(result.intensite_act))} kWh/m²/an`, result.intensite_act > result.obj2030 ? 'text-red-600' : 'text-green-600'], ['Obj. 2030', `${formatNum(Math.round(result.obj2030))} kWh/m²/an`, 'text-amber-600'], ['Obj. 2040', `${formatNum(Math.round(result.obj2040))} kWh/m²/an`, 'text-blue-600'], ['Obj. 2050', `${formatNum(Math.round(result.obj2050))} kWh/m²/an`, 'text-green-700']].map(([l, v, c]) => (
                  <div key={l} className="text-center bg-gray-50 rounded-xl py-3">
                    <div className={`text-lg font-black num ${c}`}>{v}</div>
                    <div className="text-xs text-gray-500 mt-0.5">{l}</div>
                  </div>
                ))}
              </div>
              {result.ecart2030 > 0 && (
                <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700">
                  🔴 Écart à combler pour 2030 : <strong>{formatNum(Math.round(result.ecart2030))} kWh/m²/an</strong> ({Math.round(result.ecart_pct)}% de réduction supplémentaire nécessaire)
                </div>
              )}
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={chartData} margin={{ top: 10, right: 10, left: 0, bottom: 0 }}>
                  <XAxis dataKey="name" tick={{ fontSize: 10 }} />
                  <YAxis tick={{ fontSize: 11 }} unit=" kWh" />
                  <RTooltip formatter={(v) => [`${v} kWh/m²/an`]} />
                  <Bar dataKey="value" radius={[6, 6, 0, 0]} label={{ position: 'top', fontSize: 11, fontWeight: 700 }}>
                    {chartData.map((e, i) => <Cell key={i} fill={e.fill} />)}
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
              <p className="text-xs text-gray-400 mt-2">Disclaimer : Cette estimation ne se substitue pas à une déclaration OPERAT. Les valeurs absolues réglementaires varient selon la catégorie d'activité définie dans l'arrêté. Consulter : operat.ademe.fr</p>
            </div>
          )}

          <div className="flex flex-col sm:flex-row gap-3">
            <button type="button" onClick={onContinue}
              className="flex-1 py-3 rounded-xl font-bold text-white text-sm transition shadow-lg"
              style={{ background: 'linear-gradient(135deg,#1B4FD8,#3B82F6)' }}>
              Lancer un diagnostic complet pour identifier les actions →
            </button>
            <button type="button"
              className="flex-1 py-3 rounded-xl font-semibold text-blue-700 bg-blue-50 border-2 border-blue-200 text-sm hover:bg-blue-100 transition">
              📧 Être notifié de la version bêta complète
            </button>
          </div>
        </div>
      );
    }

    // =====================================================
    // FORMULAIRE PRO — CONTENEUR 7 MODULES
    // =====================================================
    const MODULES = ['Identification', 'Profil', 'Enveloppe', 'Systèmes', 'Consommations', 'Usage', 'Travaux', 'Récapitulatif'];

    function FormulairePro({ onComplete }) {
      const [step, setStep] = useState(() => parseInt(localStorage.getItem('diagtertiaire_step_v1') || '0'));
      useEffect(() => { localStorage.setItem('diagtertiaire_step_v1', step); }, [step]);
      const [formData, setFormData] = useState(() => {
        try {
          const saved = localStorage.getItem('diagtertiaire_pro_alpha_v1');
          return saved ? JSON.parse(saved) : {};
        } catch { return {}; }
      });
      const [errors, setErrors] = useState({});

      useEffect(() => {
        try { localStorage.setItem('diagtertiaire_pro_alpha_v1', JSON.stringify(formData)); }
        catch { }
        // Sync zone climatique
        if (formData.cp && formData.cp.length >= 2) {
          const zone = getZoneClimatique(formData.cp);
          if (zone !== formData.zone_climatique) {
            setFormData(p => ({ ...p, zone_climatique: zone }));
          }
        }
      }, [formData]);

      const validate = () => {
        const e = {};
        if (step === 0) {
          if (!formData.contact) e.contact = 'Champ requis';
          if (!formData.email) e.email = 'Email requis';
          if (!formData.telephone) e.telephone = 'Téléphone requis';
          if (!formData.adresse) e.adresse = 'Adresse requise';
          if (!formData.cp || formData.cp.length !== 5) e.cp = 'Code postal à 5 chiffres';
          if (!formData.statut) e.statut = 'Sélectionnez votre statut';
          if (!formData.objectif) e.objectif = 'Sélectionnez un objectif';
          if (!formData.horizon) e.horizon = 'Sélectionnez un horizon';
        }
        if (step === 1) {
          if (!formData.activite) e.activite = 'Sélectionnez une activité';
          if (!formData.surface || parseFloat(formData.surface) <= 0) e.surface = 'Surface requise';
          if (!formData.annee_construction) e.annee_construction = 'Année requise';
        }
        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const next = () => { if (validate()) setStep(s => Math.min(s + 1, MODULES.length - 1)); };
      const prev = () => setStep(s => Math.max(s - 1, 0));
      const progress = Math.round((step / (MODULES.length - 1)) * 100);

      const moduleComponents = [
        <Module1_Identification data={formData} onChange={setFormData} errors={errors} />,
        <Module2_Profil data={formData} onChange={setFormData} errors={errors} />,
        <Module3_Enveloppe data={formData} onChange={setFormData} />,
        <Module4_Systemes data={formData} onChange={setFormData} />,
        <Module5_Consommations data={formData} onChange={setFormData} />,
        <Module6_Usage data={formData} onChange={setFormData} />,
        <Module7_Travaux data={formData} onChange={setFormData} />,
        <RecapitulatifFinal formData={formData} onGenerate={() => onComplete(formData)} onBack={prev} />
      ];

      return (
        <div className="form-container min-h-screen bg-gradient-to-br from-slate-50 to-blue-50">
          {/* Sticky progress bar */}
          <div className="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm no-print">
            <div className="max-w-3xl mx-auto px-4 py-3">
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs font-semibold text-gray-500">Module {step + 1} / {MODULES.length} — {MODULES[step]}</span>
                <span className="text-xs font-bold text-blue-600">{progress}% complété</span>
              </div>
              <div className="w-full bg-gray-100 rounded-full h-1.5">
                <div className="progress-bar-fill h-1.5" style={{ width: `${progress}%` }}></div>
              </div>
              <div className="flex gap-1 mt-2 overflow-x-auto">
                {MODULES.map((m, i) => (
                  <button key={m} type="button"
                    onClick={() => i < step ? setStep(i) : null}
                    className={`shrink-0 px-2.5 py-0.5 rounded-full text-xs font-medium transition ${i === step ? 'bg-blue-600 text-white' : i < step ? 'bg-blue-100 text-blue-700 cursor-pointer' : 'bg-gray-100 text-gray-400 cursor-default'}`}>
                    {i < step ? '✓ ' : ''}{m}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Form content */}
          <div className="max-w-3xl mx-auto px-4 py-8">
            <div className="card">
              {moduleComponents[step]}
            </div>

            {/* Navigation */}
            {step < MODULES.length - 1 && (
              <div className="flex justify-between mt-6">
                <button type="button" onClick={prev} disabled={step === 0}
                  className={`px-6 py-2.5 border-2 rounded-xl font-semibold text-gray-700 transition ${step === 0 ? 'opacity-30 cursor-not-allowed border-gray-200' : 'border-gray-300 hover:border-gray-400'}`}>
                  ← Précédent
                </button>
                <button type="button" onClick={next}
                  className="px-8 py-2.5 rounded-xl font-bold text-white transition shadow-md hover:shadow-lg"
                  style={{ background: 'linear-gradient(135deg,#1B4FD8,#3B82F6)' }}>
                  Suivant →
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // =====================================================
    // SURFACE GATE — Question de routage initiale
    // =====================================================
    function SurfaceGate({ onChoose }) {
      return (
        <div className="surface-gate min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 p-4">
          <div className="max-w-xl w-full">
            <div className="text-center mb-8">
              <div className="inline-block text-4xl font-black text-white mb-2" style={{ fontFamily: 'Syne,sans-serif' }}>
                DiagTertiaire <span className="text-blue-400">Pro</span> <span className="text-xs bg-blue-500 text-white px-2 py-0.5 rounded-full align-middle">Alpha</span>
              </div>
              <p className="text-blue-200 text-sm">Outil de pré-diagnostic énergétique professionnel</p>
            </div>

            <div className="bg-white bg-opacity-10 backdrop-blur-sm border border-white border-opacity-20 rounded-2xl p-8 text-center">
              <div className="text-5xl mb-4">🏢</div>
              <h2 className="text-xl font-bold text-white mb-2" style={{ fontFamily: 'Syne,sans-serif' }}>
                La surface utile du bâtiment est-elle<br />supérieure à 1 000 m² ?
              </h2>
              <p className="text-blue-200 text-sm mb-8">Cette information détermine les obligations réglementaires applicables</p>

              <div className="flex gap-4 justify-center">
                <button type="button" onClick={() => onChoose(true)}
                  className="flex-1 py-4 rounded-xl font-bold text-lg transition-all border-2 border-amber-400 text-amber-300 hover:bg-amber-400 hover:text-white">
                  ✅ OUI<br />
                  <span className="text-sm font-normal opacity-80">≥ 1 000 m² → Décret Tertiaire</span>
                </button>
                <button type="button" onClick={() => onChoose(false)}
                  className="flex-1 py-4 rounded-xl font-bold text-lg transition-all border-2 border-blue-400 text-blue-300 hover:bg-blue-500 hover:text-white">
                  ❌ NON<br />
                  <span className="text-sm font-normal opacity-80">{"<"} 1 000 m² → Formulaire Pro</span>
                </button>
              </div>
            </div>

            <p className="text-center text-blue-300 text-xs mt-6 opacity-70">
              Outil réservé aux professionnels — Données déclaratives — Pré-diagnostic non réglementaire
            </p>
          </div>
        </div>
      );
    }

    // =====================================================
    // APP ROOT
    // =====================================================
    function App() {
      const [view, setView] = useState('gate'); // gate | form | rapport | dashboard | decret
      const [formData, setFormData] = useState({});

      // Check localStorage resume
      const [showResume, setShowResume] = useState(() => {
        try {
          const saved = localStorage.getItem('diagtertiaire_pro_alpha_v1');
          const d = saved ? JSON.parse(saved) : {};
          return !!(d.contact || d.activite);
        } catch { return false; }
      });

      const handleGate = (sup1000) => {
        if (sup1000) setView('decret');
        else setView('form');
        setShowResume(false);
      };

      const handleFormComplete = (data) => {
        setFormData(data);
        // Notifie le dashboard Pro parent via localStorage (polling dans ProNewDiag)
        try {
          const report = { id: 'DT-' + Date.now(), formData: data, timestamp: Date.now() };
          localStorage.setItem('newDiagnosticLatestReport', JSON.stringify(report));
        } catch (e) { }
        setView('rapport');
      };

      if (view === 'gate') {
        return (
          <SurfaceGate onChoose={handleGate}>
            {showResume && (
              <div className="mt-4 bg-white bg-opacity-10 border border-white border-opacity-20 rounded-xl p-4 text-center">
                <p className="text-blue-200 text-sm mb-2">Une saisie précédente a été trouvée.</p>
                <button onClick={() => setView('form')} className="px-4 py-1.5 bg-blue-500 text-white rounded-lg text-sm font-semibold hover:bg-blue-600 transition">
                  Reprendre la saisie →
                </button>
              </div>
            )}
          </SurfaceGate>
        );
      }

      if (view === 'decret') {
        return <DecretTertiaire onContinue={() => { setView('form'); }} />;
      }

      if (view === 'form') {
        return (
          <>
            {showResume && (
              <div className="fixed bottom-4 right-4 z-50 bg-white border border-blue-200 shadow-xl rounded-xl p-4 max-w-xs no-print">
                <p className="text-sm font-semibold text-gray-800 mb-1">💾 Saisie en cours retrouvée</p>
                <p className="text-xs text-gray-500 mb-2">Vos données précédentes ont été restaurées automatiquement.</p>
                <button onClick={() => setShowResume(false)} className="text-xs text-blue-600 underline">Masquer</button>
              </div>
            )}
            <FormulairePro onComplete={handleFormComplete} />
          </>
        );
      }

      if (view === 'rapport') {
        return <RapportClient formData={formData} onBack={() => setView('form')} onShowDashboard={() => setView('dashboard')} />;
      }

      if (view === 'dashboard') {
        return <DashboardPro formData={formData} onBack={() => setView('rapport')} />;
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>

</body>

</html>
