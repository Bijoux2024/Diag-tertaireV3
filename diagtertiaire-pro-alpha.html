/* ═══════════════════════════════════════════════════
   FONCTIONS UTILITAIRES
═══════════════════════════════════════════════════ */

function getZoneClimatique(cp) {
  const dept = parseInt((cp || '75').substring(0, 2), 10);
  if ([13, 30, 34, 83, 84, 2, 4, 5, 6, 66, 11, 48, 07, 26].includes(dept)) return 'H3';
  if ([29, 22, 35, 56, 44, 17, 33, 40, 64, 65, 09, 31, 32, 12, 81, 82, 47].includes(dept)) return 'H2';
  return 'H1';
}

function scoreLettre(ratio) {
  if (ratio < 0.60) return 'A';
  if (ratio < 0.90) return 'B';
  if (ratio < 1.20) return 'C';
  if (ratio < 1.70) return 'D';
  return 'E';
}

function scoreColor(l) {
  return { A:'#059669', B:'#16a34a', C:'#d97706', D:'#dc2626', E:'#b91c1c' }[l] || '#6b7280';
}

function scoreBgClass(l) {
  return { A:'score-a', B:'score-b', C:'score-c', D:'score-d', E:'score-e' }[l] || '';
}

function fmt(n, decimals=0) {
  if (n == null || isNaN(n)) return '—';
  return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: decimals }).format(n);
}

function fmtEuro(n) {
  if (n == null || isNaN(n)) return '—';
  return new Intl.NumberFormat('fr-FR', { style:'currency', currency:'EUR', maximumFractionDigits:0 }).format(n);
}

function selectActions(activite, systemesChauffage, energiePrincipale, surface, annualCost) {
  return ACTIONS_LIBRARY.filter(a => {
    if (a.prerequis.includes('gaz') && energiePrincipale !== 'gaz') return false;
    return true;
  }).map(a => {
    const capexMid = ((a.capex_low + a.capex_high) / 2) * surface;
    const gainEuro = annualCost * a.gain_pct;
    const roi = gainEuro > 0 ? capexMid / gainEuro : null;
    return { ...a, capexEstime: capexMid, gainEuroAnnuel: gainEuro, roiAns: roi };
  }).sort((a, b) => (a.roiAns || 999) - (b.roiAns || 999)).slice(0, 6);
}

function projection10ans(annualSavings, totalCapex) {
  const points = [];
  for (let y = 0; y <= 10; y++) {
    const savings = y === 0 ? 0 : annualSavings * y;
    const cumAction = y === 0 ? -totalCapex : -totalCapex + savings;
    const cumInaction = -(annualSavings * 0.03 * y * (y+1) / 2); // dérive coût
    points.push({ annee: `A${y}`, avecTravaux: Math.round(cumAction), sansTravaux: Math.round(cumInaction), economie: Math.round(savings) });
  }
  return points;
}

/* ═══════════════════════════════════════════════════
   MOTEUR DE CALCUL PRINCIPAL
═══════════════════════════════════════════════════ */

function runEngine(formData) {
  const {
    activite, surface, anneeConstruction, codePostal,
    energiePrincipale, elecKwh, elecEuro, gasKwh, gasEuro,
    autresKwh, autresEuro, energieSecondaire,
    systemeChauffage, systemeClim, systemeVentilation, systemeEclairage,
    nbOccupants, heuresOuverture, joursOuverture,
    travauxRecents,
  } = formData;

  const surf = parseFloat(surface) || 1;
  const benchmark = BENCHMARKS[activite] || BENCHMARKS.bureau;
  const zone = getZoneClimatique(codePostal);
  const corrZone = CORRECTIFS_ZONE[zone] || 1.0;
  const corrAge = CORRECTIFS_AGE[anneeConstruction] || 1.0;

  // Correctifs systèmes
  let corrSyst = 0;
  if (systemeChauffage && CORRECTIFS_SYSTEMES.chauffage[systemeChauffage] != null)
    corrSyst += CORRECTIFS_SYSTEMES.chauffage[systemeChauffage];
  if (systemeClim && CORRECTIFS_SYSTEMES.clim[systemeClim] != null)
    corrSyst += CORRECTIFS_SYSTEMES.clim[systemeClim];
  if (systemeVentilation && CORRECTIFS_SYSTEMES.ventilation[systemeVentilation] != null)
    corrSyst += CORRECTIFS_SYSTEMES.ventilation[systemeVentilation];
  if (systemeEclairage && CORRECTIFS_SYSTEMES.eclairage[systemeEclairage] != null)
    corrSyst += CORRECTIFS_SYSTEMES.eclairage[systemeEclairage];

  // Intensité réelle
  const prixElec = parseFloat(elecEuro) && parseFloat(elecKwh) ?
    (parseFloat(elecEuro) / parseFloat(elecKwh)) : PRIX_ENERGIE.electricite;
  const prixGaz = parseFloat(gasEuro) && parseFloat(gasKwh) ?
    (parseFloat(gasEuro) / parseFloat(gasKwh)) : PRIX_ENERGIE[energiePrincipale] || PRIX_ENERGIE.gaz;

  const totalKwh = (parseFloat(elecKwh) || 0) + (parseFloat(gasKwh) || 0) + (parseFloat(autresKwh) || 0);
  const totalEuro = (parseFloat(elecEuro) || 0) + (parseFloat(gasEuro) || 0) + (parseFloat(autresEuro) || 0);

  let intensiteReelle;
  let consoEstimee = false;
  if (totalKwh > 0) {
    intensiteReelle = totalKwh / surf;
  } else {
    // Estimation benchmark + correctifs
    intensiteReelle = benchmark.median * corrZone * corrAge * (1 + corrSyst);
    consoEstimee = true;
  }

  const annualCost = totalEuro > 0 ? totalEuro :
    intensiteReelle * surf * (PRIX_ENERGIE[energiePrincipale] || PRIX_ENERGIE.electricite);

  // CO2
  const co2Factor = CO2_FACTEURS[energiePrincipale] || CO2_FACTEURS.electricite;
  const co2Annual = (totalKwh > 0 ? totalKwh : intensiteReelle * surf) * co2Factor / 1000; // tCO2

  // Score
  const ratio = intensiteReelle / benchmark.median;
  const lettre = scoreLettre(ratio);

  // Score confiance
  let confiance = 'Élevée';
  let confianceScore = 3;
  if (consoEstimee) { confiance = 'Faible'; confianceScore = 1; }
  else if (!gasKwh && !elecEuro) { confiance = 'Moyenne'; confianceScore = 2; }

  // Postes ventilation
  const postes = POSTES_VENTILATION[activite] || POSTES_VENTILATION.bureau;

  // Actions prioritaires
  const actions = selectActions(activite, systemeChauffage, energiePrincipale, surf, annualCost);
  const totalGainPct = Math.min(actions.reduce((s, a) => s + a.gain_pct, 0), PLAFONDS_GAINS[activite] || 0.40);
  const economiesAnnuelles = annualCost * totalGainPct;
  const capexTotal = actions.reduce((s, a) => s + (a.capexEstime || 0), 0);
  const roiMoyen = economiesAnnuelles > 0 ? capexTotal / economiesAnnuelles : null;

  // Score maturité pro (qualification interne)
  let maturite = 0;
  if (travauxRecents === 'oui_recents') maturite += 2;
  if (travauxRecents === 'planifies') maturite += 3;
  if (travauxRecents === 'non') maturite += 1;
  if (lettre === 'D' || lettre === 'E') maturite += 3;
  if (lettre === 'C') maturite += 2;
  if (surf > 1000) maturite += 2;
  if (nbOccupants > 20) maturite += 1;
  maturite = Math.min(maturite, 10);

  const scoreMaturiteLabel = maturite >= 8 ? 'Prioritaire' : maturite >= 5 ? 'Qualifié' : maturite >= 3 ? 'À nurture' : 'Froid';
  const scoreMaturiteColor = maturite >= 8 ? '#059669' : maturite >= 5 ? '#d97706' : maturite >= 3 ? '#6272f8' : '#6b7280';

  // Projection 10 ans
  const projData = projection10ans(economiesAnnuelles, capexTotal);

  return {
    intensiteReelle: Math.round(intensiteReelle),
    medianeRef: benchmark.median,
    ratio: Math.round(ratio * 100) / 100,
    lettre,
    annualCost: Math.round(annualCost),
    co2Annual: Math.round(co2Annual * 10) / 10,
    totalKwh: Math.round(totalKwh > 0 ? totalKwh : intensiteReelle * surf),
    consoEstimee,
    confiance,
    confianceScore,
    postes,
    actions,
    economiesAnnuelles: Math.round(economiesAnnuelles),
    capexTotal: Math.round(capexTotal),
    roiMoyen: roiMoyen ? Math.round(roiMoyen * 10) / 10 : null,
    totalGainPct: Math.round(totalGainPct * 100),
    zone,
    maturite,
    scoreMaturiteLabel,
    scoreMaturiteColor,
    projData,
  };
}

function SurfaceGate({ onChoose }) {
  const [surface, setSurface] = useState('');
  const [error, setError] = useState('');

  function handleSubmit() {
    const s = parseFloat(surface);
    if (!s || s < 50) { setError('Veuillez saisir une surface valide (min. 50 m²).'); return; }
    onChoose(s > 1000 ? 'decret' : 'standard', s);
  }

  return (
    <div className="min-h-screen flex flex-col items-center justify-center px-4 py-16">
      <div className="max-w-lg w-full text-center">
        <div className="mb-8">
          <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-sm font-medium mb-6"

          </h1>

          </p>
        </div>

        <div className="glass rounded-2xl p-8 text-left mb-6">

          </label>
          <input
            type="number"
            placeholder="Ex : 850"
            value={surface}
            onChange={e => { setSurface(e.target.value); setError(''); }}
            onKeyDown={e => e.key === 'Enter' && handleSubmit()}
            className="w-full px-4 py-3 rounded-xl text-white text-lg font-medium outline-none focus:ring-2 focus:ring-alpha-500"
            style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}}
          />
          {error && <p className="mt-2 text-red-400 text-sm">{error}</p>}
          {parseFloat(surface) > 1000 && !error && (
            <div className="mt-3 flex items-start gap-2 text-sm text-amber-400">
              <span>⚠️</span>
              <span>Surface &gt; 1 000 m² — module Décret Tertiaire disponible (OPERAT + objectifs 2030/2040/2050)</span>
            </div>
          )}
        </div>

        <button
          onClick={handleSubmit}
          className="w-full py-4 rounded-xl font-semibold text-white text-lg transition-all hover:opacity-90 active:scale-98"
          style={{background:'linear-gradient(135deg, #6272f8, #4650ed)'}}>
          Commencer le diagnostic →
        </button>

        <p className="mt-4 text-xs text-gray-500">
          Données traitées localement · Résultats indicatifs · Non opposables OPERAT
        </p>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   COMPOSANT : DÉCRET TERTIAIRE MODULE (bêta)
═══════════════════════════════════════════════════ */

function DecretTertiaire({ surface, onBack }) {
  const OBJECTIFS_DECRET = { 2030: 0.40, 2040: 0.50, 2050: 0.60 };
  const [anneeRef, setAnneeRef] = useState('2010');
  const [consoRef, setConsoRef] = useState('');
  const [consoActuelle, setConsoActuelle] = useState('');
  const [result, setResult] = useState(null);

  function calculate() {
    const ref = parseFloat(consoRef) || 0;
    const actuel = parseFloat(consoActuelle) || 0;
    if (!ref || !actuel) return;
    const reduction2030 = ref * OBJECTIFS_DECRET[2030];
    const reduction2040 = ref * OBJECTIFS_DECRET[2040];
    const reduction2050 = ref * OBJECTIFS_DECRET[2050];
    const ecart2030 = actuel - (ref - reduction2030);
    const ecart2040 = actuel - (ref - reduction2040);
    const ecart2050 = actuel - (ref - reduction2050);
    setResult({ ref, actuel, reduction2030, reduction2040, reduction2050, ecart2030, ecart2040, ecart2050 });
  }

  return (
    <div className="min-h-screen px-4 py-12 max-w-3xl mx-auto">
      <button onClick={onBack} className="flex items-center gap-2 text-gray-400 hover:text-white mb-8 transition-colors">
        ← Retour
      </button>
      <div className="mb-8">
        <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-sm font-medium mb-4"
             style={{background:'rgba(251,191,36,0.15)', border:'1px solid rgba(251,191,36,0.3)', color:'#fbbf24'}}>
          Décret Tertiaire — Module bêta
        </div>
        <h1 className="text-3xl font-bold mb-2">Trajectoire OPERAT</h1>
        <p className="text-gray-400">Surface : {fmt(surface)} m² — Calcul des objectifs 2030 / 2040 / 2050</p>
      </div>

      <div className="glass rounded-2xl p-6 mb-6 space-y-4">
        <div className="grid grid-cols-2 gap-4">
          <div>
            <label className="block text-sm text-gray-400 mb-1">Année de référence</label>
            <select value={anneeRef} onChange={e => setAnneeRef(e.target.value)}
              className="w-full px-3 py-2 rounded-lg text-white"
              style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}}>
              {['2010','2011','2012','2013','2014','2015','2016','2017','2018','2019'].map(y =>
                <option key={y} value={y}>{y}</option>
              )}
            </select>
          </div>
          <div>
            <label className="block text-sm text-gray-400 mb-1">Conso référence (kWh/m²/an)</label>
            <input type="number" placeholder="Ex : 220" value={consoRef}
              onChange={e => setConsoRef(e.target.value)}
              className="w-full px-3 py-2 rounded-lg text-white"
              style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}} />
          </div>
        </div>
        <div>
          <label className="block text-sm text-gray-400 mb-1">Consommation actuelle (kWh/m²/an)</label>
          <input type="number" placeholder="Ex : 165" value={consoActuelle}
            onChange={e => setConsoActuelle(e.target.value)}
            className="w-full px-3 py-2 rounded-lg text-white"
            style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}} />
        </div>
        <button onClick={calculate}
          className="w-full py-3 rounded-xl font-semibold text-white transition-all hover:opacity-90"
          style={{background:'linear-gradient(135deg, #6272f8, #4650ed)'}}>
          Calculer la trajectoire
        </button>
      </div>

      {result && (
        <div className="space-y-4">
          {[{year:2030, target: result.ref - result.reduction2030, ecart: result.ecart2030},
            {year:2040, target: result.ref - result.reduction2040, ecart: result.ecart2040},
            {year:2050, target: result.ref - result.reduction2050, ecart: result.ecart2050}].map(obj => (
            <div key={obj.year} className="glass rounded-xl p-5 flex items-center justify-between">
              <div>
                <div className="text-sm text-gray-400 mb-1">Objectif {obj.year}</div>
                <div className="text-2xl font-bold" style={{fontFamily:'Syne,sans-serif'}}>
                  {fmt(Math.round(obj.target))} kWh/m²/an
                </div>
              </div>
              <div className="text-right">
                <div className={`text-lg font-semibold ${obj.ecart > 0 ? 'text-red-400' : 'text-emerald-400'}`}>
                  {obj.ecart > 0 ? `+${fmt(Math.round(obj.ecart))}` : fmt(Math.round(obj.ecart))} kWh/m²
                </div>
                <div className="text-sm text-gray-500">{obj.ecart > 0 ? 'Dépassement objectif' : 'Objectif atteint ✓'}</div>
              </div>
            </div>
          ))}
          <div className="glass rounded-xl p-5">
            <div className="text-sm text-gray-400 mb-3">Trajectoire de réduction</div>
            <ResponsiveContainer width="100%" height={180}>
              <LineChart data={[
                { an: anneeRef, conso: result.ref },
                { an: '2024', conso: result.actuel },
                { an: '2030', cible: Math.round(result.ref - result.reduction2030), conso: result.ecart2030 > 0 ? null : result.actuel },
                { an: '2040', cible: Math.round(result.ref - result.reduction2040) },
                { an: '2050', cible: Math.round(result.ref - result.reduction2050) },
              ]}>
                <CartesianGrid strokeDasharray="3 3" />
                <XAxis dataKey="an" tick={{fill:'#9ca3af', fontSize:11}} />
                <YAxis tick={{fill:'#9ca3af', fontSize:11}} />
                <Tooltip contentStyle={{background:'#1a1a2e', border:'1px solid rgba(255,255,255,0.1)', borderRadius:'8px'}} />
                <Line type="monotone" dataKey="cible" stroke="#6272f8" strokeWidth={2} strokeDasharray="5 5" name="Objectif réglementaire" dot={{ fill:'#6272f8' }} />
                <Line type="monotone" dataKey="conso" stroke="#f59e0b" strokeWidth={2} name="Consommation réelle" dot={{ fill:'#f59e0b' }} />
              </LineChart>
            </ResponsiveContainer>
          </div>
          <div className="glass rounded-xl p-5 text-sm text-amber-300">
            ⚠️ Module bêta — Vérifier les données avec votre déclaration OPERAT officielle.
            Ce calcul est indicatif et ne remplace pas l'accompagnement d'un AMO Décret Tertiaire.
          </div>
        </div>
      )}
    </div>
  );
}

  { id:6, label:'Usage et occupation', short:'Usage'      },
  { id:7, label:'Contexte et travaux', short:'Travaux'    },

const DEFAULT_FORM = {
  nomBatiment: '', nomContact: '', emailContact: '', telephoneContact: '', societe: '',
  activite: '', surface: '', codePostal: '', ville: '', anneeConstruction: '',
  typeConstruction: '', certificationEnv: '',
  isolationToiture: '', isolationFacade: '', isolationPlancher: '', typeVitrage: '',
  systemeChauffage: '', systemeClim: '', systemeVentilation: '', systemeEclairage: '',
  energiePrincipale: '', energieSecondaire: '',
  elecKwh: '', elecEuro: '', gasKwh: '', gasEuro: '', autresKwh: '', autresEuro: '',
  sansFactures: false,
  nbOccupants: '', heuresOuverture: '', joursOuverture: '5',
  activiteNuit: false, activiteWeekend: false,
  travauxRecents: '', budgetTravaux: '', horizonDecision: '',
  objectif: '',
};

function DiagForm({ surface: surfaceInit, onComplete }) {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ ...DEFAULT_FORM, surface: String(Math.round(surfaceInit)) });
  const [errors, setErrors] = useState({});

  function set(field, value) {
    setForm(f => ({ ...f, [field]: value }));
    setErrors(e => { const n = {...e}; delete n[field]; return n; });
  }

  function validate(s) {
    const e = {};
    if (s === 1) {
      if (!form.nomContact.trim()) e.nomContact = 'Requis';
      if (!form.activite) e.activite = 'Requis';
    }
    if (s === 2) {
      if (!form.surface || parseFloat(form.surface) < 50) e.surface = 'Surface min. 50 m²';
      if (!form.anneeConstruction) e.anneeConstruction = 'Requis';
    }
    if (s === 5) {
      if (!form.energiePrincipale) e.energiePrincipale = 'Requis';
    }
    if (s === 7) {
      if (!form.emailContact.trim()) e.emailContact = 'Requis';
    }
    setErrors(e);
    return Object.keys(e).length === 0;
  }

  function next() {
    if (!validate(step)) return;
    if (step === 7) { onComplete(form); return; }
    setStep(s => s + 1);
  }

  const progress = ((step - 1) / 6) * 100;

  return (
    <div className="min-h-screen px-4 py-8 max-w-2xl mx-auto">
      {/* Header progress */}
      <div className="mb-8">
        <div className="flex items-center justify-between mb-3">
          <span className="text-sm text-gray-400">Module {step}/{MODULES.length}</span>
          <span className="text-sm font-medium text-alpha-400">{MODULES[step-1].label}</span>
        </div>
        <div className="progress-bar">
          <div className="progress-fill" style={{width:`${progress}%`}} />
        </div>
        <div className="flex mt-2 gap-1">
          {MODULES.map(m => (
            <button key={m.id} onClick={() => m.id < step && setStep(m.id)}
              className={`flex-1 text-xs py-1 rounded transition-colors ${step === m.id ? 'text-alpha-400 font-semibold' : m.id < step ? 'text-gray-400 cursor-pointer hover:text-gray-200' : 'text-gray-600 cursor-default'}`}>
              {m.short}
            </button>
          ))}
        </div>
      </div>

      {/* Module 1 — Identification */}
      {step === 1 && (
        <div className="space-y-6">
          <h2 className="text-2xl font-bold">Identification</h2>
          <div>
            <label className="block text-sm text-gray-400 mb-2">Nom du bâtiment / projet (optionnel)</label>
            <input value={form.nomBatiment} onChange={e => set('nomBatiment', e.target.value)}
              placeholder="Ex : Bureaux Haussmann" className="form-input w-full px-4 py-3 rounded-xl text-white"
              style={{background:'rgba(255,255,255,0.07)', border:`1px solid ${errors.nomBatiment ? '#f87171' : 'rgba(255,255,255,0.12)'}`}} />
          </div>
          <div>
            <label className="block text-sm text-gray-400 mb-2">Votre nom *</label>
            <input value={form.nomContact} onChange={e => set('nomContact', e.target.value)}
              placeholder="Prénom Nom"
              className="form-input w-full px-4 py-3 rounded-xl text-white"
              style={{background:'rgba(255,255,255,0.07)', border:`1px solid ${errors.nomContact ? '#f87171' : 'rgba(255,255,255,0.12)'}`}} />
            {errors.nomContact && <p className="text-red-400 text-xs mt-1">{errors.nomContact}</p>}
          </div>
          <div>
            <label className="block text-sm text-gray-400 mb-2">Société (optionnel)</label>
            <input value={form.societe} onChange={e => set('societe', e.target.value)}
              placeholder="Raison sociale"
              className="form-input w-full px-4 py-3 rounded-xl text-white"
              style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}} />
          </div>
          <div>
            <label className="block text-sm text-gray-400 mb-3">Type d'activité *</label>
            <div className="grid grid-cols-3 gap-3">
              {ACTIVITE_OPTIONS.map(opt => (
                <button key={opt.id} onClick={() => set('activite', opt.id)}

                      style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}} />

                  <div>
                    <label className="block text-xs text-gray-500 mb-1">€ TTC/an</label>
                    <input type="number" value={form.elecEuro} onChange={e => set('elecEuro', e.target.value)}
                      placeholder="Ex : 8 800" className="w-full px-3 py-2.5 rounded-lg text-white text-sm"
                      style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}} />
                  </div>
                </div>
              </div>
              <div>
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-sm font-medium text-gray-300">🔥 Gaz naturel</span>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">kWh/an</label>
                    <input type="number" value={form.gasKwh} onChange={e => set('gasKwh', e.target.value)}
                      placeholder="Ex : 32 000" className="w-full px-3 py-2.5 rounded-lg text-white text-sm"
                      style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}} />
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">€ TTC/an</label>
                    <input type="number" value={form.gasEuro} onChange={e => set('gasEuro', e.target.value)}
                      placeholder="Ex : 3 400" className="w-full px-3 py-2.5 rounded-lg text-white text-sm"
                      style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}} />
                  </div>
                </div>
              </div>
              <div>
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-sm font-medium text-gray-300">♨️ Autres énergies</span>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">kWh/an</label>
                    <input type="number" value={form.autresKwh} onChange={e => set('autresKwh', e.target.value)}
                      placeholder="0" className="w-full px-3 py-2.5 rounded-lg text-white text-sm"
                      style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}} />
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">€ TTC/an</label>
                    <input type="number" value={form.autresEuro} onChange={e => set('autresEuro', e.target.value)}
                      placeholder="0" className="w-full px-3 py-2.5 rounded-lg text-white text-sm"
                      style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}} />
                  </div>
                </div>
              </div>
            </div>
          )}

          {form.sansFactures && (
            <div className="glass rounded-xl p-4 text-sm text-amber-300">
              ⚠️ En l'absence de factures, l'estimation se base sur les médianes sectorielles.
              Le score de confiance sera "Faible". Privilégiez la saisie de factures pour un résultat fiable.
            </div>
          )}
        </div>
      )}

      {/* Module 6 — Usage et occupation */}
      {step === 6 && (
        <div className="space-y-6">
          <h2 className="text-2xl font-bold">Usage et occupation</h2>
          <div>
            <label className="block text-sm text-gray-400 mb-2">Nombre d'occupants / employés habituels</label>
            <input type="number" value={form.nbOccupants} onChange={e => set('nbOccupants', e.target.value)}
              placeholder="Ex : 35" className="w-full px-4 py-3 rounded-xl text-white"
              style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}} />
          </div>
          <div>
            <label className="block text-sm text-gray-400 mb-2">Heures d'ouverture par jour</label>
            <div className="flex flex-wrap gap-2">
              {['6','8','10','12','16','24'].map(h => (
                <button key={h} onClick={() => set('heuresOuverture', h)}
                  className={`px-4 py-2 rounded-lg border text-sm transition-all ${form.heuresOuverture === h ? 'tile-active' : 'glass hover:border-gray-500'}`}
                  style={{borderColor: form.heuresOuverture === h ? '#6272f8' : 'rgba(255,255,255,0.08)'}}>
                  {h}h
                </button>
              ))}
            </div>
          </div>
          <div>
            <label className="block text-sm text-gray-400 mb-2">Jours d'ouverture par semaine</label>
            <div className="flex flex-wrap gap-2">
              {['5','6','7'].map(d => (
                <button key={d} onClick={() => set('joursOuverture', d)}
                  className={`px-4 py-2 rounded-lg border text-sm transition-all ${form.joursOuverture === d ? 'tile-active' : 'glass hover:border-gray-500'}`}
                  style={{borderColor: form.joursOuverture === d ? '#6272f8' : 'rgba(255,255,255,0.08)'}}>
                  {d} jours
                </button>
              ))}
            </div>
          </div>
          <div className="flex flex-col gap-3">
            <label className="flex items-center gap-3 cursor-pointer">
              <input type="checkbox" checked={form.activiteNuit} onChange={e => set('activiteNuit', e.target.checked)}
                className="w-4 h-4 rounded" />
              <span className="text-sm">Activité nocturne (après 22h)</span>
            </label>
            <label className="flex items-center gap-3 cursor-pointer">
              <input type="checkbox" checked={form.activiteWeekend} onChange={e => set('activiteWeekend', e.target.checked)}
                className="w-4 h-4 rounded" />
              <span className="text-sm">Ouvert le week-end</span>
            </label>
          </div>
        </div>
      )}

      {/* Module 7 — Contexte et travaux */}
      {step === 7 && (
        <div className="space-y-6">
          <h2 className="text-2xl font-bold">Contexte et travaux</h2>

          <div>
            <label className="block text-sm text-gray-400 mb-2">Travaux énergétiques récents ou planifiés</label>
            <div className="space-y-2">
              {[
                {id:'oui_recents', label:'Oui, travaux réalisés dans les 3 dernières années'},
                {id:'planifies',   label:'Oui, travaux planifiés (budget défini)'},
                {id:'en_reflexion',label:'En réflexion (pas encore planifiés)'},
                {id:'non',         label:'Non, aucun travaux prévu'},
              ].map(opt => (
                <button key={opt.id} onClick={() => set('travauxRecents', opt.id)}
                  className={`w-full px-4 py-3 rounded-xl border text-sm text-left transition-all ${form.travauxRecents === opt.id ? 'tile-active' : 'glass hover:border-gray-500'}`}
                  style={{borderColor: form.travauxRecents === opt.id ? '#6272f8' : 'rgba(255,255,255,0.08)'}}>
                  {opt.label}
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="block text-sm text-gray-400 mb-2">Horizon décision investissement</label>
            <div className="flex flex-wrap gap-2">
              {[{id:'immediat',label:'Immédiat'},{id:'6mois',label:'< 6 mois'},{id:'1an',label:'1 an'},{id:'2ans_plus',label:'2 ans+'}].map(opt => (
                <button key={opt.id} onClick={() => set('horizonDecision', opt.id)}
                  className={`px-4 py-2 rounded-lg border text-sm transition-all ${form.horizonDecision === opt.id ? 'tile-active' : 'glass hover:border-gray-500'}`}
                  style={{borderColor: form.horizonDecision === opt.id ? '#6272f8' : 'rgba(255,255,255,0.08)'}}>
                  {opt.label}
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="block text-sm text-gray-400 mb-2">Objectif principal</label>
            <div className="grid grid-cols-3 gap-3">
              {[{id:'conformite',label:'Conformité réglementaire',icon:'⚖️'},{id:'charges',label:'Réduction charges',icon:'💶'},{id:'valorisation',label:'Valorisation bien',icon:'📈'}].map(opt => (
                <button key={opt.id} onClick={() => set('objectif', opt.id)}
                  className={`p-3 rounded-xl border text-center transition-all ${form.objectif === opt.id ? 'tile-active' : 'glass hover:border-gray-500'}`}
                  style={{borderColor: form.objectif === opt.id ? '#6272f8' : 'rgba(255,255,255,0.08)'}}>
                  <div className="text-xl mb-1">{opt.icon}</div>
                  <div className="text-xs font-medium leading-tight">{opt.label}</div>
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="block text-sm text-gray-400 mb-2">Email de contact (pour recevoir le rapport) *</label>
            <input type="email" value={form.emailContact} onChange={e => set('emailContact', e.target.value)}
              placeholder="vous@example.com" className="w-full px-4 py-3 rounded-xl text-white"
              style={{background:'rgba(255,255,255,0.07)', border:`1px solid ${errors.emailContact ? '#f87171' : 'rgba(255,255,255,0.12)'}`}} />
            {errors.emailContact && <p className="text-red-400 text-xs mt-1">{errors.emailContact}</p>}
          </div>

          <div>
            <label className="block text-sm text-gray-400 mb-2">Téléphone (optionnel)</label>
            <input type="tel" value={form.telephoneContact} onChange={e => set('telephoneContact', e.target.value)}
              placeholder="06 xx xx xx xx" className="w-full px-4 py-3 rounded-xl text-white"
              style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}} />
            <p className="text-xs text-gray-500 mt-1">✓ Pour être rappelé par un expert RGE près de chez vous</p>
          </div>

          <div className="p-4 rounded-xl" style={{background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)'}}>
            <p className="text-xs text-gray-400 leading-relaxed">
              Données traitées de manière sécurisée pour produire cette estimation indicative.
              Ne remplace pas un audit réglementaire complet. Conservation 18 mois · Droits RGPD : diagtertiaire.fr/rgpd
            </p>
          </div>
        </div>
      )}

      {/* Navigation */}
      <div className="flex gap-3 mt-10">
        {step > 1 && (
          <button onClick={() => setStep(s => s - 1)}
            className="flex-1 py-3 rounded-xl border text-sm font-medium transition-all hover:border-gray-400"
            style={{border:'1px solid rgba(255,255,255,0.15)', color:'#9ca3af'}}>
            ← Précédent
          </button>
        )}
        <button onClick={next}
          className="flex-1 py-3 rounded-xl font-semibold text-white transition-all hover:opacity-90"
          style={{background:'linear-gradient(135deg, #6272f8, #4650ed)'}}>
          {step === 7 ? 'Générer le rapport →' : 'Suivant →'}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   RAPPORT CLIENT — 8 SECTIONS
═══════════════════════════════════════════════════ */

const CHART_COLORS = ['#6272f8','#8098fb','#f59e0b','#10b981','#ef4444','#8b5cf6'];
const TOOLTIP_STYLE = { background:'#1a1a2e', border:'1px solid rgba(255,255,255,0.1)', borderRadius:'8px', color:'#f0f0f5', fontFamily:'DM Sans, sans-serif', fontSize:'13px' };

function RapportClient({ formData, result, onDashboard, onReset }) {
  const secteur = BENCHMARKS[formData.activite] || BENCHMARKS.bureau;
  const activiteLabel = ACTIVITY_LABELS[formData.activite] || formData.activite;

  const repartitionData = Object.entries(result.postes).map(([k, v]) => ({
    name: k.charAt(0).toUpperCase() + k.slice(1),
    value: v,
    kwh: Math.round((result.totalKwh * v) / 100),
  }));

  const benchmarkData = [
    { name: 'Q1', valeur: secteur.q1, fill: '#059669' },
    { name: 'Médiane', valeur: secteur.median, fill: '#d97706' },
    { name: 'Q3', valeur: secteur.q3, fill: '#dc2626' },
    { name: formData.nomBatiment || 'Votre bâtiment', valeur: result.intensiteReelle, fill: '#6272f8' },
  ];

  const economiesData = result.actions.slice(0, 5).map(a => ({
    name: a.label.length > 28 ? a.label.substring(0, 26) + '…' : a.label,
    economie: Math.round(a.gainEuroAnnuel),
    capex: Math.round(a.capexEstime),
    roi: a.roiAns ? Math.round(a.roiAns * 10) / 10 : null,
  }));

  function exportPrint() { window.print(); }

  function exportShare() {
    try {
      const payload = { f: formData, r: result, ts: Date.now() };
      const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
      const url = window.location.href.split('#')[0] + '#rapport=' + b64;
      navigator.clipboard.writeText(url).then(() => alert('Lien copié dans le presse-papiers !'));
    } catch(e) { alert('Impossible de générer le lien.'); }
  }

  return (
    <div className="max-w-4xl mx-auto px-4 py-8" id="rapport-client">
      {/* Actions header */}
      <div className="flex items-center justify-between mb-8 no-print">
        <button onClick={onReset} className="flex items-center gap-2 text-gray-400 hover:text-white transition-colors text-sm">
          ← Nouveau diagnostic
        </button>
        <div className="flex gap-3">
          <button onClick={onDashboard}
            className="px-4 py-2 rounded-lg text-sm font-medium transition-all hover:opacity-80"
            style={{background:'rgba(98,114,248,0.2)', border:'1px solid rgba(98,114,248,0.3)', color:'#8098fb'}}>
            Dashboard Pro
          </button>
          <button onClick={exportShare}
            className="px-4 py-2 rounded-lg text-sm font-medium transition-all hover:opacity-80"
            style={{background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)'}}>
            Partager
          </button>
          <button onClick={exportPrint}
            className="px-4 py-2 rounded-lg text-sm font-medium text-white transition-all hover:opacity-90"
            style={{background:'linear-gradient(135deg, #6272f8, #4650ed)'}}>
            Télécharger PDF
          </button>
        </div>
      </div>

      {/* Section 1 — Hero band */}
      <div className="rounded-2xl p-8 mb-6"
           style={{background:'linear-gradient(135deg, #1a1a3e 0%, #0f0f2e 100%)', border:'1px solid rgba(98,114,248,0.3)'}}>
        <div className="flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
          <div>
            <div className="text-xs font-medium text-alpha-400 uppercase tracking-wider mb-2">Rapport DiagTertiaire Pro Alpha</div>
            <h1 className="text-3xl font-bold mb-2" style={{fontFamily:'Syne,sans-serif'}}>
              {formData.nomBatiment || 'Bâtiment diagnostiqué'}
            </h1>
            <div className="flex flex-wrap gap-4 text-sm text-gray-300">
              <span>📍 {formData.ville || '—'} {formData.codePostal && `(${formData.codePostal})`}</span>
              <span>🏢 {activiteLabel}</span>
              <span>📐 {fmt(parseFloat(formData.surface))} m²</span>
              <span>🗓️ {new Date().toLocaleDateString('fr-FR')}</span>
            </div>
            {result.consoEstimee && (
              <div className="mt-3 text-xs text-amber-300 flex items-center gap-1">
                ⚠️ Consommation estimée par benchmark sectoriel — saisir les factures pour affiner
              </div>
            )}
          </div>
          <div className={`flex flex-col items-center justify-center w-28 h-28 rounded-2xl border-2 font-bold flex-shrink-0 ${scoreBgClass(result.lettre)}`}
               style={{borderColor: scoreColor(result.lettre)}}>
            <div className="text-5xl" style={{fontFamily:'Syne,sans-serif'}}>{result.lettre}</div>
            <div className="text-xs mt-1 opacity-70">Indice DiagT.</div>
          </div>
        </div>
      </div>

      {/* Section 2 — KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        {[
          { label:'Intensité', value:`${fmt(result.intensiteReelle)} kWh/m²/an`, sub:`Médiane : ${fmt(result.medianeRef)}`, color:'#6272f8' },
          { label:'Coût énergie', value: fmtEuro(result.annualCost), sub:'/ an TTC', color:'#f59e0b' },
          { label:'Émissions CO₂', value:`${fmt(result.co2Annual, 1)} t', sub:'CO₂/an', color:'#10b981' },
          { label:'Confiance', value: result.confiance, sub:`Score ${result.confianceScore}/3`, color: result.confianceScore === 3 ? '#059669' : result.confianceScore === 2 ? '#d97706' : '#dc2626' },
        ].map((kpi, i) => (
          <div key={i} className="glass rounded-xl p-4">
            <div className="text-xs text-gray-400 mb-2">{kpi.label}</div>
            <div className="text-xl font-bold mb-0.5" style={{color: kpi.color, fontFamily:'Syne,sans-serif'}}>{kpi.value}</div>
            <div className="text-xs text-gray-500">{kpi.sub}</div>
          </div>
        ))}
      </div>

      {/* Section 3 — Positionnement sectoriel */}
      <div className="glass rounded-2xl p-6 mb-6">
        <h2 className="text-xl font-bold mb-4">Positionnement sectoriel — {activiteLabel}</h2>
        <div className="flex flex-col md:flex-row gap-6">
          <div className="flex-1">
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={benchmarkData} margin={{top:5, right:5, bottom:5, left:5}}>
                <CartesianGrid strokeDasharray="3 3" />
                <XAxis dataKey="name" tick={{fill:'#9ca3af', fontSize:11}} />
                <YAxis tick={{fill:'#9ca3af', fontSize:11}} unit=" kWh" />
                <Tooltip contentStyle={TOOLTIP_STYLE} formatter={(v) => [`${fmt(v)} kWh/m²/an`, 'Intensité']} />
                <Bar dataKey="valeur" radius={[4,4,0,0]}>
                  {benchmarkData.map((entry, i) => (
                    <Cell key={i} fill={entry.fill} />
                  ))}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="md:w-56">
            <div className="space-y-2">
              <div className="flex justify-between text-sm">
                <span className="text-gray-400">Votre intensité</span>
                <span className="font-semibold">{fmt(result.intensiteReelle)} kWh/m²</span>
              </div>
              <div className="flex justify-between text-sm">
                <span className="text-gray-400">Ratio / médiane</span>
                <span className="font-semibold" style={{color: scoreColor(result.lettre)}}>×{result.ratio}</span>
              </div>
              <div className="flex justify-between text-sm">
                <span className="text-gray-400">Zone climatique</span>
                <span className="font-semibold">{result.zone}</span>
              </div>
              <div className="mt-4 p-3 rounded-xl text-center text-sm"
                   style={{background:`${scoreColor(result.lettre)}22`, border:`1px solid ${scoreColor(result.lettre)}55`}}>
                <div className="text-xs text-gray-400 mb-1">Classe estimée</div>
                <div className="text-3xl font-bold" style={{color: scoreColor(result.lettre), fontFamily:'Syne,sans-serif'}}>{result.lettre}</div>
                <div className="text-xs text-gray-500 mt-1">Indicatif — non opposable</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Section 4 — Répartition postes */}
      <div className="glass rounded-2xl p-6 mb-6">
        <h2 className="text-xl font-bold mb-4">Répartition estimée par poste</h2>
        <div className="flex flex-col md:flex-row gap-6">
          <div className="flex-shrink-0">
            <ResponsiveContainer width={200} height={200}>
              <PieChart>
                <Pie data={repartitionData} dataKey="value" cx="50%" cy="50%"
                     innerRadius={55} outerRadius={85} paddingAngle={3}>
                  {repartitionData.map((_, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                </Pie>
                <Tooltip contentStyle={TOOLTIP_STYLE} formatter={(v, n, p) => [`${v}% — ${fmt(p.payload.kwh)} kWh`, p.payload.name]} />
              </PieChart>
            </ResponsiveContainer>
          </div>
          <div className="flex-1 grid grid-cols-2 gap-3">
            {repartitionData.map((p, i) => (
              <div key={i} className="flex items-center gap-3">
                <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background: CHART_COLORS[i % CHART_COLORS.length]}} />
                <div>
                  <div className="text-sm font-medium">{p.name}</div>
                  <div className="text-xs text-gray-400">{p.value}% · {fmt(p.kwh)} kWh</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Section 5 — Actions prioritaires */}
      <div className="glass rounded-2xl p-6 mb-6">
        <h2 className="text-xl font-bold mb-2">Actions prioritaires</h2>
        <p className="text-sm text-gray-400 mb-4">
          Potentiel global estimé : {result.totalGainPct}% de réduction — {fmtEuro(result.economiesAnnuelles)}/an
        </p>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="border-b" style={{borderColor:'rgba(255,255,255,0.08)'}}>
                <th className="text-left py-2 pr-4 text-gray-400 font-medium">Action</th>
                <th className="text-right py-2 pr-4 text-gray-400 font-medium">Gain €/an</th>
                <th className="text-right py-2 pr-4 text-gray-400 font-medium">CAPEX est.</th>
                <th className="text-right py-2 pr-4 text-gray-400 font-medium">Retour</th>
                <th className="text-right py-2 text-gray-400 font-medium">CEE</th>
              </tr>
            </thead>
            <tbody>
              {result.actions.map((a, i) => (
                <tr key={i} className="border-b hover:bg-white/5 transition-colors"
                    style={{borderColor:'rgba(255,255,255,0.05)'}}>
                  <td className="py-3 pr-4">
                    <div className="font-medium">{a.label}</div>
                    <div className="text-xs text-gray-500">{a.temps_retour_indicatif}</div>
                  </td>
                  <td className="py-3 pr-4 text-right font-semibold text-emerald-400">{fmtEuro(a.gainEuroAnnuel)}</td>
                  <td className="py-3 pr-4 text-right text-gray-300">{fmtEuro(a.capexEstime)}</td>
                  <td className="py-3 pr-4 text-right">
                    {a.roiAns ? <span className="font-medium">{a.roiAns} ans</span> : '—'}
                  </td>
                  <td className="py-3 text-right">
                    {a.cee_fiche ?
                      <span className="px-2 py-0.5 rounded text-xs font-medium" style={{background:'rgba(98,114,248,0.2)', color:'#8098fb'}}>{a.cee_fiche}</span>
                      : <span className="text-gray-600">—</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="mt-4 p-3 rounded-xl text-xs text-gray-500"
             style={{background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.06)'}}>
          CAPEX estimé sur base de {fmt(parseFloat(formData.surface))} m² · Prix de référence marché 2024 · Hors aides et subventions
        </div>
      </div>

      {/* Section 6 — Projection ROI 10 ans */}
      <div className="glass rounded-2xl p-6 mb-6">
        <h2 className="text-xl font-bold mb-2">Projection financière 10 ans</h2>
        <p className="text-sm text-gray-400 mb-4">
          CAPEX total estimé : {fmtEuro(result.capexTotal)} · ROI moyen : {result.roiMoyen ? `${result.roiMoyen} ans` : '—'}
        </p>
        <ResponsiveContainer width="100%" height={240}>

/* ═══════════════════════════════════════════════════
   DASHBOARD PRO — DONNÉES DE QUALIFICATION
═══════════════════════════════════════════════════ */

function DashboardPro({ formData, result, allCases, onBack, onReset }) {
  function exportCSV() {
    const cases = allCases || [{ formData, result, ts: Date.now() }];
    const headers = ['Date','Nom','Email','Société','Activité','Surface','Ville','Score','Intensité','Coût/an','Économies/an','CAPEX','ROI','Maturité','Label maturité','Objectif','Horizon'];
    const rows = cases.map(c => {
      const f = c.formData; const r = c.result;
      return [
        new Date(c.ts).toLocaleDateString('fr-FR'),
        f.nomContact, f.emailContact, f.societe,
        ACTIVITY_LABELS[f.activite] || f.activite,
        f.surface, f.ville,
        r.lettre, r.intensiteReelle, r.annualCost,
        r.economiesAnnuelles, r.capexTotal,
        r.roiMoyen || '',
        r.maturite, r.scoreMaturiteLabel,
        f.objectif, f.horizonDecision,
      ].map(v => `"${v || ''}"`).join(',');
    });
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `leads-diagtertiaire-${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }

  return (
    <div className="max-w-4xl mx-auto px-4 py-8">
      <div className="flex items-center justify-between mb-8">
        <div>
          <button onClick={onBack} className="flex items-center gap-2 text-gray-400 hover:text-white transition-colors text-sm mb-2">
            ← Retour au rapport client
          </button>
          <h1 className="text-2xl font-bold" style={{fontFamily:'Syne,sans-serif'}}>Dashboard Pro</h1>
          <p className="text-sm text-gray-400">Données de qualification — usage interne uniquement</p>
        </div>
        <button onClick={exportCSV}
          className="px-4 py-2 rounded-lg text-sm font-medium transition-all hover:opacity-90"
          style={{background:'rgba(16,185,129,0.2)', border:'1px solid rgba(16,185,129,0.3)', color:'#10b981'}}>
          Exporter CSV
        </button>
      </div>

      {/* Score maturité */}
      <div className="glass rounded-2xl p-6 mb-6">
        <h2 className="text-lg font-bold mb-4">Score de maturité prospect</h2>
        <div className="flex items-center gap-6">
          <div className="flex flex-col items-center justify-center w-28 h-28 rounded-2xl border-2 flex-shrink-0"
               style={{borderColor: result.scoreMaturiteColor, background:`${result.scoreMaturiteColor}22`}}>
            <div className="text-4xl font-bold" style={{color: result.scoreMaturiteColor, fontFamily:'Syne,sans-serif'}}>{result.maturite}</div>
            <div className="text-xs mt-1" style={{color: result.scoreMaturiteColor}}>/10</div>
          </div>
          <div className="flex-1">
            <div className="flex items-center gap-3 mb-3">
              <span className="text-xl font-bold" style={{color: result.scoreMaturiteColor, fontFamily:'Syne,sans-serif'}}>{result.scoreMaturiteLabel}</span>
            </div>
            <div className="space-y-1 text-sm text-gray-400">
              <div>Score énergie (lettre {result.lettre}) : {result.lettre === 'D' || result.lettre === 'E' ? '+3' : result.lettre === 'C' ? '+2' : '+1'} pts</div>
              {formData.travauxRecents === 'planifies' && <div>Travaux planifiés : +3 pts</div>}
              {formData.travauxRecents === 'oui_recents' && <div>Travaux récents : +2 pts</div>}
              {parseFloat(formData.surface) > 1000 && <div>Surface &gt; 1000 m² : +2 pts</div>}
              {parseInt(formData.nbOccupants) > 20 && <div>Organisation &gt; 20 pers. : +1 pt</div>}
            </div>
          </div>
        </div>
      </div>

      {/* Données prospect */}
      <div className="grid md:grid-cols-2 gap-4 mb-6">
        <div className="glass rounded-2xl p-5">
          <h3 className="text-base font-semibold mb-3">Contact</h3>
          <div className="space-y-2 text-sm">
            <div className="flex justify-between">
              <span className="text-gray-400">Nom</span>
              <span>{formData.nomContact || '—'}</span>
            </div>
            <div className="flex justify-between">
              <span className="text-gray-400">Email</span>
              <span className="text-alpha-400">{formData.emailContact || '—'}</span>
            </div>
            <div className="flex justify-between">
              <span className="text-gray-400">Téléphone</span>

            </div>
            <div className="flex justify-between">
              <span className="text-gray-400">Société</span>

        </div>

        <div className="glass rounded-2xl p-5">
          <h3 className="text-base font-semibold mb-3">Qualification</h3>
          <div className="space-y-2 text-sm">
            <div className="flex justify-between">
              <span className="text-gray-400">Objectif</span>
              <span>{formData.objectif ? {conformite:'Conformité',charges:'Réduction charges',valorisation:'Valorisation'}[formData.objectif] : '—'}</span>
            </div>
            <div className="flex justify-between">
              <span className="text-gray-400">Horizon décision</span>
              <span>{formData.horizonDecision ? {immediat:'Immédiat',['6mois']:'< 6 mois',['1an']:'1 an',['2ans_plus']:'2 ans+'}[formData.horizonDecision] : '—'}</span>
            </div>
            <div className="flex justify-between">

            <div className="flex justify-between">

          { label:'CAPEX total estimé', value: fmtEuro(result.capexTotal), sub:'investissement', color:'#6272f8' },
          { label:'ROI moyen', value: result.roiMoyen ? `${result.roiMoyen} ans` : '—', sub:'retour sur investissement', color:'#f59e0b' },
          { label:'Gain potentiel', value: `${result.totalGainPct}%`, sub:'de réduction conso.', color:'#8b5cf6' },
        ].map((kpi, i) => (
          <div key={i} className="glass rounded-xl p-4">
            <div className="text-xs text-gray-400 mb-1">{kpi.label}</div>
            <div className="text-xl font-bold" style={{color: kpi.color, fontFamily:'Syne,sans-serif'}}>{kpi.value}</div>
            <div className="text-xs text-gray-500 mt-0.5">{kpi.sub}</div>
          </div>
        ))}
      </div>

      {/* Données techniques complètes */}
      <div className="glass rounded-2xl p-5 mb-6">
        <h3 className="text-base font-semibold mb-3">Données techniques saisies</h3>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-x-8 gap-y-2 text-sm">
          {[
            ['Activité', ACTIVITY_LABELS[formData.activite] || '—'],
            ['Surface', `${fmt(parseFloat(formData.surface))} m²`],
            ['Construction', formData.anneeConstruction || '—'],
            ['Zone climatique', result.zone],
            ['Energie principale', formData.energiePrincipale || '—'],
            ['Chauffage', formData.systemeChauffage || '—'],
            ['Climatisation', formData.systemeClim || '—'],
            ['Ventilation', formData.systemeVentilation || '—'],

            ['Heures ouverture', formData.heuresOuverture ? `${formData.heuresOuverture}h/j` : '—'],
            ['Jours ouverture', formData.joursOuverture ? `${formData.joursOuverture}j/sem` : '—'],
          ].map(([k, v]) => (
            <div key={k} className="flex justify-between py-1 border-b" style={{borderColor:'rgba(255,255,255,0.05)'}}>

            </div>
          ))}
        </div>
      </div>

      <div className="text-center">
        <button onClick={onReset}
          className="px-6 py-3 rounded-xl font-semibold text-white transition-all hover:opacity-90"
          style={{background:'linear-gradient(135deg, #6272f8, #4650ed)'}}>
          Nouveau diagnostic
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════ */

const LS_KEY = 'diagtertiaire_pro_alpha_v1';

function App() {
  const [screen, setScreen] = useState('gate'); // gate | decret | form | rapport | dashboard
  const [surface, setSurface] = useState(null);
  const [formData, setFormData] = useState(null);
  const [result, setResult] = useState(null);
  const [allCases, setAllCases] = useState([]);

  // Charger depuis localStorage + vérifier hash URL
  useEffect(() => {
    try {
      const hash = window.location.hash;
      if (hash && hash.startsWith('#rapport=')) {
        const b64 = hash.replace('#rapport=', '');
        const payload = JSON.parse(decodeURIComponent(escape(atob(b64))));
        if (payload && payload.f && payload.r) {
          setFormData(payload.f);
          setResult(payload.r);
          setSurface(parseFloat(payload.f.surface));
          setScreen('rapport');
          return;
        }
      }
    } catch(e) { /* invalid hash */ }

    try {
      const saved = localStorage.getItem(LS_KEY);
      if (saved) {
        const data = JSON.parse(saved);
        if (data.cases) setAllCases(data.cases);
      }
    } catch(e) {}
  }, []);

  function handleGateChoose(type, s) {
    setSurface(s);
    setScreen(type === 'decret' ? 'decret' : 'form');
  }

  function handleFormComplete(data) {
    const engineResult = runEngine(data);
    setFormData(data);
    setResult(engineResult);
    setScreen('rapport');

    // Sauvegarder en localStorage
    try {
      const entry = { formData: data, result: engineResult, ts: Date.now() };
      const newCases = [entry, ...allCases].slice(0, 100);
      setAllCases(newCases);
      localStorage.setItem(LS_KEY, JSON.stringify({ cases: newCases, lastUpdated: Date.now() }));
    } catch(e) {}
  }

  function handleReset() {
    setScreen('gate');
    setFormData(null);
    setResult(null);
    setSurface(null);
    window.location.hash = '';
  }

  return (
    <div>
      {screen === 'gate' && <SurfaceGate onChoose={handleGateChoose} />}
      {screen === 'decret' && <DecretTertiaire surface={surface} onBack={() => setScreen('gate')} />}
      {screen === 'form' && <DiagForm surface={surface} onComplete={handleFormComplete} />}
      {screen === 'rapport' && formData && result && (
        <RapportClient
          formData={formData}
          result={result}
          onDashboard={() => setScreen('dashboard')}
          onReset={handleReset}
        />
      )}
      {screen === 'dashboard' && formData && result && (
        <DashboardPro
          formData={formData}
          result={result}
          allCases={allCases}
          onBack={() => setScreen('rapport')}
          onReset={handleReset}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
