                                                                if (!antiSpamCheck.ok) {
                                                                    setCtaError(antiSpamCheck.error);
                                                                    return;
                                                                }

                                                                setCtaSubmitting(true);
                                                                newDiagnosticSetFormCooldown(ctaFormKey);

                                                                const leadPayload = newDiagnosticBuildReportCtaLeadPayload(reportPayload, ctaName, ctaMessage);
                                                                let leadSubmissionId = reportPayload && reportPayload.lead_submission_id
                                                                    ? reportPayload.lead_submission_id
                                                                    : null;

                                                                if (!leadSubmissionId) {
                                                                    const leadResult = await newDiagnosticSubmitLead(leadPayload);

                                                                    if (!leadResult.ok || !leadResult.id) {
                                                                        setCtaError("Impossible d'enregistrer votre demande principale. Merci de réessayer dans quelques instants.");
                                                                        newDiagnosticClearFormCooldown(ctaFormKey);
                                                                        setCtaSubmitting(false);
                                                                        return;
                                                                    }

                                                                    leadSubmissionId = leadResult.id;

                                                                    if (leadSubmissionId && typeof onLeadSubmissionCreated === 'function') {
                                                                        onLeadSubmissionCreated(leadSubmissionId);
                                                                    }
                                                                }

                                                                const partnerResult = await newDiagnosticSubmitPartnerLead(leadPayload, leadSubmissionId);

                                                                if (!partnerResult.ok) {
                                                                    setCtaError("Impossible d'envoyer votre demande de mise en relation. Merci de réessayer dans quelques instants.");
                                                                    newDiagnosticClearFormCooldown(ctaFormKey);
                                                                    setCtaSubmitting(false);
                                                                    return;
                                                                }

                                                                if (typeof onPartnerSubmissionCreated === 'function') {
                                                                    onPartnerSubmissionCreated();
                                                                }

                                                                setCtaSent(true);
                                                                setCtaError(null);
                                                                setCtaSubmitting(false);
                                                                setTimeout(() => setShowCTAModal(false), 2000);
                                                            }}
                                                            disabled={ctaSubmitting}
                                                            className="flex-1 px-4 py-3 bg-[#1D4ED8] text-white rounded-xl text-sm font-semibold hover:bg-[#1E40AF] disabled:opacity-60"
                                                        >
                                                            {ctaSubmitting ? 'Envoi...' : 'Envoyer'}
                                                        </button>
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

        };

        /* ─────────────────────────────────────────────────────────────────────────
           FONCTION : EXPORT HTML AUTONOME
           Le fichier telecharge est un HTML autonome, propre et imprimable.
           Le PDF local legacy reste ci-dessous comme secours non prioritaire.

           FONCTION : EXPORT PDF
           
           Génère un PDF du rapport et le télécharge.
           Utilise jsPDF (à charger via CDN).
           
           TODO Phase V1.1 : harmoniser si besoin le rendu local navigateur avec le PDF officiel serveur
           ───────────────────────────────────────────────────────────────────────── */

        function newDiagnosticEscapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function newDiagnosticBuildDownloadFileName(siteName, extension = 'html') {
            const safeSiteName = String(siteName || 'rapport')
                .trim()
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '') || 'rapport';

            return `diagtertiaire-${safeSiteName}-${new Date().toISOString().slice(0, 10)}.${extension}`;
        }

        async function newDiagnosticBuildStandaloneReportHtml(reportPayload, userEmail) {
            const calc = reportPayload.calculation_results || {};
            const benchmark = reportPayload.benchmark_result || {};
            const composite = reportPayload.composite_savings || {};
            const actions = (reportPayload.top_actions || []).slice(0, 3);
            const confidence = reportPayload.confidence || {};
            const inputs = reportPayload.inputs_summary || {};
            const surfaceValue = Math.max(1, (inputs.surface && inputs.surface.value) || 1);
            const targetIntensity = Math.max(0, (benchmark.site_intensity && benchmark.site_intensity.value ? benchmark.site_intensity.value : 0) - ((composite.annual_kwh && composite.annual_kwh.value ? composite.annual_kwh.value : 0) / surfaceValue));
            const siteNameLabel = newDiagnosticGetReportSiteName(reportPayload);
            const activityLabel = newDiagnosticGetReportActivityLabel(reportPayload);
            const cityLabel = newDiagnosticGetReportCityLabel(reportPayload);
            const currentLabel = newDiagnosticComputeSectorLabel(benchmark.site_intensity.value, benchmark.benchmark_median.value);
            const targetLabel = newDiagnosticComputeSectorLabel(targetIntensity, benchmark.benchmark_median.value);
            const decisionReadout = newDiagnosticBuildDecisionReadout(reportPayload);
            const budgetProgram = newDiagnosticBuildProgramBudget(actions, composite.annual_euro.value);
            const projection = newDiagnosticBuildProjectionData({
                annualSavingsEuro: composite.annual_euro.value,
                totalCostEuroAn: calc.total_cost_euro_an.value,
                elecKwh: calc.elec_kwh_an.value,
                gasKwh: calc.gas_kwh_an.value,
                actions
            });
            const projectionEnd = projection.data && projection.data.length
                ? projection.data[projection.data.length - 1]
                : { sans_travaux: 0, avec_travaux: 0 };
            const elecKwh = calc.elec_kwh_an.value || 0;
            const gasKwh = calc.gas_kwh_an.value || 0;
            const knownKwh = elecKwh + gasKwh;
            const co2Factor = knownKwh > 0
                ? ((elecKwh / knownKwh) * NEW_DIAGNOSTIC_CO2_FACTORS.elec) + ((gasKwh / knownKwh) * NEW_DIAGNOSTIC_CO2_FACTORS.gaz)
                : 0.12;
            const co2Annual = Math.max(0, Math.round((composite.annual_kwh.value || 0) * co2Factor));
            const co2Eq = newDiagnosticGetCO2Equivalences(co2Annual);
            const logo = await newDiagnosticResolveBrandLogoDataUrl().catch(() => null);
            const reportDate = new Date(reportPayload.generated_at || Date.now()).toLocaleDateString('fr-FR');
            const horizonLabel = (inputs.role || inputs.decision_role) === 'tenant' ? 'Lecture charges a 3 ans' : 'Lecture patrimoniale a 10 ans';
            const contactLabel = userEmail || inputs.email || 'Non renseigne';
            const metricCards = [
                { label: 'Cout annuel actuel', value: newDiagnosticFormatCurrency(calc.total_cost_euro_an.value), note: 'Charges energie estimees' },
                { label: 'Economies annuelles', value: newDiagnosticFormatCurrency(composite.annual_euro.value), note: '3 actions prioritaires visibles' },
                { label: 'Budget net indicatif', value: newDiagnosticFormatCurrency(budgetProgram.capex_net), note: 'Aides deduites' },
                { label: 'ROI indicatif', value: budgetProgram.roi_global_years !== null ? newDiagnosticFormatYears(budgetProgram.roi_global_years, 1) : 'A confirmer', note: horizonLabel }
            ];
            const metricCardsHtml = metricCards.map((card) => `
                <article class="metric-card">
                    <div class="metric-label">${newDiagnosticEscapeHtml(card.label)}</div>
                    <div class="metric-value">${newDiagnosticEscapeHtml(card.value)}</div>
                    <div class="metric-note">${newDiagnosticEscapeHtml(card.note)}</div>
                </article>
            `).join('');
            const actionCardsHtml = actions.length
                ? actions.map((action, index) => {
                    const actionReason = newDiagnosticGetActionPriorityReason(action, reportPayload.usage_breakdown || {});
                    const actionRobustness = newDiagnosticGetActionRobustness(action);
                    return `
                        <article class="action-card">
                            <div class="action-topline">Priorite ${index + 1}</div>
                            <h3>${newDiagnosticEscapeHtml(action.name || 'Action prioritaire')}</h3>
                            <div class="badge-row">
                                <span class="badge">${newDiagnosticEscapeHtml(actionRobustness.label)}</span>
                                <span class="badge">${newDiagnosticEscapeHtml(newDiagnosticFormatYears(action.roi_years && action.roi_years.value, 1))}</span>
                            </div>
                            <dl class="action-stats">
                                <div><dt>Economies / an</dt><dd>${newDiagnosticEscapeHtml(newDiagnosticFormatCurrency(action.gain_euro_an && action.gain_euro_an.value))}</dd></div>
                                <div><dt>Gain energie</dt><dd>${newDiagnosticEscapeHtml(newDiagnosticFormatUnitValue(action.gain_kwh_an && action.gain_kwh_an.value, 'kWh/an'))}</dd></div>
                                <div><dt>Budget estime</dt><dd>${newDiagnosticEscapeHtml(newDiagnosticFormatCurrency(action.capex && action.capex.value))}</dd></div>
                            </dl>
                            <p>${newDiagnosticEscapeHtml(actionReason.why)}</p>
                            <p class="subtle">${newDiagnosticEscapeHtml(actionReason.posteText)}</p>
                        </article>
                    `;
                }).join('')
                : '<div class="empty-state">Aucune action prioritaire suffisamment robuste ne ressort avec le niveau de donnees actuel.</div>';
            const renderListItems = (items, emptyLabel) => {
                if (!Array.isArray(items) || !items.length) {
                    return `<li>${newDiagnosticEscapeHtml(emptyLabel)}</li>`;
                }

                return items.slice(0, 6).map((item) => `<li>${newDiagnosticEscapeHtml(item)}</li>`).join('');
            };

            return `<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${newDiagnosticEscapeHtml(NEW_DIAGNOSTIC_BRAND.name)} - Rapport ${newDiagnosticEscapeHtml(siteNameLabel)}</title>
    <style>
        :root { --ink:#102A43; --blue:#1D4ED8; --blue-soft:#E8F0FF; --slate:#5B6B7F; --line:#D8E2EE; --bg:#EEF4F8; --card:#FFFFFF; --green:#15803D; --green-soft:#EAF7EE; }
        * { box-sizing:border-box; } html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:Segoe UI, Arial, Helvetica, sans-serif; } body { padding:28px; } .page { max-width:1100px; margin:0 auto; } .hero { background:linear-gradient(135deg, #102A43 0%, #14395C 55%, #1D4ED8 100%); color:#fff; padding:32px; border-radius:28px; box-shadow:0 24px 60px rgba(16,42,67,.18); } .hero-head, .hero-meta, .grid, .actions-grid, .list-grid, .kpi-grid, .tone-grid, .budget-grid, .impact-grid { display:grid; gap:18px; } .hero-head { grid-template-columns:minmax(0,1fr) auto; align-items:start; } .brand img { width:64px; height:64px; object-fit:contain; border-radius:18px; background:#fff; padding:10px; } .eyebrow { display:inline-block; font-size:11px; letter-spacing:.14em; text-transform:uppercase; font-weight:800; color:#BFDBFE; margin-bottom:10px; } h1, h2, h3, p { margin:0; } .hero h1 { font-size:34px; line-height:1.05; letter-spacing:-.04em; margin-bottom:10px; max-width:14ch; } .hero p { color:rgba(255,255,255,.82); line-height:1.6; } .hero-meta, .kpi-grid, .tone-grid, .budget-grid, .impact-grid, .list-grid { grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); } .hero-pill { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18); border-radius:18px; padding:14px 16px; } .hero-pill strong { display:block; color:#fff; font-size:15px; margin-bottom:4px; } .section { margin-top:24px; background:var(--card); border:1px solid var(--line); border-radius:24px; padding:24px; box-shadow:0 12px 28px rgba(16,42,67,.06); } .section h2 { font-size:22px; letter-spacing:-.03em; margin-bottom:16px; } .metric-card, .tone-card, .budget-card, .impact-card { border:1px solid var(--line); border-radius:20px; padding:18px; background:#fff; } .metric-label, .label-caption { font-size:12px; text-transform:uppercase; letter-spacing:.12em; color:var(--slate); font-weight:800; } .metric-value { font-size:28px; font-weight:900; line-height:1.1; margin:10px 0 6px; letter-spacing:-.04em; } .metric-note, .subtle { color:var(--slate); font-size:13px; line-height:1.5; } .grid, .actions-grid { grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); } .score-card { padding:22px; border-radius:22px; } .score-card.current { background:#F8FBFF; border:1px solid #CFE0FF; } .score-card.target { background:var(--green-soft); border:1px solid #B7E1C3; } .score-letter { font-size:42px; font-weight:900; line-height:1; margin:10px 0; } .score-current { color:var(--blue); } .score-target { color:var(--green); } .action-card { border:1px solid var(--line); border-radius:22px; padding:20px; background:linear-gradient(180deg, #FFFFFF 0%, #F8FBFF 100%); } .action-card h3 { font-size:20px; line-height:1.2; margin:8px 0 14px; } .action-topline { font-size:11px; text-transform:uppercase; letter-spacing:.12em; font-weight:800; color:var(--blue); } .badge-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; } .badge { display:inline-flex; padding:7px 10px; border-radius:999px; background:var(--blue-soft); color:var(--blue); font-size:12px; font-weight:800; } .action-stats { display:grid; gap:8px; margin:0 0 14px; } .action-stats div { display:flex; justify-content:space-between; gap:16px; padding-bottom:8px; border-bottom:1px dashed var(--line); } .action-stats dt { color:var(--slate); } .action-stats dd { margin:0; font-weight:800; text-align:right; } ul { margin:0; padding-left:18px; color:#31475E; line-height:1.7; } .empty-state { border:1px dashed var(--line); border-radius:20px; padding:18px; color:var(--slate); background:#F8FBFF; } .footer-note { margin-top:20px; color:var(--slate); font-size:13px; line-height:1.6; text-align:center; } @media print { body { background:#fff; padding:0; } .page { max-width:none; } .hero, .section { box-shadow:none; break-inside:avoid; } }
    </style>
</head>
<body>
    <main class="page">
        <section class="hero">
            <div class="hero-head">
                <div>
                    <div class="eyebrow">Rapport telechargeable autonome</div>
                    <h1>${newDiagnosticEscapeHtml(siteNameLabel)}</h1>
                    <p>${newDiagnosticEscapeHtml(activityLabel)} · ${newDiagnosticEscapeHtml(newDiagnosticFormatUnitValue(surfaceValue, 'm²'))} · ${newDiagnosticEscapeHtml(cityLabel)} · ${newDiagnosticEscapeHtml(reportDate)}</p>
                </div>
                <div class="brand">${logo && logo.dataUrl ? `<img src="${logo.dataUrl}" alt="${newDiagnosticEscapeHtml(NEW_DIAGNOSTIC_BRAND.name)}">` : ''}</div>
            </div>
            <div class="hero-meta">
                <div class="hero-pill"><strong>Contact de restitution</strong><span>${newDiagnosticEscapeHtml(contactLabel)}</span></div>
                <div class="hero-pill"><strong>Confiance</strong><span>${newDiagnosticEscapeHtml(confidence.label || 'À confirmer')}</span></div>
                <div class="hero-pill"><strong>Adresse</strong><span>${newDiagnosticEscapeHtml(inputs.address || 'Adresse à confirmer')}</span></div>
                <div class="hero-pill"><strong>Lecture</strong><span>${newDiagnosticEscapeHtml(horizonLabel)}</span></div>
            </div>
        </section>
        <section class="section"><h2>Vue d'ensemble</h2><div class="kpi-grid">${metricCardsHtml}</div></section>
        <section class="section"><h2>Positionnement energie</h2><div class="grid"><article class="score-card current"><div class="label-caption">Situation actuelle</div><div class="score-letter score-current">${newDiagnosticEscapeHtml(currentLabel.label)}</div><p>${newDiagnosticEscapeHtml(currentLabel.positioning)}</p><p class="subtle">${newDiagnosticEscapeHtml(newDiagnosticFormatUnitValue(benchmark.site_intensity.value, 'kWh/m²/an'))}</p></article><article class="score-card target"><div class="label-caption">Apres travaux estimes</div><div class="score-letter score-target">${newDiagnosticEscapeHtml(targetLabel.label)}</div><p>${newDiagnosticEscapeHtml(targetLabel.positioning)}</p><p class="subtle">${newDiagnosticEscapeHtml(newDiagnosticFormatUnitValue(targetIntensity, 'kWh/m²/an'))}</p></article></div><p class="footer-note">Reference mediane : ${newDiagnosticEscapeHtml(newDiagnosticFormatUnitValue(benchmark.benchmark_median.value, 'kWh/m²/an'))}.</p></section>
        <section class="section"><h2>Lecture decisionnelle</h2><div class="tone-grid"><article class="tone-card"><strong>Diagnostic</strong><p>${newDiagnosticEscapeHtml(decisionReadout.diagnostic)}</p></article><article class="tone-card"><strong>Risque</strong><p>${newDiagnosticEscapeHtml(decisionReadout.risk)}</p></article><article class="tone-card"><strong>Opportunite</strong><p>${newDiagnosticEscapeHtml(decisionReadout.opportunity)}</p></article></div></section>
        <section class="section"><h2>Actions prioritaires</h2><div class="actions-grid">${actionCardsHtml}</div></section>
        <section class="section"><h2>Budget et impact</h2><div class="budget-grid"><article class="budget-card"><div class="label-caption">Budget travaux estime</div><div class="metric-value">${newDiagnosticEscapeHtml(newDiagnosticFormatCurrency(budgetProgram.capex_brut))}</div></article><article class="budget-card"><div class="label-caption">Aides estimees</div><div class="metric-value">${newDiagnosticEscapeHtml(newDiagnosticFormatCurrency(budgetProgram.aides))}</div></article><article class="budget-card"><div class="label-caption">Sans travaux a 10 ans</div><div class="metric-value">${newDiagnosticEscapeHtml(newDiagnosticFormatCurrency(projectionEnd.sans_travaux || 0))}</div></article><article class="budget-card"><div class="label-caption">Avec plan a 10 ans</div><div class="metric-value">${newDiagnosticEscapeHtml(newDiagnosticFormatCurrency(projectionEnd.avec_travaux || 0))}</div></article></div><div class="impact-grid" style="margin-top:14px;"><article class="impact-card"><div class="label-caption">CO2 evite / an</div><div class="metric-value">${newDiagnosticEscapeHtml(newDiagnosticFormatUnitValue(co2Annual, 'kgCO2e'))}</div></article><article class="impact-card"><div class="label-caption">Equivalent arbres</div><div class="metric-value">${newDiagnosticEscapeHtml(newDiagnosticFormatInteger(co2Eq.arbres))}</div></article><article class="impact-card"><div class="label-caption">Equivalent voitures</div><div class="metric-value">${newDiagnosticEscapeHtml(newDiagnosticFormatDecimal(co2Eq.voitures, 1))}</div></article><article class="impact-card"><div class="label-caption">Point de rentabilite</div><div class="metric-value">${newDiagnosticEscapeHtml(projection.roiAnnee || 'A confirmer')}</div></article></div></section>
        <section class="section"><h2>Hypotheses et limites</h2><div class="list-grid"><div><div class="label-caption" style="margin-bottom:10px;">Hypotheses</div><ul>${renderListItems(reportPayload.assumptions, 'Hypotheses a confirmer sur site.')}</ul></div><div><div class="label-caption" style="margin-bottom:10px;">Limites</div><ul>${renderListItems(reportPayload.limits, 'Limites a confirmer avec un expert.')}</ul></div></div><p class="footer-note">Fichier HTML autonome genere depuis ${newDiagnosticEscapeHtml(NEW_DIAGNOSTIC_BRAND.name)}. Ouvrez-le dans votre navigateur puis imprimez-le en PDF si vous avez besoin d'une version papier.</p></section>
    </main>
</body>
</html>`;
        }

        const newDiagnosticDownloadReportHtml = async (reportPayload, userEmail) => {
            const html = await newDiagnosticBuildStandaloneReportHtml(reportPayload, userEmail);
            const fileName = newDiagnosticBuildDownloadFileName(reportPayload && reportPayload.inputs_summary ? reportPayload.inputs_summary.site_name : 'rapport');
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const objectUrl = window.URL.createObjectURL(blob);
            const link = document.createElement('a');

            link.href = objectUrl;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            link.remove();

            window.setTimeout(() => {
                window.URL.revokeObjectURL(objectUrl);
            }, 1500);
        };

        const newDiagnosticExportRenderedPdfFallback = async (targetNode, reportPayload) => {
            if (!targetNode) {
                throw new Error('Zone de rapport introuvable.');
            }

            if (typeof window.html2canvas === 'undefined') {
                throw new Error('html2canvas non charge.');
            }

            if (typeof window.jspdf === 'undefined') {
                throw new Error('jsPDF non charge.');
            }

            const waitForPaint = async (frameCount = 2) => {
                let remainingFrames = Math.max(1, frameCount);

                await new Promise((resolve) => {
                    const tick = () => {
                        remainingFrames -= 1;
                        if (remainingFrames <= 0) {
                            resolve();
                            return;
                        }
                        window.requestAnimationFrame(tick);
                    };

                    window.requestAnimationFrame(tick);
                });
            };

            const getOuterHeight = (node) => {
                if (!node) {
                    return 0;
                }

                const styles = window.getComputedStyle(node);
                const marginTop = Number.parseFloat(styles.marginTop || '0') || 0;
                const marginBottom = Number.parseFloat(styles.marginBottom || '0') || 0;

                return Math.ceil(node.getBoundingClientRect().height + marginTop + marginBottom);
            };

            const createAccordionExportPanel = (title, items, tone) => {
                const wrapper = document.createElement('div');
                const markerClass = tone === 'warning'
                    ? 'bg-amber-500/80'
                    : 'bg-blue-500/80';
                const itemsHtml = Array.isArray(items) && items.length
                    ? items.map((item) => `
                        <li class="flex items-start gap-3">
                            <span class="mt-1.5 h-2.5 w-2.5 rounded-full shrink-0 ${markerClass}"></span>
                            <span>${newDiagnosticEscapeHtml(item)}</span>
                        </li>
                    `).join('')
                    : `
                        <li class="flex items-start gap-3">
                            <span class="mt-1.5 h-2.5 w-2.5 rounded-full shrink-0 ${markerClass}"></span>
                            <span>${tone === 'warning' ? 'Aucune limite complementaire renseignee.' : 'Aucune hypothese complementaire renseignee.'}</span>
                        </li>
                    `;

                wrapper.className = 'border border-neutral-200 rounded-lg overflow-hidden bg-white';
                wrapper.innerHTML = `
                    <div class="w-full px-6 py-4 bg-white border-b border-neutral-100">
                        <span class="font-semibold text-neutral-900">${newDiagnosticEscapeHtml(title)}</span>
                    </div>
                    <div class="px-6 py-4 bg-neutral-50 border-t border-neutral-100">
                        <ul class="space-y-2 text-sm text-neutral-600">
                            ${itemsHtml}
                        </ul>
                    </div>
                `;

                return wrapper;
            };

            const buildPdfExportClone = () => {
                const sourceWidth = Math.ceil(targetNode.getBoundingClientRect().width || targetNode.scrollWidth || 0);
                const sourceHeight = Math.max(1200, Math.ceil(targetNode.scrollHeight || targetNode.getBoundingClientRect().height || 0));
                const exportHost = document.createElement('div');
                const exportStyle = document.createElement('style');
                const clonedReport = targetNode.cloneNode(true);

                exportHost.setAttribute('aria-hidden', 'true');
                exportHost.className = 'new-diagnostic-pdf-export-host';
                Object.assign(exportHost.style, {
                    position: 'fixed',
                    left: '-20000px',
                    top: '0',
                    width: `${sourceWidth}px`,
                    minHeight: `${sourceHeight}px`,
                    background: '#F8FAFC',
                    pointerEvents: 'none',
                    opacity: '1',
                    overflow: 'hidden',
                    zIndex: '-1'
                });

                exportStyle.textContent = `
                    .new-diagnostic-pdf-export-host,
                    .new-diagnostic-pdf-export-host * {
                        animation: none !important;
                        transition: none !important;
                        caret-color: transparent !important;
                    }
                    .new-diagnostic-pdf-export-host [data-html2canvas-ignore="true"] {
                        display: none !important;
                    }
                    .new-diagnostic-pdf-export-host .fade-in {
                        opacity: 1 !important;
                        transform: none !important;
                    }
                `;

                clonedReport.classList.remove('fade-in');
                clonedReport.style.opacity = '1';
                clonedReport.style.transform = 'none';
                clonedReport.style.width = `${sourceWidth}px`;
                clonedReport.style.maxWidth = `${sourceWidth}px`;
                clonedReport.style.paddingTop = '48px';
                clonedReport.style.paddingBottom = '48px';
                clonedReport.style.background = '#F8FAFC';

                const hypothesisCard = Array.from(clonedReport.querySelectorAll('.report-card')).pop();
                if (hypothesisCard) {
                    const accordionContainers = Array.from(hypothesisCard.querySelectorAll('button[type="button"]'))
                        .map((button) => button.parentElement)
                        .filter(Boolean);
                    const exportPanels = [
                        createAccordionExportPanel('Hypotheses du calcul', reportPayload && reportPayload.assumptions, 'info'),
                        createAccordionExportPanel("Limites de l'approche", reportPayload && reportPayload.limits, 'warning')
                    ];

                    accordionContainers.forEach((container, index) => {
                        if (exportPanels[index]) {
                            container.replaceWith(exportPanels[index]);
                        }
                    });
                }

                exportHost.appendChild(exportStyle);
                exportHost.appendChild(clonedReport);
                document.body.appendChild(exportHost);

                return {
                    exportHost,
                    clonedReport,
                    sourceWidth,
                    sourceHeight
                };
            };

            if (document.fonts && document.fonts.ready) {
                try {
                    await document.fonts.ready;
                } catch (error) { }
            }

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const margin = 8;
            const printableWidth = pageWidth - (margin * 2);
            const printableHeight = pageHeight - (margin * 2);
            const fileName = newDiagnosticBuildDownloadFileName(
                reportPayload && reportPayload.inputs_summary ? reportPayload.inputs_summary.site_name : 'rapport',
                'pdf'
            );
            const exportScale = Math.max(2, Math.min(3, window.devicePixelRatio || 2));
            let exportContext = null;

            try {
                await waitForPaint(3);

                exportContext = buildPdfExportClone();
                await waitForPaint(3);

                const cloneInner = exportContext.clonedReport.querySelector('.max-w-5xl') || exportContext.clonedReport;
                const reportCards = Array.from(cloneInner.children).filter((node) => (
                    node instanceof HTMLElement && node.classList.contains('report-card')
                ));

                if (!reportCards.length) {
                    throw new Error('Sections de rapport introuvables.');
                }

                const pageContentWidthPx = Math.max(
                    1,
                    Math.ceil(cloneInner.getBoundingClientRect().width || exportContext.sourceWidth)
                );
                const maxGroupHeightPx = Math.floor(((printableHeight - 2) * pageContentWidthPx) / printableWidth);
                const groupedCards = [];
                let currentGroup = [];
                let currentGroupHeight = 0;

                reportCards.forEach((card) => {
                    const cardHeight = getOuterHeight(card);
                    const shouldStartNewPage = currentGroup.length > 0 && (currentGroupHeight + cardHeight) > maxGroupHeightPx;

                    if (shouldStartNewPage) {
                        groupedCards.push(currentGroup);
                        currentGroup = [card];
                        currentGroupHeight = cardHeight;
                        return;
                    }

                    currentGroup.push(card);
                    currentGroupHeight += cardHeight;
                });

                if (currentGroup.length > 0) {
                    groupedCards.push(currentGroup);
                }

                const pagesHost = document.createElement('div');
                pagesHost.style.width = `${pageContentWidthPx}px`;
                pagesHost.style.margin = '0 auto';
                pagesHost.style.background = '#F8FAFC';

                cloneInner.innerHTML = '';
                cloneInner.appendChild(pagesHost);

                const pageNodes = groupedCards.map((group, index) => {
                    const pageNode = document.createElement('div');
                    pageNode.className = 'new-diagnostic-pdf-page';
                    Object.assign(pageNode.style, {
                        width: '100%',
                        background: '#F8FAFC',
                        padding: index === groupedCards.length - 1 ? '0 0 6px' : '0 0 2px'
                    });

                    group.forEach((card) => {
                        pageNode.appendChild(card);
                    });

                    pagesHost.appendChild(pageNode);
                    return pageNode;
                });

                await waitForPaint(2);

                for (let pageIndex = 0; pageIndex < pageNodes.length; pageIndex += 1) {
                    const pageNode = pageNodes[pageIndex];
                    const canvas = await window.html2canvas(pageNode, {
                        backgroundColor: '#F8FAFC',
                        useCORS: true,
                        scale: exportScale,
                        logging: false,
                        scrollX: 0,
                        scrollY: 0,
                        windowWidth: exportContext.sourceWidth,
                        windowHeight: Math.max(exportContext.sourceHeight, Math.ceil(pageNode.scrollHeight || pageNode.getBoundingClientRect().height || 0) + 120),
                        ignoreElements: (element) => element && element.getAttribute && element.getAttribute('data-html2canvas-ignore') === 'true'
                    });
                    const imageData = canvas.toDataURL('image/png', 1.0);
                    const renderScale = Math.min(printableWidth / canvas.width, printableHeight / canvas.height);
                    const renderWidth = canvas.width * renderScale;
                    const renderHeight = canvas.height * renderScale;
                    const renderX = margin + ((printableWidth - renderWidth) / 2);
                    const renderY = margin + ((printableHeight - renderHeight) / 2);

                    if (pageIndex > 0) {
                        pdf.addPage();
                    }

                    pdf.addImage(imageData, 'PNG', renderX, renderY, renderWidth, renderHeight, undefined, 'FAST');
                }

                pdf.save(fileName);
            } finally {
                if (exportContext && exportContext.exportHost && exportContext.exportHost.parentNode) {
                    exportContext.exportHost.parentNode.removeChild(exportContext.exportHost);
                }
            }
        };

        function newDiagnosticResolveAbsoluteUrl(value) {
            const raw = String(value || '').trim();
            if (!raw) {
                return '';
            }

            if (/^(data:|https?:|blob:)/i.test(raw)) {
                return raw;
            }

            try {
                return new URL(raw, window.location.href).href;
            } catch (error) {
                return raw;
            }
        }

            const headNodes = Array.from(document.head.querySelectorAll('style, link[rel="stylesheet"], link[rel="preconnect"]'));

            parts.push('<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"><\/script>');

        function newDiagnosticNormalizeReportCloneForPdf(clonedReport, reportPayload) {
            const exportWidthPx = 960;
            const printableWidthPx = ((210 - 20) / 25.4) * 96;
            const pdfScale = Number(Math.max(0.72, Math.min(0.82, printableWidthPx / exportWidthPx)).toFixed(3));

            clonedReport.classList.remove('fade-in');
            clonedReport.classList.add('pdf-export-root');
            clonedReport.style.padding = '0';

                contentFrame.style.maxWidth = `${exportWidthPx}px`;
                contentFrame.style.width = '100%';
                contentFrame.style.marginLeft = 'auto';
                contentFrame.style.marginRight = 'auto';
            }

            const hypothesisCard = Array.from(clonedReport.querySelectorAll('.report-card')).pop();
            if (hypothesisCard) {
                const accordionBlocks = Array.from(hypothesisCard.querySelectorAll('button[type="button"]'))
                    .map((button) => button.parentElement)
                    .filter(Boolean);
                const exportPanels = [
                    newDiagnosticBuildPdfAccordionPanel('Hypotheses du calcul', reportPayload && reportPayload.assumptions, 'info'),
                    newDiagnosticBuildPdfAccordionPanel("Limites de l'approche", reportPayload && reportPayload.limits, 'warning')
                ];

                accordionBlocks.forEach((block, index) => {
                    if (exportPanels[index]) {
                        block.replaceWith(exportPanels[index]);
                    }
                });
            }

            clonedReport.querySelectorAll('[data-html2canvas-ignore="true"]').forEach((node) => node.remove());
            clonedReport.querySelectorAll('.recharts-tooltip-wrapper').forEach((node) => node.remove());
            clonedReport.querySelectorAll('button').forEach((button) => button.remove());

            clonedReport.querySelectorAll('img').forEach((image) => {
                const src = image.getAttribute('src');
                if (src) {
                    image.setAttribute('src', newDiagnosticResolveAbsoluteUrl(src));
                }

            clonedReport.querySelectorAll('source').forEach((sourceNode) => {
                const srcset = sourceNode.getAttribute('srcset');
                if (srcset) {
                    sourceNode.setAttribute('srcset', newDiagnosticResolveAbsoluteUrl(srcset));

            const reportCards = Array.from(clonedReport.querySelectorAll('.report-card'));
            reportCards.forEach((card, index) => {
                card.style.breakInside = 'avoid-page';

            clonedReport.querySelectorAll('table').forEach((table) => {

            });

            return {
                exportWidthPx,
                pdfScale
            };
        }

        async function newDiagnosticDownloadServerRenderedPdf({ html, fileName, pdfOptions }) {
            const response = await fetch('/api/pdf', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    html,
                    filename: fileName,
                    mediaType: 'print',
                    pdfOptions
                })
            });

            if (!response.ok) {
                let errorMessage = 'PDF generation failed';

                try {
                    const payload = await response.json();
                    errorMessage = payload && (payload.details || payload.error) ? (payload.details || payload.error) : errorMessage;
                } catch (error) { }

                throw new Error(errorMessage);
            }

            const pdfBlob = await response.blob();
            const objectUrl = window.URL.createObjectURL(pdfBlob);
            const link = document.createElement('a');

            link.href = objectUrl;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            link.remove();

            window.setTimeout(() => {
                window.URL.revokeObjectURL(objectUrl);
            }, 1500);
        }

            addText(`- Budget net : ${pdfMoney(pdfBudgetProgramSimple.capex_net)}`, margin + 4, { fontSize: 9 });
            addText(`- Économies / an : ${pdfMoney(pdfBudgetProgramSimple.annual_savings)}`, margin + 4, { fontSize: 9 });
            addText(`- ROI indicatif : ${pdfBudgetProgramSimple.roi_global_years !== null ? pdfYears(pdfBudgetProgramSimple.roi_global_years) : 'À confirmer'}`, margin + 4, { fontSize: 9 });
            y += 2;

            checkNewPage(35);
            addText('IMPACT ÉCOLOGIQUE ESTIMÉ', margin, { fontSize: 12, bold: true });
            addText(`- CO2 évité estimé / an : ${pdfKgCo2(pdfCo2Annual)}`, margin + 4, { fontSize: 9 });
            addText(`- Équivalences : ${newDiagnosticFormatInteger(pdfCo2Eq.arbres)} arbres, ${newDiagnosticFormatDecimal(pdfCo2Eq.voitures, 1)} voitures`, margin + 4, { fontSize: 9 });
            y += 2;

            checkNewPage(40);
            addText('PROCHAINE ÉTAPE RECOMMANDÉE', margin, { fontSize: 12, bold: true });
            addText(NEW_DIAGNOSTIC_REPORT_COPY.nextStep.intro, margin + 4, { fontSize: 9 });
            NEW_DIAGNOSTIC_REPORT_COPY.nextStep.bullets.slice(0, 4).forEach(item => addText(`- ${item}`, margin + 4, { fontSize: 9 }));
            addText(NEW_DIAGNOSTIC_REPORT_COPY.nextStep.proof, margin + 4, { fontSize: 8, color: [100, 100, 100] });
            y += 2;

            checkNewPage(35);
            addText('HYPOTHÈSES ET LIMITES', margin, { fontSize: 12, bold: true });
            reportPayload.assumptions.slice(0, 5).forEach(item => addText(`- ${item}`, margin + 4, { fontSize: 9 }));
            reportPayload.limits.slice(0, 5).forEach(item => addText(`- ${item}`, margin + 4, { fontSize: 9 }));

            doc.save(`DiagTertiaire-${(reportPayload.inputs_summary.site_name || 'rapport').replace(/\\s+/g, '-')}-${Date.now()}.pdf`);
            return;

        };

        /* ─────────────────────────────────────────────────────────────────────────
           FONCTION : ENVOI EMAIL (STUB)
           
           Fonction stub pour envoi email avec PDF.
           À brancher sur API réelle en production.
           ───────────────────────────────────────────────────────────────────────── */

        /* ─────────────────────────────────────────────────────────────────────────
           CONTENEUR PRINCIPAL FORMULAIRE
           ───────────────────────────────────────────────────────────────────────── */

        const NewDiagnosticForm = ({ onComplete }) => {
            const [currentStep, setCurrentStep] = useState(1);
            const [formData, setFormData] = useState(publicTunnelCreateInitialFormData);
            const [reportPayload, setReportPayload] = useState(null);
            const [submitError, setSubmitError] = useState(null);
            const [diagnosticHoneypot, setDiagnosticHoneypot] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const diagnosticFormKey = 'public-diagnostic';

            useEffect(() => {
                newDiagnosticTrack('start_diagnostic');
                newDiagnosticMarkFormRendered(diagnosticFormKey);
                try {
                    const parsed = newDiagnosticReadStoredReportPayload();
                    if (parsed && parsed.report_id) {
                        setReportPayload(parsed);
                    }
                } catch (e) { /* silent */ }
            }, []);

            const notifyRapportEmail = async (leadPayload, reportPayload) => {
                if (!leadPayload?.email) return;

                try {
                    const inputsSummary = reportPayload?.inputs_summary || {};
                    const benchmark = reportPayload?.benchmark_result || {};
                    const computedScore = benchmark?.site_intensity?.value && benchmark?.benchmark_median?.value
                        ? newDiagnosticComputeSectorLabel(benchmark.site_intensity.value, benchmark.benchmark_median.value).label
                        : '';

                    await fetch('/api/send-email', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            type: 'rapport_disponible',
                            data: {
                                email: leadPayload.email,
                                prenom: leadPayload.prenom || leadPayload.name || '',
                                nomBatiment: leadPayload.nomBatiment || leadPayload.site_name || leadPayload.company || newDiagnosticGetReportSiteName(reportPayload),
                                surface: leadPayload.surface || leadPayload.raw_payload?.surface || reportPayload?.inputs_summary?.surface?.value || '',
                                activite: leadPayload.activiteLabel || leadPayload.activite || inputsSummary.activity_label || newDiagnosticGetReportActivityLabel(reportPayload),
                                scoreLettre: reportPayload?.benchmark_result?.score_letter || computedScore || '',
                                economiesTotalesAnnuelles: reportPayload?.composite_savings?.annual_euro?.value || 0,
                                reportUrl: window.location.origin + window.location.pathname
                            }
                        })
                    });
                } catch (_) {
                    // silencieux
                }
            };

            const notifyAdminNewLead = async (leadPayload, reportPayload, leadId) => {
                try {
                    const inputsSummary = reportPayload?.inputs_summary || {};
                    const benchmark = reportPayload?.benchmark_result || {};
                    const computedScore = benchmark?.site_intensity?.value && benchmark?.benchmark_median?.value
                        ? newDiagnosticComputeSectorLabel(benchmark.site_intensity.value, benchmark.benchmark_median.value).label
                        : '';

                    await fetch('/api/send-email', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            type: 'nouveau_lead_admin',
                            data: {
                                leadId: leadId || 'N/A',
                                email: leadPayload.email || '',
                                prenom: leadPayload.prenom || leadPayload.name || '',
                                telephone: leadPayload.telephone || leadPayload.phone || inputsSummary.phone || '',
                                societe: leadPayload.societe || leadPayload.company || inputsSummary.site_name || '',
                                activite: leadPayload.activiteLabel || leadPayload.activite || inputsSummary.activity_label || newDiagnosticGetReportActivityLabel(reportPayload),
                                surface: leadPayload.surface || leadPayload.raw_payload?.surface || inputsSummary?.surface?.value || '',
                                ville: leadPayload.ville || inputsSummary.city || newDiagnosticGetReportCityLabel(reportPayload),
                                codePostal: leadPayload.codePostal || leadPayload.postalCode || leadPayload.raw_payload?.postal_code || inputsSummary.postal_code || '',
                                scoreLettre: reportPayload?.benchmark_result?.score_letter || computedScore || '',
                                intensiteKwhM2: reportPayload?.benchmark_result?.site_intensity?.value || '',
                                economiesTotalesAnnuelles: reportPayload?.composite_savings?.annual_euro?.value || 0,
                                scoreConfiance: reportPayload?.confidence?.label || reportPayload?.confidence?.level || '',
                                objectif: leadPayload.primaryGoal || leadPayload.primary_goal || leadPayload.raw_payload?.primary_goal || '',
                                horizonDecision: leadPayload.projectHorizon || leadPayload.project_horizon || leadPayload.raw_payload?.project_horizon || '',
                                politiqueConsent: !!(leadPayload.opt_in_politique || leadPayload.raw_payload?.opt_in_politique),
                                partnerConsent: !!leadPayload.partnerConsent
                            }
                        })
                    });
                } catch (_) {
                    // silencieux
                }
            };

            const handleComplete = async () => {
                setSubmitError(null);
                const antiSpamCheck = newDiagnosticRunAntiSpamChecks({
                    formKey: diagnosticFormKey,
                    honeypotValue: diagnosticHoneypot,
                    minimumDelayMs: 3000,
                    cooldownMs: 30000
                });

                if (!antiSpamCheck.ok) {
                    setSubmitError(antiSpamCheck.error);
                    return;
                }

                setIsSubmitting(true);
                newDiagnosticSetFormCooldown(diagnosticFormKey);
                let leadSaved = false;

                try {
                    newDiagnosticTrack('submit_form', {
                        activity: formData.activity,
                        role: formData.role,
                        surface: formData.surface
                    });

                    const payload = newDiagnosticBuildReportData(formData);
                    const leadPayload = newDiagnosticBuildDiagnosticLeadPayload(formData, payload);
                    const legacyLeadMirrorPromise = newDiagnosticMirrorLeadToLegacyTable(leadPayload).catch(() => null);
                    const leadResult = await newDiagnosticSubmitLead(leadPayload);
                    const leadSubmissionId = leadResult.ok && leadResult.id ? leadResult.id : null;
                    leadSaved = !!leadSubmissionId;

                    if (!leadSubmissionId) {
                        console.warn('lead submission failed, report kept visible', leadResult?.error || leadResult?.status);
                        console.warn('lead persistence warning', leadResult?.error || leadResult?.status);
                    }

                    let nextReportPayload = {
                        ...payload,
                        lead_submission_id: leadSubmissionId,
                        partner_lead_submitted: false,
                        partner_submission_error: null
                    };

                    if (leadPayload.partnerConsent && leadSubmissionId) {
                        const partnerResult = await newDiagnosticSubmitPartnerLead(leadPayload, leadSubmissionId);

                        if (partnerResult.ok) {
                            nextReportPayload = {
                                ...nextReportPayload,
                                partner_lead_submitted: true,
                                partner_submission_error: null
                            };
                        } else {
                            nextReportPayload = {
                                ...nextReportPayload,
                                partner_lead_submitted: false,
                                partner_submission_error: "Votre demande de mise en relation n'a pas pu être enregistrée. Vous pouvez réessayer depuis le rapport."
                            };
                        }
                    }

                    if (leadPayload.partnerConsent && !leadSubmissionId) {
                        nextReportPayload = {
                            ...nextReportPayload,
                            partner_lead_submitted: false,
                            partner_submission_error: "Votre consentement partenaire n'a pas pu etre enregistre pour le moment. Vous pouvez reessayer depuis le rapport."
                        };
                    }

                    setReportPayload(nextReportPayload);
                    legacyLeadMirrorPromise.catch(() => null);
                    notifyRapportEmail(leadPayload, nextReportPayload);
                    notifyAdminNewLead(leadPayload, nextReportPayload, leadSubmissionId || 'N/A');

                    if (typeof onComplete === 'function') {
                        onComplete(formData, nextReportPayload);
                    }

                    try {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } catch (error) {
                        window.scrollTo(0, 0);
                    }
                } catch (error) {
                    if (!leadSaved) {
                        newDiagnosticClearFormCooldown(diagnosticFormKey);
                    }
                    console.error('Erreur lors de la génération du rapport du nouveau formulaire :', error);
                    setSubmitError("Impossible de générer le rapport. Vérifiez les données saisies puis réessayez.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleReset = () => {
                setFormData(publicTunnelCreateInitialFormData());
                setCurrentStep(1);
                setReportPayload(null);
                setSubmitError(null);
                setDiagnosticHoneypot('');
                setIsSubmitting(false);
                newDiagnosticMarkFormRendered(diagnosticFormKey);

                try {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (error) {
                    window.scrollTo(0, 0);
                }
            };

            if (reportPayload) {
                return (
                    <div className="new-diagnostic-report-shell">
                        <div className="max-w-5xl mx-auto px-4 pt-8">
                            <button
                                type="button"
                                onClick={handleReset}
                                className="inline-flex items-center gap-2 bg-[#F8FAFC] text-[#1D4ED8] px-4 py-2 rounded-lg font-semibold border border-[#DBEAFE] hover:bg-[#EFF6FF] transition-colors shadow-sm"
                            >
                                <Icon icon="solar:restart-linear" className="text-lg" />
                                Recommencer une nouvelle saisie
                            </button>
                        </div>

                        <NewDiagnosticReportScreen
                            reportPayload={reportPayload}
                            userEmail={formData.email}
                            onLeadSubmissionCreated={(leadSubmissionId) => {
                                setReportPayload((prev) => {
                                    if (!prev || prev.lead_submission_id === leadSubmissionId) {
                                        return prev;
                                    }

                                    return { ...prev, lead_submission_id: leadSubmissionId };
                                });
                            }}
                            onPartnerSubmissionCreated={() => {
                                setReportPayload((prev) => {
                                    if (!prev) {
                                        return prev;
                                    }

                                    return {
                                        ...prev,
                                        partner_lead_submitted: true,
                                        partner_submission_error: null
                                    };
                                });
                            }}
                        />
                    </div>
                );
            }

            return (
                <div className="new-diagnostic-form fade-in py-12 px-4">
                    <div className="max-w-4xl mx-auto">
                        {submitError && (
                            <div className="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
                                {submitError}
                            </div>
                        )}

                        <NewDiagnosticStepper currentStep={currentStep} totalSteps={4} />

                        {currentStep === 1 && (
                            <NewDiagnosticStep1Identification
                                formData={formData}
                                setFormData={setFormData}
                                onNext={() => setCurrentStep(2)}
                            />
                        )}

                        {currentStep === 2 && (
                            <PublicTunnelStep2Energies
                                formData={formData}
                                setFormData={setFormData}
                                onNext={() => setCurrentStep(3)}
                                onBack={() => setCurrentStep(1)}
                            />
                        )}

                        {currentStep === 3 && (
                            <PublicTunnelStep3BuildingUsage
                                formData={formData}
                                setFormData={setFormData}
                                onNext={() => setCurrentStep(4)}
                                onBack={() => setCurrentStep(2)}
                            />
                        )}

                        {currentStep === 4 && (
                            <PublicTunnelStep4Qualification
                                formData={formData}
                                setFormData={setFormData}
                                onNext={handleComplete}
                                onBack={() => setCurrentStep(3)}
                                honeypotValue={diagnosticHoneypot}
                                onHoneypotChange={setDiagnosticHoneypot}
                                isSubmitting={isSubmitting}
                            />
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [legalModalKey, setLegalModalKey] = useState('');

            const navigate = (page) => {
                setCurrentPage(page);
                setIsMobileMenuOpen(false);
                window.scrollTo(0, 0);
            };

            const openExampleReport = () => {
                newDiagnosticWriteExampleReportToStorage();
                navigate('exemple');
            };

            const handleClearPersonalData = () => {
                newDiagnosticClearPersonalLocalData();
                setLegalModalKey('');
                window.alert('Les données personnelles enregistrées dans ce navigateur ont été effacées.');
            };

            const isLandingPage = currentPage === 'home';
            const headerPages = [
                { page: 'exemple', label: 'Exemple de rapport' },
                { page: 'pro', label: 'Espace Pro', external: true }
            ];

            const NavLink = ({ page, label, external = false, mobile = false }) => {
                const classes = mobile
                    ? `w-full text-left px-3 py-2.5 rounded-lg text-sm font-semibold transition-colors ${currentPage === page ? 'text-[#1D4ED8] bg-[#EEF2FF]' : 'text-[#475569] hover:text-[#102A43] hover:bg-[#F8FAFC]'}`
                    : `inline-flex items-center h-10 px-3 rounded-lg text-sm font-semibold transition-colors ${currentPage === page ? 'text-[#1D4ED8] bg-[#EEF2FF]' : 'text-[#475569] hover:text-[#102A43] hover:bg-[#F8FAFC]'}`;

                if (external) {
                    return <a href="index.saaspro.html" className={classes}>{label}</a>;
                }

                return (
                    <button type="button"
                        onClick={() => (page === 'exemple' ? openExampleReport() : navigate(page))}
                        className={classes}
                    >
                        {label}
                    </button>
                );
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className={`sticky top-0 z-50 backdrop-blur border-b border-[#E2E8F0] ${isLandingPage ? 'bg-white/80 shadow-[0_2px_12px_rgba(15,23,42,0.04)]' : 'bg-white/95 shadow-[0_6px_20px_rgba(15,23,42,0.06)]'}`}>
                        <div className="max-w-6xl mx-auto px-4 sm:px-6">
                            <div className="h-[74px] flex items-center justify-between gap-4">
                                <button
                                    type="button"
                                    onClick={() => navigate('home')}
                                    className="inline-flex items-center gap-2 text-[#102A43] hover:text-[#1D4ED8] transition-colors"
                                >
                                    <Icon icon="solar:buildings-2-linear" className="text-xl" />
                                    <span className="font-bold text-lg tracking-tight">DiagTertiaire</span>
                                </button>

                                <div className="hidden md:flex items-center gap-1">
                                    {headerPages.map((item) => (
                                        <NavLink key={item.page} page={item.page} label={item.label} external={item.external} />
                                    ))}
                                </div>

                                <div className="hidden md:block">
                                    <button
                                        type="button"
                                        onClick={() => navigate('diagnostic')}
                                        className="btn-primary inline-flex items-center justify-center px-5 py-2.5 text-sm font-bold rounded-xl"
                                    >
                                        Lancer mon diagnostic gratuit
                                    </button>
                                </div>

                                <button
                                    type="button"
                                    className="md:hidden text-[#102A43] hover:text-[#1D4ED8] transition-colors"
                                    onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                                    aria-label={isMobileMenuOpen ? 'Fermer le menu' : 'Ouvrir le menu'}
                                >
                                    <Icon icon={isMobileMenuOpen ? "solar:close-square-linear" : "solar:hamburger-menu-linear"} className="text-2xl" />
                                </button>
                            </div>
                        </div>

                        {isMobileMenuOpen && (
                            <div className="md:hidden border-t border-[#E2E8F0] bg-white">
                                <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4">
                                    <div className="flex flex-col gap-2">
                                        {headerPages.map((item) => (
                                            <NavLink key={`mobile-${item.page}`} page={item.page} label={item.label} external={item.external} mobile />
                                        ))}
                                    </div>
                                    <button
                                        type="button"
                                        onClick={() => navigate('diagnostic')}
                                        className="btn-primary mt-3 w-full inline-flex items-center justify-center px-5 py-3 text-sm font-bold rounded-xl"
                                    >
                                        Lancer mon diagnostic gratuit
                                    </button>
                                </div>
                            </div>
                        )}
                    </nav>

                    <main className="flex-1">
                        {currentPage === 'home' && <PageHome navigate={navigate} />}

                        {currentPage === 'diagnostic' && (
                            <div className="new-diagnostic-page">
                                <NewDiagnosticForm
                                    onComplete={(data, reportPayload) => {
                                        try {
                                            window.localStorage.setItem('newDiagnosticLatestSubmission', JSON.stringify(data));
                                            if (reportPayload) {
                                                window.localStorage.setItem('newDiagnosticLatestReport', JSON.stringify(reportPayload));
                                            }
                                        } catch (error) {
                                            console.warn('Impossible de sauvegarder la soumission du nouveau formulaire.', error);
                                        }
                                        console.log('Nouveau formulaire', data);
                                        if (reportPayload) {
                                            console.log('Nouveau rapport', reportPayload);
                                        }
                                    }}
                                />
                            </div>
                        )}

                        {currentPage === 'exemple' && <PageExample navigate={navigate} />}
                    </main>

                    {currentPage !== 'diagnostic' && (
                        <footer className="bg-[#0F172A] py-12 md:py-14 border-t border-white/5">
                            <div className="max-w-6xl mx-auto px-4">
                                <div className="grid md:grid-cols-4 gap-8 md:gap-10 mb-8">

                                    <div>
                                        <div className="flex items-center gap-2 mb-4">
                                            <div className="w-8 h-8 bg-[#1D4ED8]/20 rounded-lg flex items-center justify-center">
                                                <iconify-icon icon="solar:buildings-2-linear" style={{ color: '#1D4ED8', fontSize: '18px' }} />
                                            </div>
                                            <span className="font-bold text-white">DiagTertiaire</span>
                                        </div>
                                        <p className="text-sm text-[#475569] leading-relaxed mb-4">Pré-diagnostic énergétique tertiaire orienté décision, basé sur références sectorielles.</p>
                                        <div className="space-y-2">
                                            <button type="button" onClick={() => navigate('home')} className="block text-sm text-slate-400 hover:text-white transition-colors font-medium">A propos</button>
                                            <button type="button" className="block text-sm text-slate-400 hover:text-white transition-colors font-medium">Notre méthodologie</button>
                                            <a href="mailto:contact@diagtertiaire.fr" className="block text-sm text-slate-400 hover:text-white transition-colors font-medium">Contact</a>
                                        </div>
                                    </div>

                                    <div>
                                        <h4 className="text-sm font-bold text-white mb-4">Ressources</h4>
                                        <ul className="space-y-2.5">
                                            <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Guide du décret tertiaire</button></li>
                                            <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Références sectorielles</button></li>
                                            <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Blog</button></li>
                                            <li><button type="button" onClick={openExampleReport} className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Exemple de rapport</button></li>
                                        </ul>
                                    </div>

                                    <div>
                                        <h4 className="text-sm font-bold text-white mb-4">Légal</h4>
                                        <ul className="space-y-2.5">
                                            <li><button type="button" onClick={() => setLegalModalKey('mentions')} className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Mentions légales</button></li>
                                            <li><button type="button" onClick={() => setLegalModalKey('privacy')} className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Politique de confidentialité</button></li>
                                            <li><button type="button" onClick={handleClearPersonalData} className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Effacer mes données</button></li>
                                        </ul>
                                    </div>

                                    <div>
                                        <h4 className="text-sm font-bold text-white mb-4">Professionnel</h4>
                                        <ul className="space-y-2.5">
                                            <li><a href="index.saaspro.html" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Espace pro</a></li>
                                            <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Devenir partenaire</button></li>
                                            <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">API et Intégrations</button></li>
                                        </ul>
                                    </div>
                                </div>

                                <div className="pt-6 border-t border-white/10 flex flex-wrap justify-between items-center gap-4">
                                    <p className="text-xs text-[#475569]">© 2026 DiagTertiaire • Estimations basées sur références sectorielles</p>
                                    <div className="flex items-center gap-3">
                                        {['SSL', 'RGPD', '🇫🇷 FR'].map((b, i) => (
                                            <span key={i} className="text-xs text-[#475569] bg-white/5 px-2.5 py-1.5 rounded-lg font-medium">{b}</span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </footer>
                    )}
                    <NewDiagnosticLegalModal modalKey={legalModalKey} onClose={() => setLegalModalKey('')} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>

</html>
