              <NewDiagnosticAccordion title="Hypothèses du calcul" defaultOpen={false}>
                <ul className="space-y-2 text-sm text-neutral-600">
                  {reportPayload.assumptions.map((assumption, i) => (
                    <li key={i} className="flex items-start gap-2">
                      <Icon icon="solar:check-circle-linear" className="text-blue-500 flex-shrink-0 mt-0.5" />
                      <span>{assumption}</span>
                    </li>
                  ))}
                </ul>
              </NewDiagnosticAccordion>

              <NewDiagnosticAccordion title="Limites de l'approche" defaultOpen={false}>
                <ul className="space-y-2 text-sm text-neutral-600">
                  {reportPayload.limits.map((limit, i) => (
                    <li key={i} className="flex items-start gap-2">
                      <Icon icon="solar:shield-warning-linear" className="text-orange-500 flex-shrink-0 mt-0.5" />
                      <span>{limit}</span>
                    </li>
                  ))}
                </ul>
              </NewDiagnosticAccordion>

              {reportPayload.warnings && reportPayload.warnings.length > 0 && (
                <NewDiagnosticAccordion title={`Avertissements (${reportPayload.warnings.length})`} defaultOpen={true}>
                  <ul className="space-y-2">
                    {reportPayload.warnings.map((warning, i) => (
                      <li key={i} className="flex items-start gap-2 text-sm">
                        <Icon icon="solar:danger-triangle-linear" className="text-yellow-500 flex-shrink-0 mt-0.5" />
                        <span className="text-neutral-700">{warning.message}</span>
                      </li>
                    ))}
                  </ul>
                </NewDiagnosticAccordion>
              )}
            </div>

            {/* Footer rapport */}
            <div className="bg-neutral-50 rounded-xl p-6 text-center border border-neutral-200">
              <p className="text-sm font-semibold text-[#102A43] mb-1">
                Pré-diagnostic indicatif. Résultats à confirmer par audit énergétique professionnel
              </p>
              <p className="text-xs text-neutral-500 mb-2">
                Références observées sectorielles (ADEME, CEREN). Non substituable à une étude réglementaire.
              </p>
              <p className="text-xs text-neutral-400">
                Rapport ID : {reportPayload.report_id} • Version : {reportPayload.version_tag}
              </p>
            </div>
          </div>
        </div>
      );
    };

    /* ─────────────────────────────────────────────────────────────────────────
       FONCTION : EXPORT PDF
       
       Génère un PDF du rapport et le télécharge.
       Utilise jsPDF (à charger via CDN).
       
       TODO Phase V1.1 : Migrer vers PDFShift pour meilleur rendu
       ───────────────────────────────────────────────────────────────────────── */

    const newDiagnosticExportPDF = async (reportPayload, userEmail) => {
      // Vérifier que jsPDF est chargé
      if (typeof window.jspdf === 'undefined') {
        console.error('jsPDF non chargé');
        alert('Erreur : bibliothèque PDF non disponible');
        return;
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      let y = 20; // Position verticale
      const lineHeight = 7;
      const pageWidth = doc.internal.pageSize.width;
      const margin = 20;
      const contentWidth = pageWidth - 2 * margin;

      // Helper : ajouter du texte avec retour à la ligne auto
      const addText = (text, x, options = {}) => {
        const fontSize = options.fontSize || 10;
        const isBold = options.bold || false;
        const color = options.color || [0, 0, 0];

        doc.setFontSize(fontSize);
        doc.setFont('helvetica', isBold ? 'bold' : 'normal');
        doc.setTextColor(...color);

        const lines = doc.splitTextToSize(text, contentWidth - x + margin);
        doc.text(lines, x, y);
        y += lines.length * lineHeight;
      };

      // Helper : nouvelle page si besoin
      const checkNewPage = (space = 20) => {
        if (y > doc.internal.pageSize.height - space) {
          doc.addPage();
          y = 20;
        }
      };

      // ──────────────────────────────────────────────────────────────────────
      // PAGE 1 : EN-TÊTE
      // ──────────────────────────────────────────────────────────────────────

      // Titre
      addText('PRÉ-DIAGNOSTIC ÉNERGÉTIQUE INDICATIF', margin, { fontSize: 18, bold: true, color: [37, 99, 235] });
      addText('Références observées sectorielles. Estimations à confirmer par audit', margin, { fontSize: 9, color: [120, 53, 15] });
      y += 3;
      y += 5;

      // Infos site
      addText(`Site : ${reportPayload.inputs_summary.site_name}`, margin, { fontSize: 12, bold: true });
      if (reportPayload.inputs_summary.address) {
        addText(`Adresse : ${reportPayload.inputs_summary.address}`, margin);
      }
      addText(`Surface : ${reportPayload.inputs_summary.surface.value} ${reportPayload.inputs_summary.surface.unit}`, margin);
      addText(`Email : ${userEmail}`, margin);
      addText(`Date : ${new Date(reportPayload.generated_at).toLocaleDateString('fr-FR')}`, margin);
      y += 10;

      // KPIs clés
      checkNewPage();
      addText('VUE D\'ENSEMBLE', margin, { fontSize: 14, bold: true });
      y += 5;

      const calc = reportPayload.calculation_results;
      addText(`Consommation annuelle : ${calc.total_kwh_an.value.toLocaleString('fr-FR')} ${calc.total_kwh_an.unit}`, margin + 5);
      addText(`Intensité énergétique : ${calc.intensity_kwh_m2_an.value} ${calc.intensity_kwh_m2_an.unit}`, margin + 5);
      addText(`Coût annuel estimé : ${calc.total_cost_euro_an.value.toLocaleString('fr-FR')} ${calc.total_cost_euro_an.unit}`, margin + 5);
      y += 10;

      // ──────────────────────────────────────────────────────────────────────
      // PAGE 2 : BENCHMARK
      // ──────────────────────────────────────────────────────────────────────

      checkNewPage();
      addText('POSITIONNEMENT', margin, { fontSize: 14, bold: true });
      y += 5;

      const benchmark = reportPayload.benchmark_result;
      const benchmarkLabels = {
        below_range: 'Sous la référence',
        in_range: 'Dans la référence',
        above_range: 'Au-dessus de la référence',
        far_above_range: 'Très au-dessus de la référence'
      };

      addText(`Position : ${benchmarkLabels[benchmark.position]}`, margin + 5);
      addText(`Votre intensité : ${benchmark.site_intensity.value} ${benchmark.site_intensity.unit}`, margin + 5);
      addText(`Médiane secteur : ${benchmark.benchmark_median.value} ${benchmark.benchmark_median.unit}`, margin + 5);
      addText(`Plage de référence : ${benchmark.benchmark_low.value} - ${benchmark.benchmark_high.value} ${benchmark.benchmark_low.unit}`, margin + 5);
      addText(`Source : ${benchmark.source_ref}`, margin + 5, { fontSize: 8, color: [100, 100, 100] });
      y += 10;

      // ──────────────────────────────────────────────────────────────────────
      // PAGE 3 : ACTIONS PRIORITAIRES
      // ──────────────────────────────────────────────────────────────────────

      checkNewPage();
      addText('ACTIONS PRIORITAIRES', margin, { fontSize: 14, bold: true });
      y += 5;

      reportPayload.top_actions.forEach((action, i) => {
        checkNewPage(40);

        addText(`${i + 1}. ${action.name}`, margin + 5, { bold: true });
        addText(`   Gain annuel estimé : ${action.gain_kwh_an.value.toLocaleString('fr-FR')} ${action.gain_kwh_an.unit} (${action.gain_euro_an.value.toLocaleString('fr-FR')} ${action.gain_euro_an.unit})`, margin + 5);
        addText(`   Investissement indicatif : ${action.capex.value.toLocaleString('fr-FR')} ${action.capex.unit}`, margin + 5);
        addText(`   ROI indicatif : ${action.roi_years.value !== null ? action.roi_years.value + ' ' + action.roi_years.unit : 'N/A'}`, margin + 5);

        const hasCEE = action.aid_tags && action.aid_tags.includes('CEE');
        addText(`   Aide CEE potentielle : ${hasCEE ? 'Oui (à confirmer avec devis)' : 'Non identifiée'}`, margin + 5, { color: hasCEE ? [29, 78, 216] : [100, 100, 100] });

        y += 5;
      });

      // ──────────────────────────────────────────────────────────────────────
      // PAGE 4 : PROJECTIONS
      // ──────────────────────────────────────────────────────────────────────

      checkNewPage();
      addText('PROJECTIONS D\'ÉCONOMIES', margin, { fontSize: 14, bold: true });
      y += 5;

      const composite = reportPayload.composite_savings;
      addText(`Économies annuelles estimées (3 actions) : ${composite.annual_euro.value.toLocaleString('fr-FR')} ${composite.annual_euro.unit}`, margin + 5, { bold: true });
      addText(`Soit ${composite.annual_kwh.value.toLocaleString('fr-FR')} ${composite.annual_kwh.unit} (${composite.total_pct.value}${composite.total_pct.unit})`, margin + 5);
      y += 5;

      addText(`Economies cumulées sur 3 ans (prix constants) : ${reportPayload.projection_3y ? reportPayload.projection_3y.savings_euro.toLocaleString('fr-FR') : 'N/A'} EUR`, margin + 5);
      addText('Estimations indicatives – à confirmer par devis professionnel.', margin + 5, { fontSize: 8, color: [120, 53, 15] });
      y += 10;

      // ──────────────────────────────────────────────────────────────────────
      // PAGE 5 : HYPOTHÈSES & LIMITES
      // ──────────────────────────────────────────────────────────────────────

      checkNewPage();
      addText('HYPOTHÈSES ET LIMITES', margin, { fontSize: 14, bold: true });
      y += 5;

      addText('Hypothèses :', margin + 5, { bold: true, fontSize: 11 });
      reportPayload.assumptions.forEach(assumption => {
        checkNewPage(15);
        addText(`• ${assumption}`, margin + 10, { fontSize: 9 });
      });
      y += 5;

      addText('Limites :', margin + 5, { bold: true, fontSize: 11 });
      reportPayload.limits.forEach(limit => {
        checkNewPage(15);
        addText(`• ${limit}`, margin + 10, { fontSize: 9 });
      });
      y += 10;

      // ──────────────────────────────────────────────────────────────────────
      // FOOTER TOUTES PAGES
      // ──────────────────────────────────────────────────────────────────────

      const pageCount = doc.internal.getNumberOfPages();
      for (let i = 1; i <= pageCount; i++) {
        doc.setPage(i);
        doc.setFontSize(8);
        doc.setTextColor(150, 150, 150);
        doc.text(
          `DiagTertiaire - Pré-diagnostic énergétique - Page ${i}/${pageCount}`,
          pageWidth / 2,
          doc.internal.pageSize.height - 10,
          { align: 'center' }
        );
      }

      // ──────────────────────────────────────────────────────────────────────
      // SAUVEGARDE PDF
      // ──────────────────────────────────────────────────────────────────────

      const filename = `DiagTertiaire-${reportPayload.inputs_summary.site_name.replace(/\s+/g, '-')}-${Date.now()}.pdf`;
      doc.save(filename);
    };

    /* ─────────────────────────────────────────────────────────────────────────
       FONCTION : ENVOI EMAIL (STUB)
       
       Fonction stub pour envoi email avec PDF.
       À brancher sur API réelle en production.
       ───────────────────────────────────────────────────────────────────────── */

    /* ─────────────────────────────────────────────────────────────────────────
       CONTENEUR PRINCIPAL FORMULAIRE
       ───────────────────────────────────────────────────────────────────────── */

    const NewDiagnosticForm = ({ onComplete }) => {
      const [currentStep, setCurrentStep] = useState(1);
      const [formData, setFormData] = useState(NEW_DIAGNOSTIC_DEFAULT_FORM_DATA);
      const [reportPayload, setReportPayload] = useState(null);
      const [submitError, setSubmitError] = useState(null);

      useEffect(() => {
        newDiagnosticTrack('start_diagnostic');
      }, []);

      const handleComplete = () => {
        setSubmitError(null);

        try {
          newDiagnosticTrack('submit_form', {
            activity: formData.activity,
            role: formData.role,
            surface: formData.surface
          });

          const payload = newDiagnosticBuildReportData(formData);
          setReportPayload(payload);

          if (typeof onComplete === 'function') {
            onComplete(formData, payload);
          }

          try {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          } catch (error) {
            window.scrollTo(0, 0);
          }
        } catch (error) {
          console.error('Erreur lors de la génération du rapport du nouveau formulaire :', error);
          setSubmitError("Impossible de générer le rapport. Vérifiez les données saisies puis réessayez.");
        }
      };

      const handleReset = () => {
        setFormData(NEW_DIAGNOSTIC_DEFAULT_FORM_DATA);
        setCurrentStep(1);
        setReportPayload(null);
        setSubmitError(null);

        try {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (error) {
          window.scrollTo(0, 0);
        }
      };

      if (reportPayload) {
        return (
          <div className="new-diagnostic-report-shell">
            <div className="max-w-5xl mx-auto px-4 pt-8">
              <button
                type="button"
                onClick={handleReset}
                className="inline-flex items-center gap-2 bg-[#F8FAFC] text-[#1D4ED8] px-4 py-2 rounded-lg font-semibold border border-[#DBEAFE] hover:bg-[#EFF6FF] transition-colors shadow-sm"
              >
                <Icon icon="solar:restart-linear" className="text-lg" />
                Recommencer une nouvelle saisie
              </button>
            </div>

            <NewDiagnosticReportScreen
              reportPayload={reportPayload}
              userEmail={formData.email}
            />
          </div>
        );
      }

      return (
        <div className="new-diagnostic-form fade-in py-12 px-4">
          <div className="max-w-4xl mx-auto">
            {submitError && (
              <div className="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
                {submitError}
              </div>
            )}

            <NewDiagnosticStepper currentStep={currentStep} totalSteps={4} />

            {currentStep === 1 && (
              <NewDiagnosticStep1Identification
                formData={formData}
                setFormData={setFormData}
                onNext={() => setCurrentStep(2)}
              />
            )}

            {currentStep === 2 && (
              <NewDiagnosticStep2Building
                formData={formData}
                setFormData={setFormData}
                onNext={() => setCurrentStep(3)}
                onBack={() => setCurrentStep(1)}
              />
            )}

            {currentStep === 3 && (
              <NewDiagnosticStep3Energies
                formData={formData}
                setFormData={setFormData}
                onNext={() => setCurrentStep(4)}
                onBack={() => setCurrentStep(2)}
              />
            )}

            {currentStep === 4 && (
              <NewDiagnosticStep4Works
                formData={formData}
                setFormData={setFormData}
                onNext={handleComplete}
                onBack={() => setCurrentStep(3)}
              />
            )}
          </div>
        </div>
      );
    };

    const App = () => {
      const [currentPage, setCurrentPage] = useState('home');
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

      const navigate = (page) => {
        setCurrentPage(page);
        setIsMobileMenuOpen(false);
        window.scrollTo(0, 0);
      };

      const isLandingPage = currentPage === 'home';
      const headerPages = [
        { page: 'exemple', label: 'Exemple de rapport' },
        { page: 'pro', label: 'Espace Pro', external: true }
      ];

      const NavLink = ({ page, label, external = false, mobile = false }) => {
        const classes = mobile
          ? `w-full text-left px-3 py-2.5 rounded-lg text-sm font-semibold transition-colors ${currentPage === page ? 'text-[#1D4ED8] bg-[#EEF2FF]' : 'text-[#475569] hover:text-[#102A43] hover:bg-[#F8FAFC]'}`
          : `inline-flex items-center h-10 px-3 rounded-lg text-sm font-semibold transition-colors ${currentPage === page ? 'text-[#1D4ED8] bg-[#EEF2FF]' : 'text-[#475569] hover:text-[#102A43] hover:bg-[#F8FAFC]'}`;

        if (external) {
          return <a href="pro.html" className={classes}>{label}</a>;
        }

        return (
          <button type="button"
            onClick={() => navigate(page)}
            className={classes}
          >
            {label}
          </button>
        );
      };

      return (
        <div className="min-h-screen flex flex-col">
          <nav className={`sticky top-0 z-50 backdrop-blur border-b border-[#E2E8F0] ${isLandingPage ? 'bg-white/80 shadow-[0_2px_12px_rgba(15,23,42,0.04)]' : 'bg-white/95 shadow-[0_6px_20px_rgba(15,23,42,0.06)]'}`}>
            <div className="max-w-6xl mx-auto px-4 sm:px-6">
              <div className="h-[74px] flex items-center justify-between gap-4">
                <button
                  type="button"
                  onClick={() => navigate('home')}
                  className="inline-flex items-center gap-2 text-[#102A43] hover:text-[#1D4ED8] transition-colors"
                >
                  <Icon icon="solar:buildings-2-linear" className="text-xl" />
                  <span className="font-bold text-lg tracking-tight">DiagTertiaire</span>
                </button>

                <div className="hidden md:flex items-center gap-1">
                  {headerPages.map((item) => (
                    <NavLink key={item.page} page={item.page} label={item.label} />
                  ))}
                </div>

                <div className="hidden md:block">
                  <button
                    type="button"
                    onClick={() => navigate('diagnostic')}
                    className="btn-primary inline-flex items-center justify-center px-5 py-2.5 text-sm font-bold rounded-xl"
                  >
                    Lancer mon diagnostic gratuit
                  </button>
                </div>

                <button
                  type="button"
                  className="md:hidden text-[#102A43] hover:text-[#1D4ED8] transition-colors"
                  onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                  aria-label={isMobileMenuOpen ? 'Fermer le menu' : 'Ouvrir le menu'}
                >
                  <Icon icon={isMobileMenuOpen ? "solar:close-square-linear" : "solar:hamburger-menu-linear"} className="text-2xl" />
                </button>
              </div>
            </div>

            {isMobileMenuOpen && (
              <div className="md:hidden border-t border-[#E2E8F0] bg-white">
                <div className="max-w-6xl mx-auto px-4 sm:px-6 py-4">
                  <div className="flex flex-col gap-2">
                    {headerPages.map((item) => (
                      <NavLink key={`mobile-${item.page}`} page={item.page} label={item.label} external={item.external} mobile />
                    ))}
                  </div>
                  <button
                    type="button"
                    onClick={() => navigate('diagnostic')}
                    className="btn-primary mt-3 w-full inline-flex items-center justify-center px-5 py-3 text-sm font-bold rounded-xl"
                  >
                    Lancer mon diagnostic gratuit
                  </button>
                </div>
              </div>
            )}
          </nav>

          <main className="flex-1">
            {currentPage === 'home' && <PageHome navigate={navigate} />}

            {currentPage === 'diagnostic' && (
              <div className="new-diagnostic-page">
                <NewDiagnosticForm
                  onComplete={(data, reportPayload) => {
                    try {
                      window.localStorage.setItem('newDiagnosticLatestSubmission', JSON.stringify(data));
                      if (reportPayload) {
                        window.localStorage.setItem('newDiagnosticLatestReport', JSON.stringify(reportPayload));
                      }
                    } catch (error) {
                      console.warn('Impossible de sauvegarder la soumission du nouveau formulaire.', error);
                    }
                    console.log('Nouveau formulaire', data);
                    if (reportPayload) {
                      console.log('Nouveau rapport', reportPayload);
                    }
                  }}
                />
              </div>
            )}

            {currentPage === 'exemple' && <PageExample navigate={navigate} />}
          </main>

          {currentPage !== 'diagnostic' && (
            <footer className="bg-[#0F172A] py-12 md:py-14 border-t border-white/5">
              <div className="max-w-6xl mx-auto px-4">
                <div className="grid md:grid-cols-4 gap-8 md:gap-10 mb-8">

                  <div>
                    <div className="flex items-center gap-2 mb-4">
                      <div className="w-8 h-8 bg-[#1D4ED8]/20 rounded-lg flex items-center justify-center">
                        <iconify-icon icon="solar:buildings-2-linear" style={{ color: '#1D4ED8', fontSize: '18px' }} />
                      </div>
                      <span className="font-bold text-white">DiagTertiaire</span>
                    </div>
                    <p className="text-sm text-[#475569] leading-relaxed mb-4">Pré-diagnostic énergétique tertiaire orienté décision, basé sur références sectorielles.</p>
                    <div className="space-y-2">
                      <button type="button" onClick={() => navigate('home')} className="block text-sm text-slate-400 hover:text-white transition-colors font-medium">A propos</button>
                      <button type="button" className="block text-sm text-slate-400 hover:text-white transition-colors font-medium">Notre méthodologie</button>
                      <a href="mailto:contact@diagtertiaire.fr" className="block text-sm text-slate-400 hover:text-white transition-colors font-medium">Contact</a>
                    </div>
                  </div>

                  <div>
                    <h4 className="text-sm font-bold text-white mb-4">Ressources</h4>
                    <ul className="space-y-2.5">
                      <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Guide du décret tertiaire</button></li>
                      <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Références sectorielles</button></li>
                      <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Blog</button></li>
                      <li><button type="button" onClick={() => navigate('exemple')} className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Exemple de rapport</button></li>
                    </ul>
                  </div>

                  <div>
                    <h4 className="text-sm font-bold text-white mb-4">Légal</h4>
                    <ul className="space-y-2.5">
                      <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Mentions légales</button></li>
                      <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Politique de confidentialité</button></li>
                      <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">CGU</button></li>
                      <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Gestion des cookies</button></li>
                    </ul>
                  </div>

                  <div>
                    <h4 className="text-sm font-bold text-white mb-4">Professionnel</h4>
                    <ul className="space-y-2.5">
                      <li><a href="pro.html" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Espace pro</a></li>
                      <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">Devenir partenaire</button></li>
                      <li><button type="button" className="text-sm text-slate-400 hover:text-white transition-colors font-medium">API et Intégrations</button></li>
                    </ul>
                  </div>
                </div>

                <div className="pt-6 border-t border-white/10 flex flex-wrap justify-between items-center gap-4">
                  <p className="text-xs text-[#475569]">© 2026 DiagTertiaire • Estimations basées sur références sectorielles</p>
                  <div className="flex items-center gap-3">
                    {['SSL', 'RGPD', '🇫🇷 FR'].map((b, i) => (
                      <span key={i} className="text-xs text-[#475569] bg-white/5 px-2.5 py-1.5 rounded-lg font-medium">{b}</span>
                    ))}
                  </div>
                </div>
              </div>
            </footer>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>

</html>
