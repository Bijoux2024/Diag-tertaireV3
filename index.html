  <script type="text/babel">
    /* ╔═══════════════════════════════════════════════════════════════════════════╗
       ║                           DIAGTERTIAIRE                                   ║
       ║                   Pré-diagnostic énergétique tertiaire                    ║
       ║                                                                           ║
       ║  NAVIGATION RAPIDE :                                                      ║
       ║  → SECTION 1  : Imports & Setup React                   (lignes 53-56)  ║
       ║  → SECTION 2  : Constantes Métier                       (lignes 60-145) ║
       ║  → SECTION 3  : Configuration & Helpers                 (lignes 150-378)║
       ║  → SECTION 4  : Composants UI Réutilisables            (lignes 165-378)║
       ║  → SECTION 5  : Formulaire Multi-Étapes                (lignes 379-1925)║
       ║  → SECTION 6  : Moteur de Calcul & Export PDF          (lignes 1928+)  ║
       ║  → SECTION 7  : Pages (Home, Méthode, Exemple, Pro)    (lignes 2920+)  ║
       ║  → SECTION 8  : App Root & Navigation                  (lignes 3959+)  ║
       ╚═══════════════════════════════════════════════════════════════════════════╝ */

    /* ═══════════════════════════════════════════════════════════════════════════
       SECTION 1: IMPORTS & SETUP REACT
       
       Imports des hooks React et de Recharts pour les graphiques
       ═══════════════════════════════════════════════════════════════════════════ */
    const { useState, useEffect, useCallback, useRef } = React;
    // Recharts non utilisé après refactoring (conservé en commentaire au cas où)
    // const RechartsObj = window.Recharts || {};









    /* ═══════════════════════════════════════════════════════════════════════════
       SECTION 3: CONFIGURATION & HELPERS
       ═══════════════════════════════════════════════════════════════════════════ */

    /* ═══════════════════════════════════════════════════════════════════════════
       ENGINE_PRO : MOTEUR COMMUN DE CALCUL (Gratuit + SaaS)
       ═══════════════════════════════════════════════════════════════════════════ */
    const ENGINE_PRO = {
      benchmarks: {
        "Bureau": { q1: 66, med: 104, q3: 154 },
        "Hôtel": { q1: 114, med: 151, q3: 200 },
        "Restauration": { q1: 155, med: 307, q3: 562 },
        "Santé": { q1: 77, med: 113, q3: 173 },
        "Enseignement": { q1: 82, med: 105, q3: 131 },
        "Entrepôt-Chauffé": { q1: 29, med: 61, q3: 131 },
        "Entrepôt-NonChauffé": { q1: 15, med: 30, q3: 65 }, // Fallback
        "Commerce_Froid": { q1: 152, med: 363, q3: 649 },
        "Commerce_SansFroid": { q1: 93, med: 142, q3: 210 },
        "Autre": { q1: 100, med: 150, q3: 250 }
      },
      prices: {
        elec: 0.20,
        gaz: 0.105,
        reseau: 0.08,
        autre: 0.12
      },
      actions: [
        { id: "opti_horaires", title: "Optimisation horaires chauffage", scope: "total", gainRange: [3, 7, 12], capRange: [0, 300, 1500], capexType: "forfait" },
        { id: "regul_chauff", title: "Régulation chauffage central", scope: "chauffage", gainRange: [8, 15, 25], capRange: [1200, 2500, 6000], capexType: "forfait" },
        { id: "reduit_inocc", title: "Réduit hors occupation / consignes", scope: "total", gainRange: [2, 5, 10], capRange: [0, 500, 2000], capexType: "forfait" },
        { id: "vent_modul", title: "Ventilation hors occupation / modulation", scope: "ventilation", gainRange: [10, 20, 35], capRange: [300, 1500, 5000], capexType: "forfait_zone" },
        { id: "led", title: "Relamping LED ciblé", scope: "eclairage", gainRange: [20, 35, 55], capRange: [25, 50, 90], capexType: "point_lumineux" },
        { id: "detect_pres", title: "Détection présence éclairage", scope: "eclairage", gainRange: [10, 20, 35], capRange: [120, 250, 500], capexType: "zone" },
        { id: "calorifugeage", title: "Calorifugeage ECS / réseaux", scope: "ecs", gainRange: [5, 12, 25], capRange: [20, 40, 70], capexType: "ml" },
        { id: "isotoit", title: "Isolation opportuniste toiture", scope: "total", gainRange: [5, 12, 20], capRange: [25, 60, 140], capexType: "m2" }
      ],

      compute: function (data) {
        // Mappages depuis les IDs du form gratuit (offices, retail, etc.) ou form PRO (Bureau, Commerce, etc.)
        let actMapping = {
          'offices': 'Bureau',
          'retail': 'Commerce_SansFroid',
          'hotel': 'Hôtel',
          'restaurant': 'Restauration',
          'health_local': 'Santé',
          'education': 'Enseignement',
          'light_warehouse': 'Entrepôt-NonChauffé',
          'mixed': 'Bureau' // Simplifié si mixte
        };

        let activityKey = actMapping[data.activity] || data.activity;

        // Gestion dynamique ciblée sur les gates PRO
        if (data.activity === 'Commerce' || data.activity === 'retail') {
          activityKey = data.commerceFroid ? 'Commerce_Froid' : 'Commerce_SansFroid';
        }
        if (data.activity === 'Entrepôt' || data.activity === 'light_warehouse') {
          activityKey = data.entrepotChauffe ? 'Entrepôt-Chauffé' : 'Entrepôt-NonChauffé';
        }

        if (!this.benchmarks[activityKey]) activityKey = 'Autre';
        const ref = this.benchmarks[activityKey];
        const area = parseFloat(data.surface || data.area) || 100;

        let kwhTotal = 0;
        let isKwhPrioritaire = false;

        const getKwhFromInput = (valKwh, valEur, priceRef) => {
          if (valKwh && parseFloat(valKwh) > 0) { isKwhPrioritaire = true; return parseFloat(valKwh); }
          if (valEur && parseFloat(valEur) > 0) return parseFloat(valEur) / priceRef;
          return 0;
        };

        // Compatibilité avec les champs index.html (elecKwh/gasKwh) et index.saaspro.html (elec/gaz kwh)
        let kwhElec = getKwhFromInput(data.elecKwh || data.elec_kwh, data.elecEuro || data.elec_eur, this.prices.elec);
        let kwhGaz = getKwhFromInput(data.gasKwh || data.gaz_kwh, data.gasEuro || data.gaz_eur, this.prices.gaz);

        kwhTotal = kwhElec + kwhGaz;

        if (kwhTotal === 0 && data._fallbackKwh) {
          // Seulement utilisé si vraiment vide en dev local / mock initial
          kwhTotal = data._fallbackKwh;
        } else if (kwhTotal === 0) {
          kwhTotal = ref.med * area;
        }

        const intensity = kwhTotal / area;

        // Score OPERAT-like
        let score = "C";
        let positioning = "Dans la médiane";
        if (intensity <= ref.q1) { score = "A"; positioning = "Très performant (Top 25%)"; }
        else if (intensity > ref.q1 && intensity <= ref.med * 0.9) { score = "B"; positioning = "Performant"; }
        else if (intensity > ref.med * 0.9 && intensity <= ref.med * 1.1) { score = "C"; positioning = "Dans la médiane"; }
        else if (intensity > ref.med * 1.1 && intensity <= ref.q3) { score = "D"; positioning = "Surconsommation (Q3)"; }
        else { score = "E"; positioning = "Très énergivore (Bottom 25%)"; }

        // Sélection des actions pro
        let actionPool = [...this.actions];

        // Gates contextuels
        if (!data.hasCooling && data.hasClim === false) actionPool = actionPool.filter(a => a.id !== 'vent_modul');

        let remainingKwh = kwhTotal;
        let globalSavingsKwh = 0;
        let usedScopes = {};

        let selectedActions = actionPool.slice(0, 3).map(a => {
          let gainFactor = (a.gainRange[1] / 100);
          if (usedScopes[a.scope]) gainFactor *= 0.5; // Recouvrement
          usedScopes[a.scope] = true;

          let scopeWeight = 1;
          let mainHeating = data.mainHeating || data.heating || 'electric';
          if (a.scope === 'chauffage' && mainHeating.includes('elec')) scopeWeight = 0.5;
          if (a.scope === 'chauffage' && mainHeating.includes('gas')) scopeWeight = 0.8;
          if (a.scope === 'eclairage') scopeWeight = 0.15;
          if (a.scope === 'ecs') scopeWeight = 0.10;

          const actionSavings = remainingKwh * scopeWeight * gainFactor;
          remainingKwh -= actionSavings;
          globalSavingsKwh += actionSavings;

          let capex = a.capRange[1];
          if (a.capexType === 'm2') capex *= area;
          if (a.capexType === 'ml') capex *= 50;
          if (a.capexType === 'point_lumineux') capex *= (area / 15);
          if (a.capexType === 'zone') capex *= (area / 50);

          const billElecUsed = parseFloat(data.elecEuro || data.elec_eur) || 0;
          const billGazUsed = parseFloat(data.gasEuro || data.gaz_eur) || 0;
          const totalBill = billElecUsed + billGazUsed;

          let implicitElecPrice = (kwhElec > 0 && billElecUsed > 0) ? (billElecUsed / kwhElec) : this.prices.elec;
          let implicitGazPrice = (kwhGaz > 0 && billGazUsed > 0) ? (billGazUsed / kwhGaz) : this.prices.gaz;

          let mixPrice = this.prices.elec; // fallback default
          if (kwhTotal > 0) {
            mixPrice = (kwhElec / kwhTotal) * implicitElecPrice + (kwhGaz / kwhTotal) * implicitGazPrice;
          }

          const savEur = actionSavings * mixPrice;

          return {
            id: a.id,
            title: a.title,
            savingsEur: Math.round(savEur),
            savingsKwh: Math.round(actionSavings),
            capex: Math.round(capex),
            roi: savEur > 0 ? (capex / savEur).toFixed(1) : 0
          };
        });

        const billSub = parseFloat(data.elecSubscriptionYearly) || 0 + parseFloat(data.gasSubscriptionYearly) || 0;

        return {
          kwhTotal: Math.round(kwhTotal),
          intensity: Math.round(intensity),
          score: score,
          positioning: positioning,
          ref: ref,
          isKwhPrioritaire: isKwhPrioritaire,
          totalSavingsEur: Math.round(selectedActions.reduce((acc, a) => acc + a.savingsEur, 0)),
          totalCapex: Math.round(selectedActions.reduce((acc, a) => acc + a.capex, 0)),
          topActions: selectedActions.sort((a, b) => b.savingsEur - a.savingsEur),
          estimatedBill: Math.round(kwhElec * this.prices.elec + kwhGaz * this.prices.gaz + billSub)
        };
      }
    };

    const CTA_CALENDLY_URL = 'https://calendly.com/TON-LIEN'; // à remplacer
    const CTA_EMAIL = 'contact@diagtertiaire.fr';


    /* --- UI COMPONENTS --- */
    const Icon = ({ icon, className = "", style = {} }) => (
      <iconify-icon
        icon={icon}
        class={`${className} text-2xl`}
        style={{ strokeWidth: '1.5', ...style }}
      ></iconify-icon>
    );
    const Button = ({ children, onClick, disabled, variant = 'primary', className = '', type = 'button' }) => {
      const base = "px-6 py-3 rounded-lg font-semibold text-sm transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 flex items-center justify-center gap-2";
      const styles = {
        primary: "bg-[#102A43] text-white hover:bg-[#162B47] focus:ring-[#102A43] disabled:opacity-50 disabled:cursor-not-allowed shadow-sm",
        secondary: "bg-white border border-[#E2E8F0] text-[#0F172A] hover:bg-[#F8FAFC] focus:ring-slate-200",
        ghost: "text-[#475569] hover:text-[#102A43]",
        green: "bg-[#16A34A] text-white hover:bg-[#27AE60] focus:ring-[#16A34A] shadow-sm"

    /* ─────────────────────────────────────────────────────────────────────────

    const newDiagnosticValidateEmail = (email) => {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    };

    const newDiagnosticValidatePostalCode = (code) => {
      return /^\d{5}$/.test(code);
    };

    const newDiagnosticValidateNumber = (value, min = 0, max = Infinity) => {
      const num = parseFloat(value);
      return !isNaN(num) && num >= min && num <= max;
    };

    const newDiagnosticValidateMixUsage = (officesPct, retailPct) => {
      const total = parseFloat(officesPct || 0) + parseFloat(retailPct || 0);
      // Tolérance arrondi <= 0.5 puis normalisation
      return Math.abs(total - 100) <= 0.5;
    };

    const newDiagnosticNormalizeMixUsage = (officesPct, retailPct) => {
      const total = parseFloat(officesPct || 0) + parseFloat(retailPct || 0);
      if (total === 0) return { officesPct: 50, retailPct: 50 };
      return {
        officesPct: Math.round((officesPct / total) * 100 * 10) / 10,
        retailPct: Math.round((retailPct / total) * 100 * 10) / 10
      };
    };

    const newDiagnosticValidateEnergyData = (formData) => {
      const errors = [];

      // Au moins une énergie doit être renseignée
      if (!formData.elecUsed && !formData.gasUsed) {
        errors.push('Au moins une énergie (électricité ou gaz) doit être renseignée');
        return errors;
      }

      // Si élec utilisée, au moins kWh ou €
      if (formData.elecUsed) {
        const hasElecData = formData.elecKwh || formData.elecEuro;
        if (!hasElecData) {
          errors.push('Électricité : renseignez au moins les kWh ou le montant en €');
        }
      }

      // Si gaz utilisé, au moins kWh ou €
      if (formData.gasUsed) {
        const hasGasData = formData.gasKwh || formData.gasEuro;
        if (!hasGasData) {
          errors.push('Gaz : renseignez au moins les kWh ou le montant en €');
        }
      }

      // Validation cohérence prix implicite (warning, non bloquant)
      if (formData.elecKwh && formData.elecEuro) {
        const implicitPrice = parseFloat(formData.elecEuro) / parseFloat(formData.elecKwh);
        if (implicitPrice < 0.10 || implicitPrice > 0.35) {
          errors.push({
            type: 'warning',
            code: 'PRICE_IMPLIED_OUT_OF_RANGE',
            message: 'Électricité : le prix implicite semble inhabituel (vérifiez vos données)'
          });
        }
      }

      if (formData.gasKwh && formData.gasEuro) {
        const implicitPrice = parseFloat(formData.gasEuro) / parseFloat(formData.gasKwh);
        if (implicitPrice < 0.05 || implicitPrice > 0.20) {
          errors.push({
            type: 'warning',
            code: 'PRICE_IMPLIED_OUT_OF_RANGE',
            message: 'Gaz : le prix implicite semble inhabituel (vérifiez vos données)'
          });
        }
      }

      // Warning abonnement coché mais vide
      if (formData.elecIncludesSubscription && !formData.elecSubscriptionYearly) {
        errors.push({
          type: 'warning',
          code: 'SUBSCRIPTION_INCLUDED_NO_VALUE',
          message: 'Électricité : abonnement coché mais montant non renseigné (estimation moins précise)'
        });
      }

      if (formData.gasIncludesSubscription && !formData.gasSubscriptionYearly) {
        errors.push({
          type: 'warning',
          code: 'SUBSCRIPTION_INCLUDED_NO_VALUE',
          message: 'Gaz : abonnement coché mais montant non renseigné (estimation moins précise)'
        });
      }

            >
              {option.icon && (
                <iconify-icon
                  icon={option.icon}
                  className={`text-2xl mb-2 block ${selected === option.id ? 'text-[#1D4ED8]' : 'text-neutral-500'}`}
                />
              )}
              <div className="font-semibold text-neutral-900 mb-1">{option.label}</div>
              {option.desc && <div className="text-sm text-neutral-600">{option.desc}</div>}
            </button>
          ))}
        </div>
      );
    };

    // NewDiagnosticCheckbox
    const NewDiagnosticCheckbox = ({ label, checked, onChange, helper = null }) => (
      <label className="flex items-start gap-3 cursor-pointer">
        <input
          type="checkbox"
          checked={checked}
          onChange={(e) => onChange(e.target.checked)}
          className="mt-1 w-5 h-5 rounded border-[#E2E8F0] text-[#1D4ED8] focus:ring-[#1D4ED8]"
        />
        <div>
          <span className="text-neutral-700">{label}</span>
          {helper && <p className="text-xs text-neutral-500 mt-1">{helper}</p>}
        </div>
      </label>
    );

    // Checkboxes groupe
    const NewDiagnosticCheckboxGroup = ({ options, selected, onChange }) => (
      <div className="space-y-3">
        {options.map((option) => (
          <NewDiagnosticCheckbox
            key={option.id}
            label={option.label}
            checked={selected.includes(option.id)}
            onChange={(checked) => {
              if (checked) {
                onChange([...selected, option.id]);
              } else {
                onChange(selected.filter(id => id !== option.id));
              }
            }}
          />
        ))}
      </div>
    );

    // Slider mix usage
    const NewDiagnosticMixSlider = ({ officesPct, retailPct, onChange }) => {
      const handleOfficeChange = (value) => {
        const newOfficesPct = parseFloat(value);
        const newRetailPct = 100 - newOfficesPct;
        onChange({ officesPct: newOfficesPct, retailPct: newRetailPct });
      };

      const isValid = newDiagnosticValidateMixUsage(officesPct, retailPct);

      return (
        <div className="mb-6">
          <label className="block text-sm font-medium text-neutral-700 mb-4">
            Répartition des usages <span className="text-red-500">*</span>
          </label>

          <div className="space-y-4">
            <div className="px-2">
              <input
                type="range"
                min="0"
                max="100"
                step="1"
                value={officesPct}
                onChange={(e) => handleOfficeChange(e.target.value)}
                className="mix-range"
              />
            </div>

            <div className="grid grid-cols-2 gap-4">
              <div className="p-4 bg-[#EFF6FF] rounded-lg text-center border border-[#DBEAFE]">
                <div className="text-3xl font-bold text-[#1D4ED8]">{Math.round(officesPct)}%</div>
                <div className="text-sm text-neutral-600 mt-1">Bureaux</div>
              </div>
              <div className="p-4 bg-amber-50 rounded-lg text-center border border-amber-100">
                <div className="text-3xl font-bold text-[#F59E0B]">{Math.round(retailPct)}%</div>
                <div className="text-sm text-neutral-600 mt-1">Commerce</div>
              </div>
            </div>

            {!isValid && (
              <p className="text-xs text-red-500">
                La somme doit être égale à 100%
              </p>
            )}
          </div>
        </div>
      );
    };

    /* ─────────────────────────────────────────────────────────────────────────
       ÉTAPES FORMULAIRE
       ───────────────────────────────────────────────────────────────────────── */

    // Étape 1 : Identification
    const NewDiagnosticStep1Identification = ({ formData, setFormData, onNext }) => {
      const [errors, setErrors] = useState({});
      const [mixedTab, setMixedTab] = useState(0); // 0 = Usage 1, 1 = Usage 2

      const isMixed = formData.activity === 'mixed';

      // Non-mixed activities for the mixed tabs
      const nonMixedActivities = NEW_DIAGNOSTIC_ACTIVITIES.filter(a => a.id !== 'mixed');

      const validate = () => {
        const newErrors = {};

        if (!formData.address || formData.address.length < 5) {
          newErrors.address = 'Adresse du bâtiment requise (min 5 caractères)';
        }
        if (!formData.role) {
          newErrors.role = 'Veuillez sélectionner votre rôle';
        }
        if (!newDiagnosticValidatePostalCode(formData.postalCode)) {
          newErrors.postalCode = 'Code postal invalide (5 chiffres)';
        }
        if (!formData.activity) {
          newErrors.activity = 'Veuillez sélectionner une activité';
        }
        if (formData.activity === 'mixed') {
          if (!formData.mixedUsage1) newErrors.mixedUsage1 = 'Sélectionnez un usage pour Usage 1';
          if (!formData.mixedUsage2) newErrors.mixedUsage2 = 'Sélectionnez un usage pour Usage 2';
          if (formData.mixedUsage1 && formData.mixedUsage2 && formData.mixedUsage1 === formData.mixedUsage2) {
            newErrors.mixedUsage2 = 'Usage 2 doit être différent de Usage 1';
          }
        }

        setErrors(newErrors);
        return Object.keys(newErrors).length === 0;
      };

      const handleNext = () => {
        if (validate()) {
          newDiagnosticTrack('diagnostic_step1_completed');
          onNext();
        }
      };

      return (
        <div className="max-w-2xl mx-auto">
          <h2 className="text-2xl font-bold text-[#102A43] mb-2">Identification</h2>
          <p className="text-[#475569] mb-8">Commençons par quelques informations de base</p>

          <NewDiagnosticFormInput
            label="Adresse du bâtiment"
            value={formData.address}
            onChange={(v) => setFormData({ ...formData, address: v })}
            type="text"
            placeholder="12 rue de Rivoli, 75001 Paris"
            required
            error={errors.address}
            helper="Adresse complète du site diagnostiqué."
          />

          <div className="mb-4 mt-6">
            <label className="block text-sm font-medium text-neutral-700 mb-2">
              Vous êtes <span className="text-red-500">*</span>
            </label>
            <NewDiagnosticRadioCards
              options={NEW_DIAGNOSTIC_ROLES.map(r => ({ ...r, desc: null }))}
              selected={formData.role}
              onChange={(v) => setFormData({ ...formData, role: v })}
            />
            {errors.role && <p className="text-xs text-red-500 mt-2">{errors.role}</p>}
          </div>

          <NewDiagnosticFormInput
            label="Code postal du bâtiment"
            value={formData.postalCode}
            onChange={(v) => setFormData({ ...formData, postalCode: v })}
            placeholder="75001"
            required
            error={errors.postalCode}
          />

          <NewDiagnosticFormSelect
            label="Activité principale"
            value={formData.activity}
            onChange={(v) => setFormData({ ...formData, activity: v, mixedUsage1: '', mixedUsage2: '' })}
            options={NEW_DIAGNOSTIC_ACTIVITIES}
            required
            error={errors.activity}
            placeholder="Sélectionnez une activité"
          />

          {isMixed && (
            <div className="mb-6 border border-[#E2E8F0] rounded-xl overflow-hidden">
              <div className="flex border-b border-[#E2E8F0]">
                {['Usage 1', 'Usage 2'].map((tab, idx) => (
                  <button
                    key={idx}
                    type="button"
                    onClick={() => setMixedTab(idx)}
                    className={`flex-1 py-3 text-sm font-semibold transition-colors ${mixedTab === idx
                      ? 'text-[#1D4ED8] bg-[#EFF6FF] border-b-2 border-[#1D4ED8]'
                      : 'text-neutral-500 hover:text-neutral-900 bg-white'
                      }`}
                  >
                    {tab}
                    {idx === 0 && formData.mixedUsage1 && (
                      <span className="ml-2 text-xs text-[#1D4ED8] font-normal">
                        {nonMixedActivities.find(a => a.id === formData.mixedUsage1)?.label}
                      </span>
                    )}
                    {idx === 1 && formData.mixedUsage2 && (
                      <span className="ml-2 text-xs text-[#1D4ED8] font-normal">
                        {nonMixedActivities.find(a => a.id === formData.mixedUsage2)?.label}
                      </span>
                    )}
                  </button>
                ))}
              </div>
              <div className="p-4 bg-white">
                {mixedTab === 0 ? (
                  <>
                    <p className="text-sm text-neutral-600 mb-3">Sélectionnez le premier usage du bâtiment :</p>
                    <div className="grid grid-cols-2 gap-2">
                      {nonMixedActivities.map(act => (
                        <button
                          key={act.id}
                          type="button"
                          disabled={act.id === formData.mixedUsage2}
                          onClick={() => setFormData({ ...formData, mixedUsage1: act.id })}
                          className={`p-3 rounded-lg border-2 text-left text-sm transition-all ${formData.mixedUsage1 === act.id
                            ? 'border-[#1D4ED8] bg-[#EFF6FF]'
                            : act.id === formData.mixedUsage2
                              ? 'border-neutral-100 bg-neutral-50 opacity-40 cursor-not-allowed'
                              : 'border-[#E2E8F0] hover:border-[#1D4ED8]/40'
                            }`}
                        >
                          <span className="font-medium">{act.label}</span>
                        </button>
                      ))}
                    </div>
                    {errors.mixedUsage1 && <p className="text-xs text-red-500 mt-2">{errors.mixedUsage1}</p>}
                  </>
                ) : (
                  <>
                    <p className="text-sm text-neutral-600 mb-3">Sélectionnez le deuxième usage du bâtiment :</p>
                    <div className="grid grid-cols-2 gap-2">
                      {nonMixedActivities.map(act => (
                        <button
                          key={act.id}
                          type="button"
                          disabled={act.id === formData.mixedUsage1}
                          onClick={() => setFormData({ ...formData, mixedUsage2: act.id })}
                          className={`p-3 rounded-lg border-2 text-left text-sm transition-all ${formData.mixedUsage2 === act.id
                            ? 'border-[#1D4ED8] bg-[#EFF6FF]'
                            : act.id === formData.mixedUsage1
                              ? 'border-neutral-100 bg-neutral-50 opacity-40 cursor-not-allowed'
                              : 'border-[#E2E8F0] hover:border-[#1D4ED8]/40'
                            }`}
                        >
                          <span className="font-medium">{act.label}</span>
                        </button>
                      ))}
                    </div>
                    {errors.mixedUsage2 && <p className="text-xs text-red-500 mt-2">{errors.mixedUsage2}</p>}
                  </>
                )}
              </div>
            </div>
          )}

          <div className="flex justify-end mt-8">
            <button
              onClick={handleNext}
              className="px-8 py-3 bg-[#1D4ED8] text-white font-semibold rounded-lg hover:bg-[#1E40AF] transition-colors shadow-sm"
            >
              Continuer
            </button>
          </div>
        </div>
      );
    };

    // Étape 2 : Bâtiment & Usage
    const NewDiagnosticStep2Building = ({ formData, setFormData, onNext, onBack }) => {
      const [errors, setErrors] = useState({});
      const isMixed = formData.activity === 'mixed';

      const validate = () => {
        const newErrors = {};

        if (!newDiagnosticValidateNumber(formData.surface, 1)) {
          newErrors.surface = 'Surface invalide (doit être > 0)';
        }
        if (!formData.mainHeating) {
          newErrors.mainHeating = 'Veuillez sélectionner le mode de chauffage principal';
        }
        if (!formData.ecsSameSystem && !formData.ecsSystem) {
          newErrors.ecsSystem = 'Veuillez sélectionner le système ECS';
        }

        setErrors(newErrors);
        return Object.keys(newErrors).length === 0;
      };

      const handleNext = () => {
        if (validate()) {
          newDiagnosticTrack('diagnostic_step2_completed');
          onNext();
        }
      };

      return (
        <div className="max-w-2xl mx-auto">
          <h2 className="text-2xl font-bold text-[#102A43] mb-2">Bâtiment & Usage</h2>
          <p className="text-[#475569] mb-8">Caractéristiques de votre site</p>

          <NewDiagnosticFormInput
            label="Surface totale"
            value={formData.surface}
            onChange={(v) => setFormData({ ...formData, surface: v })}
            type="number"
            placeholder="300"
            suffix="m²"
            required
            error={errors.surface}
          />

          {isMixed && (
            <div className="mb-8 p-5 bg-white border border-[#E2E8F0] rounded-xl shadow-sm">
              <div className="flex items-center gap-3 mb-6">
                <div className="w-10 h-10 bg-amber-50 rounded-lg flex items-center justify-center">
                  <Icon icon="solar:chart-line-bold-duotone" className="text-[#F59E0B] text-2xl" />
                </div>
                <div>
                  <h3 className="font-bold text-[#102A43] mb-0">Répartition des surfaces</h3>
                  <p className="text-xs text-neutral-500">Ajustez la part de chaque usage</p>
                </div>
              </div>
              <NewDiagnosticMixSlider
                officesPct={formData.mixOfficesPct}
                retailPct={formData.mixRetailPct}
                onChange={(vals) => setFormData({ ...formData, mixOfficesPct: vals.officesPct, mixRetailPct: vals.retailPct })}
              />
            </div>
          )}

          {/* Gate Questions */}
          <div className="mb-6">
            <label className="block text-sm font-medium text-neutral-700 mb-2">
              Chauffage principal <span className="text-red-500">*</span>
            </label>
            <NewDiagnosticFormSelect
              value={formData.mainHeating}
              onChange={(v) => setFormData({ ...formData, mainHeating: v })}
              options={[
                { id: 'electric', label: 'Electrique (PAC, convecteurs...)' },
                { id: 'gas', label: 'Gaz (chaudière autonome)' },
                { id: 'network', label: 'Réseau de chaleur urbain' },
                { id: 'other', label: 'Autre (fioul, bois...)' }
              ]}
              placeholder="Sélectionnez..."
              error={errors.mainHeating}
            />
          </div>

          <div className="mb-6 bg-white border border-[#E2E8F0] p-4 rounded-xl flex items-center justify-between">
            <div>
              <p className="text-sm font-medium text-neutral-900">Climatisation</p>
              <p className="text-xs text-neutral-500">Le bâtiment est-il climatisé (totalement ou en partie) ?</p>
            </div>
            <label className="relative inline-flex items-center cursor-pointer">
              <input
                type="checkbox"
                className="sr-only peer"
                checked={formData.hasCooling}
                onChange={(e) => setFormData({ ...formData, hasCooling: e.target.checked })}
              />
              <div className="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-[#1D4ED8] rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#16A34A]"></div>
            </label>
          </div>

          {/* ECS Section */}
          <div className="mb-8">
            <label className="block text-sm font-medium text-neutral-700 mb-4">
              Production d'eau chaude sanitaire (ECS) <span className="text-red-500">*</span>
            </label>
            <div className="grid md:grid-cols-2 gap-4 mb-4">
              <button
                type="button"
                onClick={() => setFormData({ ...formData, ecsSameSystem: true, ecsSystem: '' })}
                className={`p-4 rounded-xl border-2 transition-all text-left ${formData.ecsSameSystem
                  ? 'border-[#1D4ED8] bg-[#EFF6FF]'
                  : 'border-[#E2E8F0] hover:border-[#1D4ED8]/40'
                  }`}
              >
                <Icon icon="solar:fire-bold" className={`text-2xl mb-2 block ${formData.ecsSameSystem ? 'text-[#1D4ED8]' : 'text-neutral-500'}`} />
                <div className="font-semibold text-neutral-900 mb-1">Même système que le chauffage</div>
                <div className="text-xs text-neutral-600">Chaudière mixte, PAC, ou réseau urbain</div>
              </button>
              <button
                type="button"
                onClick={() => setFormData({ ...formData, ecsSameSystem: false })}
                className={`p-4 rounded-xl border-2 transition-all text-left ${!formData.ecsSameSystem
                  ? 'border-[#1D4ED8] bg-[#EFF6FF]'
                  : 'border-[#E2E8F0] hover:border-[#1D4ED8]/40'
                  }`}
              >
                <Icon icon="solar:bath-bold" className={`text-2xl mb-2 block ${!formData.ecsSameSystem ? 'text-[#1D4ED8]' : 'text-neutral-500'}`} />
                <div className="font-semibold text-neutral-900 mb-1">Système indépendant / dédié</div>
                <div className="text-xs text-neutral-600">Ballon électrique, chauffe-eau gaz séparé, etc.</div>
              </button>
            </div>

            {!formData.ecsSameSystem && (
              <div className="fade-in">
                <NewDiagnosticFormSelect
                  label="Précisez le système dédié"
                  value={formData.ecsSystem}
                  onChange={(v) => setFormData({ ...formData, ecsSystem: v })}
                  options={[
                    { id: 'electric_boiler', label: 'Chauffe-eau électrique (standard)' },
                    { id: 'gas_boiler', label: 'Chauffe-eau gaz indépendant' },
                    { id: 'heat_pump', label: 'PAC thermodynamique' },
                    { id: 'solar', label: 'Solaire thermique' },
                    { id: 'network_dedicated', label: 'Réseau de chaleur (échangeur dédié)' }
                  ]}
                  required
                  error={errors.ecsSystem}
                  placeholder="Sélectionnez..."
                />
              </div>
            )}
          </div>

          <div className="mb-6">
            <label className="block text-sm font-medium text-neutral-700 mb-2">
              Intensité d'usage
            </label>
            <NewDiagnosticFormSelect
              value={formData.usageIntensity}
              onChange={(v) => setFormData({ ...formData, usageIntensity: v })}
              options={[
                { id: 'low', label: 'Faible (ex: peu occupé, horaires limités)' },
                { id: 'standard', label: 'Standard (horaires de bureau classiques)' },
                { id: 'high', label: 'Intense (horaires étendus, week-ends, fort taux d\'occupation)' }
              ]}
            />
          </div>

          <div className="flex justify-between mt-8">
            <button
              onClick={onBack}
              className="px-6 py-3 text-neutral-600 hover:text-neutral-900 font-semibold transition-colors"
            >
              Retour
            </button>
            <button
              onClick={handleNext}
              className="px-8 py-3 bg-[#1D4ED8] text-white font-semibold rounded-lg hover:bg-[#1E40AF] transition-colors shadow-sm"
            >
              Continuer
            </button>
          </div>
        </div>
      );
    };

    // Étape 3 : Énergies (suite dans le prochain fichier car limite de taille)

    /* ═══════════════════════════════════════════════════════════════════════════
       PHASE 2 : FORMULAIRE (PARTIE 2)
       
       Étape 3 : Énergies
       Étape 4 : Travaux déjà réalisés
       ═══════════════════════════════════════════════════════════════════════════ */

    // Étape 3 : Énergies
    const NewDiagnosticStep3Energies = ({ formData, setFormData, onNext, onBack }) => {
      const [errors, setErrors] = useState([]);

      const validate = () => {
        const validationErrors = newDiagnosticValidateEnergyData(formData);

        // Filtrer seulement les erreurs bloquantes
        const blockingErrors = validationErrors.filter(e => typeof e === 'string');

        setErrors(validationErrors);
        return blockingErrors.length === 0;
      };

      const handleNext = () => {
        if (validate()) {
          newDiagnosticTrack('diagnostic_step3_completed', {
            elec_used: formData.elecUsed,
            gas_used: formData.gasUsed
          });
          onNext();
        }
      };

      const warnings = errors.filter(e => typeof e === 'object' && e.type === 'warning');
      const blockingErrors = errors.filter(e => typeof e === 'string');

      return (
        <div className="max-w-3xl mx-auto">
          <h2 className="text-2xl font-bold text-[#102A43] mb-2">Énergies</h2>
          <p className="text-[#475569] mb-8">
            Renseignez vos consommations annuelles (si vous les avez)
          </p>

          {/* Erreurs bloquantes */}
          {blockingErrors.length > 0 && (
            <div className="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg">
              <p className="text-sm font-semibold text-red-800 mb-2">Erreurs à corriger :</p>
              <ul className="list-disc list-inside text-sm text-red-700 space-y-1">
                {blockingErrors.map((err, i) => (
                  <li key={i}>{err}</li>
                ))}
              </ul>
            </div>
          )}

          {/* Warnings */}
          {warnings.length > 0 && (
            <div className="mb-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
              <p className="text-sm font-semibold text-yellow-800 mb-2">Avertissements :</p>
              <ul className="list-disc list-inside text-sm text-yellow-700 space-y-1">
                {warnings.map((warn, i) => (
                  <li key={i}>{warn.message}</li>
                ))}
              </ul>
            </div>
          )}

          {/* Électricité */}
          <div className="mb-8 p-6 bg-white border border-neutral-200 rounded-xl">
            <NewDiagnosticCheckbox
              label="J'utilise de l'électricité"
              checked={formData.elecUsed}
              onChange={(v) => setFormData({ ...formData, elecUsed: v })}
            />

            {formData.elecUsed && (
              <div className="mt-6 pl-8 border-l-4 border-[#1D4ED8] space-y-4">
                <div className="grid md:grid-cols-2 gap-4">
                  <NewDiagnosticFormInput
                    label="Consommation annuelle"
                    value={formData.elecKwh}
                    onChange={(v) => setFormData({ ...formData, elecKwh: v })}
                    type="number"
                    placeholder="120000"
                    suffix="kWh/an"
                    helper="Si vous avez cette info sur votre facture"
                  />

                  <NewDiagnosticFormInput
                    label="Montant annuel TTC"
                    value={formData.elecEuro}
                    onChange={(v) => setFormData({ ...formData, elecEuro: v })}
                    type="number"
                    placeholder="23280"
                    suffix="€/an"
                    helper="Total TTC sur l'année"
                  />
                </div>

                <NewDiagnosticCheckbox
                  label="Mon montant inclut l'abonnement"
                  checked={formData.elecIncludesSubscription}
                  onChange={(v) => setFormData({ ...formData, elecIncludesSubscription: v })}
                  helper="Si vous cochez cette case et renseignez l'abonnement, on l'enlèvera pour estimer la consommation"
                />

                {formData.elecIncludesSubscription && (
                  <NewDiagnosticFormInput
                    label="Abonnement annuel"
                    value={formData.elecSubscriptionYearly}
                    onChange={(v) => setFormData({ ...formData, elecSubscriptionYearly: v })}
                    type="number"
                    placeholder="150"
                    suffix="€/an"
                    helper="Montant de l'abonnement seul (hors consommation)"
                  />
                )}
              </div>
            )}
          </div>

          {/* Gaz */}
          <div className="mb-8 p-6 bg-white border border-neutral-200 rounded-xl">
            <NewDiagnosticCheckbox
              label="J'utilise du gaz"
              checked={formData.gasUsed}
              onChange={(v) => setFormData({ ...formData, gasUsed: v })}
            />

            {formData.gasUsed && (
              <div className="mt-6 pl-8 border-l-4 border-[#F59E0B] space-y-4">
                <div className="grid md:grid-cols-2 gap-4">
                  <NewDiagnosticFormInput
                    label="Consommation annuelle"
                    value={formData.gasKwh}
                    onChange={(v) => setFormData({ ...formData, gasKwh: v })}
                    type="number"
                    placeholder="80000"
                    suffix="kWh/an"
                    helper="Si vous avez cette info sur votre facture"
                  />

                  <NewDiagnosticFormInput
                    label="Montant annuel TTC"
                    value={formData.gasEuro}
                    onChange={(v) => setFormData({ ...formData, gasEuro: v })}
                    type="number"
                    placeholder="8000"
                    suffix="€/an"
                    helper="Total TTC sur l'année"
                  />
                </div>

                <NewDiagnosticCheckbox
                  label="Mon montant inclut l'abonnement"
                  checked={formData.gasIncludesSubscription}
                  onChange={(v) => setFormData({ ...formData, gasIncludesSubscription: v })}

          aid_tags: ['CEE'],
          source_level_gain: 'source_partial',
          source_ref_gain: 'ADEME - Isolation ballons',
          source_level_capex: 'hypothesis',
          source_ref_capex: 'Estimation jaquette isolante',
          source_level_roi: 'hypothesis'
        },

        {
          id: 'ACT12',
          name: 'Isolation toiture (si travaux prévus)',
          category: 'envelope',
          trigger_rules: ['heating_post > 35%', 'no_envelope_done', 'age_building > 15'],
          gain_scope: 'heating_post',
          gain_pct_low: 0.15,
          gain_pct_med: 0.22,
          gain_pct_high: 0.30,
          capex_low: 40,
          capex_med: 70,
          capex_high: 120,
          capex_unit: '€/m²',
          roi_method: 'simple_payback',
          aid_tags: ['CEE', 'MaPrimeRenov'],
          source_level_gain: 'source_strong',
          source_ref_gain: 'ADEME - Isolation toiture tertiaire',
          source_level_capex: 'source_partial',
          source_ref_capex: 'Prix marché isolation + MO',
          source_level_roi: 'hypothesis'
        }
      ]
    };

    /* ═══════════════════════════════════════════════════════════════════════════
       EXPORTS POUR INTÉGRATION
       ═══════════════════════════════════════════════════════════════════════════ */

    // Ces tables sont prêtes à être utilisées dans newDiagnosticBuildReportData()

    /* ═══════════════════════════════════════════════════════════════════════════
       PHASE 3 : MOTEUR DE CALCUL - PIPELINE COMPLET
       
       Pipeline :
       1. Normalisation inputs
       2. Conversion € → kWh (avec option B : déduction abonnement)
       3. Calcul intensité kWh/m²/an
       4. Benchmark vs activité (+ mix si applicable)
       5. Répartition postes (usage_breakdowns)
       6. Déclenchement actions (règles + exclusions)
       7. Calcul gains/économies/ROI (par poste si applicable)
       8. Tri actions (impact + faisabilité)
       9. Output payload standardisé avec unités partout
       
       ═══════════════════════════════════════════════════════════════════════════ */

    /* ─────────────────────────────────────────────────────────────────────────
       HELPERS : CONVERSION € → kWh (OPTION B)
       ───────────────────────────────────────────────────────────────────────── */

    const newDiagnosticConvertEuroToKwh = (energy, formData) => {
      const isElec = energy === 'elec';
      const priceDefault = isElec
        ? NEW_DIAGNOSTIC_ENERGY_PRICES.electricity.price_default_eur_kwh
        : NEW_DIAGNOSTIC_ENERGY_PRICES.gas.price_default_eur_kwh;

      const kwh = formData[`${energy}Kwh`];
      const euro = formData[`${energy}Euro`];
      const includesSubscription = formData[`${energy}IncludesSubscription`];
      const subscriptionYearly = formData[`${energy}SubscriptionYearly`];

      // Priorité 1 : kWh saisis
      if (kwh && parseFloat(kwh) > 0) {
        return {
          value: parseFloat(kwh),
          method: 'kwh_provided',
          price_used: null
        };
      }

      // Priorité 2 : Conversion depuis €
      if (euro && parseFloat(euro) > 0) {
        let montantEnergie = parseFloat(euro);

        // Option B : Déduction abonnement si renseigné
        if (includesSubscription && subscriptionYearly && parseFloat(subscriptionYearly) > 0) {
          montantEnergie = Math.max(montantEnergie - parseFloat(subscriptionYearly), 0);
        }

        const kwhEstimated = montantEnergie / priceDefault;

        return {
          value: Math.round(kwhEstimated),
          method: includesSubscription && subscriptionYearly
            ? 'euro_converted_subscription_deducted'
            : 'euro_converted_default_price',
          price_used: priceDefault
        };
      }

      return {
        value: 0,
        method: 'none',
        price_used: null
      };
    };

    /* ─────────────────────────────────────────────────────────────────────────
       HELPERS : BENCHMARK & MIX USAGE
       ───────────────────────────────────────────────────────────────────────── */

    const newDiagnosticGetBenchmark = (activity, formData) => {
      // Si usage mixte, pondération par les pourcentages du slider
      if (activity === 'mixed') {
        const u1 = (formData && formData.mixedUsage1) || 'offices';
        const u2 = (formData && formData.mixedUsage2) || 'retail';
        const p1 = (formData && formData.mixOfficesPct) / 100 || 0.5;
        const p2 = (formData && formData.mixRetailPct) / 100 || 0.5;
        const data1 = NEW_DIAGNOSTIC_BENCHMARKS_INTENSITY[u1] || NEW_DIAGNOSTIC_BENCHMARKS_INTENSITY.offices;
        const data2 = NEW_DIAGNOSTIC_BENCHMARKS_INTENSITY[u2] || NEW_DIAGNOSTIC_BENCHMARKS_INTENSITY.retail;

        return {
          median_kwh_m2_an: Math.round(data1.median_kwh_m2_an * p1 + data2.median_kwh_m2_an * p2),
          low_kwh_m2_an: Math.round(data1.low_kwh_m2_an * p1 + data2.low_kwh_m2_an * p2),
          high_kwh_m2_an: Math.round(data1.high_kwh_m2_an * p1 + data2.high_kwh_m2_an * p2),
          source_level: 'hypothesis',
          source_ref: `Pondération ${Math.round(p1 * 100)}/${Math.round(p2 * 100)} : ${u1} + ${u2}`,
          is_mixed: true
        };
      }

      // Activité simple
      const benchmark = NEW_DIAGNOSTIC_BENCHMARKS_INTENSITY[activity];
      if (!benchmark) {
        return {
          median_kwh_m2_an: 200,
          low_kwh_m2_an: 150,
          high_kwh_m2_an: 280,
          source_level: 'hypothesis',
          source_ref: 'Fallback générique',
          is_mixed: false
        };
      }

      return { ...benchmark, is_mixed: false };
    };

    const newDiagnosticGetUsageBreakdown = (activity, formData) => {
      // Si usage mixte, pondération par les pourcentages du slider
      if (activity === 'mixed') {
        const u1 = (formData && formData.mixedUsage1) || 'offices';
        const u2 = (formData && formData.mixedUsage2) || 'retail';
        const p1 = (formData && formData.mixOfficesPct) / 100 || 0.5;
        const p2 = (formData && formData.mixRetailPct) / 100 || 0.5;
        const data1 = NEW_DIAGNOSTIC_USAGE_BREAKDOWNS[u1] || NEW_DIAGNOSTIC_USAGE_BREAKDOWNS.offices;
        const data2 = NEW_DIAGNOSTIC_USAGE_BREAKDOWNS[u2] || NEW_DIAGNOSTIC_USAGE_BREAKDOWNS.retail;

        return {
          heating_pct: Math.round(data1.heating_pct * p1 + data2.heating_pct * p2),
          cooling_pct: Math.round(data1.cooling_pct * p1 + data2.cooling_pct * p2),
          vent_aux_pct: Math.round(data1.vent_aux_pct * p1 + data2.vent_aux_pct * p2),
          lighting_pct: Math.round(data1.lighting_pct * p1 + data2.lighting_pct * p2),
          dhw_pct: Math.round(data1.dhw_pct * p1 + data2.dhw_pct * p2),
          cooking_pct: Math.round(data1.cooking_pct * p1 + data2.cooking_pct * p2),
          other_specific_pct: Math.round(data1.other_specific_pct * p1 + data2.other_specific_pct * p2),
          source_level: 'hypothesis',
          source_ref: `Pondération ${Math.round(p1 * 100)}/${Math.round(p2 * 100)} : ${u1} + ${u2}`,
          breakdown_mode: 'coarse_statistical'
        };
      }

      // Activité simple
      const breakdown = NEW_DIAGNOSTIC_USAGE_BREAKDOWNS[activity];
      if (!breakdown) {
        return {
          heating_pct: 45,
          cooling_pct: 5,
          vent_aux_pct: 10,
          lighting_pct: 20,
          dhw_pct: 5,
          cooking_pct: 0,
          other_specific_pct: 15,
          source_level: 'hypothesis',
          source_ref: 'Fallback générique',
          breakdown_mode: 'coarse_statistical'
        };
      }

      return breakdown;
    };

    /* ─────────────────────────────────────────────────────────────────────────
       HELPERS : ACTIONS & GAINS
       ───────────────────────────────────────────────────────────────────────── */

    const newDiagnosticCalculateActionGain = (action, totalKwh, breakdown, avgPrice, surface) => {
      let baseKwh = totalKwh;

      // Si gain sur poste spécifique
      if (action.gain_scope !== 'total' && action.gain_scope.endsWith('_post')) {
        const postKey = action.gain_scope.replace('_post', '_pct');
        const postPct = breakdown[postKey] || 0;
        baseKwh = totalKwh * (postPct / 100);
      }

      // Calcul gain (médian)
      const gainKwh = Math.round(baseKwh * action.gain_pct_med);
      const gainEuro = Math.round(gainKwh * avgPrice);

      // CAPEX (médian)
      let capex = action.capex_med;

      // Si capex par m² ou par unité, estimer avec la surface réelle
      if (action.capex_unit === '€/m²') {
        const safeSurface = Math.max(1, Number(surface || 100));
        capex = action.capex_med * safeSurface;
      }

      // ROI
      const roi_years = gainEuro > 0 ? Math.round((capex / gainEuro) * 10) / 10 : null;

      return {
        gainKwh,
        gainEuro,
        capex,
        roi_years
      };
    };

    const newDiagnosticFilterAndScoreActions = (formData, totalKwh, breakdown, avgPrice) => {
      const worksDone = formData.worksDone || [];
      const surface = Math.max(1, Number(formData.surface || 100));

      // Filtrer actions déjà réalisées et inapplicables (Gate questions)
      let eligibleActions = NEW_DIAGNOSTIC_ACTIONS_LIBRARY.actions.filter(action => {
        // Exclusion travaux réalisés
        if (worksDone.includes('led') && action.category === 'lighting') return false;
        if (worksDone.includes('regulation') && (action.id === 'ACT01' || action.id === 'ACT02')) return false;
        if (worksDone.includes('hvac_new') && action.category === 'heating') return false;
        if (worksDone.includes('envelope') && action.category === 'envelope') return false;
        if (worksDone.includes('dhw') && action.category === 'dhw') return false;

        // Gate questions : exclusion logique
        if (!formData.hasCooling && action.category === 'cooling') return false;
        if (formData.mainHeating === 'electric' && action.id === 'ACT04') return false; // Pas de désembouage sur chauffage électrique direct

        return true;
      });

      // Calculer gains + score pour chaque action (SCORE V1)
      const scoredActions = eligibleActions.map(action => {
        const calc = newDiagnosticCalculateActionGain(action, totalKwh, breakdown, avgPrice, surface);

        // SCORE V1 : (annual_savings * feasibility) / CAPEX
        // feasibility : arbitraire léger pour V1 (1.0 = facile, 0.8 = moyen, 0.5 = lourd)
        let feasibility = 1.0;
        if (action.category === 'envelope') feasibility = 0.5; // Isolation = lourd
        if (action.category === 'heating' && action.capex_med > 5000) feasibility = 0.7; // Gros CVC = moyen-lourd
        if (action.category === 'lighting') feasibility = 1.2; // LED = très facile

        // Division par zéro protection
        const safeCapex = Math.max(1, calc.capex);

        let priorityScore = (calc.gainEuro * feasibility) / safeCapex;

        return {
          ...action,
          ...calc,
          priorityScore
        };
      });

      // Tri par priorité V1 décroissante
      scoredActions.sort((a, b) => b.priorityScore - a.priorityScore);

      // Ne garder qu'1 action par famille
      const families = {};
      const topActions = [];

      for (const action of scoredActions) {
        if (!families[action.category]) {
          families[action.category] = true;
          topActions.push(action);
          if (topActions.length >= 3) break;
        }
      }

      return topActions;
    };

    /* ─────────────────────────────────────────────────────────────────────────
       HELPERS : GAINS COMPOSÉS + CAP
       ───────────────────────────────────────────────────────────────────────── */

    const newDiagnosticCalculateCompositeSavings = (actions) => {
      // Gains composés : 1 - Π(1 - g_i)
      let composite = 1;

      for (const action of actions) {
        const gainPct = action.gainKwh > 0 ? action.gain_pct_med : 0;
        composite *= (1 - gainPct);
      }

      const totalGainPct = 1 - composite;

      // Cap max 65%
      return Math.min(totalGainPct, NEW_DIAGNOSTIC_MAX_TOTAL_SAVINGS_PCT);
    };

    /* ─────────────────────────────────────────────────────────────────────────
       WARNINGS STANDARDISÉS
       ───────────────────────────────────────────────────────────────────────── */

    const newDiagnosticGenerateWarnings = (formData, conversionResults) => {
      const warnings = [];

      // Warning prix implicite
      ['elec', 'gas'].forEach(energy => {
        const kwh = formData[`${energy}Kwh`];
        const euro = formData[`${energy}Euro`];

        if (kwh && euro) {
          const implicitPrice = parseFloat(euro) / parseFloat(kwh);
          const priceMin = energy === 'elec' ? 0.10 : 0.05;
          const priceMax = energy === 'elec' ? 0.35 : 0.20;

          if (implicitPrice < priceMin || implicitPrice > priceMax) {
            warnings.push({
              code: 'PRICE_IMPLIED_OUT_OF_RANGE',
              severity: 'warning',
              message: `${energy === 'elec' ? 'Électricité' : 'Gaz'} : prix implicite ${implicitPrice.toFixed(3)} €/kWh inhabituel`,
              energy
            });
          }
        }
      });

      // Warning abonnement
      ['elec', 'gas'].forEach(energy => {
        if (formData[`${energy}IncludesSubscription`] && !formData[`${energy}SubscriptionYearly`]) {
          warnings.push({
            code: 'SUBSCRIPTION_INCLUDED_NO_VALUE',
            severity: 'warning',
            message: `${energy === 'elec' ? 'Électricité' : 'Gaz'} : abonnement inclus mais montant non renseigné`,
            energy
          });
        }
      });

      // Warning mix usage (ne devrait pas arriver car validation formulaire)
      // (Supprimé car le mix est maintenant géré via mixedUsage1/mixedUsage2 en Step1)

      return warnings;
    };

    /* ─────────────────────────────────────────────────────────────────────────
       SCORE CONFIANCE
       ───────────────────────────────────────────────────────────────────────── */

    const newDiagnosticCalculateConfidenceScore = (formData, conversionResults) => {
      let score = 100;

      // Pénalité si conversion depuis €
      if (conversionResults.elec?.method?.includes('euro_converted')) score -= 15;
      if (conversionResults.gas?.method?.includes('euro_converted')) score -= 15;

      // Pénalité si aucune donnée énergie
      if (conversionResults.elec?.value === 0 && conversionResults.gas?.value === 0) score -= 50;

      // Bonus si kWh fournis
      if (conversionResults.elec?.method === 'kwh_provided') score += 5;
      if (conversionResults.gas?.method === 'kwh_provided') score += 5;

      // Pénalité si pending_expert sur activité
      const benchmark = newDiagnosticGetBenchmark(formData.activity, formData);
      if (benchmark.source_level === 'pending_expert') score -= 20;

      score = Math.max(0, Math.min(100, score));

      // Niveau
      let level = 'strong';
      if (score < 50) level = 'low';
      else if (score < 75) level = 'medium';

      return {
        score,
        level,
        label: level === 'strong' ? 'Fort' : level === 'medium' ? 'Moyen' : 'Faible'
      };
    };

    /* ─────────────────────────────────────────────────────────────────────────
       FONCTION PRINCIPALE : newDiagnosticBuildReportData()
       ───────────────────────────────────────────────────────────────────────── */

    const newDiagnosticBuildReportData = (formData) => {
      const reportId = `DIAG-${Date.now()}`;
      const generatedAt = new Date().toISOString();

      // ──────────────────────────────────────────────────────────────────────
      // 1. NORMALISATION INPUTS
      // ──────────────────────────────────────────────────────────────────────
      const surface = parseFloat(formData.surface) || 0;
      const activity = formData.activity || 'offices';

      // Garde-fou surface
      if (surface <= 0) {
        throw new Error('Surface invalide (doit être > 0)');
      }

      // ──────────────────────────────────────────────────────────────────────
      // 2. CONVERSION € → kWh
      // ──────────────────────────────────────────────────────────────────────
      const elecConversion = formData.elecUsed ? newDiagnosticConvertEuroToKwh('elec', formData) : { value: 0, method: 'not_used' };
      const gasConversion = formData.gasUsed ? newDiagnosticConvertEuroToKwh('gas', formData) : { value: 0, method: 'not_used' };

      const totalKwh = elecConversion.value + gasConversion.value;

      // Garde-fou NaN
      if (isNaN(totalKwh) || !isFinite(totalKwh)) {
        throw new Error('Calcul consommation invalide (NaN ou Infinity)');
      }

      // ──────────────────────────────────────────────────────────────────────
      // 3. INTENSITÉ kWh/m²/an
      // ──────────────────────────────────────────────────────────────────────
      const intensity_kwh_m2_an = surface > 0 ? Math.round(totalKwh / surface) : 0;

      // ──────────────────────────────────────────────────────────────────────
      // 4. BENCHMARK
      // ──────────────────────────────────────────────────────────────────────
      const benchmark = newDiagnosticGetBenchmark(activity, formData);

      let benchmarkPosition = 'in_range';
      if (intensity_kwh_m2_an < benchmark.low_kwh_m2_an) benchmarkPosition = 'below_range';
      else if (intensity_kwh_m2_an > benchmark.high_kwh_m2_an) benchmarkPosition = 'above_range';
      if (intensity_kwh_m2_an > benchmark.high_kwh_m2_an * 1.2) benchmarkPosition = 'far_above_range';

      // ──────────────────────────────────────────────────────────────────────
      // 5. RÉPARTITION POSTES
      // ──────────────────────────────────────────────────────────────────────
      const breakdown = newDiagnosticGetUsageBreakdown(activity, formData);

      const breakdownKwh = {
        heating: Math.round(totalKwh * breakdown.heating_pct / 100),
        cooling: Math.round(totalKwh * breakdown.cooling_pct / 100),
        vent_aux: Math.round(totalKwh * breakdown.vent_aux_pct / 100),
        lighting: Math.round(totalKwh * breakdown.lighting_pct / 100),
        dhw: Math.round(totalKwh * breakdown.dhw_pct / 100),
        cooking: Math.round(totalKwh * breakdown.cooking_pct / 100),
        other_specific: Math.round(totalKwh * breakdown.other_specific_pct / 100)
      };

      // ──────────────────────────────────────────────────────────────────────
      // 6-8. ACTIONS + GAINS + TRI
      // ──────────────────────────────────────────────────────────────────────

      // Calcul du prix moyen pondéré (avgPrice)
      let calculatedAvgPrice = 0.20; // Prix moyen par défaut (mix)
      const elecPrice = NEW_DIAGNOSTIC_ENERGY_PRICES.electricity.price_default_eur_kwh;
      const gasPrice = NEW_DIAGNOSTIC_ENERGY_PRICES.gas.price_default_eur_kwh;

      if (totalKwh > 0) {
        let totalEuro = 0;

        // Coût élec
        if (formData.elecUsed) {
          if (formData.elecEuro) totalEuro += Number(formData.elecEuro);
          else totalEuro += elecConversion.value * elecPrice;
        }

        // Coût gaz
        if (formData.gasUsed) {
          if (formData.gasEuro) totalEuro += Number(formData.gasEuro);
          else totalEuro += gasConversion.value * gasPrice;
        }

        calculatedAvgPrice = totalEuro / totalKwh;
      }

      // Sécurité : garder le prix entre 0.05 et 0.40 pour éviter les aberrations
      const avgPrice = Math.min(Math.max(calculatedAvgPrice, 0.05), 0.40);

      const topActions = newDiagnosticFilterAndScoreActions(formData, totalKwh, breakdown, avgPrice);

      const compositeSavingsPct = newDiagnosticCalculateCompositeSavings(topActions);
      const annualSavingsKwh = Math.round(totalKwh * compositeSavingsPct);
      const annualSavingsEuro = Math.round(annualSavingsKwh * avgPrice);

      // ──────────────────────────────────────────────────────────────────────
      // 9. PROJECTIONS
      // ──────────────────────────────────────────────────────────────────────
      // [V1] Simplification : Projection sur 3 ans (actionnable) au lieu de 5/10 ans
      const projection3y = {
        savings_euro: annualSavingsEuro * 3,
        unit: '€',
        period: '3 ans'
      };

      // ──────────────────────────────────────────────────────────────────────
      // WARNINGS & CONFIANCE
      // ──────────────────────────────────────────────────────────────────────
      const warnings = newDiagnosticGenerateWarnings(formData, { elec: elecConversion, gas: gasConversion });
      const confidence = newDiagnosticCalculateConfidenceScore(formData, { elec: elecConversion, gas: gasConversion });

      // ──────────────────────────────────────────────────────────────────────
      // PAYLOAD STANDARDISÉ AVEC UNITÉS PARTOUT
      // ──────────────────────────────────────────────────────────────────────
      return {
        report_id: reportId,
        version_tag: 'v1.0-2026',
        generated_at: generatedAt,

        // Inputs summary
        inputs_summary: {
          email: formData.email,
          address: formData.address,
          role: formData.role,
          site_name: formData.address ? formData.address.split(',')[0].trim() : 'Bâtiment tertiaire',
          postal_code: formData.postalCode,
          activity: activity,
          mixedUsage1: activity === 'mixed' ? formData.mixedUsage1 : null,
          mixedUsage2: activity === 'mixed' ? formData.mixedUsage2 : null,
          surface: { value: surface, unit: 'm²' },
          levels: { value: parseInt(formData.levels) || 1, unit: 'niveaux' },
          works_done: formData.worksDone || [],
          phone: formData.phone || null,
          ecsSameSystem: formData.ecsSameSystem,
          ecsSystem: formData.ecsSystem || null
        },

        // Calculation results
        calculation_results: {
          elec_kwh_an: { value: elecConversion.value, unit: 'kWh/an', method: elecConversion.method },
          gas_kwh_an: { value: gasConversion.value, unit: 'kWh/an', method: gasConversion.method },
          total_kwh_an: { value: totalKwh, unit: 'kWh/an' },
          intensity_kwh_m2_an: { value: intensity_kwh_m2_an, unit: 'kWh/m²/an' },
          total_cost_euro_an: { value: Math.round(totalKwh * avgPrice), unit: '€/an', price_avg: avgPrice }
        },

        // Benchmark
        benchmark_result: {
          position: benchmarkPosition,
          site_intensity: { value: intensity_kwh_m2_an, unit: 'kWh/m²/an' },
          benchmark_median: { value: benchmark.median_kwh_m2_an, unit: 'kWh/m²/an' },
          benchmark_low: { value: benchmark.low_kwh_m2_an, unit: 'kWh/m²/an' },
          benchmark_high: { value: benchmark.high_kwh_m2_an, unit: 'kWh/m²/an' },
          source_level: benchmark.source_level,
          source_ref: benchmark.source_ref
        },

        // Usage breakdown
        usage_breakdown: {
          breakdown_pct: breakdown,
          breakdown_kwh: breakdownKwh,
          source_level: breakdown.source_level,
          source_ref: breakdown.source_ref,
          breakdown_mode: breakdown.breakdown_mode
        },

        // Top actions
        top_actions: topActions.map(a => ({
          id: a.id,
          name: a.name,
          category: a.category,
          gain_kwh_an: { value: a.gainKwh, unit: 'kWh/an' },
          gain_euro_an: { value: a.gainEuro, unit: '€/an' },
          capex: { value: a.capex, unit: '€' },
          roi_years: { value: a.roi_years, unit: 'ans' },
          source_level_gain: a.source_level_gain,
          source_level_capex: a.source_level_capex,
          aid_tags: a.aid_tags
        })),

        // Projections
        projection_3y: projection3y,

        // Composite savings
        composite_savings: {
          total_pct: { value: Math.round(compositeSavingsPct * 100), unit: '%' },
          annual_kwh: { value: annualSavingsKwh, unit: 'kWh/an' },
          annual_euro: { value: annualSavingsEuro, unit: '€/an' }
        },

        // Metadata
        confidence: confidence,
        warnings: warnings,

        // Hypothèses & limites
        assumptions: [
          'Pré-diagnostic, non substituable à un audit énergétique réglementaire',
          'Benchmarks issus de données publiques statistiques',
          'Répartition par postes indicative (non mesurée sur site)',
          `Conversion € → kWh basée sur prix simplifiés (élec ${NEW_DIAGNOSTIC_ENERGY_PRICES.electricity.price_default_eur_kwh} €/kWh, gaz ${NEW_DIAGNOSTIC_ENERGY_PRICES.gas.price_default_eur_kwh} €/kWh)`,
          'Gains et ROI indicatifs à confirmer avant travaux',
          'Aides indicatives à vérifier selon éligibilité réelle'
        ],

        limits: [
          'Résultats dépendants de la qualité des données saisies',
          'Hypothèses sur usages et horaires non vérifiées',

      const ACTION_COST = annualSavingsEuro * 3; // Hypothèse CAPEX = 3 ans d'économies

      for (let year = 0; year <= 10; year++) {
        const inaction = cumulativeInaction;
        const action = cumulativeAction;
        const savings = cumulativeInaction - cumulativeAction;

        data.push({
          year: `Année ${year}`,
          inaction: Math.round(inaction),
          action: Math.round(action),
          savings: Math.round(savings)
        });

        cumulativeInaction += totalCostEuroAn * Math.pow(1.03, year);
        cumulativeAction += (totalCostEuroAn - annualSavingsEuro) * Math.pow(1.03, year);
      }

      return (

    const NewDiagnosticPositioningGauge = ({ intensity, low, median, high, targetIntensity }) => {

      const min = low * 0.5;
      const max = high * 1.5;
      const getPos = (val) => Math.min(100, Math.max(0, ((val - min) / (max - min)) * 100));

      const posCurrent = getPos(intensity);
      const posTarget = getPos(targetIntensity);

      const labels = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];

      return (
