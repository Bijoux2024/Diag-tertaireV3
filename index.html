<body class="antialiased text-[#374151] bg-[#F8F9FA]">
    <div id="root"></div>

    <script type="text/babel">
        /* ╔═══════════════════════════════════════════════════════════════════════════╗
           ║                           DIAGTERTIAIRE                                   ║
           ║                   Pré-diagnostic énergétique tertiaire                    ║
           ║                                                                           ║
           ║  NAVIGATION RAPIDE :                                                      ║
           ║  → SECTION 1  : Imports & Setup React                   (lignes 53-56)  ║
           ║  → SECTION 2  : Constantes Métier                       (lignes 60-145) ║
           ║  → SECTION 3  : Configuration & Helpers                 (lignes 150-378)║
           ║  → SECTION 4  : Composants UI Réutilisables            (lignes 165-378)║
           ║  → SECTION 5  : Formulaire Multi-Étapes                (lignes 379-1925)║
           ║  → SECTION 6  : Moteur de Calcul & Export PDF          (lignes 1928+)  ║
           ║  → SECTION 7  : Pages (Home, Méthode, Exemple, Pro)    (lignes 2920+)  ║
           ║  → SECTION 8  : App Root & Navigation                  (lignes 3959+)  ║
           ╚═══════════════════════════════════════════════════════════════════════════╝ */

        /* ═══════════════════════════════════════════════════════════════════════════
           SECTION 1: IMPORTS & SETUP REACT
           
           Imports des hooks React et de Recharts pour les graphiques
           ═══════════════════════════════════════════════════════════════════════════ */
        /* Hooks React utilisés dans ce fichier :
           - useState   : gestion de l'état local des composants
           - useEffect  : effets de bord (fetch, timers, abonnements)
           - useCallback: mémoïsation de fonctions pour éviter les re-renders
           - useRef     : références DOM (focus, canvas, mesures) */
        const { useState, useEffect, useCallback, useRef } = React;
        const RechartsObj = window.Recharts || {};

        /* Composant icône léger wrap de <iconify-icon> (web component).
           Évite de réécrire React.createElement partout. */
        const Icon = ({ icon, style, className, width, height }) => (
            React.createElement('iconify-icon', { icon, style, class: className, width, height })
        );









        /* ═══════════════════════════════════════════════════════════════════════════
           SECTION 3: CONFIGURATION & HELPERS
           ═══════════════════════════════════════════════════════════════════════════ */

        let publicRuntimeConfig = null;
        let publicRuntimeConfigPromise = null;

        const loadPublicRuntimeConfig = async () => {
            if (publicRuntimeConfig) return publicRuntimeConfig;
            if (publicRuntimeConfigPromise) return publicRuntimeConfigPromise;

            publicRuntimeConfigPromise = fetch('/api/public-config', {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' }
            })
                .then(async (response) => {
                    if (!response.ok) {
                        throw new Error(`Impossible de charger /api/public-config (${response.status})`);
                    }
                    const data = await response.json();
                    publicRuntimeConfig = {
                        supabaseUrl: data.supabaseUrl || '',
                        supabasePublishableKey: data.supabasePublishableKey || ''
                    };
                    return publicRuntimeConfig;
                })
                .catch((err) => {
                    console.error('Erreur chargement config publique :', err);
                    publicRuntimeConfig = {
                        supabaseUrl: '',
                        supabasePublishableKey: ''
                    };
                    return publicRuntimeConfig;
                });

            return publicRuntimeConfigPromise;
        };

        const newDiagnosticBuildLeadMessage = (...parts) => {
            const filteredParts = parts
                .flat()
                .map(part => typeof part === 'string' ? part.trim() : part)
                .filter(Boolean);

            return filteredParts.length ? filteredParts.join(' | ') : null;
        };

        const newDiagnosticBuildProLeadPayload = (contactForm) => ({
            source: 'landing_pro',
            name: contactForm.name || null,
            email: contactForm.email || null,
            company: contactForm.company || null,
            phone: null,
            message: contactForm.message || null,
            report_id: null,
            raw_payload: {
                form: 'landing_pro',
                name: contactForm.name || null,
                email: contactForm.email || null,
                company: contactForm.company || null,
                message: contactForm.message || null
            }
        });

        const newDiagnosticBuildDiagnosticLeadPayload = (formData, reportPayload) => {
            const inputsSummary = reportPayload && reportPayload.inputs_summary ? reportPayload.inputs_summary : {};
            const siteName = inputsSummary.site_name
                || formData.siteName
                || (formData.address ? formData.address.split(',')[0].trim() : '')
                || null;
            const surfaceValue = inputsSummary.surface && typeof inputsSummary.surface === 'object'
                ? inputsSummary.surface.value
                : formData.surface;
            const companyName = formData.companyName || null;
            const activityValue = formData.activity || inputsSummary.activity || null;
            const activityLabel = newDiagnosticGetActivityLabel(activityValue, {
                mixedUsage1: formData.mixedUsage1 || inputsSummary.mixedUsage1 || null,
                mixedUsage2: formData.mixedUsage2 || inputsSummary.mixedUsage2 || null
            });
            const partnerConsent = !!formData.optInPartenaire;
            const privacyConsent = !!formData.optInPolitique;

            return {
                source: 'diagnostic_report',
                name: formData.firstName || null,
                prenom: formData.firstName || null,
                email: formData.email || null,
                company: companyName || siteName,
                societe: companyName,
                site_name: siteName,
                nomBatiment: siteName,
                phone: formData.phone || null,
                telephone: formData.phone || null,
                activite: activityValue,
                activiteLabel: activityLabel,
                surface: surfaceValue || null,
                codePostal: formData.postalCode || inputsSummary.postal_code || null,
                postalCode: formData.postalCode || inputsSummary.postal_code || null,
                primaryGoal: formData.primaryGoal || null,
                objectif: formData.primaryGoal || null,
                projectHorizon: formData.projectHorizon || null,
                horizon_decision: formData.projectHorizon || null,
                opt_in_politique: privacyConsent,
                opt_in_partenaire: partnerConsent,
                message: newDiagnosticBuildLeadMessage(
                    formData.address ? `Adresse: ${formData.address}` : null,
                    companyName ? `Societe: ${companyName}` : null,
                    formData.primaryGoal ? `Objectif: ${formData.primaryGoal}` : null,
                    formData.projectHorizon ? `Horizon: ${formData.projectHorizon}` : null,
                    privacyConsent ? 'Politique: oui' : 'Politique: non',
                    partnerConsent ? 'Mise en relation expert: oui' : 'Mise en relation expert: non'
                ),
                report_id: reportPayload && reportPayload.report_id ? reportPayload.report_id : null,
                partnerConsent: partnerConsent,
                trigger_type: 'form_partner_checkbox',
                raw_payload: {
                    form: 'diagnostic_report',
                    prenom: formData.firstName || null,
                    email: formData.email || null,
                    phone: formData.phone || null,
                    societe: companyName,
                    site_name: siteName,
                    address: formData.address || null,
                    postal_code: formData.postalCode || inputsSummary.postal_code || null,
                    activity: activityValue,

        const newDiagnosticGenerateSubmissionId = () => {
            const cryptoObject = typeof globalThis !== 'undefined' ? globalThis.crypto : null;

            if (cryptoObject && typeof cryptoObject.randomUUID === 'function') {
                return cryptoObject.randomUUID();
            }

            if (cryptoObject && typeof cryptoObject.getRandomValues === 'function') {
                const bytes = new Uint8Array(16);
                cryptoObject.getRandomValues(bytes);
                bytes[6] = (bytes[6] & 0x0f) | 0x40;
                bytes[8] = (bytes[8] & 0x3f) | 0x80;
                const hex = Array.from(bytes, (byte) => byte.toString(16).padStart(2, '0')).join('');
                return `${hex.slice(0, 8)}-${hex.slice(8, 12)}-${hex.slice(12, 16)}-${hex.slice(16, 20)}-${hex.slice(20)}`;
            }

            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (char) => {
                const randomValue = Math.random() * 16 | 0;
                const value = char === 'x' ? randomValue : (randomValue & 0x3) | 0x8;
                return value.toString(16);
            });

        const NEW_DIAGNOSTIC_ANTISPAM_STORAGE_PREFIX = 'diagtertiaire_antispam';
        const NEW_DIAGNOSTIC_ANTISPAM_HONEYPOT_STYLE = {
            position: 'absolute',
            left: '-9999px',
            width: '1px',
            height: '1px',
            overflow: 'hidden',
            opacity: 0,
            pointerEvents: 'none'
        };
        const NEW_DIAGNOSTIC_GENERIC_SUBMIT_ERROR = "Impossible d'envoyer votre demande pour le moment. Merci de réessayer dans quelques instants.";

        const newDiagnosticGetStorage = (type = 'session') => {
            if (typeof window === 'undefined') {
                return null;
            }

            try {
                return type === 'local' ? window.localStorage : window.sessionStorage;
            } catch (error) {
                return null;
            }
        };

        const newDiagnosticGetAntiSpamStorageKey = (kind, formKey) => `${NEW_DIAGNOSTIC_ANTISPAM_STORAGE_PREFIX}:${kind}:${formKey}`;

        const newDiagnosticReadStoredTimestamp = (kind, formKey, type = 'session') => {
            const storage = newDiagnosticGetStorage(type);
            if (!storage) {
                return null;
            }

            const rawValue = storage.getItem(newDiagnosticGetAntiSpamStorageKey(kind, formKey));
            const parsedValue = Number(rawValue);
            return Number.isFinite(parsedValue) && parsedValue > 0 ? parsedValue : null;
        };

        const newDiagnosticWriteStoredTimestamp = (kind, formKey, value, type = 'session') => {
            const storage = newDiagnosticGetStorage(type);
            if (!storage) {
                return;
            }

            const storageKey = newDiagnosticGetAntiSpamStorageKey(kind, formKey);

            if (value === null || typeof value === 'undefined') {
                storage.removeItem(storageKey);
                return;
            }

            storage.setItem(storageKey, String(value));
        };

        const newDiagnosticMarkFormRendered = (formKey) => {
            const now = Date.now();
            newDiagnosticWriteStoredTimestamp('rendered', formKey, now, 'session');
            return now;
        };

        const newDiagnosticEnsureFormRendered = (formKey) => (
            newDiagnosticReadStoredTimestamp('rendered', formKey, 'session') || newDiagnosticMarkFormRendered(formKey)
        );

        const newDiagnosticHasHoneypotValue = (value) => typeof value === 'string' && value.trim().length > 0;

        const newDiagnosticIsSubmissionTooFast = (formKey, minimumDelayMs) => {
            if (!minimumDelayMs) {
                return false;
            }

            const renderedAt = newDiagnosticEnsureFormRendered(formKey);
            return (Date.now() - renderedAt) < minimumDelayMs;
        };

        const newDiagnosticGetCooldownRemainingMs = (formKey, cooldownMs) => {
            if (!cooldownMs) {
                return 0;
            }

            const cooldownStartedAt = newDiagnosticReadStoredTimestamp('cooldown', formKey, 'local');
            if (!cooldownStartedAt) {
                return 0;
            }

            return Math.max(0, cooldownMs - (Date.now() - cooldownStartedAt));
        };

        const newDiagnosticSetFormCooldown = (formKey) => {
            newDiagnosticWriteStoredTimestamp('cooldown', formKey, Date.now(), 'local');
        };

        const newDiagnosticClearFormCooldown = (formKey) => {
            newDiagnosticWriteStoredTimestamp('cooldown', formKey, null, 'local');
        };

        const newDiagnosticBuildCooldownMessage = (remainingMs) => {
            const seconds = Math.max(1, Math.ceil(remainingMs / 1000));
            return `Merci de patienter ${seconds} seconde${seconds > 1 ? 's' : ''} avant de renvoyer votre demande.`;
        };

        // Point d'extension futur: brancher un CAPTCHA ici si la pression spam augmente.
        // Point d'extension futur: ajouter un rate limiting serveur et une validation API si les insertions sortent du front.
        const newDiagnosticRunAntiSpamChecks = ({
            formKey,
            honeypotValue,
            minimumDelayMs,
            cooldownMs,
            genericErrorMessage = NEW_DIAGNOSTIC_GENERIC_SUBMIT_ERROR,
            cooldownMessage
        }) => {
            if (newDiagnosticHasHoneypotValue(honeypotValue)) {
                return { ok: false, error: genericErrorMessage };
            }

            if (newDiagnosticIsSubmissionTooFast(formKey, minimumDelayMs)) {
                return { ok: false, error: genericErrorMessage };
            }

            const cooldownRemainingMs = newDiagnosticGetCooldownRemainingMs(formKey, cooldownMs);
            if (cooldownRemainingMs > 0) {
                return {
                    ok: false,
                    error: cooldownMessage || newDiagnosticBuildCooldownMessage(cooldownRemainingMs)
                };
            }

            return { ok: true, error: null };
        };

        const newDiagnosticInsertSupabaseRow = async (tableName, payload, preferHeader = 'return=minimal') => {
            const { supabaseUrl, supabasePublishableKey } = await loadPublicRuntimeConfig();

            if (!supabaseUrl || !supabasePublishableKey) {
                console.warn('Supabase non configure. Lead non sauvegarde :', payload);
                return {
                    ok: false,
                    status: 0,
                    data: null,
                    error: 'Configuration Supabase indisponible.'
                };
            }

            try {
                console.log('lead submit triggered', payload);
                const response = await fetch(`${supabaseUrl}/rest/v1/${tableName}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': supabasePublishableKey,
                        'Authorization': `Bearer ${supabasePublishableKey}`,
                        'Prefer': preferHeader
                    },
                    body: JSON.stringify(payload)
                });
                console.log('lead submit response', response.status);

                const responseText = await response.text().catch(() => '');
                let responseData = null;

                if (responseText) {
                    try {
                        const parsed = JSON.parse(responseText);
                        responseData = Array.isArray(parsed) ? (parsed[0] || null) : parsed;
                    } catch (parseError) {
                        responseData = null;
                    }
                }

                if (!response.ok) {
                    return {
                        ok: false,
                        status: response.status,
                        data: responseData,
                        error: `Erreur Supabase ${tableName}: ${response.status}${responseText ? ` ${responseText}` : ''}`
                    };
                }

                return {
                    ok: true,
                    status: response.status,
                    data: responseData,
                    error: null
                };

                    data: null,
                    error: err && err.message ? err.message : `Erreur reseau lors de la sauvegarde dans ${tableName}.`

            }
        };

            const total = parseFloat(officesPct || 0) + parseFloat(retailPct || 0);
            // Tolérance arrondi <= 0.5 puis normalisation
            return Math.abs(total - 100) <= 0.5;
        };

        const newDiagnosticNormalizeMixUsage = (officesPct, retailPct) => {
            const total = parseFloat(officesPct || 0) + parseFloat(retailPct || 0);
            if (total === 0) return { officesPct: 50, retailPct: 50 };
            return {
                officesPct: Math.round((officesPct / total) * 100 * 10) / 10,
                retailPct: Math.round((retailPct / total) * 100 * 10) / 10
            };

        const newDiagnosticValidateEnergyData = (formData) => {
            const errors = [];

            // Au moins une énergie doit être renseignée
            if (!formData.elecUsed && !formData.gasUsed) {
                errors.push('Au moins une énergie (électricité ou gaz) doit être renseignée');
                return errors;
            }

            // Si élec utilisée, au moins kWh ou €
            if (formData.elecUsed) {
                const hasElecData = formData.elecKwh || formData.elecEuro;
                if (!hasElecData) {
                    errors.push('Électricité : renseignez au moins les kWh ou le montant en €');
                }
            }

            // Si gaz utilisé, au moins kWh ou €
            if (formData.gasUsed) {
                const hasGasData = formData.gasKwh || formData.gasEuro;
                if (!hasGasData) {
                    errors.push('Gaz : renseignez au moins les kWh ou le montant en €');
                }
            }

            // Validation cohérence prix implicite (warning, non bloquant)
            if (formData.elecKwh && formData.elecEuro) {
                const implicitPrice = parseFloat(formData.elecEuro) / parseFloat(formData.elecKwh);
                if (implicitPrice < 0.10 || implicitPrice > 0.35) {
                    errors.push({
                        type: 'warning',
                        code: 'PRICE_IMPLIED_OUT_OF_RANGE',
                        message: 'Électricité : le prix implicite semble inhabituel (vérifiez vos données)'
                    });
                }
            }

            if (formData.gasKwh && formData.gasEuro) {
                const implicitPrice = parseFloat(formData.gasEuro) / parseFloat(formData.gasKwh);
                if (implicitPrice < 0.05 || implicitPrice > 0.20) {
                    errors.push({
                        type: 'warning',
                        code: 'PRICE_IMPLIED_OUT_OF_RANGE',
                        message: 'Gaz : le prix implicite semble inhabituel (vérifiez vos données)'
                    });
                }
            }

                    type: 'warning',
                    code: 'SUBSCRIPTION_INCLUDED_NO_VALUE',
                    message: 'Électricité : abonnement coché mais montant non renseigné (estimation moins précise)'
                });
            }

            if (formData.gasIncludesSubscription && !formData.gasSubscriptionYearly) {
                errors.push({
                    type: 'warning',
                    code: 'SUBSCRIPTION_INCLUDED_NO_VALUE',
                    message: 'Gaz : abonnement coché mais montant non renseigné (estimation moins précise)'
                });
            }

            return errors;
        };

        const publicTunnelValidateEnergyData = (formData) => {
            const errors = [];
            const selectedEnergies = publicTunnelGetSelectedEnergyConfigs(formData);

            if (!selectedEnergies.length) {
                errors.push('Selectionnez au moins une energie.');
                return errors;
            }

            if (!formData.noInvoicesMode) {
                selectedEnergies.forEach((config) => {
                    const hasKwh = Boolean(formData[`${config.fieldPrefix}Kwh`]);
                    const hasEuro = Boolean(formData[`${config.fieldPrefix}Euro`]);

                    if (!hasKwh && !hasEuro) {
                        errors.push(`${config.label} : renseignez au moins les kWh ou le montant en EUR.`);
                    }
                });
            }

            selectedEnergies.forEach((config) => {
                const kwhValue = parseFloat(formData[`${config.fieldPrefix}Kwh`] || 0);
                const euroValue = parseFloat(formData[`${config.fieldPrefix}Euro`] || 0);

                if (kwhValue > 0 && euroValue > 0) {
                    const implicitPrice = euroValue / kwhValue;
                    const minPrice = config.defaultPriceEurKwh * 0.55;
                    const maxPrice = config.defaultPriceEurKwh * 1.8;

                    if (implicitPrice < minPrice || implicitPrice > maxPrice) {
                        errors.push({
                            type: 'warning',
                            code: 'PRICE_IMPLIED_OUT_OF_RANGE',
                            message: `${config.label} : le prix implicite semble inhabituel (verifiez vos donnees).`,

                if (!formData.activity && isCommerce) {

                    gain_pct_med: 0.15,
                    gain_pct_high: 0.25,
                    capex_low: 500,
                    capex_med: 1500,
                    capex_high: 3000,
                    capex_unit: '€',
                    roi_method: 'simple_payback',
                    aid_tags: ['CEE'],
                    source_level_gain: 'source_partial',
                    source_ref_gain: 'ADEME - Calorifugeage ECS',
                    source_level_capex: 'source_partial',
                    source_ref_capex: 'Prix isolants + MO',
                    source_level_roi: 'hypothesis'
                },

                {
                    id: 'ACT11',
                    name: 'Isolation ballon ECS',
                    category: 'dhw',
                    trigger_rules: ['dhw_post > 8%', 'no_dhw_done'],
                    gain_scope: 'dhw_post',
                    gain_pct_low: 0.08,
                    gain_pct_med: 0.12,
                    gain_pct_high: 0.20,
                    capex_low: 200,
                    capex_med: 500,
                    capex_high: 1000,
                    capex_unit: '€',
                    roi_method: 'simple_payback',
                    aid_tags: ['CEE'],
                    source_level_gain: 'source_partial',
                    source_ref_gain: 'ADEME - Isolation ballons',
                    source_level_capex: 'hypothesis',
                    source_ref_capex: 'Estimation jaquette isolante',
                    source_level_roi: 'hypothesis'
                },

                {
                    id: 'ACT12',
                    name: 'Isolation toiture (si travaux prévus)',
                    category: 'envelope',
                    trigger_rules: ['heating_post > 35%', 'no_envelope_done', 'age_building > 15'],
                    gain_scope: 'heating_post',
                    gain_pct_low: 0.15,
                    gain_pct_med: 0.22,
                    gain_pct_high: 0.30,
                    capex_low: 40,
                    capex_med: 70,
                    capex_high: 120,
                    capex_unit: '€/m²',
                    roi_method: 'simple_payback',
                    aid_tags: ['CEE', 'MaPrimeRenov'],
                    source_level_gain: 'source_strong',
                    source_ref_gain: 'ADEME - Isolation toiture tertiaire',
                    source_level_capex: 'source_partial',
                    source_ref_capex: 'Prix marché isolation + MO',
                    source_level_roi: 'hypothesis'
                }
            ]
        };

        /* ═══════════════════════════════════════════════════════════════════════════
           EXPORTS POUR INTÉGRATION
           ═══════════════════════════════════════════════════════════════════════════ */

        // Ces tables sont prêtes à être utilisées dans newDiagnosticBuildReportData()

        /* ═══════════════════════════════════════════════════════════════════════════
           PHASE 3 : MOTEUR DE CALCUL - PIPELINE COMPLET
           
           Pipeline :
           1. Normalisation inputs
           2. Conversion € → kWh (avec option B : déduction abonnement)
           3. Calcul intensité kWh/m²/an
           4. Benchmark vs activité (+ mix si applicable)
           5. Répartition postes (usage_breakdowns)
           6. Déclenchement actions (règles + exclusions)
           7. Calcul gains/économies/ROI (par poste si applicable)
           8. Tri actions (impact + faisabilité)
           9. Output payload standardisé avec unités partout
           
           ═══════════════════════════════════════════════════════════════════════════ */

        /* ─────────────────────────────────────────────────────────────────────────
           HELPERS : CONVERSION € → kWh (OPTION B)
           ───────────────────────────────────────────────────────────────────────── */

        const newDiagnosticConvertEuroToKwh = (energy, formData) => {
            return publicTunnelConvertEnergyToKwh(energy, formData);
            const isElec = energy === 'elec';
            const priceDefault = isElec
                ? NEW_DIAGNOSTIC_ENERGY_PRICES.electricity.price_default_eur_kwh
                : NEW_DIAGNOSTIC_ENERGY_PRICES.gas.price_default_eur_kwh;

            const kwh = formData[`${energy}Kwh`];
            const euro = formData[`${energy}Euro`];
            const includesSubscription = formData[`${energy}IncludesSubscription`];
            const subscriptionYearly = formData[`${energy}SubscriptionYearly`];

            // Priorité 1 : kWh saisis
            if (kwh && parseFloat(kwh) > 0) {
                return {
                    value: parseFloat(kwh),
                    method: 'kwh_provided',
                    price_used: null
                };
            }

            // Priorité 2 : Conversion depuis €
            if (euro && parseFloat(euro) > 0) {
                let montantEnergie = parseFloat(euro);

                // Option B : Déduction abonnement si renseigné
                if (includesSubscription && subscriptionYearly && parseFloat(subscriptionYearly) > 0) {
                    montantEnergie = Math.max(montantEnergie - parseFloat(subscriptionYearly), 0);
                }

                const kwhEstimated = montantEnergie / priceDefault;

                return {
                    value: Math.round(kwhEstimated),
                    method: includesSubscription && subscriptionYearly
                        ? 'euro_converted_subscription_deducted'
                        : 'euro_converted_default_price',
                    price_used: priceDefault
                };
            }

            return {
                value: 0,
                method: 'none',
                price_used: null
            };
        };

        /* ─────────────────────────────────────────────────────────────────────────
           HELPERS : BENCHMARK & MIX USAGE
           ───────────────────────────────────────────────────────────────────────── */

        const newDiagnosticGetBenchmark = (activity, formData) => {
            // Si usage mixte, pondération par les pourcentages du slider
            if (activity === 'mixed') {
                const u1 = (formData && formData.mixedUsage1) || 'offices';
                const u2 = (formData && formData.mixedUsage2) || 'retail';
                const p1 = (formData && formData.mixOfficesPct) / 100 || 0.5;
                const p2 = (formData && formData.mixRetailPct) / 100 || 0.5;
                const data1 = NEW_DIAGNOSTIC_BENCHMARKS_INTENSITY[u1] || NEW_DIAGNOSTIC_BENCHMARKS_INTENSITY.offices;
                const data2 = NEW_DIAGNOSTIC_BENCHMARKS_INTENSITY[u2] || NEW_DIAGNOSTIC_BENCHMARKS_INTENSITY.retail;

                return {
                    median_kwh_m2_an: Math.round(data1.median_kwh_m2_an * p1 + data2.median_kwh_m2_an * p2),
                    low_kwh_m2_an: Math.round(data1.low_kwh_m2_an * p1 + data2.low_kwh_m2_an * p2),
                    high_kwh_m2_an: Math.round(data1.high_kwh_m2_an * p1 + data2.high_kwh_m2_an * p2),
                    source_level: 'hypothesis',
                    source_ref: `Pondération ${Math.round(p1 * 100)}/${Math.round(p2 * 100)} : ${u1} + ${u2}`,
                    is_mixed: true
                };
            }

            // Activité simple
            const benchmark = NEW_DIAGNOSTIC_BENCHMARKS_INTENSITY[activity];
            if (!benchmark) {
                return {
                    median_kwh_m2_an: 200,
                    low_kwh_m2_an: 150,
                    high_kwh_m2_an: 280,
                    source_level: 'hypothesis',
                    source_ref: 'Fallback générique',
                    is_mixed: false
                };
            }

            return { ...benchmark, is_mixed: false };
        };

        const newDiagnosticGetUsageBreakdown = (activity, formData) => {
            // Si usage mixte, pondération par les pourcentages du slider
            if (activity === 'mixed') {
                const u1 = (formData && formData.mixedUsage1) || 'offices';
                const u2 = (formData && formData.mixedUsage2) || 'retail';
                const p1 = (formData && formData.mixOfficesPct) / 100 || 0.5;
                const p2 = (formData && formData.mixRetailPct) / 100 || 0.5;
                const data1 = NEW_DIAGNOSTIC_USAGE_BREAKDOWNS[u1] || NEW_DIAGNOSTIC_USAGE_BREAKDOWNS.offices;
                const data2 = NEW_DIAGNOSTIC_USAGE_BREAKDOWNS[u2] || NEW_DIAGNOSTIC_USAGE_BREAKDOWNS.retail;

                return {
                    heating_pct: Math.round(data1.heating_pct * p1 + data2.heating_pct * p2),
                    cooling_pct: Math.round(data1.cooling_pct * p1 + data2.cooling_pct * p2),
                    vent_aux_pct: Math.round(data1.vent_aux_pct * p1 + data2.vent_aux_pct * p2),
                    lighting_pct: Math.round(data1.lighting_pct * p1 + data2.lighting_pct * p2),
                    dhw_pct: Math.round(data1.dhw_pct * p1 + data2.dhw_pct * p2),
                    cooking_pct: Math.round(data1.cooking_pct * p1 + data2.cooking_pct * p2),
                    other_specific_pct: Math.round(data1.other_specific_pct * p1 + data2.other_specific_pct * p2),
                    source_level: 'hypothesis',
                    source_ref: `Pondération ${Math.round(p1 * 100)}/${Math.round(p2 * 100)} : ${u1} + ${u2}`,
                    breakdown_mode: 'coarse_statistical'
                };
            }

            // Activité simple
            const breakdown = NEW_DIAGNOSTIC_USAGE_BREAKDOWNS[activity];
            if (!breakdown) {
                return {
                    heating_pct: 45,
                    cooling_pct: 5,
                    vent_aux_pct: 10,
                    lighting_pct: 20,
                    dhw_pct: 5,
                    cooking_pct: 0,
                    other_specific_pct: 15,
                    source_level: 'hypothesis',
                    source_ref: 'Fallback générique',
                    breakdown_mode: 'coarse_statistical'
                };
            }

            return breakdown;
        };

        /* ─────────────────────────────────────────────────────────────────────────
           HELPERS : ACTIONS & GAINS
           ───────────────────────────────────────────────────────────────────────── */

        const newDiagnosticCalculateActionGain = (action, totalKwh, breakdown, avgPrice, surface) => {
            let baseKwh = totalKwh;

            // Si gain sur poste spécifique
            if (action.gain_scope !== 'total' && action.gain_scope.endsWith('_post')) {
                const postKey = action.gain_scope.replace('_post', '_pct');
                const postPct = breakdown[postKey] || 0;
                baseKwh = totalKwh * (postPct / 100);
            }

            // Calcul gain (médian)
            const gainKwh = Math.round(baseKwh * action.gain_pct_med);
            const gainEuro = Math.round(gainKwh * avgPrice);

            // CAPEX (médian)
            let capex = action.capex_med;

            // Si capex par m² ou par unité, estimer avec la surface réelle
            if (action.capex_unit === '€/m²') {
                const safeSurface = Math.max(1, Number(surface || 100));
                capex = action.capex_med * safeSurface;
            } else if (action.capex_unit === '€/radiateur') {
                const estimatedRadiators = Math.max(6, Math.round(Number(surface || 100) / 15));
                capex = action.capex_med * estimatedRadiators;
            }

            // ROI
            const roi_years = gainEuro > 0 ? Math.round((capex / gainEuro) * 10) / 10 : null;

            return {
                gainKwh,
                gainEuro,
                capex,
                roi_years,
                gain_pct_total: totalKwh > 0 ? gainKwh / totalKwh : 0
            };
        };

        const newDiagnosticFilterAndScoreActions = (formData, totalKwh, breakdown, avgPrice) => {
            const worksDone = formData.worksDone || [];
            const surface = Math.max(1, Number(formData.surface || 100));

            // Filtrer actions déjà réalisées et inapplicables (Gate questions)
            let eligibleActions = NEW_DIAGNOSTIC_ACTIONS_LIBRARY.actions.filter(action => {
                // Exclusion travaux réalisés
                if (worksDone.includes('led') && action.category === 'lighting') return false;
                if (worksDone.includes('regulation') && (action.id === 'ACT01' || action.id === 'ACT02')) return false;
                if (worksDone.includes('hvac_new') && action.category === 'heating') return false;
                if (worksDone.includes('envelope') && action.category === 'envelope') return false;
                if (worksDone.includes('dhw') && action.category === 'dhw') return false;

                // Gate questions : exclusion logique
                if (!formData.hasCooling && action.category === 'cooling') return false;
                if (formData.mainHeating === 'electric' && action.id === 'ACT04') return false; // Pas de désembouage sur chauffage électrique direct

                return true;
            });

            // Calculer gains + score pour chaque action (SCORE V1)
            const scoredActions = eligibleActions.map(action => {
                const calc = newDiagnosticCalculateActionGain(action, totalKwh, breakdown, avgPrice, surface);

                // SCORE V1 : (annual_savings * feasibility) / CAPEX
                // feasibility : arbitraire léger pour V1 (1.0 = facile, 0.8 = moyen, 0.5 = lourd)
                let feasibility = 1.0;
                if (action.category === 'envelope') feasibility = 0.5; // Isolation = lourd
                if (action.category === 'heating' && action.capex_med > 5000) feasibility = 0.7; // Gros CVC = moyen-lourd
                if (action.category === 'lighting') feasibility = 1.2; // LED = très facile

                // Division par zéro protection
                const safeCapex = Math.max(1, calc.capex);

                let priorityScore = (calc.gainEuro * feasibility) / safeCapex;

                return {
                    ...action,
                    ...calc,
                    priorityScore
                };
            });

            // Tri par priorité V1 décroissante
            scoredActions.sort((a, b) => b.priorityScore - a.priorityScore);

            // Ne garder qu'1 action par famille
            const families = {};
            const topActions = [];

            for (const action of scoredActions) {
                if (!families[action.category]) {
                    families[action.category] = true;
                    topActions.push(action);
                    if (topActions.length >= 3) break;
                }
            }

            return topActions;
        };

        /* ─────────────────────────────────────────────────────────────────────────
           HELPERS : GAINS COMPOSÉS + CAP
           ───────────────────────────────────────────────────────────────────────── */

        const newDiagnosticCalculateCompositeSavings = (actions) => {
            // Gains composés : 1 - Π(1 - g_i)
            let composite = 1;

            for (const action of actions) {
                const gainPct = Math.max(0, Math.min(0.65, Number(
                    action && typeof action.gain_pct_total === 'number'
                        ? action.gain_pct_total
                        : (action && action.gainKwh && action.totalKwh ? action.gainKwh / action.totalKwh : 0)
                ) || 0));
                composite *= (1 - gainPct);
            }

            const totalGainPct = 1 - composite;

            // Cap max 65%
            return Math.min(totalGainPct, NEW_DIAGNOSTIC_MAX_TOTAL_SAVINGS_PCT);
        };

        /* ─────────────────────────────────────────────────────────────────────────
           WARNINGS STANDARDISÉS
           ───────────────────────────────────────────────────────────────────────── */

        const newDiagnosticGenerateWarnings = (formData, conversionResults) => {
            const genericWarnings = [];
            const selectedEnergies = publicTunnelGetSelectedEnergyConfigs(formData);

            selectedEnergies.forEach((config) => {
                const kwhValue = parseFloat(formData[`${config.fieldPrefix}Kwh`] || 0);
                const euroValue = parseFloat(formData[`${config.fieldPrefix}Euro`] || 0);

                if (kwhValue > 0 && euroValue > 0) {
                    const implicitPrice = euroValue / kwhValue;
                    const minPrice = config.defaultPriceEurKwh * 0.55;
                    const maxPrice = config.defaultPriceEurKwh * 1.8;

                    if (implicitPrice < minPrice || implicitPrice > maxPrice) {
                        genericWarnings.push({
                            code: 'PRICE_IMPLIED_OUT_OF_RANGE',
                            severity: 'warning',
                            message: `${config.label} : prix implicite ${implicitPrice.toFixed(3)} EUR/kWh inhabituel`,
                            energy: config.id
                        });
                    }
                }
            });

            if (formData.noInvoicesMode) {
                genericWarnings.push({
                    code: 'DEFAULT_ESTIMATION_MODE',
                    severity: 'warning',
                    message: 'Mode estimation actif : les consommations peuvent etre approximees a partir du profil du site.',
                    energy: null
                });
            }

            return genericWarnings;
            const warnings = [];

            // Warning prix implicite
            ['elec', 'gas'].forEach(energy => {
                const kwh = formData[`${energy}Kwh`];
                const euro = formData[`${energy}Euro`];

                if (kwh && euro) {
                    const implicitPrice = parseFloat(euro) / parseFloat(kwh);
                    const priceMin = energy === 'elec' ? 0.10 : 0.05;
                    const priceMax = energy === 'elec' ? 0.35 : 0.20;

                    if (implicitPrice < priceMin || implicitPrice > priceMax) {
                        warnings.push({
                            code: 'PRICE_IMPLIED_OUT_OF_RANGE',
                            severity: 'warning',
                            message: `${energy === 'elec' ? 'Électricité' : 'Gaz'} : prix implicite ${implicitPrice.toFixed(3)} €/kWh inhabituel`,
                            energy
                        });
                    }
                }
            });

            // Warning abonnement
            ['elec', 'gas'].forEach(energy => {
                if (formData[`${energy}IncludesSubscription`] && !formData[`${energy}SubscriptionYearly`]) {
                    warnings.push({
                        code: 'SUBSCRIPTION_INCLUDED_NO_VALUE',
                        severity: 'warning',
                        message: `${energy === 'elec' ? 'Électricité' : 'Gaz'} : abonnement inclus mais montant non renseigné`,
                        energy
                    });
                }
            });

            // Warning mix usage (ne devrait pas arriver car validation formulaire)
            // (Supprimé car le mix est maintenant géré via mixedUsage1/mixedUsage2 en Step1)

            return warnings;
        };

        /* ─────────────────────────────────────────────────────────────────────────
           SCORE CONFIANCE
           ───────────────────────────────────────────────────────────────────────── */

        const newDiagnosticCalculateConfidenceScore = (formData, conversionResults) => {
            return publicTunnelCalculateConfidence(formData);
            let score = 100;

            // Pénalité si conversion depuis €
            if (conversionResults.elec?.method?.includes('euro_converted')) score -= 15;
            if (conversionResults.gas?.method?.includes('euro_converted')) score -= 15;

            // Pénalité si aucune donnée énergie
            if (conversionResults.elec?.value === 0 && conversionResults.gas?.value === 0) score -= 50;

            // Bonus si kWh fournis
            if (conversionResults.elec?.method === 'kwh_provided') score += 5;
            if (conversionResults.gas?.method === 'kwh_provided') score += 5;

            // Pénalité si pending_expert sur activité
            const benchmark = newDiagnosticGetBenchmark(formData.activity, formData);
            if (benchmark.source_level === 'pending_expert') score -= 20;

            score = Math.max(0, Math.min(100, score));

            // Niveau
            let level = 'strong';
            if (score < 50) level = 'low';
            else if (score < 75) level = 'medium';

            return {
                score,
                level,
                label: level === 'strong' ? 'Fort' : level === 'medium' ? 'Moyen' : 'Faible'
            };
        };

        /* ─────────────────────────────────────────────────────────────────────────
           FONCTION PRINCIPALE : newDiagnosticBuildReportData()
           ───────────────────────────────────────────────────────────────────────── */

        const newDiagnosticBuildReportData = (formData) => {
            const reportId = `DIAG-${Date.now()}`;
            const generatedAt = new Date().toISOString();

            // ──────────────────────────────────────────────────────────────────────
            // 1. NORMALISATION INPUTS
            // ──────────────────────────────────────────────────────────────────────
            const surface = parseFloat(formData.surface) || 0;
            const activity = formData.activity || 'offices';

            // Garde-fou surface
            if (surface <= 0) {
                throw new Error('Surface invalide (doit être > 0)');
            }

            // ──────────────────────────────────────────────────────────────────────
            // 2. CONVERSION € → kWh
            // ──────────────────────────────────────────────────────────────────────
            let elecConversion = formData.elecUsed ? publicTunnelConvertEnergyToKwh('elec', formData) : { value: 0, method: 'not_used', price_used: null };
            let gasConversion = formData.gasUsed ? publicTunnelConvertEnergyToKwh('gas', formData) : { value: 0, method: 'not_used', price_used: null };
            let heatNetworkConversion = formData.heatNetworkUsed ? publicTunnelConvertEnergyToKwh('heatNetwork', formData) : { value: 0, method: 'not_used', price_used: null };
            let fuelOilConversion = formData.fuelOilUsed ? publicTunnelConvertEnergyToKwh('fuelOil', formData) : { value: 0, method: 'not_used', price_used: null };
            let woodConversion = formData.woodUsed ? publicTunnelConvertEnergyToKwh('wood', formData) : { value: 0, method: 'not_used', price_used: null };

            let totalKwh = elecConversion.value + gasConversion.value + heatNetworkConversion.value + fuelOilConversion.value + woodConversion.value;

            if (formData.noInvoicesMode && totalKwh === 0) {
                const estimatedConversions = publicTunnelEstimateEnergyConversions(formData);
                if (estimatedConversions) {
                    elecConversion = estimatedConversions.elec || elecConversion;
                    gasConversion = estimatedConversions.gas || gasConversion;
                    heatNetworkConversion = estimatedConversions.heatNetwork || heatNetworkConversion;
                    fuelOilConversion = estimatedConversions.fuelOil || fuelOilConversion;
                    woodConversion = estimatedConversions.wood || woodConversion;
                    totalKwh = elecConversion.value + gasConversion.value + heatNetworkConversion.value + fuelOilConversion.value + woodConversion.value;
                }
            }

            // Garde-fou NaN
            if (isNaN(totalKwh) || !isFinite(totalKwh)) {
                throw new Error('Calcul consommation invalide (NaN ou Infinity)');
            }

            // ──────────────────────────────────────────────────────────────────────
            // 3. INTENSITÉ kWh/m²/an
            // ──────────────────────────────────────────────────────────────────────
            const intensity_kwh_m2_an = surface > 0 ? Math.round(totalKwh / surface) : 0;

            // ──────────────────────────────────────────────────────────────────────
            // 4. BENCHMARK
            // ──────────────────────────────────────────────────────────────────────
            const benchmark = newDiagnosticGetBenchmark(activity, formData);

            let benchmarkPosition = 'in_range';
            if (intensity_kwh_m2_an < benchmark.low_kwh_m2_an) benchmarkPosition = 'below_range';
            else if (intensity_kwh_m2_an > benchmark.high_kwh_m2_an) benchmarkPosition = 'above_range';
            if (intensity_kwh_m2_an > benchmark.high_kwh_m2_an * 1.2) benchmarkPosition = 'far_above_range';

            // ──────────────────────────────────────────────────────────────────────
            // 5. RÉPARTITION POSTES
            // ──────────────────────────────────────────────────────────────────────
            const breakdown = newDiagnosticGetUsageBreakdown(activity, formData);

            const breakdownKwh = {
                heating: Math.round(totalKwh * breakdown.heating_pct / 100),
                cooling: Math.round(totalKwh * breakdown.cooling_pct / 100),
                vent_aux: Math.round(totalKwh * breakdown.vent_aux_pct / 100),
                lighting: Math.round(totalKwh * breakdown.lighting_pct / 100),
                dhw: Math.round(totalKwh * breakdown.dhw_pct / 100),
                cooking: Math.round(totalKwh * breakdown.cooking_pct / 100),
                other_specific: Math.round(totalKwh * breakdown.other_specific_pct / 100)
            };

            // ──────────────────────────────────────────────────────────────────────
            // 6-8. ACTIONS + GAINS + TRI
            // ──────────────────────────────────────────────────────────────────────

            // Calcul du prix moyen pondéré (avgPrice) — T03: use energy-specific fallback if only kWh
            let calculatedAvgPrice = 0.20; // Prix moyen par défaut (mix)
            const elecPrice = NEW_DIAGNOSTIC_ENERGY_PRICES.electricity.price_default_eur_kwh;
            const gasPrice = NEW_DIAGNOSTIC_ENERGY_PRICES.gas.price_default_eur_kwh;
            const heatNetworkPrice = NEW_DIAGNOSTIC_ENERGY_PRICES.heat_network.price_default_eur_kwh;
            const fuelOilPrice = NEW_DIAGNOSTIC_ENERGY_PRICES.fuel_oil.price_default_eur_kwh;
            const woodPrice = NEW_DIAGNOSTIC_ENERGY_PRICES.wood_pellets.price_default_eur_kwh;
            const activityLabel = newDiagnosticGetActivityLabel(activity, {
                mixedUsage1: formData.mixedUsage1,
                mixedUsage2: formData.mixedUsage2
            });
            const cityLabel = newDiagnosticExtractCityFromAddress(formData.address);
            const siteName = formData.siteName || (formData.address ? formData.address.split(',')[0].trim() : 'Bâtiment diagnostiqué');

            if (totalKwh > 0) {
                let totalEuro = 0;

                // Coût élec : utiliser le montant € saisi, ou prix de référence × kWh
                if (formData.elecUsed) {
                    if (formData.elecEuro && parseFloat(formData.elecEuro) > 0) totalEuro += Number(formData.elecEuro);
                    else totalEuro += elecConversion.value * elecPrice;
                }

                // Coût gaz : utiliser le montant € saisi, ou prix de référence × kWh
                if (formData.gasUsed) {
                    if (formData.gasEuro && parseFloat(formData.gasEuro) > 0) totalEuro += Number(formData.gasEuro);
                    else totalEuro += gasConversion.value * gasPrice;
                }

                if (formData.heatNetworkUsed) {
                    if (formData.heatNetworkEuro && parseFloat(formData.heatNetworkEuro) > 0) totalEuro += Number(formData.heatNetworkEuro);
                    else totalEuro += heatNetworkConversion.value * heatNetworkPrice;
                }

                if (formData.fuelOilUsed) {
                    if (formData.fuelOilEuro && parseFloat(formData.fuelOilEuro) > 0) totalEuro += Number(formData.fuelOilEuro);
                    else totalEuro += fuelOilConversion.value * fuelOilPrice;
                }

                if (formData.woodUsed) {
                    if (formData.woodEuro && parseFloat(formData.woodEuro) > 0) totalEuro += Number(formData.woodEuro);
                    else totalEuro += woodConversion.value * woodPrice;
                }

                calculatedAvgPrice = totalKwh > 0 ? totalEuro / totalKwh : elecPrice;
            }

            // Sécurité : garder le prix entre 0.05 et 0.40 pour éviter les aberrations
            const avgPrice = Math.min(Math.max(calculatedAvgPrice, 0.05), 0.40);

            const topActions = newDiagnosticFilterAndScoreActions(formData, totalKwh, breakdown, avgPrice);

            const compositeSavingsPct = newDiagnosticCalculateCompositeSavings(topActions);
            const annualSavingsKwh = Math.round(totalKwh * compositeSavingsPct);
            const annualSavingsEuro = Math.round(annualSavingsKwh * avgPrice);

            // 9. PROJECTIONS

        const publicTunnelGetSelectedEnergyConfigs = (formData) => {

        const publicTunnelGetEnergyCardTone = (accent, selected) => {

                blue: selected ? 'border-[#2563EB] bg-[#EFF6FF]' : 'border-[#E2E8F0] hover:border-[#2563EB]/40',
                amber: selected ? 'border-[#F59E0B] bg-amber-50' : 'border-[#E2E8F0] hover:border-[#F59E0B]/40',
                rose: selected ? 'border-rose-400 bg-rose-50' : 'border-[#E2E8F0] hover:border-rose-300',
                slate: selected ? 'border-slate-400 bg-slate-50' : 'border-[#E2E8F0] hover:border-slate-300',
                emerald: selected ? 'border-emerald-500 bg-emerald-50' : 'border-[#E2E8F0] hover:border-emerald-300'
            };
            return tones[accent] || tones.blue;
        };

        const publicTunnelGetLiveEnergyConversions = (formData) => {
            return PUBLIC_TUNNEL_ENERGY_CONFIG.reduce((accumulator, config) => {
                accumulator[config.id] = formData && formData[`${config.fieldPrefix}Used`]
                    ? publicTunnelConvertEnergyToKwh(config.id, formData)
                    : { value: 0, method: 'not_used', price_used: null };
                return accumulator;

        const publicTunnelEstimateEnergyConversions = (formData) => {
            const safeSurface = Math.max(0, parseFloat(formData && formData.surface) || 0);
            const selected = publicTunnelGetSelectedEnergyConfigs(formData);

            if (!safeSurface || !selected.length) {
                return null;
            }

            const benchmark = newDiagnosticGetBenchmark((formData && formData.activity) || 'offices', formData);
            const usageFactor = PUBLIC_TUNNEL_USAGE_INTENSITY_FACTORS[(formData && formData.usageIntensity) || 'standard'] || 1;
            const constructionFactor = PUBLIC_TUNNEL_CONSTRUCTION_FACTORS[(formData && formData.constructionPeriod) || 'y1975_2000'] || 1;
            const coolingFactor = formData && formData.hasCooling === true ? 1.05 : 1;
            const estimatedTotalKwh = Math.round(Math.max(benchmark.median_kwh_m2_an * safeSurface * usageFactor * constructionFactor * coolingFactor, safeSurface * 40));
            const selectedIds = selected.map((config) => config.id);
            const shares = {};
            const baseShare = 1 / selected.length;
            const heatingMap = {
                electric: 'elec',
                gas: 'gas',
                network: 'heatNetwork'
            };
            const preferredHeating = formData && formData.mainHeating === 'other'
                ? selectedIds.find((id) => id === 'fuelOil' || id === 'wood') || selectedIds.find((id) => id !== 'elec') || selectedIds[0]
                : heatingMap[formData && formData.mainHeating] || selectedIds[0];

            selectedIds.forEach((id) => {
                shares[id] = baseShare;
            });

            if (preferredHeating && shares[preferredHeating] !== undefined) {
                shares[preferredHeating] += 0.35;
            }

            if (selectedIds.includes('elec') && formData && formData.hasCooling === true) {
                shares.elec += 0.15;
            }

            const totalShare = Object.values(shares).reduce((sum, value) => sum + value, 0) || 1;
            let remainingKwh = estimatedTotalKwh;

            return selected.reduce((accumulator, config, index) => {
                const normalizedShare = shares[config.id] / totalShare;
                const allocatedValue = index === selected.length - 1
                    ? remainingKwh
                    : Math.round(estimatedTotalKwh * normalizedShare);

                remainingKwh -= allocatedValue;
                accumulator[config.id] = {
                    value: Math.max(0, allocatedValue),
                    method: 'estimated_default_profile',
                    price_used: config.defaultPriceEurKwh
                };
                return accumulator;
            }, {});
        };

        const publicTunnelConvertEnergyToKwh = (energyId, formData) => {
            const config = PUBLIC_TUNNEL_ENERGY_CONFIG.find((item) => item.id === energyId);

            if (!config) {
                return { value: 0, method: 'none', price_used: null };
            }

            const kwh = formData && formData[`${config.fieldPrefix}Kwh`];
            const euro = formData && formData[`${config.fieldPrefix}Euro`];
            const includesSubscription = config.fieldPrefix === 'elec' || config.fieldPrefix === 'gas'
                ? formData[`${config.fieldPrefix}IncludesSubscription`]
                : false;
            const subscriptionYearly = config.fieldPrefix === 'elec' || config.fieldPrefix === 'gas'
                ? formData[`${config.fieldPrefix}SubscriptionYearly`]
                : null;

            if (kwh && parseFloat(kwh) > 0) {
                return {
                    value: parseFloat(kwh),
                    method: 'kwh_provided',
                    price_used: null
                };
            }

            if (euro && parseFloat(euro) > 0) {
                let amount = parseFloat(euro);

                if (includesSubscription && subscriptionYearly && parseFloat(subscriptionYearly) > 0) {
                    amount = Math.max(amount - parseFloat(subscriptionYearly), 0);
                }

                return {
                    value: Math.round(amount / config.defaultPriceEurKwh),
                    method: includesSubscription && subscriptionYearly
                        ? 'euro_converted_subscription_deducted'
                        : 'euro_converted_default_price',

            return {

        const publicTunnelCalculateConfidence = (formData) => {
            const selectedEnergies = publicTunnelGetSelectedEnergyConfigs(formData);

            if (!selectedEnergies.length) {
                return { score: 0, level: 'low', label: 'Faible' };
            }

            if (formData.noInvoicesMode) {
                return { score: 35, level: 'low', label: 'Faible' };
            }

            const allHaveKwh = selectedEnergies.every((config) => Boolean(formData[`${config.fieldPrefix}Kwh`]));
            const allHaveKwhAndEuro = selectedEnergies.every((config) => Boolean(formData[`${config.fieldPrefix}Kwh`]) && Boolean(formData[`${config.fieldPrefix}Euro`]));
            const anyKwh = selectedEnergies.some((config) => Boolean(formData[`${config.fieldPrefix}Kwh`]));

            if (allHaveKwhAndEuro) {
                return { score: 90, level: 'strong', label: 'Élevée' };
            }

            if (allHaveKwh || anyKwh) {
                return { score: 70, level: 'medium', label: 'Moyenne' };

            return { score: 45, level: 'low', label: 'Faible' };

        // ─────────────────────────────────────────────────────────────────────────

        const {

        } = window.Recharts;

        function newDiagnosticBuildProjectionData({ annualSavingsEuro, totalCostEuroAn, elecKwh = 0, gasKwh = 0, actions = [] }) {
            const elecEur = elecKwh * NEW_DIAGNOSTIC_ENERGY_PRICES.electricity.price_default_eur_kwh;
            const gazEur = gasKwh * NEW_DIAGNOSTIC_ENERGY_PRICES.gas.price_default_eur_kwh;
            const totalBase = Math.max(elecEur + gazEur, 1);
            const partElec = elecEur / totalBase;
            const partGaz = gazEur / totalBase;
            const taux = partElec * INFLATION_ENERGIE.electricite
                + partGaz * INFLATION_ENERGIE.gaz
                + Math.max(0, 1 - partElec - partGaz) * INFLATION_ENERGIE.electricite;
            const tauxPct = (taux * 100).toFixed(1);
            const hasGaz = gazEur > 0;

            const capexBrut = (actions || []).reduce((s, a) => s + (a.capex?.value || 0), 0);
            let aidesTotal = 0;
            for (const action of (actions || [])) {
                const capVal = action.capex?.value || 0;
                aidesTotal += capVal * (0.20 - 0.055) / 1.20;
                if (action.aid_tags?.includes('CEE')) aidesTotal += capVal * 0.015;
            }
            const capexNet = Math.max(0, capexBrut - aidesTotal);
            const roiGlobal = annualSavingsEuro > 0 ? capexNet / annualSavingsEuro : 999;
            const economiesPct = totalCostEuroAn > 0 ? annualSavingsEuro / totalCostEuroAn : 0;
            const graphiquePubliable = roiGlobal >= 0.5 && roiGlobal <= 20 && economiesPct >= 0.01;
            const horizon = 10;

            const data = [{ annee: 'Auj.', sans_travaux: 0, avec_travaux: Math.round(capexNet), economies_nettes: -Math.round(capexNet) }];
            let cumSans = 0;
            let cumAvec = capexNet;
            let roiAnnee = null;
            for (let an = 1; an <= horizon; an++) {
                const f = Math.pow(1 + taux, an);
                cumSans += totalCostEuroAn * f;
                cumAvec += (totalCostEuroAn - annualSavingsEuro) * f;
                const ecoNettes = Math.round(cumSans - cumAvec);
                if (!roiAnnee && ecoNettes > 0) roiAnnee = `A+${an}`;
                data.push({ annee: `A+${an}`, sans_travaux: Math.round(cumSans), avec_travaux: Math.round(cumAvec), economies_nettes: ecoNettes });
            }

            return {
                data,
                taux,
                tauxPct,
                hasGaz,
                horizon,
                roiAnnee,
                roiGlobal,
                capexBrut: Math.round(capexBrut),
                capexNet: Math.round(capexNet),
                aidesTotal: Math.round(aidesTotal),
                graphiquePubliable
            };
        }

        const NewDiagnosticProjectionTooltipCompact = ({ active, payload, label }) => {
            if (!active || !Array.isArray(payload) || payload.length === 0) return null;

            const byKey = {};
            payload.forEach(item => {
                const key = item?.dataKey || item?.name;
                if ((key === 'sans_travaux' || key === 'avec_travaux') && !byKey[key]) {

                }

            const rows = ['sans_travaux', 'avec_travaux']

            if (!rows.length) return null;

            const meta = {
                sans_travaux: { label: 'Sans travaux (cumulé)', color: '#EF4444' },
                avec_travaux: { label: 'Avec travaux (cumulé)', color: '#10B981' }
            };

            return (
                <div className="bg-white border border-neutral-200 rounded-xl shadow-lg px-4 py-3 text-sm min-w-[220px]">
                    <p className="font-bold text-neutral-900 mb-2">{label}</p>
                    <div className="space-y-1.5">
                        {rows.map(row => (
                            <div key={row.key} className="flex items-start justify-between gap-4">
                                <span style={{ color: meta[row.key].color }}>{meta[row.key].label}</span>
                                <span className="font-bold text-neutral-900">{newDiagnosticFormatCurrency(row.value)}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const NewDiagnosticInactionGraph = ({ annualSavingsEuro, totalCostEuroAn, elecKwh = 0, gasKwh = 0, actions = [] }) => {

            const safeIntensity = Math.max(0, Number(intensityValue) || 0);
            const safeMedian = Math.max(1, Number(medianValue) || 1);
            const ratio = safeIntensity / safeMedian;

            let label = 'E';
            if (ratio < 0.6) label = 'A';
            else if (ratio < 0.9) label = 'B';
            else if (ratio < 1.2) label = 'C';
            else if (ratio < 1.7) label = 'D';

            const config = NEW_DIAGNOSTIC_SECTOR_LABEL_CONFIG[label] || NEW_DIAGNOSTIC_SECTOR_LABEL_CONFIG.C;
            return {
                label,
                positioning: config.positioning,
                ratio: Math.round(ratio * 100) / 100,
                color: config.color,
                bg: config.bg
            };
        }

        function newDiagnosticGetSectorThresholds(medianValue) {
            const med = Math.max(1, Number(medianValue) || 1);
            const aMax = Math.round(med * 0.6);
            const bMin = aMax;
            const bMax = Math.round(med * 0.9);
            const cMin = bMax;
            const cMax = Math.round(med * 1.2);
            const dMin = cMax;
            const dMax = Math.round(med * 1.7);
            const eMin = dMax;

            return {
                A: { min: 0, max: aMax },
                B: { min: bMin, max: bMax },
                C: { min: cMin, max: cMax },
                D: { min: dMin, max: dMax },
                E: { min: eMin, max: null }
            };
        }

        function newDiagnosticFormatInteger(value) {

        function newDiagnosticFormatNumber(value, options = {}) {
            const safe = Number(value);
            const numericValue = Number.isFinite(safe) ? safe : 0;
            const maximumFractionDigits = typeof options.maximumFractionDigits === 'number' ? options.maximumFractionDigits : 0;
            const minimumFractionDigits = typeof options.minimumFractionDigits === 'number' ? options.minimumFractionDigits : 0;
            return numericValue.toLocaleString('fr-FR', {
                minimumFractionDigits,
                maximumFractionDigits
            });
        }

        function newDiagnosticFormatDecimal(value, maximumFractionDigits = 1) {
            return newDiagnosticFormatNumber(value, { minimumFractionDigits: 0, maximumFractionDigits });
        }

        function newDiagnosticFormatCurrency(value, maximumFractionDigits = 0) {
            return `${newDiagnosticFormatNumber(value, { minimumFractionDigits: 0, maximumFractionDigits })} €`;
        }

        function newDiagnosticFormatUnitValue(value, unit, options = {}) {
            const maximumFractionDigits = typeof options.maximumFractionDigits === 'number' ? options.maximumFractionDigits : 0;
            return `${newDiagnosticFormatNumber(value, { minimumFractionDigits: 0, maximumFractionDigits })} ${unit}`.trim();
        }

        function newDiagnosticFormatYears(value, maximumFractionDigits = 1) {
            return newDiagnosticFormatUnitValue(value, 'ans', { maximumFractionDigits });
        }

        function newDiagnosticFormatCompactCurrencyTick(value) {
            const safe = Number(value);
            const numericValue = Number.isFinite(safe) ? safe : 0;
            if (Math.abs(numericValue) >= 1000) {
                return `${newDiagnosticFormatNumber(numericValue / 1000, { maximumFractionDigits: 0 })} k€`;
            }
            return newDiagnosticFormatCurrency(numericValue);
        }

        function newDiagnosticExtractCityFromAddress(address) {
            const safeAddress = typeof address === 'string' ? address.trim() : '';
            if (!safeAddress) return '';

            const parts = safeAddress.split(',').map((part) => part.trim()).filter(Boolean);
            if (!parts.length) return '';

            const lastPart = parts[parts.length - 1] || '';
            const previousPart = parts[parts.length - 2] || '';

            if (/\d{5}/.test(lastPart)) {
                return lastPart;
            }

            if (/\d{5}/.test(previousPart)) {
                return `${previousPart} ${lastPart}`.trim();
            }

            return lastPart;
        }

        function newDiagnosticLoadImageAsDataUrl(src) {
            return new Promise(resolve => {
                if (!src) {
                    resolve(null);
                    return;
                }

                const image = new Image();
                image.crossOrigin = 'anonymous';
                image.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = image.naturalWidth || image.width;
                        canvas.height = image.naturalHeight || image.height;
                        const context = canvas.getContext('2d');
                        context.drawImage(image, 0, 0);
                        resolve(canvas.toDataURL('image/png'));
                    } catch (error) {
                        resolve(null);
                    }
                };
                image.onerror = () => resolve(null);
                image.src = src;
            });
        }

            if (Array.isArray(breakdownPct)) {
                const found = breakdownPct.find(item => item && item.key === key);
                return found && typeof found.value === 'number' ? found.value : 0;
            }
            return typeof breakdownPct[key] === 'number' ? breakdownPct[key] : 0;
        }

        function newDiagnosticEstimateAides(actions) {
            let aidesTotal = 0;
            for (const action of (actions || [])) {
                const capVal = action && action.capex ? (action.capex.value || 0) : 0;
                aidesTotal += capVal * (0.20 - 0.055) / 1.20; // TVA 5.5%
                if (action && action.aid_tags && action.aid_tags.includes('CEE')) {
                    aidesTotal += capVal * 0.015; // CEE plancher
                }
            }
            return Math.max(0, Math.round(aidesTotal));
        }

        function newDiagnosticGetActionRobustness(action) {
            const roi = action && action.roi_years ? action.roi_years.value : null;
            const capex = action && action.capex ? action.capex.value || 0 : 0;
            const gainLevel = action ? action.source_level_gain : null;
            const capexLevel = action ? action.source_level_capex : null;

            const weakData = (gainLevel === 'hypothesis' || gainLevel === 'pending_expert')
                + (capexLevel === 'hypothesis' || capexLevel === 'pending_expert');

            if (roi !== null && roi <= 3 && capex <= 15000 && weakData === 0) {
                return {
                    level: 'strong',
                    label: 'Forte probabilité',
                    className: 'bg-green-50 text-green-700 border-green-200'
                };
            }
            if (roi !== null && roi <= 7 && capex <= 40000 && weakData <= 1) {
                return {
                    level: 'medium',
                    label: 'Probable',
                    className: 'bg-yellow-50 text-yellow-800 border-yellow-200'
                };
            }
            return {
                level: 'low',
                label: 'À confirmer sur site',
                className: 'bg-orange-50 text-orange-700 border-orange-200'
            };
        }

        function newDiagnosticGetActionEffort(action) {
            const capex = action && action.capex ? action.capex.value || 0 : 0;
            const roi = action && action.roi_years ? action.roi_years.value : null;
            const category = action && action.category ? action.category : '';

            if (capex <= 3000 && (roi === null || roi <= 4) && category !== 'envelope') {
                return { key: 'low', label: 'Faible', className: 'bg-emerald-50 text-emerald-700 border-emerald-200' };
            }
            if (capex <= 15000 && (roi === null || roi <= 8) && category !== 'envelope') {
                return { key: 'medium', label: 'Modere', className: 'bg-amber-50 text-amber-700 border-amber-200' };
            }
            return { key: 'high', label: 'Structurant', className: 'bg-purple-50 text-purple-700 border-purple-200' };
        }

        function newDiagnosticGetActionPriorityReason(action, breakdown) {
            const category = action ? action.category : null;
            const categoryLabel = NEW_DIAGNOSTIC_CATEGORY_LABELS[category] || 'Usage principal';
            const breakdownKey = NEW_DIAGNOSTIC_CATEGORY_TO_BREAKDOWN_KEY[category] || 'other_specific_pct';
            const postePct = newDiagnosticGetBreakdownPctValue(
                breakdown && breakdown.breakdown_pct ? breakdown.breakdown_pct : breakdown,
                breakdownKey
            );

            const roi = action && action.roi_years ? action.roi_years.value : null;
            const gainEuro = action && action.gain_euro_an ? action.gain_euro_an.value || 0 : 0;
            const capex = action && action.capex ? action.capex.value || 0 : 0;

            let why = 'Cette action remonte car elle active un levier concret sans complexité excessive.';
            if (roi !== null && roi <= 3) {
                why = 'Cette action remonte car elle agit vite sur un poste utile avec un investissement limité.';
            } else if (gainEuro >= 2500) {
                why = 'Cette action est prioritaire pour capter un gain annuel significatif sur un poste déjà lourd.';
            } else if (capex <= 2000) {
                why = 'Cette action permet d’enclencher des gains sans engager de chantier lourd.';
            } else if (roi !== null && roi > 7) {
                why = 'Cette action a du sens mais doit être validée techniquement avant arbitrage budgétaire.';

            const posteText = postePct > 0

            return { why, posteText };
        }

        function newDiagnosticBuildDecisionReadout(reportPayload) {

                ? reportPayload.confidence.level
                : '';
            const totalPct = composite.total_pct ? composite.total_pct.value || 0 : 0;
            const position = benchmark.position || 'in_range';

            let diagnostic = 'Le site est globalement dans la référence du secteur, avec des gains encore accessibles.';
            if (position === 'far_above_range') {
                diagnostic = 'Le site est nettement au-dessus des références du secteur et doit être repriorisé.';
            } else if (position === 'above_range') {
                diagnostic = 'Le site se situe au-dessus de la référence sectorielle, sans être hors contrôle.';
            } else if (position === 'below_range') {
                diagnostic = 'Le site est bien positionné ; la suite repose surtout sur une optimisation ciblée.';
            }

            let risk = 'Le risque principal est de laisser des gains rapides non captés faute d’ordre d’action.';
            if (position === 'far_above_range' || position === 'above_range') {
                risk = 'Sans plan gradué, la hausse des charges peut repousser les arbitrages utiles.';
            } else if (position === 'below_range') {

            if (confidenceLevel === 'low') {
                risk = 'Le risque immédiat est de décider sur des données encore trop approximatives.';
            }

            let opportunity = `Un plan progressif peut capter environ ${Math.round(totalPct)}% d’économies estimées, sans engager d’emblée des travaux lourds.`;
            if (totalPct >= 30) {
                opportunity = `Le potentiel est élevé (~${Math.round(totalPct)}%) ; un échange expert permet surtout de confirmer le bon ordre d’action.`;
            } else if (totalPct <= 15) {
                opportunity = 'Le potentiel est ciblé ; la valeur vient surtout d’un tri fin des actions sans regret.';
            }

            return { diagnostic, risk, opportunity };

        function newDiagnosticBuildProgramBudget(actions, annualSavings) {
            const safeActions = actions || [];
            const capexBrut = safeActions.reduce((sum, action) => sum + ((action.capex && action.capex.value) || 0), 0);
            const aides = newDiagnosticEstimateAides(safeActions);
            const capexNet = Math.max(0, capexBrut - aides);
            const annual = Math.max(0, annualSavings || 0);
            const roi = annual > 0 ? capexNet / annual : null;

            return {
                capex_brut: Math.round(capexBrut),
                aides: Math.round(aides),
                capex_net: Math.round(capexNet),
                annual_savings: Math.round(annual),
                roi_global_years: roi !== null ? Math.round(roi * 10) / 10 : null
