    DiagTertiaire Pro - index.saaspro.html
    =========================================================
    REGLES DE CONFORMITE DES DONNEES MOCK (MOCK_PRO_CASES_V2)
    ---------------------------------------------------------
    Chaque objet case_XXX doit respecter 7 regles verifiees
    au demarrage par validateMockCase() :
      1. postes[x].pct -> somme exacte = 100%
      2. postes[x].kwh -> somme = annualConsumption
      3. intensityPerSqm = round(annualConsumption / buildingArea)
      4. score in ['A','B','C','D','E','F','G']
      5. totalCapexNet = totalCapex - aidesEstimees
      6. sum(actions[x].savingsEuro) = estimatedSavingsPerYear
      7. totalCapexNet / estimatedSavingsPerYear ~ roiGlobal (15%)
    ---------------------------------------------------------
    REGLE ABSOLUE : zero tiret cadratin U+2014 dans tout le fichier.
    =========================================================
-->

            const [highlightStyle, setHighlightStyle] = useState({});
            const [arrowClass, setArrowClass] = useState('');
            const [isVisible, setIsVisible] = useState(false);

            // Étapes définies dans la constante globale ONBOARDING_TOUR_STEPS
            const steps = ONBOARDING_TOUR_STEPS;

            const updatePosition = useCallback(() => {
                const step = steps[currentStep];
                if (!step) return;

                const target = document.getElementById(step.id);
                if (!target) {
                    // Repli au centre si non trouvé (ex: mobile menu fermé)
                    setHighlightStyle({ display: 'none' });
                    setPopoverStyle({
                        top: '50%',
                        left: '50%',
                        transform: 'translate(-50%, -50%)'
                    });
                    setArrowClass('');
                    return;
                }

                const rect = target.getBoundingClientRect();

                // --- Highlight Box ---
                const padding = 6;
                setHighlightStyle({
                    top: `${rect.top - padding}px`,
                    left: `${rect.left - padding}px`,
                    width: `${rect.width + padding * 2}px`,
                    height: `${rect.height + padding * 2}px`,
                    display: 'block'
                });

                // --- Popover Position ---
                const popoverWidth = 360; // max-width
                const popoverHeight = 200; // approx
                const gap = 16;
                const viewWidth = window.innerWidth;
                const viewHeight = window.innerHeight;

                let top, left, arrow;

                // Espace dispo
                const spaceRight = viewWidth - rect.right;
                const spaceBottom = viewHeight - rect.bottom;
                const spaceLeft = rect.left;
                const spaceTop = rect.top;

                // Logique de placement (priorité : bas > droite > haut > gauche)
                if (spaceBottom > popoverHeight + gap) {
                    top = rect.bottom + gap;
                    left = rect.left + (rect.width / 2) - (popoverWidth / 2);
                    arrow = 'ob-arrow-top';
                } else if (spaceRight > popoverWidth + gap) {
                    top = rect.top + (rect.height / 2) - (popoverHeight / 2);
                    left = rect.right + gap;
                    arrow = 'ob-arrow-left';
                } else if (spaceTop > popoverHeight + gap) {
                    top = rect.top - popoverHeight - gap;
                    left = rect.left + (rect.width / 2) - (popoverWidth / 2);
                    arrow = 'ob-arrow-bottom';
                } else if (spaceLeft > popoverWidth + gap) {
                    top = rect.top + (rect.height / 2) - (popoverHeight / 2);
                    left = rect.left - popoverWidth - gap;
                    arrow = 'ob-arrow-right';
                } else {
                    top = viewHeight / 2 - popoverHeight / 2;
                    left = viewWidth / 2 - popoverWidth / 2;
                    arrow = '';
                }

                // Contraintes viewport
                left = Math.max(16, Math.min(left, viewWidth - popoverWidth - 16));
                top = Math.max(16, Math.min(top, viewHeight - popoverHeight - 16));

                setPopoverStyle({ top: `${top}px`, left: `${left}px`, transform: 'none' });
                setArrowClass(arrow);

            }, [currentStep, steps]);

            // Observer le changement de step pour mettre à jour la cible
            useEffect(() => {
                if (!isActive) {
                    setIsVisible(false);
                    return;
                }

                const step = steps[currentStep];
                if (!step) return;

                // Open/close sidebar on mobile depending on whether the step targets a sidebar element
                const isMobile = window.innerWidth < 1024;
                if (isMobile) {
                    if (step.inSidebar && typeof onOpenMobile === 'function') {
                        onOpenMobile();
                    } else if (!step.inSidebar && typeof onCloseMobile === 'function') {
                        onCloseMobile();
                    }
                }

                // On patiente pour laisser le DOM se mettre à jour (changement de page + menu animation)
                const timer = setTimeout(() => {
                    updatePosition();
                    setIsVisible(true);
                }, 350);

                // Repositionner au scroll et resize
                window.addEventListener('scroll', updatePosition, true);
                window.addEventListener('resize', updatePosition);

                return () => {
                    clearTimeout(timer);
                    window.removeEventListener('scroll', updatePosition, true);
                    window.removeEventListener('resize', updatePosition);
                };
            }, [currentStep, isActive, updatePosition]);

            if (!isActive || !steps[currentStep]) return null;

            const step = steps[currentStep];

                    }

            return (

        const bytesToUuid = (bytes) => {
            const parts = [
                Array.from(bytes.slice(0, 4)),
                Array.from(bytes.slice(4, 6)),
                Array.from(bytes.slice(6, 8)),
                Array.from(bytes.slice(8, 10)),
                Array.from(bytes.slice(10, 16))
            ];

            return parts
                .map(part => part.map(byte => byte.toString(16).padStart(2, '0')).join(''))
                .join('-');
        };

            if (window.crypto?.randomUUID) {
                return window.crypto.randomUUID();

            const bytes = new Uint8Array(16);
            if (window.crypto?.getRandomValues) {
                window.crypto.getRandomValues(bytes);
            } else {
                for (let index = 0; index < bytes.length; index += 1) {
                    bytes[index] = Math.floor(Math.random() * 256);
                }
            }

            bytes[6] = (bytes[6] & 0x0f) | 0x40;
            bytes[8] = (bytes[8] & 0x3f) | 0x80;
            return bytesToUuid(bytes);
        };

                bytes[6] = (bytes[6] & 0x0f) | 0x40;
                bytes[8] = (bytes[8] & 0x3f) | 0x80;
                return bytesToUuid(bytes);

            if (!matches) {
                return null;

            const mimeType = matches[1];
            const binary = window.atob(matches[2]);
            const bytes = new Uint8Array(binary.length);
            for (let index = 0; index < binary.length; index += 1) {
                bytes[index] = binary.charCodeAt(index);
            }

            const fileName = buildSafeStorageFileName(
                `${suggestedBaseName}.${getFileExtensionFromMimeType(mimeType)}`,

            return new File([bytes], fileName, { type: mimeType });

        const establishSupabaseSessionFromAuthCallback = async (browserClient) => {
            if (!browserClient?.auth) {
                return {
                    session: null,
                    error: null,
                    flowType: '',
                    handled: false,
                    usedDirectSessionTokens: false
                };
            }

            const callbackParams = getAuthCallbackParamsFromLocation();
            const flowType = callbackParams.type;
            const shouldHandleSession = AUTH_CALLBACK_SESSION_FLOW_TYPES.includes(flowType)
                || !!callbackParams.code
                || !!callbackParams.accessToken;

            if (!shouldHandleSession) {
                return {
                    session: null,
                    error: null,
                    flowType,
                    handled: false,
                    usedDirectSessionTokens: false
                };
            }

            // Supabase email confirmation can return direct session tokens in the hash.
            // In this case we must not use exchangeCodeForSession(), which expects a PKCE code.
            if (callbackParams.accessToken && callbackParams.refreshToken && typeof browserClient.auth.setSession === 'function') {
                const { data, error } = await browserClient.auth.setSession({
                    access_token: callbackParams.accessToken,
                    refresh_token: callbackParams.refreshToken
                });

                return {
                    session: data?.session || null,
                    error: error || null,
                    flowType,
                    handled: true,
                    usedDirectSessionTokens: true
                };
            }

            if (callbackParams.code && typeof browserClient.auth.exchangeCodeForSession === 'function') {
                const { data, error } = await browserClient.auth.exchangeCodeForSession(callbackParams.code);
                return {
                    session: data?.session || null,
                    error: error || null,
                    flowType,
                    handled: true,
                    usedDirectSessionTokens: false
                };
            }

            const { data, error } = await browserClient.auth.getSession();
            return {
                session: data?.session || null,
                error: error || null,
                flowType,
                handled: true,
                usedDirectSessionTokens: false
            };
        };

            let didChange = false;

            AUTH_CALLBACK_SEARCH_KEYS.forEach((key) => {
                if (currentUrl.searchParams.has(key)) {
                    currentUrl.searchParams.delete(key);
                    didChange = true;
                }
            });

            const rawHash = currentUrl.hash || '';
            if (rawHash && !rawHash.startsWith('#report=')) {
                const hashParams = new URLSearchParams(rawHash.slice(1));
                let hashDidChange = false;

                AUTH_CALLBACK_HASH_KEYS.forEach((key) => {
                    if (hashParams.has(key)) {
                        hashParams.delete(key);
                        hashDidChange = true;
                    }
                });

                if (hashDidChange) {
                    currentUrl.hash = hashParams.toString() ? `#${hashParams.toString()}` : '';
                    didChange = true;

            const savingsValue = Number(engineResult.totalSavingsEur || source.estimatedSavingsPerYear || 0);
            const savingsLabel = savingsValue > 0
                ? `${Math.round(savingsValue).toLocaleString('fr-FR')} EUR / an`
                : '';
            const roiValue = Number(source.roiGlobal || engineResult.roiGlobal || 0);
            const roiLabel = roiValue > 0 ? `${String(roiValue).replace('.', ',')} ans` : '';

        const readProFormAntiSpamTimestamp = (kind, formKey, type = 'session') => {
            const storage = getProFormAntiSpamStorage(type);
            if (!storage) {
                return null;
            }

            const rawValue = storage.getItem(getProFormAntiSpamKey(kind, formKey));
            const parsedValue = Number(rawValue);
            return Number.isFinite(parsedValue) && parsedValue > 0 ? parsedValue : null;
        };

        const writeProFormAntiSpamTimestamp = (kind, formKey, value, type = 'session') => {
            const storage = getProFormAntiSpamStorage(type);
            if (!storage) {
                return;
            }

            const storageKey = getProFormAntiSpamKey(kind, formKey);

            if (value === null || typeof value === 'undefined') {
                storage.removeItem(storageKey);
                return;
            }

            storage.setItem(storageKey, String(value));
        };

        function scoreMaturite(formData) {
            let score = 1;
            // FIX audit-2026-03-07 - champs alignés sur sortie alpha form (budget/horizon/objectif)
            const budget = formData.budget || formData.budget_travaux;
            const horizon = formData.horizon || formData.horizon_decision;
            const objectif = formData.objectif || formData.objectif_principal;

            if (['20k_80k', 'sup80k', 'sup_80k'].includes(budget)) score += 2;
            else if (budget === '5k_20k') score += 1;

            if (horizon === 'immediat') score += 2;
            else if (horizon === 'court' || horizon === 'court_terme') score += 1;

            if (objectif === 'conformite' || objectif === 'conformite_reglementaire') score += 1;

            return Math.min(score, 5);
        }

        function selectActions(formData, consommation, postes) {
            const activite = formData.activite || 'bureaux';
            const plafond = PLAFONDS_GAINS[activite] || 0.60;

            // 1. Filtrer par prérequis et travaux déjà réalisés
            let applicables = ACTIONS_LIBRARY.filter(action => {
                if (action.exclu_si.some(t => formData.travaux_realises?.includes(t)))
                    return false;

                for (const req of action.prerequis) {
                    if (req === 'chauffage_reseau_eau' &&
                        formData.chauffage_reseau !== 'eau_chaude') return false;
                    if (req === 'age_sup_10_ans' &&
                        formData.chauffage_age === 'moins_10_ans') return false;
                    if (req === 'eclairage_non_led' &&
                        formData.eclairage_type === 'led_complet') return false;
                    if (req === 'vmc_simple_flux' &&
                        !['simple_auto', 'simple_hygro'].includes(formData.vmc_type)) return false;
                    if (req === 'vmc_presente' &&
                        formData.vmc_type === 'naturelle') return false;
                    if (req === 'vmc_sans_recuperation' &&
                        formData.vmc_type === 'df_hr') return false;
                    if (req === 'ecs_presente' && !formData.ecs_presente) return false;
                    if (req === 'ecs_calorifugeage_incomplet' &&
                        formData.ecs_calorifugeage === 'oui') return false;
                    if (req === 'toiture_non_isolee' &&
                        formData.isolation_toiture === 'oui') return false;
                    if (req === 'chaudiere_presente' &&
                        ['convecteurs', 'plancher_elec', 'aucun'].includes(formData.chauffage_type)) return false;
                    // FIX #D audit-2026-03-07 - prerequis chauffage_regulation_horloge manquant
                    if (req === 'chauffage_regulation_horloge' &&
                        !formData.chauffage_regulation?.includes?.('horloge') &&
                        !formData.chauffage_regulation?.includes?.('gtb')) return false;
                }
                return true;
            });

            // 2. Calculer gain et ROI pour chaque action
            applicables = applicables.map(action => {
                const pct_poste = (postes[activite] && postes[activite][action.poste]) || 15;
                const conso_poste = consommation.total_kwh * (pct_poste / 100);
                const gain_kwh = conso_poste * action.gain.med;
                const energieKey = formData.energie_principale || Object.keys(PRIX_ENERGIE)[0];
                const gain_eur = gain_kwh * (PRIX_ENERGIE[energieKey] || PRIX_ENERGIE.electricite);

                let capex = action.capex.med;
                if (action.capex_m2) {
                    capex = action.capex_m2 * (formData.surface || 100);
                }
                if (capex < action.capex.low) capex = action.capex.low;
                if (capex > action.capex.high) capex = action.capex.high;

                const roi = capex > 0 ? capex / gain_eur : 0;
                return { ...action, conso_poste, gain_kwh, gain_eur, capex, roi };
            });

            // 3. Trier par ROI croissant
            applicables.sort((a, b) => a.roi - b.roi);

            // 4. Sélectionner avec plafonnement
            let gains_cumules = 0;
            const retenues = [];
            for (const action of applicables) {
                if (gains_cumules + action.gain.med <= plafond) {
                    retenues.push(action);
                    gains_cumules += action.gain.med;
                }
                if (retenues.length >= 5) break;
            }

            return { actions: retenues, gains_pct_total: gains_cumules };
        }

        function projection10ans(cout_annuel, economies_annuelles, capex) {
            const inflation = 0.03;
            const points = [];
            let cumul_sans = 0;
            let cumul_avec = capex; // Bug #4 corrigé

            for (let an = 0; an <= 10; an++) { // Bug #5 corrigé: de 0 à 10
                const facteur = Math.pow(1 + inflation, an);
                if (an > 0) {
                    cumul_sans += cout_annuel * facteur;
                    cumul_avec += (cout_annuel - economies_annuelles) * facteur;
                }
                points.push({
                    label: an === 0 ? 'Auj.' : `A+${an}`,
                    sans_travaux: Math.round(cumul_sans),
                    avec_travaux: Math.round(cumul_avec),
                    economies_nettes: Math.round(cumul_sans - cumul_avec),
                });
            }
            // Point ROI = première année où economies_nettes > 0
            const annee_roi = points.find(p => p.economies_nettes > 0)?.label || 'N/A';
            return { points, annee_roi };
        }

                const _aliases = {
                    'bureaux': 'bureau', 'hotellerie': 'hotel', 'sante_cabinet': 'sante',
                    'commerce_nonalim': 'commerce_non_alim', 'entrepot_froid': 'entrepot_non_chauffe',
                };
                const _act = _aliases[data.activity] || data.activity || data.activite;
                let activityKey = actMapping[_act] || actMapping[data.activity] || 'Autre';
                if (data.activity === 'Commerce' || data.activity === 'commerce') {
                    activityKey = data.commerceFroid ? 'Commerce_Froid' : 'Commerce_SansFroid';
                }
                if (data.activity === 'Entrepôt' || data.activity === 'entrepot') {
                    activityKey = data.entrepotChauffe ? 'Entrepôt-Chauffé' : 'Entrepôt-NonChauffé';
                }
                if (!this.benchmarks[activityKey]) activityKey = 'Autre';
                data.activite = activityKey; // backward compat

                const ref = this.benchmarks[activityKey];
                const area = parseFloat(data.surface || data.surface_utile || data.area) || 100;

                // === ZONE CLIMATIQUE ===
                const zone = data.zone_climatique || this.getZoneFromCP(data.postalCode || data.batiment_cp);
                const zoneCorr = this.zoneCorrectifs[zone] || this.zoneCorrectifs['H2'];

                // === CONSOMMATION ===
                let isKwhPrioritaire = false;
                const getKwh = (kwh, eur, price) => {
                    if (kwh && parseFloat(kwh) > 0) { isKwhPrioritaire = true; return parseFloat(kwh); }
                    if (eur && parseFloat(eur) > 0) return parseFloat(eur) / price;
                    return 0;
                };
                let kwhElec = getKwh(data.elecKwh || data.elec_kwh || data.conso_elec_kwh, data.elecEuro || data.elec_euro || data.elec_eur || data.cout_elec_eur, this.prices.elec);
                let kwhGaz = getKwh(data.gasKwh || data.gaz_kwh || data.gas_kwh || data.conso_gaz_kwh, data.gasEuro || data.gaz_euro || data.gaz_eur || data.cout_gaz_eur, this.prices.gaz);
                let kwhTotal = kwhElec + kwhGaz;
                const isFallback = kwhTotal === 0;
                if (isFallback) kwhTotal = ref.med * area;

                const intensity = kwhTotal / area;
                const scoring = computeScoreFromIntensity(intensity, ref.med);
                const score = scoring.score;
                const positioning = scoring.positioning;
                const ratio = scoring.ratio;

                // === PRIX MOYEN PONDÉRÉ ===
                const billElec = parseFloat(data.elecEuro || data.elec_euro || data.elec_eur || data.cout_elec_eur) || 0;
                const billGaz = parseFloat(data.gasEuro || data.gaz_euro || data.gaz_eur || data.cout_gaz_eur) || 0;
                const aboElec = parseFloat(data.elecSubscriptionYearly || data.elec_abo_euro) || 0;
                const billElecNet = Math.max(0, billElec - aboElec);
                const implicitElec = (kwhElec > 0 && billElecNet > 0) ? billElecNet / kwhElec : this.prices.elec;
                const implicitGaz = (kwhGaz > 0 && billGaz > 0) ? billGaz / kwhGaz : this.prices.gaz;
                // Somme des kWh réellement saisis (avant substitution benchmark)
                const _kwhInput = kwhElec + kwhGaz;
                const _energiePrinc = data.energiePrincipale || data.energie_principale || data.energiePrincipale || 'electricite';
                const _prixParEnergie = _energiePrinc === 'gaz' ? this.prices.gaz : _energiePrinc === 'fioul' ? this.prices.fioul : _energiePrinc === 'bois_granules' ? this.prices.bois : this.prices.elec;
                const avgPrice = _kwhInput > 0
                    ? (kwhElec * implicitElec + kwhGaz * implicitGaz) / _kwhInput
                    : _prixParEnergie;
                const totalBill = Math.round(billElecNet + billGaz) || Math.round(kwhTotal * avgPrice);

                // === CORRECTIFS ANNÉE CONSTRUCTION ===
                const anneeKey = data.constructionYear || data.annee_construction || '2001-2012';
                const isEntrepot = activityKey.includes('Entrepôt');
                const anneeGrid = isEntrepot ? this.anneeCorrectifs.entrepot : this.anneeCorrectifs.general;
                const anneeCorr = anneeGrid[anneeKey] || 1.0;

                // === RÉPARTITION PAR POSTES ===
                const postesBase = this.postesRepartition[activityKey] || this.postesRepartition['Autre'];
                const postes = {};
                for (const [p, pct] of Object.entries(postesBase)) {
                    let corrMulti = 1.0;
                    if (p === 'chauffage') corrMulti = zoneCorr.chauffage * anneeCorr;
                    if (p === 'clim') corrMulti = zoneCorr.clim;
                    postes[p] = { pct, kwh: Math.round(kwhTotal * (pct / 100) * corrMulti), eur: 0 };
                }
                const sumKwh = Object.values(postes).reduce((s, p) => s + p.kwh, 0);
                if (sumKwh > 0) {
                    for (const p of Object.values(postes)) {
                        p.kwh = Math.round(p.kwh * kwhTotal / sumKwh);
                        p.eur = Math.round(p.kwh * avgPrice);
                    }
                }

                // === CO2 ===
                // Fallback sur l energie principale quand aucun kWh n est saisi (mode benchmark)
                const _co2FacteurPrinc = _energiePrinc === 'gaz' ? this.co2Factors.gaz
                    : _energiePrinc === 'reseau_chaleur' ? this.co2Factors.reseau
                        : _energiePrinc === 'fioul' ? this.co2Factors.fioul
                            : _energiePrinc === 'bois_granules' ? this.co2Factors.bois
                                : this.co2Factors.elec;
                const co2Total = _kwhInput > 0
                    ? Math.round(kwhElec * this.co2Factors.elec + kwhGaz * this.co2Factors.gaz)
                    : Math.round(kwhTotal * _co2FacteurPrinc);

                // === SÉLECTION DES ACTIONS (nouvelle bibliothèque) ===
                const travaux = data.travaux_realises || data.travauxRealises || [];
                const exclusionMap = {
                    'led_recent': ['ACT08'], 'vmc_df_recente': ['ACT12', 'ACT05'],
                    'chaudiere_pac_recente': ['ACT11'], 'regulation_recente': ['ACT02', 'ACT01'],
                    'calorifugeage_recent': ['ACT07'], 'isolation_toiture_recente': ['ACT10'],
                };
                const actionsExclues = travaux.flatMap(t => exclusionMap[t] || []);
                const heatingType = data.heating || data.chauffage_type || data.mainHeating || '';
                const vmcType = data.vmc_type || '';
                const hasECS = data.ecs_presente !== false;
                const eclairageType = data.eclairage_type || '';
                const isolToiture = data.isolation_toiture || '';
                const chaudiereAge = data.chauffage_age || '';
                const hasReseauEau = heatingType.includes('gaz') || heatingType.includes('chaudiere') || heatingType === 'reseau' || heatingType === 'eau_chaude';
                const chaudiereVieille = chaudiereAge.includes('10_20') || chaudiereAge.includes('20') || chaudiereAge === 'entre_10_20_ans' || chaudiereAge === 'plus_20_ans';
                const hasChaudiere = heatingType.includes('chaudiere') || heatingType.includes('gaz') || heatingType === 'gas';
                const isLED = eclairageType.includes('led_complet');

                let pool = this.actions.filter(a => {
                    if (actionsExclues.includes(a.id)) return false;
                    const p = a.prerequis;
                    if (p.includes('reseau_eau') && !hasReseauEau) return false;
                    if (p.includes('chaudiere_age_10plus') && !chaudiereVieille) return false;
                    if (p.includes('vmc_simple') && vmcType !== 'simple_auto') return false;
                    if (p.includes('vmc_presente') && !vmcType) return false;
                    if (p.includes('ecs_presente') && !hasECS) return false;
                    if (p.includes('chaudiere_presente') && !hasChaudiere) return false;
                    if (p.includes('eclairage_non_led') && isLED) return false;
                    if (p.includes('isolation_toiture_partielle_ou_nulle') && isolToiture === 'oui') return false;
                    return true;
                });

                const plafond = this.plafondGains[activityKey] || 0.60;
                let cumulGainPct = 0;
                let selectedActions = [];
                pool = pool.map(a => {
                    const scopePct = postesBase[a.scope] || 30;
                    const gainKwh = kwhTotal * (scopePct / 100) * (a.gainRange[1] / 100);
                    const gainEur = gainKwh * avgPrice;
                    let capex;
                    if (a.capexType === 'm2') capex = a.capRange[1] * area;
                    else if (a.capexType === 'point_lumineux') capex = a.capRange[1] * (area / 15);
                    else capex = a.capRange[1];
                    const roi = gainEur > 0 ? capex / gainEur : 999;
                    return { ...a, gainKwh: Math.round(gainKwh), gainEur: Math.round(gainEur), capex: Math.round(capex), roi: parseFloat(roi.toFixed(1)), gain_kwh: Math.round(gainKwh), gain_eur: Math.round(gainEur) };
                }).sort((a, b) => a.roi - b.roi);

                for (const a of pool) {
                    if (selectedActions.length >= 5) break;
                    if (cumulGainPct + (a.gainRange[1] / 100) * (postesBase[a.scope] || 30) / 100 > plafond) continue;
                    cumulGainPct += (a.gainRange[1] / 100) * (postesBase[a.scope] || 30) / 100;
                    selectedActions.push(a);
                }

                const totalSavingsKwh = selectedActions.reduce((s, a) => s + a.gainKwh, 0);
                const totalSavingsEur = selectedActions.reduce((s, a) => s + a.gainEur, 0);
                const totalCapexBrut = selectedActions.reduce((s, a) => s + a.capex, 0);

                // === AIDES ===
                let aidesTotal = 0;
                for (const a of selectedActions) {
                    if (a.cee) aidesTotal += a.capex * 0.015;
                    aidesTotal += a.capex * (0.20 - 0.055) / 1.20;
                }
                aidesTotal = Math.round(aidesTotal);
                const totalCapexNet = Math.max(0, totalCapexBrut - aidesTotal);

                // === ROI GLOBAL ===
                const roiGlobal = totalSavingsEur > 0 ? totalCapexNet / totalSavingsEur : 999;
                const graphiquePubliable = roiGlobal >= 0.5 && roiGlobal <= 20 && totalSavingsEur > 0;

                // === INFLATION PONDÉRÉE ===
                const partElec = kwhTotal > 0 ? kwhElec / kwhTotal : 0.5;
                const partGaz = kwhTotal > 0 ? kwhGaz / kwhTotal : 0.5;
                const tauxInflation = partElec * this.inflationTaux.elec + partGaz * this.inflationTaux.gaz;

                // === PROJECTION ===
                const horizonAns = roiGlobal > 10 && roiGlobal <= 20 ? 15 : 10;
                const projectionData = [{ annee: 'Auj.', sans_travaux: 0, avec_travaux: totalCapexNet, economies_nettes: -totalCapexNet }];
                let cumulSans = 0, cumulAvec = totalCapexNet;
                for (let an = 1; an <= horizonAns; an++) {
                    const f = Math.pow(1 + tauxInflation, an);
                    cumulSans += totalBill * f;
                    cumulAvec += (totalBill - totalSavingsEur) * f;
                    projectionData.push({
                        annee: `A+${an}`,
                        sans_travaux: Math.round(cumulSans),
                        avec_travaux: Math.round(cumulAvec),
                        economies_nettes: Math.round(cumulSans - cumulAvec),
                    });
                }

                // === SCORE MATURITÉ ===
                const mainGoal = data.mainGoal || data.objectif || data.objectif_principal || '';
                const horizon = data.timeHorizon || data.horizon || data.horizon_decision || '';
                const budget = data.budget || data.budget_travaux || '';
                let scoreMat = 0;
                if (horizon === 'immediat') scoreMat += 2;
                else if (horizon === 'moyen' || horizon === 'court' || horizon === 'court_terme') scoreMat += 1;
                if (budget && budget !== 'non_defini') scoreMat += 1;
                if (mainGoal === 'facture' || mainGoal === 'conformite' || mainGoal === 'conformite_reglementaire') scoreMat += 1;
                scoreMat = Math.min(5, scoreMat);

                const co2Apres = Math.round(co2Total * (1 - totalSavingsKwh / Math.max(kwhTotal, 1)));

                return {
                    // Calcul de base
                    id: data.id || ('DT-' + new Date().getFullYear() + '-' + Math.floor(Math.random() * 100000)),
                    date: data.date || new Date().toLocaleDateString(),
                    kwhTotal: Math.round(kwhTotal),
                    kwhElec: Math.round(kwhElec),
                    kwhGaz: Math.round(kwhGaz),
                    elecCost: Math.round(kwhElec * implicitElec),
                    gasCost: Math.round(kwhGaz * implicitGaz),
                    intensity: Math.round(intensity),
                    isFallback,
                    zone,
                    anneeCorr,
                    score,
                    positioning,
                    ratio: parseFloat(ratio.toFixed(2)),
                    ref,
                    activityKey,
                    // Financier
                    totalBill,
                    estimatedBill: totalBill,
                    avgPrice: parseFloat(avgPrice.toFixed(4)),
                    // Postes
                    postes,
                    // Actions
                    topActions: selectedActions,
                    totalSavingsEur: Math.round(totalSavingsEur),
                    totalSavingsKwh,
                    totalCapex: totalCapexBrut,
                    totalCapexBrut,
                    totalCapexNet,
                    aidesTotal,
                    // ROI et graphiques
                    roiGlobal: parseFloat(roiGlobal.toFixed(1)),
                    graphiquePubliable,
                    horizonAns,
                    projectionData,
                    tauxInflation: parseFloat(tauxInflation.toFixed(4)),
                    // CO2
                    co2Total,
                    emissionsActuelles: co2Total,
                    co2Evite: Math.round(co2Total - co2Apres),
                    co2Apres,
                    // Dashboard pro
                    scoreMaturite: scoreMat,
                    // Qualité données
                    isKwhPrioritaire,
                    badgeConfiance: isKwhPrioritaire ? 'Élevé' : isFallback ? 'Estimé' : 'Moyen',
                    // backward compat
                    formData: data,
                };
            }
        };

        // CO2 equivalences - ADEME 2023
        const CO2_ARBRE_KG_AN = 22;

        function getCO2Equivalences(co2KgEvite) {
            const arbres = Math.round(co2KgEvite / CO2_ARBRE_KG_AN);
            const voitures = (co2KgEvite / CO2_VOITURE_KG_AN).toFixed(1);
            const km = Math.round(co2KgEvite / CO2_VOITURE_KM);
            return { arbres, voitures, km };

        function getSectorialThresholds(ref) {
            if (!ref || !ref.med) return null;
            const med = ref.med;
            // Flat values used in THRESHOLD_LABELS: A=seuil max A, B=seuil max B, etc.
            return {
                A: Math.round(med * 0.60),
                B: Math.round(med * 0.90),
                C: Math.round(med * 1.20),
                D: Math.round(med * 1.70),
                E: '> ' + Math.round(med * 1.70),
            };
        }

        function computeScoreFromIntensity(intensityValue, medianValue) {
            const intensity = parseFloat(intensityValue) || 0;
            const median = parseFloat(medianValue) || 0;
            const ratioRaw = median > 0 ? intensity / median : 1;
            // Évite les effets de flottants sur les seuils (ex: 1.1999999)
            const ratio = parseFloat(ratioRaw.toFixed(4));
            if (ratio < 0.6) return { score: 'A', positioning: 'Très performant', ratio };
            if (ratio < 0.9) return { score: 'B', positioning: 'Performant', ratio };
            if (ratio < 1.2) return { score: 'C', positioning: 'Dans la médiane', ratio };
            if (ratio < 1.7) return { score: 'D', positioning: 'Surconsommation notable', ratio };
            return { score: 'E', positioning: 'Très énergivore', ratio };
        }

        function parseSurfaceValue(raw) {
            if (raw === null || raw === undefined) return 0;
            if (typeof raw === 'number') return raw > 0 ? raw : 0;
            if (typeof raw !== 'string') return 0;
            const normalized = raw.replace(/\s/g, '').replace(',', '.');
            const cleaned = normalized.replace(/[^\d.]/g, '');
            const parsed = parseFloat(cleaned);
            return Number.isFinite(parsed) && parsed > 0 ? parsed : 0;

            return [

            return {

        function getCapexBrutValue(source) {
            if (!source) return 0;
            const explicit = Number(source.totalCapexBrut ?? source.totalCapex);
            if (Number.isFinite(explicit) && explicit > 0) return Math.round(explicit);

            const net = Number(source.totalCapexNet);
            const aides = Number(source.aidesTotal ?? source.aidesEstimees);
            if (Number.isFinite(net) && Number.isFinite(aides) && (net > 0 || aides > 0)) {
                return Math.max(0, Math.round(net + aides));

            const actions = source.topActions || source.actions || [];
            const fromActions = actions.reduce((sum, a) => sum + (Number(a?.capex) || 0), 0);
            if (fromActions > 0) return Math.round(fromActions);

            if (Number.isFinite(net) && net > 0) return Math.round(net);
            return 0;

            const organization = await loadOrganizationRecord(profile.organization_id);

            let settings = await loadOrganizationSettings(organization.id, organization.name || DEFAULT_WORKSPACE_BRAND_NAME);
            let branding = await loadBrandingRecord(organization.id);
            let cases = await listProCases(organization.id);

            const migrationResult = await migrateLegacyWorkspaceIfNeeded({
                userId: user.id,

                settings,
                branding,
                userWorkspaceState
            });

            if (migrationResult.didMutate) {
                settings = await loadOrganizationSettings(organization.id, organization.name || DEFAULT_WORKSPACE_BRAND_NAME);
                branding = await loadBrandingRecord(organization.id);
                cases = await listProCases(organization.id);
                reports = await listProReports(organization.id);

        const Icon = ({ icon, style, className, width, height }) => {
            const name = icon ? icon.replace('solar:', '') : '';
            const d = SOLAR_ICONS[name];
            if (!d) return React.createElement('span', { className, style, 'data-icon': icon });
            const { fontSize, color, ...restStyle } = (style || {});
            const svgStyle = {
                display: 'inline-block',
                flexShrink: 0,
                verticalAlign: '-0.125em',
                lineHeight: 1,
                fontSize: fontSize || 'inherit',
                color: color,
                ...restStyle
            };
            return React.createElement('svg', {
                xmlns: 'http://www.w3.org/2000/svg',
                viewBox: '0 0 ' + d.w + ' ' + d.h,
                width: width || '1em',
                height: height || '1em',
                style: svgStyle,
                className,
                fill: 'currentColor',
                dangerouslySetInnerHTML: { __html: d.b }
            });
        };

        const ScoreBadge = ({ score, size }) => {
            const sz = size === 'lg' ? { width: 48, height: 48, borderRadius: 12, fontSize: 24 } : { width: 28, height: 28, borderRadius: 8, fontSize: 13 };
            return <span className={`score-badge score-${score}`} style={sz}>{score}</span>;
        };

        const ReliabilityBadge = ({ level }) => {
            const cls = level === 'élevé' ? 'rel-eleve' : level === 'moyen' ? 'rel-moyen' : 'rel-faible';
            return <span className={`rel-badge ${cls}`}>{level}</span>;
        };

        const AttentionBadge = ({ level }) => {
            const config = {
                'faible': { bg: '#F8FAFC', text: '#64748B', icon: 'solar:check-circle-bold' },
                'modéré': { bg: '#FEF9C3', text: '#A16207', icon: 'solar:info-circle-bold' },
                'à surveiller': { bg: '#FEE2E2', text: '#B91C1C', icon: 'solar:danger-triangle-bold' }
            };
            const { bg, text, icon } = config[level] || config['faible'];
            return (
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: '6px', padding: '4px 10px', background: bg, color: text, borderRadius: '6px', fontSize: '11px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                    <Icon icon={icon} style={{ fontSize: '14px' }} />
                    {level}
                </span>
            );
        };

        const StatusBadge = ({ status }) => {
            const cls = status === 'nouveau' ? 'status-nouveau' : status === 'projet' ? 'status-projet' : status === 'à relancer' ? 'status-relancer' : 'status-clos';
            return <span className={`status-badge ${cls}`}>{status}</span>;
        };

        const DEMO_MODAL_INITIAL_FORM = {
            name: '',
            company: '',
            email: '',
            mainChallenge: ''
        };

        /* ===== MODAL DEMO B2B (Mise à jour avec workflow complet et vidéo placeholder) ===== */
        const DemoModal = ({ isOpen, onClose }) => {
            const [step, setStep] = useState(1);
            const [form, setForm] = useState(DEMO_MODAL_INITIAL_FORM);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitError, setSubmitError] = useState(null);
            const [honeypot, setHoneypot] = useState('');
            const demoModalFormKey = 'pro-demo-modal';
            const setField = (key, value) => setForm(prev => ({ ...prev, [key]: value }));

            // Reset à la fermeture
            useEffect(() => {
                if (isOpen) {
                    markProFormRendered(demoModalFormKey);
                    setHoneypot('');
                    return;
                }

                setTimeout(() => {
                    setStep(1);
                    setForm(DEMO_MODAL_INITIAL_FORM);
                    setIsSubmitting(false);
                    setSubmitError(null);
                    setHoneypot('');
                }, 300);
            }, [isOpen]);

            if (!isOpen) return null;

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSubmitError(null);
                const antiSpamCheck = runProFormAntiSpamChecks({
                    formKey: demoModalFormKey,
                    honeypotValue: honeypot,
                    minimumDelayMs: 3000,
                    cooldownMs: 30000
                });

                if (!antiSpamCheck.ok) {
                    setSubmitError(antiSpamCheck.error);
                    return;
                }

                setIsSubmitting(true);
                setProFormCooldown(demoModalFormKey);

                const result = await submitProInterestLead({
                    source: 'saaspro_demo_modal',
                    name: form.name || null,
                    email: form.email || null,
                    company: form.company || null,
                    phone: null,
                    message: buildProInterestMessage(
                        form.mainChallenge ? `Enjeu principal: ${form.mainChallenge}` : null
                    ),
                    form: 'demo_modal',
                    main_challenge: form.mainChallenge || null
                });

                setIsSubmitting(false);

                if (!result.ok) {
                    clearProFormCooldown(demoModalFormKey);
                    setSubmitError("Impossible d'envoyer votre demande pour le moment. Merci de réessayer dans quelques instants.");
                    return;
                }

                setStep(2); // Passage écran succès
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-box fade-in" onClick={e => e.stopPropagation()}>
                        {step === 1 ? (
                            <div className="p-8 relative">
                                <button type="button" onClick={onClose} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400 transition-colors">
                                    <Icon icon="solar:close-circle-linear" style={{ fontSize: '24px' }} />
                                </button>

                                <div className="w-12 h-12 rounded-xl bg-blue-50 text-blue-700 flex items-center justify-center mb-5">
                                    <Icon icon="solar:presentation-graph-bold" style={{ fontSize: '24px' }} />
                                </div>
                                <h3 className="text-2xl font-bold text-slate-800 mb-2">Découvrir DiagTertiaire Pro</h3>
                                <p className="text-slate-600 mb-6 text-sm">
                                    Remplissez ce formulaire court. Notre équipe vous donnera accès à un environnement de présentation complet pour vous et vos collaborateurs.
                                </p>

                                <form onSubmit={handleSubmit} className="space-y-4">
                                    <div style={PRO_FORM_ANTISPAM_HONEYPOT_STYLE} aria-hidden="true">
                                        <label htmlFor="pro-demo-modal-website">Site web</label>
                                        <input
                                            id="pro-demo-modal-website"
                                            name="website"
                                            type="text"
                                            tabIndex="-1"
                                            autoComplete="off"
                                            value={honeypot}
                                            onChange={e => setHoneypot(e.target.value)}
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="pro-label">Prénom & Nom</label>
                                            <input type="text" className="pro-input" placeholder="Ex: Marie Dupont" value={form.name} onChange={e => setField('name', e.target.value)} required />
                                        </div>
                                        <div>
                                            <label className="pro-label">Société/ Cabinet</label>
                                            <input type="text" className="pro-input" placeholder="Ex: Nexity" value={form.company} onChange={e => setField('company', e.target.value)} required />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="pro-label">Email professionnel</label>
                                        <input type="email" className="pro-input" placeholder="marie@entreprise.com" value={form.email} onChange={e => setField('email', e.target.value)} required />
                                    </div>
                                    <div>
                                        <label className="pro-label">Enjeu principal (optionnel)</label>
                                        <select className="pro-input text-slate-600" value={form.mainChallenge} onChange={e => setField('mainChallenge', e.target.value)}>
                                            <option value="">Sélectionnez un enjeu</option>
                                            <option value="1">Génération de rapports en marque blanche</option>
                                            <option value="2">Supervision d'un parc immobilier multi-sites</option>
                                            <option value="3">Simplification des échanges avec les MOE</option>
                                            <option value="other">Autre besoin spécifique</option>
                                        </select>
                                    </div>

                                    {submitError && (
                                        <div className="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                                            {submitError}
                                        </div>
                                    )}

                                    <div className="pt-4">
                                        <button type="submit" disabled={isSubmitting} className="pro-btn pro-btn-primary w-full justify-center py-3 text-[15px] disabled:opacity-60">
                                            {isSubmitting ? 'Envoi...' : 'Accéder à la présentation'}
                                            <Icon icon="solar:arrow-right-linear" />
                                        </button>
                                        <p className="text-center mt-3 text-xs text-slate-400">
                                            Réponse sous 24h ouvrées. Aucun engagement.
                                        </p>
                                    </div>
                                </form>
                            </div>
                        ) : (
                            <div className="p-8 text-center relative fade-in">
                                <button type="button" onClick={onClose} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400 transition-colors">
                                    <Icon icon="solar:close-circle-linear" style={{ fontSize: '24px' }} />
                                </button>

                                <div className="w-16 h-16 mx-auto rounded-full bg-green-50 text-green-600 flex items-center justify-center mb-5">
                                    <Icon icon="solar:check-circle-bold" style={{ fontSize: '32px' }} />
                                </div>
                                <h3 className="text-2xl font-bold text-slate-800 mb-2">Demande envoyée avec succès</h3>
                                <p className="text-slate-600 mb-8 max-w-sm mx-auto text-sm">
                                    Un conseiller va préparer votre espace dédié et vous recontacter par email d'ici 24 heures ouvrées.
                                </p>

                                <div className="bg-slate-900 rounded-xl overflow-hidden shadow-inner relative" style={{ aspectRatio: '16/9' }}>
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400">
                                        <Icon icon="solar:play-bold" style={{ fontSize: '48px', color: 'rgba(255,255,255,0.2)', marginBottom: '12px' }} />
                                        <span className="font-semibold text-sm tracking-wide uppercase text-slate-500">Vidéo de présentation</span>
                                        <span className="text-xs text-slate-600 mt-1">Lancement en préparation</span>
                                    </div>
                                </div>

                                <button type="button" onClick={onClose} className="pro-btn pro-btn-secondary mt-8 w-full justify-center">
                                    Fermer et retourner au tableau de bord
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        /* ===== CHATBOT PRO B2B (Fermé par défaut, textes B2B pro) ===== */
        const ChatbotWidget = () => {
            const [isOpen, setIsOpen] = useState(false);
            const [openQuestion, setOpenQuestion] = useState(null);

            const toggleQ = (idx) => {
                setOpenQuestion(openQuestion === idx ? null : idx);
            };

            return (
                <div className="chatbot-widget">
                    {isOpen && (
                        <div className="chatbot-panel fade-in flex flex-col h-[480px]">
                            <div className="bg-slate-900 text-white p-5 relative shrink-0">
                                <div className="absolute right-4 top-4">
                                    <button type="button" onClick={() => setIsOpen(false)} className="text-slate-400 hover:text-white transition-colors">
                                        <Icon icon="solar:close-circle-bold" style={{ fontSize: '24px' }} />
                                    </button>
                                </div>
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center">
                                        <Icon icon="solar:user-bold" style={{ fontSize: '20px' }} />
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-sm">Équipe Pro</h4>
                                        <div className="flex items-center gap-1.5 text-xs text-blue-300">
                                            <div className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"></div>
                                            <span>En ligne</span>
                                        </div>
                                    </div>
                                </div>
                                <p className="text-sm text-slate-300">Comment puis-je vous aider dans votre lecture des dossiers ?</p>
                            </div>

            const noteModal = editingNoteId ? (() => {
                const saveNote = async () => {

                        setEditingNoteId(null);

        /* ===== RAPPORT DOSSIER - redirige vers ProReport ===== */
        /* ===== ProCaseReport - Rapport pour dossiers générés via le wizard 7 modules ===== */
        const ProCaseReport = ({
            caseId,
            setPage,
            sharedCase,
            cases = [],
            reportsByCaseId = {},
            settings = DEFAULT_ORGANIZATION_SETTINGS,
            branding = DEFAULT_ORGANIZATION_BRANDING,
            organization = null,
            onSyncReportPdfMetadata,
            onDeleteCase
        }) => {
            // Hooks avant tout return conditionnel (règle des hooks React)
            const sourceCase = sharedCase || resolveWorkspaceCaseForReport(caseId, cases, reportsByCaseId);
            const c = sourceCase?._isLocalExample && sourceCase?.diagnostic_data
                ? { ...sourceCase.diagnostic_data, ...sourceCase }
                : sourceCase;
            const isProAuth = !sharedCase && !!getActiveProUserId();
            const [officialPdfPending, setOfficialPdfPending] = useState(false);
            const [officialPdfError, setOfficialPdfError] = useState('');
            const [officialPdfSuccess, setOfficialPdfSuccess] = useState('');
            const [officialPdfUrl, setOfficialPdfUrl] = useState('');
            const [officialPdfFile, setOfficialPdfFile] = useState(null);
            const [officialPdfOpenBlocked, setOfficialPdfOpenBlocked] = useState(false);

            useEffect(() => {
                let isCancelled = false;

                const hydrateOfficialPdfAccess = async () => {
                    if (!isProAuth || sharedCase || !c?.latestPdfFileId || !organization?.id) {
                        if (!isCancelled) {
                            setOfficialPdfUrl('');
                            setOfficialPdfFile(null);
                            setOfficialPdfOpenBlocked(false);
                        }
                        return;
                    }

                    try {
                        const access = await resolveStoredPdfAccess({
                            report: c,
                            organizationId: organization.id,
                            latestPdfFile: officialPdfFile && officialPdfFile.id === c.latestPdfFileId
                                ? officialPdfFile
                                : null
                        });

                        if (!isCancelled) {
                            setOfficialPdfUrl(access.url || '');
                            setOfficialPdfFile(access.fileRecord || null);
                        }
                    } catch (error) {
                        if (!isCancelled) {
                            setOfficialPdfUrl('');
                            setOfficialPdfFile(null);
                        }
                        console.warn('Impossible de préparer l\'accès au PDF officiel :', error);
                    }
                };

                hydrateOfficialPdfAccess();

                return () => {
                    isCancelled = true;
                };
            }, [isProAuth, sharedCase, organization?.id, c?.latestPdfFileId, c?.reportRecordId]);

            if (!c) return (
                <div className="p-8 text-center">
                    <div className="text-red-500 font-bold text-lg mb-4">Rapport introuvable.</div>

                        <span className="flex items-center gap-2">
                            <Icon icon="solar:alt-arrow-left-linear" />
                            Retour aux dossiers
                        </span>
                    </button>

            );

            const rawResult = c.engineResult
                || (c.formData ? ENGINE_PRO.compute(c.formData) : null)
                || buildEngineResultFromMock(c);
            const r = normalizeEngineResult(rawResult, c.benchmark?.median || c.benchmark?.med || 0);
            const reportNarrative = buildCanonicalReportNarrative(c, r);

            const proLogoImg = isProAuth ? resolveBrandPreviewUrl(branding) : '';
            const proLogoName = isProAuth ? resolveBrandName(settings, organization) : DEFAULT_WORKSPACE_BRAND_NAME;
            const hasCustomBranding = !!(proLogoImg || proLogoName !== DEFAULT_WORKSPACE_BRAND_NAME);
            const isLocalExample = !!c._isLocalExample;
            const reportAccent = typeof settings?.accent === 'string' && settings.accent.trim()
                ? settings.accent.trim()
                : DEFAULT_WORKSPACE_ACCENT;
            const withAccentAlpha = (alphaHex) => (
                /^#[0-9A-Fa-f]{6}$/.test(reportAccent)
                    ? `${reportAccent}${alphaHex}`
                    : reportAccent
            );
            const reportAccentSoft = withAccentAlpha('22');
            const reportAccentBorder = withAccentAlpha('38');
            const reportAccentText = withAccentAlpha('CC');
            const canGenerateOfficialPdf = isProAuth && !sharedCase && !isLocalExample && !!c.reportRecordId && !!organization?.id;
            const hasOfficialPdfAvailable = !!(c.latestPdfFileId || officialPdfUrl);
            const isOfficialPdfBusy = officialPdfPending || c.pdfStatus === 'generating';
            const effectivePdfError = officialPdfError || c.pdfError || '';
            const effectivePdfSuccess = officialPdfSuccess || (
                c.pdfStatus === 'ready' && c.latestPdfGeneratedAtLabel
                    ? `PDF officiel enregistré le ${c.latestPdfGeneratedAtLabel}.`
                    : ''
            );

            const openOfficialPdfWindow = () => {
                const pdfWindow = window.open('', '_blank');
                if (!pdfWindow) {
                    return null;
                }

                try {
                    pdfWindow.opener = null;
                    pdfWindow.document.title = 'Preparation du PDF officiel';
                    pdfWindow.document.body.innerHTML = `
                        <div style="margin:0;padding:32px;font-family:Inter,Arial,sans-serif;background:#f8fafc;color:#0f172a;">
                            <div style="max-width:480px;margin:0 auto;background:#ffffff;border:1px solid #e2e8f0;border-radius:20px;padding:24px;box-shadow:0 10px 30px rgba(15,23,42,0.08);">
                                <div style="font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#64748b;margin-bottom:12px;">DiagTertiaire Pro</div>
                                <h1 style="margin:0 0 12px;font-size:22px;line-height:1.2;">Preparation du PDF officiel...</h1>
                                <p style="margin:0;font-size:14px;line-height:1.7;color:#475569;">Le document va s'ouvrir automatiquement des qu'il est pret.</p>
                            </div>
                        </div>
                    `;
                    pdfWindow.document.close();
                } catch (error) {
                    console.warn('Impossible de preparer la fenetre PDF officielle :', error);
                }

                return pdfWindow;
            };

            const closeOfficialPdfWindow = (pdfWindow) => {
                if (!pdfWindow || pdfWindow.closed) {
                    return;
                }

                try {
                    pdfWindow.close();
                } catch (error) {
                    console.warn('Impossible de fermer la fenetre PDF officielle :', error);
                }
            };

            const navigateOfficialPdfWindow = (pdfWindow, url) => {
                if (!url) {
                    return false;
                }

                if (pdfWindow && !pdfWindow.closed) {
                    try {
                        pdfWindow.location.replace(url);
                        return true;
                    } catch (error) {
                        console.warn('Impossible de rediriger la fenetre PDF officielle :', error);
                    }
                }

                const openedWindow = window.open(url, '_blank', 'noopener,noreferrer');
                return !!openedWindow;
            };

            const handlePrintPdf = () => {
                const orig = document.title;
                document.title = `Rapport_${c.clientName || c.id}`;
                window.print();
                document.title = orig;
            };

            const handleGenerateOfficialPdf = async () => {
                if (!canGenerateOfficialPdf || isOfficialPdfBusy) {
                    return;
                }

                const pdfWindow = openOfficialPdfWindow();
                setOfficialPdfPending(true);
                setOfficialPdfError('');
                setOfficialPdfSuccess('');
                setOfficialPdfOpenBlocked(false);

                try {
                    const generationResult = await requestOfficialPdfGeneration(c.reportRecordId);
                    const syncedResult = await (onSyncReportPdfMetadata
                        ? onSyncReportPdfMetadata(c.reportRecordId, generationResult)
                        : syncReportPdfMetadata({
                            reportId: c.reportRecordId,
                            organizationId: organization.id,
                            generationResult
                        }));

                    const access = await resolveStoredPdfAccess({
                        report: syncedResult.report,
                        organizationId: organization.id,
                        latestPdfFile: syncedResult.latestPdfFile
                    });

                    setOfficialPdfFile(access.fileRecord || syncedResult.latestPdfFile || null);
                    setOfficialPdfUrl(access.url || '');
                    setOfficialPdfSuccess('PDF officiel généré et sauvegardé dans votre espace privé.');

                    const didOpen = navigateOfficialPdfWindow(pdfWindow, access.url || '');
                    if (!didOpen) {
                        setOfficialPdfOpenBlocked(true);
                        setOfficialPdfError("Le navigateur a bloqué l'ouverture automatique. Utilisez le bouton ci-dessous pour ouvrir le PDF officiel.");
                    }
                } catch (error) {
                    closeOfficialPdfWindow(pdfWindow);
                    try {
                        await (onSyncReportPdfMetadata
                            ? onSyncReportPdfMetadata(c.reportRecordId)
                            : syncReportPdfMetadata({
                                reportId: c.reportRecordId,
                                organizationId: organization.id
                            }));
                    } catch (syncError) {
                        console.warn('Impossible de rafraîchir les métadonnées PDF après échec :', syncError);
                    }

                    setOfficialPdfError(error?.message || "Impossible de générer le PDF officiel.");
                } finally {
                    setOfficialPdfPending(false);
                }
            };

            const handleOpenOfficialPdf = async () => {
                if (!canGenerateOfficialPdf) {
                    return;
                }

                const pdfWindow = openOfficialPdfWindow();
                setOfficialPdfError('');
                setOfficialPdfSuccess('');
                setOfficialPdfOpenBlocked(false);

                try {
                    const access = await resolveStoredPdfAccess({
                        report: c,
                        organizationId: organization.id,
                        latestPdfFile: officialPdfFile && officialPdfFile.id === c.latestPdfFileId
                            ? officialPdfFile
                            : null
                    });

                    if (!access.url) {
                        throw new Error("Aucun PDF officiel sauvegardé n'est disponible pour ce rapport.");
                    }

                    setOfficialPdfFile(access.fileRecord || null);
                    setOfficialPdfUrl(access.url);

                    const didOpen = navigateOfficialPdfWindow(pdfWindow, access.url);
                    if (!didOpen) {
                        setOfficialPdfOpenBlocked(true);
                        setOfficialPdfError("Le navigateur a bloqué l'ouverture automatique. Utilisez le bouton ci-dessous pour ouvrir le PDF officiel.");
                    }
                } catch (error) {
                    closeOfficialPdfWindow(pdfWindow);
                    setOfficialPdfError(error?.message || "Impossible d'ouvrir le PDF officiel.");
                }
            };

            const handleShare = () => {
                const { phone, email, contact_telephone, telephone, contact_email, ...publicData } = c.formData || {};
                const shareData = { ...c, id: c.id, clientName: c.clientName, engineResult: r, formData: publicData };
                delete shareData.phone;
                delete shareData.email;
                // Données pro - JAMAIS dans le lien partagé
                delete shareData.noteInterne;
                delete shareData.scoreMaturite;
                delete shareData.urgenceVerbatim;
                if (shareData.contact) {
                    const { phone: contactPhone, email: contactEmail, ...safeContact } = shareData.contact;
                    shareData.contact = safeContact;
                }
                let encoded;
                try { encoded = btoa(unescape(encodeURIComponent(JSON.stringify(shareData)))); } catch (e) { encoded = btoa(JSON.stringify(shareData)); }
                const url = window.location.href.split('#')[0] + '#report=' + encoded;
                if (navigator.clipboard) navigator.clipboard.writeText(url).then(() => alert('Lien copié !')).catch(() => prompt('Lien :', url));
                else prompt('Lien :', url);
            };

            const handleDeleteLocalExample = async () => {
                if (!isLocalExample || !onDeleteCase) {
                    return;
                }

                if (!window.confirm("Supprimer ce dossier exemple de votre espace ?")) {
                    return;
                }

                try {
                    await onDeleteCase(c.id);
                } catch (error) {
                    window.alert(error?.message || "Impossible de supprimer ce dossier exemple pour le moment.");
                }
            };

            const COLORS = { chauffage: '#F97316', clim: '#06B6D4', ventil: '#3B82F6', eclairage: '#F59E0B', ecs: '#8B5CF6', autres: '#94A3B8' };
            const LABELS = { chauffage: 'Chauffage', clim: 'Climatisation', ventil: 'Ventilation', eclairage: 'Éclairage', ecs: 'ECS', autres: 'Autres' };
            const OBJECTIF_LABELS = { reduction_charges: 'Reduction des charges', conformite_reglementaire: 'Conformite reglementaire (Decret Tertiaire)', valorisation_patrimoine: 'Valorisation du patrimoine', confort_occupants: 'Amelioration du confort', demarche_rse: 'Demarche RSE', facture: 'Reduction des charges', conformite: 'Conformite reglementaire', valo: 'Valorisation patrimoine' };
            const HORIZON_LABELS = { immediat: 'Immediat (moins de 3 mois)', court_terme: 'Court terme (3-12 mois)', '1an': 'Court terme (3-12 mois)', moyen: 'Moyen terme (1-3 ans)', long: 'Long terme (plus de 3 ans)', '3ans': 'Moyen terme', '5ans': 'Long terme' };
            const BUDGET_LABELS = { moins_5k: 'Moins de 5 000 euros', '5k_20k': '5 000 a 20 000 euros', '10k-30k': '10 000 a 30 000 euros', '20k_50k': '20 000 a 50 000 euros', '30k-100k': '30 000 a 100 000 euros', '50k_200k': '50 000 a 200 000 euros', plus_100k: 'Plus de 100 000 euros', plus_200k: 'Plus de 200 000 euros', non_defini: 'Non defini', plus_50k: 'Plus de 50 000 euros' };

            return (
                <div className="p-4 md:p-8 max-w-5xl mx-auto">
                    {/* Barre navigation */}
                    <div className="no-print flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-6 bg-white p-3 sm:p-4 rounded-xl border border-slate-200 shadow-sm sticky top-0 z-40">
                        {isProAuth ? (
                            <button onClick={() => setPage('cases')} className="inline-flex items-center gap-2 text-slate-500 hover:text-blue-600 font-bold text-sm px-3 py-2 hover:bg-slate-50 rounded-lg transition-colors">
                                <Icon icon="solar:round-alt-arrow-left-bold" className="text-lg" />
                                <span className="hidden sm:inline">Retour Dossiers</span>
                                <span className="sm:hidden">Retour</span>
                            </button>
                        ) : (
                            <button onClick={() => setPage('cases')} className="inline-flex items-center gap-2 text-slate-500 hover:text-blue-600 font-bold text-sm px-3 py-2 hover:bg-slate-50 rounded-lg transition-colors">
                                <Icon icon="solar:round-alt-arrow-left-bold" className="text-lg" />
                                <span className="hidden sm:inline">Retour</span>
                                <span className="sm:hidden">Retour</span>
                            </button>

                        <div className="flex gap-2 w-full sm:w-auto flex-wrap">
                            {isLocalExample && isProAuth && !sharedCase && (
                                <div className="inline-flex items-center rounded-xl border border-amber-200 bg-amber-50 px-3 py-2 text-xs font-bold uppercase tracking-[0.08em] text-amber-700">
                                    Rapport exemple - donnees fictives

                            {canGenerateOfficialPdf && hasOfficialPdfAvailable ? (
                                <button onClick={handleOpenOfficialPdf} className="pro-btn pro-btn-primary flex-1 sm:flex-none text-sm px-3 py-2">
                                    <Icon icon="solar:download-bold" />
                                    <span className="hidden sm:inline">Ouvrir le PDF officiel</span>
                                    <span className="sm:hidden">Ouvrir</span>
                                </button>
                            ) : canGenerateOfficialPdf ? (
                                <button
                                    onClick={handleGenerateOfficialPdf}
                                    disabled={isOfficialPdfBusy}
                                    className={`pro-btn pro-btn-primary flex-1 sm:flex-none text-sm px-3 py-2 ${isOfficialPdfBusy ? 'opacity-70 cursor-wait' : ''}`}
                                >
                                    <Icon icon={isOfficialPdfBusy ? "solar:refresh-bold" : "solar:file-download-bold"} className={isOfficialPdfBusy ? 'animate-spin' : ''} />
                                    <span className="hidden sm:inline">
                                        {isOfficialPdfBusy ? 'Generation en cours...' : 'Generer le PDF officiel'}
                                    </span>
                                    <span className="sm:hidden">
                                        {isOfficialPdfBusy ? 'Gen...' : 'Generer'}
                                    </span>
                                </button>
                            ) : null}

                            {canGenerateOfficialPdf && hasOfficialPdfAvailable && (
                                <button
                                    onClick={handleGenerateOfficialPdf}
                                    disabled={isOfficialPdfBusy}
                                    className={`pro-btn flex-1 sm:flex-none text-sm px-3 py-2 ${isOfficialPdfBusy ? 'bg-slate-300 text-slate-600 cursor-wait' : 'pro-btn-secondary'}`}
                                >
                                    <Icon icon={isOfficialPdfBusy ? "solar:refresh-bold" : "solar:refresh-linear"} className={isOfficialPdfBusy ? 'animate-spin' : ''} />
                                    <span className="hidden sm:inline">
                                        {isOfficialPdfBusy ? 'Mise a jour en cours...' : 'Regenerer'}
                                    </span>
                                    <span className="sm:hidden">
                                        {isOfficialPdfBusy ? 'Maj...' : 'Maj'}
                                    </span>
                                </button>

                            <button onClick={handlePrintPdf} className={`pro-btn flex-1 sm:flex-none text-sm px-3 py-2 ${isLocalExample ? 'pro-btn-primary' : 'border border-slate-200 bg-white text-slate-700 hover:bg-slate-50'}`}>
                                <Icon icon="solar:file-download-bold" />
                                <span className="hidden sm:inline">{isLocalExample ? 'Télécharger PDF' : 'Export PDF local'}</span>
                                <span className="sm:hidden">PDF</span>
                            </button>
                            {isProAuth && !sharedCase && (
                                <button onClick={handleShare} className="pro-btn pro-btn-primary flex-1 sm:flex-none text-sm px-3 py-2">
                                    <Icon icon="solar:link-bold" />
                                    <span className="hidden sm:inline">Partager</span>
                                    <span className="sm:hidden">Lien</span>
                                </button>
                            )}
                            {isLocalExample && isProAuth && !sharedCase && (
                                <button onClick={handleDeleteLocalExample} className="pro-btn flex-1 sm:flex-none text-sm px-3 py-2 border border-red-200 bg-red-50 text-red-700 hover:bg-red-100">
                                    <Icon icon="solar:trash-bin-minimalistic-bold" />
                                    <span className="hidden sm:inline">Supprimer ce dossier exemple</span>
                                    <span className="sm:hidden">Supprimer</span>
                                </button>
                            )}
                        </div>
                    </div>

                    {isLocalExample && isProAuth && !sharedCase && (
                        <div className="no-print mb-6 rounded-2xl border border-amber-200 bg-amber-50 px-4 py-4 shadow-sm">

                                    </div>

                                    </div>

                    {/* Étiquettes DiagTertiaire - avant/après travaux */}
                    {r && (() => {
                        const SCORE_CONFIG = {

                            B: { color: '#4CAF50', bg: '#E8F5E9', label: 'B', text: 'Performant' },
                            C: { color: '#F59E0B', bg: '#FEF3C7', label: 'C', text: 'Dans la médiane' },
                            D: { color: '#F97316', bg: '#FFF7ED', label: 'D', text: 'Surconsommation' },
                            E: { color: '#EF4444', bg: '#FEF2F2', label: 'E', text: 'Très énergivore' },
                        };
                        // Score après travaux : calculer la nouvelle intensité
                        const savingsPct = r.kwhTotal > 0 ? r.totalSavingsKwh / r.kwhTotal : 0;
                        const intensiteApres = Math.round(r.intensity * (1 - savingsPct));
                        const scoreApres = c.formData
                            ? (c.scoreApresTravauxLabel || computeScoreFromIntensity(intensiteApres, r.ref?.med || 0).score)
                            : computeScoreFromIntensity(intensiteApres, r.ref?.med || 0).score;
                        const cfgAvant = SCORE_CONFIG[r.score] || SCORE_CONFIG['C'];
                        const cfgApres = SCORE_CONFIG[scoreApres] || SCORE_CONFIG['C'];
                        const shouldShowScoreBands = !!c.formData || r.score !== scoreApres;

                        const EtiquetteBande = ({ score, intensite, label, sectorRef }) => {
                            const ORDER = ['A', 'B', 'C', 'D', 'E'];
                            const thresholds = getSectorialThresholds(sectorRef);
                            const THRESHOLD_LABELS = thresholds ? {
                                A: '< ' + thresholds.A + ' kWh',
                                B: thresholds.A + ' - ' + thresholds.B + ' kWh',
                                C: thresholds.B + ' - ' + thresholds.C + ' kWh',
                                D: thresholds.C + ' - ' + thresholds.D + ' kWh',
                                E: '> ' + thresholds.D + ' kWh',

                                        {label}

                                    {ORDER.map(s => {
                                        const cfg = SCORE_CONFIG[s];
                                        const isActive = s === score;
                                        return (
                                            <div key={s} className="flex items-center gap-2 px-3 py-1.5 border-b border-slate-50 last:border-0"
