            <div className="bg-white border-b border-slate-200 px-4 md:px-8 py-4 flex items-center justify-between sticky top-0 z-30 shadow-sm shadow-slate-200/40">
                <div className="flex items-center gap-3">
                    <button type="button" onClick={toggleMobile} className="lg:hidden w-12 h-12 flex items-center justify-center rounded-xl bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200 transition-colors">
                        <Icon icon="solar:hamburger-menu-linear" style={{ fontSize: '24px' }} />
                    </button>
                    <h1 className="text-xl font-bold text-slate-800 tracking-tight hidden sm:block">{title}</h1>
                </div>

                <div className="flex items-center gap-4">
                    <a href="index.html" className="text-sm font-semibold text-blue-600 hover:text-blue-800 transition-colors hidden sm:flex items-center gap-1.5">
                        Site public <Icon icon="solar:square-top-down-linear" className="rotate-90 mt-0.5" />
                    </a>
                </div>
            </div>
        );

        const ProLanding = ({ authError, recoveryState, onOpenLegalModal, onClearPersonalData }) => {
            const copy = PRO_LANDING_COPY;
            const heroBadges = copy.hero.badges.slice(0, 2);
            const heroStats = copy.hero.stats.slice(0, 2);
            const [authMode, setAuthMode] = React.useState('login');
            const [form, setForm] = React.useState({
                fullName: '',
                email: '',
                company: '',
                password: '',
                confirmPassword: '',
                role: '',
                loginPassword: '',
            });
            const [recoveryForm, setRecoveryForm] = React.useState({
                password: '',
                confirmPassword: '',
            });
            const [isSubmitting, setIsSubmitting] = React.useState(false);
            const [successState, setSuccessState] = React.useState(null);
            const [submitError, setSubmitError] = React.useState(null);
            const [honeypot, setHoneypot] = React.useState('');
            const landingFormKey = 'pro-landing-form';
            const [isSendingMagicLink, setIsSendingMagicLink] = React.useState(false);
            const [magicLinkError, setMagicLinkError] = React.useState(null);
            const [magicLinkSuccess, setMagicLinkSuccess] = React.useState(null);
            const [isSendingPasswordReset, setIsSendingPasswordReset] = React.useState(false);
            const [passwordResetError, setPasswordResetError] = React.useState(null);
            const [passwordResetSuccess, setPasswordResetSuccess] = React.useState(null);
            const [isUpdatingPassword, setIsUpdatingPassword] = React.useState(false);
            const [passwordUpdateError, setPasswordUpdateError] = React.useState(null);
            const [magicLinkCooldownSec, setMagicLinkCooldownSec] = React.useState(0);
            const [passwordResetCooldownSec, setPasswordResetCooldownSec] = React.useState(0);
            const magicLinkCooldownTimerRef = React.useRef(null);
            const passwordResetCooldownTimerRef = React.useRef(null);
            const submitted = !!successState;
            const isFirstAccessSetup = recoveryState?.mode === 'first_access';
            const isRecoveryMode = recoveryState?.mode === 'recovery';

            React.useEffect(() => {
                markProFormRendered(landingFormKey);
                const obs = new IntersectionObserver(
                    entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
                    { threshold: 0.1 }
                );
                document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

                // Retour depuis l'email de confirmation de compte
                // Supabase ajoute ?type=signup ou #type=signup selon le flow
                const searchType = new URLSearchParams(window.location.search).get('type') || '';
                const hashType = new URLSearchParams((window.location.hash || '').slice(1)).get('type') || '';
                const isSignupCallback = searchType === 'signup' || hashType === 'signup';
                const pendingEmail = (() => { try { return sessionStorage.getItem('pro_pending_confirm_email') || ''; } catch (_) { return ''; } })();
                if (isSignupCallback && pendingEmail) {
                    setAuthMode('login');
                    setForm(prev => ({ ...prev, email: pendingEmail }));
                    setMagicLinkSuccess('Votre adresse email est confirmée. Connectez-vous avec votre mot de passe.');
                    try { sessionStorage.removeItem('pro_pending_confirm_email'); } catch (_) { }
                    const el = document.getElementById('pro-access-form');
                    if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);
                }

                return () => {
                    obs.disconnect();
                    if (magicLinkCooldownTimerRef.current) clearInterval(magicLinkCooldownTimerRef.current);
                    if (passwordResetCooldownTimerRef.current) clearInterval(passwordResetCooldownTimerRef.current);
                };
            }, []);

            React.useEffect(() => {
                setSubmitError(null);
                setMagicLinkError(null);
                setMagicLinkSuccess(null);
                setPasswordResetError(null);
                setPasswordResetSuccess(null);
            }, [authMode]);

            React.useEffect(() => {
                if (recoveryState?.active) {
                    setSuccessState(null);
                    setSubmitError(null);
                    setMagicLinkError(null);
                    setMagicLinkSuccess(null);
                    setPasswordResetError(null);
                    setPasswordResetSuccess(null);
                    setPasswordUpdateError(null);
                    // Scroll automatique vers la section auth au retour depuis l'email de reset
                    const el = document.getElementById('pro-access-form');
                    if (el) {
                        setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
                    }
                }
            }, [recoveryState?.active, recoveryState?.mode]);

            const [isMobileNavOpen, setIsMobileNavOpen] = React.useState(false);

            const scrollToSection = (id) => {
                setIsMobileNavOpen(false);
                const node = document.getElementById(id);
                if (node) node.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };

            const setField = (key, value) => setForm(prev => ({ ...prev, [key]: value }));
            const setRecoveryField = (key, value) => setRecoveryForm(prev => ({ ...prev, [key]: value }));

            const clearInlineFeedback = () => {
                setSubmitError(null);
                setMagicLinkError(null);
                setMagicLinkSuccess(null);
                setPasswordResetError(null);
                setPasswordResetSuccess(null);
                setPasswordUpdateError(null);
            };

            const requestMagicLink = async ({ email, fullName, companyName }, options = {}) => {
                const {
                    showSuccessMessage = true,
                    successMessage,
                    shouldCreateUser = false,
                    onboardingFlow = ''
                } = options;
                const normalizedEmail = typeof email === 'string' ? email.trim() : '';
                const normalizedFullName = typeof fullName === 'string' ? fullName.trim() : '';
                const normalizedCompanyName = typeof companyName === 'string' ? companyName.trim() : '';

                if (!normalizedEmail) {
                    setPasswordResetSuccess(null);
                    setPasswordResetError(null);
                    setMagicLinkSuccess(null);
                    setMagicLinkError("Renseignez votre email professionnel pour recevoir le lien de connexion.");
                    return false;
                }

                setIsSendingMagicLink(true);
                setMagicLinkError(null);
                setMagicLinkSuccess(null);
                setPasswordResetError(null);
                setPasswordResetSuccess(null);

                try {
                    const result = await sendMagicLink(normalizedEmail, {
                        fullName: normalizedFullName,
                        companyName: normalizedCompanyName,
                        onboardingFlow,
                        passwordSetupRequired: shouldCreateUser
                    }, {
                        shouldCreateUser
                    });

                    if (!result.ok) {
                        setMagicLinkError(result.error || "Impossible d'envoyer le lien de connexion pour le moment.");
                        return false;
                    }

                    // Démarrer un cooldown de 10 secondes après envoi réussi
                    setMagicLinkCooldownSec(10);
                    if (magicLinkCooldownTimerRef.current) clearInterval(magicLinkCooldownTimerRef.current);
                    magicLinkCooldownTimerRef.current = setInterval(() => {
                        setMagicLinkCooldownSec(prev => {
                            if (prev <= 1) {
                                clearInterval(magicLinkCooldownTimerRef.current);
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);

                    if (showSuccessMessage) {
                        setMagicLinkSuccess(successMessage || `Lien de connexion envoyé à ${normalizedEmail}. Vérifiez votre boîte mail et vos spams.`);
                    }
                    return true;
                } finally {
                    setIsSendingMagicLink(false);
                }
            };

            const handlePasswordResetRequest = async () => {
                clearInlineFeedback();
                setIsSendingPasswordReset(true);

                try {
                    const result = await requestPasswordReset(form.email);
                    if (!result.ok) {
                        setPasswordResetError(result.error || "Impossible d'envoyer le lien de réinitialisation pour le moment.");
                        return false;
                    }

                    // Démarrer un cooldown de 10 secondes après envoi réussi
                    setPasswordResetCooldownSec(10);
                    if (passwordResetCooldownTimerRef.current) clearInterval(passwordResetCooldownTimerRef.current);
                    passwordResetCooldownTimerRef.current = setInterval(() => {
                        setPasswordResetCooldownSec(prev => {
                            if (prev <= 1) {
                                clearInterval(passwordResetCooldownTimerRef.current);
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);

                    setPasswordResetSuccess(`Lien de réinitialisation envoyé à ${form.email.trim()}. Vérifiez votre boîte mail et vos spams.`);
                    return true;
                } finally {
                    setIsSendingPasswordReset(false);
                }
            };

            const handleSignupSubmit = async (e) => {
                e.preventDefault();
                clearInlineFeedback();
                setSuccessState(null);

                if (form.password.length < AUTH_MIN_PASSWORD_LENGTH) {
                    setSubmitError(`Le mot de passe doit contenir au moins ${AUTH_MIN_PASSWORD_LENGTH} caractères.`);
                    return;
                }

                if (form.password !== form.confirmPassword) {
                    setSubmitError("Les deux mots de passe ne correspondent pas.");
                    return;
                }

                const antiSpamCheck = runProFormAntiSpamChecks({
                    formKey: landingFormKey,
                    honeypotValue: honeypot,
                    minimumDelayMs: 3000,
                    cooldownMs: 30000
                });

                if (!antiSpamCheck.ok) {
                    setSubmitError(antiSpamCheck.error);
                    return;
                }

                setIsSubmitting(true);
                setProFormCooldown(landingFormKey);
                const payload = { ...form, requestedAt: new Date().toISOString(), source: 'saaspro_pro_landing' };

                try {
                    const result = await submitProInterestLead({
                        source: payload.source,
                        name: form.fullName || null,
                        email: form.email || null,
                        company: form.company || null,
                        phone: null,
                        message: buildProInterestMessage(
                            null,
                            form.role ? `Métier: ${form.role}` : null
                        ),
                        form: 'pro_landing',
                        role: form.role || null,
                        requestedAt: payload.requestedAt
                    });

                    if (!result.ok) {
                        clearProFormCooldown(landingFormKey);
                        setSubmitError("Impossible d'envoyer votre demande pour le moment. Merci de réessayer dans quelques instants.");
                        return;
                    }

                    const authResult = await signUpWithPassword({
                        email: form.email,
                        password: form.password,
                        fullName: form.fullName,
                        companyName: form.company
                    });

                    if (!authResult.ok) {
                        clearProFormCooldown(landingFormKey);
                        setSubmitError(authResult.error || "Impossible de créer votre espace pour le moment.");
                        return;
                    }

                    if (authResult.requiresEmailConfirmation) {
                        // Stocker l'email pour pré-remplir le formulaire login au retour du lien email
                        try { sessionStorage.setItem('pro_pending_confirm_email', form.email.trim()); } catch (_) { }
                        setSuccessState({
                            title: copy.form.successTitle,
                            text: `${copy.form.successText} L'email a été envoyé à ${form.email.trim()}.`
                        });
                    }
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleLoginSubmit = async (e) => {
                e.preventDefault();
                clearInlineFeedback();
                setSuccessState(null);
                setIsSubmitting(true);

                try {
                    const authResult = await signInWithPassword({
                        email: form.email,
                        password: form.loginPassword
                    });

                    if (!authResult.ok) {
                        const loginError = authResult.error || "Impossible de vous connecter pour le moment.";
                        setSubmitError(
                            /email not confirmed/i.test(loginError)
                                ? "Impossible de vous connecter. Vérifiez vos identifiants ou utilisez le lien de connexion."
                                : loginError
                        );
                    }
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleRecoverySubmit = async (e) => {
                e.preventDefault();
                setPasswordUpdateError(null);

                if (recoveryForm.password.length < AUTH_MIN_PASSWORD_LENGTH) {
                    setPasswordUpdateError(`Le mot de passe doit contenir au moins ${AUTH_MIN_PASSWORD_LENGTH} caractères.`);
                    return;
                }

                if (recoveryForm.password !== recoveryForm.confirmPassword) {
                    setPasswordUpdateError("Les deux mots de passe ne correspondent pas.");
                    return;
                }

                setIsUpdatingPassword(true);

                try {
                    const result = await updateProPassword(recoveryForm.password, {
                        passwordSetupRequired: false,
                        passwordSetupCompletedAt: new Date().toISOString(),
                        onboardingFlow: isFirstAccessSetup ? 'saaspro-password-set' : 'saaspro-recovery'
                    });
                    if (!result.ok) {
                        setPasswordUpdateError(result.error || "Impossible de mettre à jour votre mot de passe pour le moment.");
                        return;
                    }

                    clearSupabaseAuthRedirectState();
                    window.location.assign(getAuthRedirectUrl());
                } finally {
                    setIsUpdatingPassword(false);
                }
            };

            const handleSubmit = (e) => {
                if (authMode === 'login') {
                    handleLoginSubmit(e);
                    return;
                }

                handleSignupSubmit(e);
            };

            const activeAuthHelperText = recoveryState?.active
                ? isFirstAccessSetup
                    ? "Votre adresse email est validée. Définissez maintenant votre mot de passe pour ouvrir directement votre espace."
                    : "Choisissez un nouveau mot de passe pour finaliser la récupération de votre accès."
                : authMode === 'signup'
                    ? "Créez votre accès avec les informations essentielles. Le lien email reste une solution de secours."
                    : "Connectez-vous directement avec votre email et votre mot de passe. Le lien email reste un secours.";

            const SectionHeader = ({ eyebrow, title, text, centered }) => (
                React.createElement('div', { className: centered ? 'max-w-3xl mx-auto text-center' : 'max-w-xl' },
                    React.createElement('div', { className: 'text-[10px] md:text-[11px] font-semibold uppercase tracking-[0.16em] text-slate-500 mb-3' }, eyebrow),
                    React.createElement('h2', { className: 'text-[1.85rem] md:text-[2.25rem] font-black tracking-[-0.03em] text-slate-900 font-display leading-tight', style: { fontFamily: "'Inter', sans-serif" } }, title),
                    text && React.createElement('p', { className: 'text-[15px] md:text-base leading-7 text-slate-600 mt-3' }, text)
                )
            );

            return (
                <div className="pro-landing-typo min-h-screen bg-[#FAFAF8] text-slate-900 overflow-x-hidden">
                    {/* ===== HEADER ===== */}
                    <header className="sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-slate-200">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between gap-4">
                            <div className="flex items-center gap-3 min-w-0">
                                <div className="w-9 h-9 sm:w-10 sm:h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center shrink-0">
                                    <Icon icon="solar:buildings-2-bold" style={{ fontSize: '20px' }} />
                                </div>
                                <div>
                                    <div className="font-black text-slate-900 text-sm tracking-tight" style={{ fontFamily: "'Inter', sans-serif" }}>{copy.meta.brand}</div>
                                    <div className="text-[11px] text-slate-400 hidden sm:block">{copy.meta.phase}</div>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 sm:gap-4 sm:gap-5">
                                <a href="index.html" className="hidden sm:inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 hover:text-slate-900 hover:border-slate-300 transition-colors">
                                    <Icon icon="solar:alt-arrow-left-linear" style={{ fontSize: '16px' }} />
                                    Retour au site public
                                </a>
                                <button type="button" onClick={() => scrollToSection('pro-access-form')} className="hidden sm:inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-600 hover:text-slate-900 hover:border-slate-300 transition-colors">
                                    <Icon icon="solar:login-3-bold" style={{ fontSize: '16px' }} />
                                    Accès / connexion
                                </button>
                                {/* CTA - taille réduite sur mobile */}
                                <button type="button" onClick={() => scrollToSection('pro-access-form')} className="pro-btn pro-btn-primary px-2.5 py-1.5 text-[11px] sm:px-4 sm:py-2 sm:text-sm">
                                    <span className="hidden sm:inline">{copy.hero.ctaPrimary}</span>
                                    <span className="sm:hidden">Accès gratuit</span>
                                    <Icon icon="solar:arrow-right-bold" className="hidden sm:block" style={{ fontSize: '14px' }} />
                                </button>
                                {/* Hamburger mobile */}
                                <button
                                    type="button"
                                    onClick={() => setIsMobileNavOpen(!isMobileNavOpen)}
                                    className="sm:hidden w-11 h-11 flex items-center justify-center rounded-xl bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200 transition-colors"
                                    aria-label={isMobileNavOpen ? 'Fermer le menu' : 'Ouvrir le menu'}
                                >
                                    <Icon icon={isMobileNavOpen ? 'solar:close-square-linear' : 'solar:hamburger-menu-linear'} style={{ fontSize: '22px' }} />
                                </button>
                            </div>
                        </div>
                        {/* Menu mobile déroulant */}
                        {isMobileNavOpen && (
                            <div className="sm:hidden border-t border-slate-200 bg-white">
                                <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col gap-2">
                                    <a href="index.html" className="flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm font-semibold text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-colors">
                                        <Icon icon="solar:alt-arrow-left-linear" style={{ fontSize: '16px' }} />
                                        Retour au site public
                                    </a>
                                    <button type="button" onClick={() => scrollToSection('pro-access-form')} className="flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm font-semibold text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-colors w-full text-left">
                                        <Icon icon="solar:login-3-bold" style={{ fontSize: '16px' }} />
                                        Accès / connexion
                                    </button>
                                    <button type="button" onClick={() => scrollToSection('pro-how-it-works')} className="flex items-center gap-2 px-3 py-2.5 rounded-lg text-sm font-semibold text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-colors w-full text-left">
                                        <Icon icon="solar:info-circle-linear" style={{ fontSize: '16px' }} />
                                        Comment ça fonctionne
                                    </button>
                                </div>
                            </div>
                        )}
                    </header>

                    {/* ===== HERO ===== */}
                    <section className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8 sm:pt-14 md:pt-16 pb-8 sm:pb-14 md:pb-16">
                        {/* Sur desktop : grille 2 colonnes. Sur mobile : flex colonne (titre → mockup → reste) */}
                        <div className="grid lg:grid-cols-[minmax(0,1fr)_440px] lg:gap-12 lg:items-center">
                            {/* Bloc titre (eyebrow + h1) — apparaît en premier sur mobile ET desktop */}
                            <div className="max-w-[43rem] mb-4 sm:mb-5 lg:mb-0">
                                <div className="text-[10px] md:text-[11px] font-semibold uppercase tracking-[0.16em] text-slate-500 mb-4">{copy.meta.heroEyebrow}</div>
                                <h1 className="max-w-[13.6ch] text-[2.2rem] sm:text-5xl xl:text-[3.25rem] font-black tracking-[-0.045em] text-slate-950 leading-[0.98]" style={{ fontFamily: "'Inter', sans-serif" }}>
                                    {copy.hero.h1}
                                </h1>
                            </div>

                            {/* Mockup — sur mobile : juste après le titre, largeur adaptée. Sur desktop : colonne droite (row-span-2) */}
                            <div className="hero-mockup-float lg:row-span-2 relative w-full max-w-[330px] sm:max-w-[400px] mx-auto lg:max-w-[440px] lg:ml-auto lg:mx-0 mb-4 sm:mb-6 lg:mb-0">
                                <div className="relative space-y-2.5">
                                    <div className="rounded-[20px] border border-slate-200 bg-white p-4 sm:p-5 shadow-sm shadow-slate-200/30">
                                        <div className="flex items-start justify-between gap-4">
                                            <div>
                                                <div className="text-[10px] font-semibold uppercase tracking-[0.14em] text-slate-500">{copy.hero.mockup.portfolioLabel}</div>
                                                <h3 className="text-base sm:text-lg font-black tracking-[-0.03em] text-slate-900 mt-1" style={{ fontFamily: "'Inter', sans-serif" }}>{copy.hero.mockup.portfolioTitle}</h3>
                                                <p className="text-[11px] sm:text-[12px] text-slate-600 leading-5 mt-1.5 max-w-[15rem]">{copy.hero.mockup.portfolioText}</p>
                                            </div>
                                            <span className="shrink-0 px-2 py-1 rounded-full bg-slate-100 text-slate-500 text-[10px] font-semibold">
                                                {copy.hero.mockup.portfolioSummary}
                                            </span>
                                        </div>
                                        <div className="mt-3 space-y-0 divide-y divide-slate-100">
                                            {copy.hero.mockup.portfolioItems.slice(0, 3).map(item => (
                                                <div key={item.name} className="flex items-center justify-between gap-3 py-2.5">
                                                    <div className="min-w-0">
                                                        <div className="text-xs font-bold text-slate-900 truncate">{item.name}</div>
                                                        <div className="text-[11px] text-slate-500 mt-0.5 hidden sm:block">{item.meta}</div>
                                                    </div>
                                                    <div className="flex items-center gap-2 shrink-0">
                                                        {item.tone === 'amber' && (
                                                            <span className="px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 text-[9px] font-semibold hidden sm:inline">Prioritaire</span>
                                                        )}
                                                        <span className={`w-7 h-7 sm:w-8 sm:h-8 rounded-lg flex items-center justify-center text-xs font-black score-badge score-${item.score}`}>{item.score}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-3 pt-3 border-t border-slate-100 hidden sm:block">
                                            <div className="text-[10px] font-semibold uppercase tracking-[0.14em] text-slate-500">{copy.hero.mockup.reportLabel}</div>
                                            <div className="text-sm font-black mt-1 tracking-[-0.03em] text-slate-900" style={{ fontFamily: "'Inter', sans-serif" }}>{copy.hero.mockup.reportTitle}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Bloc texte bas — sous-titre, badges, stats, CTAs. Sur desktop : 2ème ligne colonne gauche */}
                            <div className="max-w-[43rem]">
                                <p className="text-[15px] sm:text-[17px] text-slate-600 leading-7 max-w-[36rem]">{copy.hero.subtitle}</p>
                                <div className="flex flex-wrap gap-2 sm:gap-2.5 mt-4 sm:mt-6">
                                    {heroBadges.map(badge => (
                                        <span key={badge} className="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-3 sm:px-3.5 py-1 sm:py-1.5 text-[12px] sm:text-[13px] font-medium text-slate-600">
                                            <span className="w-2 h-2 rounded-full bg-blue-500 shrink-0"></span>
                                            {badge}
                                        </span>
                                    ))}
                                </div>
                                <div className="flex items-center gap-4 sm:gap-5 mt-5 sm:mt-7 pt-4 sm:pt-5 border-t border-slate-100 max-w-md">
                                    {heroStats.map((stat, i) => (
                                        <React.Fragment key={stat.value}>
                                            {i > 0 && <div className="w-px h-8 bg-slate-200"></div>}
                                            <div>
                                                <div
                                                    className={`text-[1.5rem] sm:text-[1.7rem] font-black tracking-[-0.03em] ${String(stat.value || '').trim().startsWith('0') ? 'text-emerald-600' : 'text-slate-900'}`}
                                                    style={{ fontFamily: "'Inter', sans-serif" }}
                                                >
                                                    {stat.value}
                                                </div>
                                                <div className={`text-xs mt-0.5 ${String(stat.value || '').trim().startsWith('0') ? 'text-emerald-700' : 'text-slate-500'}`}>{stat.label}</div>
                                            </div>
                                        </React.Fragment>
                                    ))}
