                                    <button type="button" onClick={() => scrollToSection('pro-how-it-works')} className="inline-flex items-center gap-2 px-1 py-2 text-sm font-semibold text-slate-500 hover:text-slate-900 transition-colors">
                                        {copy.hero.ctaSecondary}
                                    </button>
                                </div>
                                <div className="flex items-center gap-2 mt-4 text-[12px] text-slate-500">
                                    <Icon icon="solar:lock-bold" style={{ fontSize: '14px' }} />
                                    {copy.hero.trustLine}
                                </div>
                            </div>

                            {/* Mockup droite */}
                            <div className="relative lg:max-w-[440px] lg:ml-auto">
                                <div className="relative space-y-2.5">
                                    <div className="rounded-[20px] border border-slate-200 bg-white p-5 shadow-sm shadow-slate-200/30">
                                        <div className="flex items-start justify-between gap-4">
                                            <div>
                                                <div className="text-[10px] font-semibold uppercase tracking-[0.14em] text-slate-500">{copy.hero.mockup.portfolioLabel}</div>
                                                <h3 className="text-lg font-black tracking-[-0.03em] text-slate-900 mt-1" style={{ fontFamily: "'Inter', sans-serif" }}>{copy.hero.mockup.portfolioTitle}</h3>
                                                <p className="text-[12px] text-slate-600 leading-5 mt-1.5 max-w-[15rem]">{copy.hero.mockup.portfolioText}</p>
                                            </div>
                                            <span className="shrink-0 px-2.5 py-1 rounded-full bg-slate-100 text-slate-500 text-[10px] font-semibold">
                                                {copy.hero.mockup.portfolioSummary}
                                            </span>
                                        </div>
                                        <div className="mt-4 space-y-0 divide-y divide-slate-100">
                                            {copy.hero.mockup.portfolioItems.map(item => (
                                                <div key={item.name} className="flex items-center justify-between gap-3 py-3">
                                                    <div className="min-w-0">
                                                        <div className="text-xs font-bold text-slate-900 truncate">{item.name}</div>
                                                        <div className="text-[11px] text-slate-500 mt-0.5">{item.meta}</div>
                                                    </div>
                                                    <div className="flex items-center gap-2 shrink-0">
                                                        {item.tone === 'amber' && (
                                                            <span className="px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 text-[9px] font-semibold">Prioritaire</span>
                                                        )}
                                                        <span className={`w-8 h-8 rounded-lg flex items-center justify-center text-xs font-black score-badge score-${item.score}`}>{item.score}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-4 pt-4 border-t border-slate-100">
                                            <div className="text-[10px] font-semibold uppercase tracking-[0.14em] text-slate-500">{copy.hero.mockup.reportLabel}</div>
                                            <div className="text-base font-black mt-1 tracking-[-0.03em] text-slate-900" style={{ fontFamily: "'Inter', sans-serif" }}>{copy.hero.mockup.reportTitle}</div>
                                            <p className="text-[12px] text-slate-600 leading-5 mt-1.5 max-w-[19rem]">{copy.hero.mockup.reportText}</p>
                                        </div>
                                        <div className="flex flex-wrap gap-2 mt-4">
                                            {copy.hero.mockup.reportItems.map(item => (
                                                <span key={item} className="inline-flex items-center gap-1.5 rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-[11px] font-medium text-slate-600">
                                                    <span className="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                                                    {item}
                                                </span>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ===== AUDIENCE ===== */}
                    <section className="reveal border-y border-slate-200 bg-white py-14">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <SectionHeader eyebrow={copy.meta.targetsEyebrow} title={copy.trustBar.label} text={copy.trustBar.intro} centered={true} />
                            <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-5 gap-3 mt-8">
                                {copy.trustBar.items.map(item => (
                                    <div key={item.label} className="rounded-xl border border-slate-200 bg-slate-50/80 px-4 py-4 transition-colors hover:bg-white">
                                        <div className="w-10 h-10 rounded-xl bg-white text-blue-600 flex items-center justify-center border border-slate-200">
                                            <Icon icon={item.icon} style={{ fontSize: '18px', color: '#1D4ED8' }} />
                                        </div>
                                        <div className="text-sm font-black text-slate-900 mt-3 tracking-tight leading-5">{item.label}</div>
                                        <p className="text-sm text-slate-600 leading-6 mt-1.5">{item.text}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ===== SOCIAL PROOF ===== */}
                    <section className="reveal bg-white border-b border-slate-100 py-14">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <SectionHeader eyebrow="Retours terrain" title={copy.proof.title} centered={true} />
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mt-8">
                                {copy.proof.items.map((item, i) => (
                                    <div
                                        key={item.name}
                                        className="rounded-2xl border border-slate-200 bg-white p-6"
                                        style={{ borderLeft: `3px solid ${item.accentColor}`, transitionDelay: `${i * 100}ms` }}
                                    >
                                        <p className="text-[15px] text-slate-600 leading-7 italic mb-4">"{item.quote}"</p>
                                        <div className="text-sm font-black text-slate-900">{item.name}</div>
                                        <div className="text-xs text-slate-500 mt-0.5">{item.role}</div>
                                    </div>
                                ))}
                            </div>
                            <p className="text-xs text-slate-500 text-center mt-6">{copy.proof.disclaimer}</p>
                        </div>
                    </section>

                    {/* ===== BENEFITS ===== */}
                    <section className="reveal max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14">
                        <SectionHeader eyebrow={copy.meta.benefitsEyebrow} title={copy.benefits.title} centered={true} />
                        <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mt-8">
                            {copy.benefits.items.map(item => (
                                <div key={item.kpi} className="rounded-xl border border-slate-200 bg-white p-5">
                                    <div className="text-[1.7rem] font-black tracking-[-0.03em]" style={{ fontFamily: "'Inter', sans-serif", color: item.kpiColor }}>{item.kpi}</div>
                                    <h3 className="text-[15px] font-black text-slate-900 mt-3 tracking-tight leading-6">{item.title}</h3>
                                    <p className="text-sm text-slate-600 mt-2 leading-6">{item.text}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* ===== STEPS ===== */}
                    <section id="pro-how-it-works" className="reveal max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14" style={{ scrollMarginTop: '80px' }}>
                        <SectionHeader eyebrow={copy.meta.stepsEyebrow} title={copy.steps.title} text={copy.steps.intro} centered={true} />
                        <div className="relative mt-10">
                            <div className="hidden lg:block absolute top-7 left-[calc(12.5%)] right-[calc(12.5%)] h-px bg-slate-200 z-0"></div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 relative z-10">
                                {copy.steps.items.map((item, i) => (
                                    <div key={item.title} className="flex flex-col items-center text-center">
                                        <div className="w-14 h-14 rounded-full bg-white border-4 border-white ring-1 ring-blue-600 flex items-center justify-center shadow-md shadow-blue-600/10">
                                            <span style={{ fontFamily: "'Inter', sans-serif", color: '#1D4ED8' }}>{i + 1}</span>
                                        </div>
                                        <h3 className="text-base font-black text-slate-900 mt-4 tracking-tight">{item.title}</h3>
                                        <p className="text-sm text-slate-600 mt-2 leading-6">{item.text}</p>
                                        <span className="mt-3 text-xs font-semibold text-slate-600 bg-slate-50 border border-slate-200 rounded-full px-3 py-1">{item.duration}</span>
                                    </div>
                                ))}
                            </div>
                            <div className="mt-10 text-center">
                                <div className="inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-6 py-3 text-sm font-semibold text-slate-700">
                                    {copy.steps.cta}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* ===== FORMULAIRE ===== */}
                    <section id="pro-access-form" className="reveal max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14" style={{ scrollMarginTop: '80px' }}>
                        <div className="grid xl:grid-cols-[1fr_1.15fr] gap-10 items-start">
                            <div>
                                <SectionHeader eyebrow={copy.meta.formEyebrow} title={copy.form.title} text={copy.form.subtitle} />
                                <div className="flex items-center gap-3 mt-6 rounded-xl bg-blue-50 border border-blue-100 px-4 py-3">
                                    <Icon icon="solar:bolt-bold" style={{ fontSize: '18px', color: '#1D4ED8' }} />
                                    <span className="text-sm font-semibold text-blue-800">{copy.form.urgency}</span>
                                </div>
                                <div className="rounded-2xl border border-slate-200 bg-white p-5 mt-4">
                                    <div className="text-[10px] font-semibold uppercase tracking-[0.16em] text-slate-500 mb-3">Ce que vous recevez</div>
                                    <div className="space-y-2.5">
                                        {copy.form.included.map(item => (
                                            <div key={item} className="flex items-center gap-3">
                                                <Icon icon="solar:check-circle-bold" style={{ fontSize: '18px', color: '#059669' }} />
                                                <span className="text-sm font-medium text-slate-700">{item}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white rounded-[26px] border border-slate-200 p-6 md:p-8 shadow-md shadow-slate-200/30">
                                {!submitted ? (
                                    <form onSubmit={handleSubmit} className="space-y-4">
                                        <div className="grid md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="pro-label">{copy.form.fields.fullName}</label>
                                                <input type="text" required className="pro-input" placeholder={copy.form.placeholders.fullName} value={form.fullName} onChange={e => setField('fullName', e.target.value)} />
                                            </div>
                                            <div>
                                                <label className="pro-label">{copy.form.fields.email}</label>
                                                <input type="email" required className="pro-input" placeholder={copy.form.placeholders.email} value={form.email} onChange={e => setField('email', e.target.value)} />
                                            </div>
                                        </div>

                                        <div>
                                            <label className="pro-label">{copy.form.fields.company}</label>
                                            <input type="text" required className="pro-input" placeholder={copy.form.placeholders.company} value={form.company} onChange={e => setField('company', e.target.value)} />
                                        </div>

                                        <div className="grid md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="pro-label">{copy.form.fields.role}</label>
                                                <select required className="pro-input" value={form.role} onChange={e => setField('role', e.target.value)}>
                                                    <option value="">Sélectionnez votre métier</option>
                                                    {copy.form.roleOptions.map(opt => (
                                                        <option key={opt} value={opt}>{opt}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div>
                                                <label className="pro-label">{copy.form.fields.siteVolume}</label>
                                                <select required className="pro-input" value={form.siteVolume} onChange={e => setField('siteVolume', e.target.value)}>
                                                    <option value="">Volume estimé</option>
                                                    {copy.form.volumeOptions.map(opt => (
                                                        <option key={opt} value={opt}>{opt}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="pro-label">{copy.form.fields.message}</label>
                                            <textarea className="pro-input min-h-[90px] resize-y" placeholder={copy.form.placeholders.message} value={form.message} onChange={e => setField('message', e.target.value)} />
                                        </div>

                                        <div className="pt-2">
                                            <button type="submit" disabled={isSubmitting} className="pro-btn pro-btn-primary w-full justify-center py-3.5 text-[15px] gap-2">
                                                {isSubmitting ? (
                                                    <>
                                                        <svg className="animate-spin w-4 h-4" viewBox="0 0 24 24" fill="none">
                                                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                                                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                                                        </svg>
                                                        {copy.form.submitting}
                                                    </>
                                                ) : (
                                                    <>
                                                        <Icon icon="solar:arrow-right-bold" style={{ fontSize: '16px' }} />
                                                        {copy.form.cta}
                                                    </>
                                                )}
                                            </button>
                                            <p className="flex justify-center items-center gap-1.5 text-xs text-slate-500 text-center mt-3">
                                                <Icon icon="solar:lock-bold" style={{ fontSize: '13px' }} />
                                                {copy.form.trustLine}
                                            </p>
                                        </div>
                                    </form>
                                ) : (
                                    <div className="fade-in">
                                        <div className="w-14 h-14 rounded-2xl bg-emerald-50 text-emerald-600 flex items-center justify-center mb-5">
                                            <Icon icon="solar:check-circle-bold" style={{ fontSize: '28px' }} />
                                        </div>
                                        <h3 className="text-2xl font-black text-slate-900 tracking-tight" style={{ fontFamily: "'Inter', sans-serif" }}>{copy.form.successTitle}</h3>
                                        <p className="text-slate-600 leading-7 mt-3">{copy.form.successText}</p>
                                        <div className="mt-6 space-y-3">
                                            <button type="button" onClick={openWorkspace} className="pro-btn pro-btn-primary w-full justify-center py-3 text-[15px]">
                                                {copy.form.successCta}
                                            </button>
                                            <p className="text-xs text-slate-500 text-center">{copy.form.successHelper}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </section>

                    {/* ===== CLOSING ===== */}
                    <section className="reveal max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                        <div className="bg-slate-900 text-white rounded-[24px] px-6 py-10 md:px-10 shadow-lg shadow-slate-900/15 text-center">
                            <div className="inline-flex items-center gap-2 rounded-full bg-white/10 border border-white/10 text-slate-200 text-[11px] font-semibold px-4 py-1.5 mb-5">
                                {copy.closing.urgencyBadge}
                            </div>
                            <h2 className="text-2xl md:text-3xl font-black tracking-[-0.03em]" style={{ fontFamily: "'Inter', sans-serif" }}>{copy.closing.title}</h2>
                            <p className="text-slate-300 text-[15px] leading-7 mt-3 max-w-xl mx-auto">{copy.closing.text}</p>
                            <button type="button" onClick={() => scrollToSection('pro-access-form')} className="pro-btn pro-btn-primary px-8 py-3.5 text-[15px] mt-7 mx-auto">
                                {copy.closing.cta}
                            </button>
                            <p className="text-xs text-slate-500 mt-3">{copy.closing.helper}</p>
                        </div>
                    </section>

                    {/* ===== FOOTER ===== */}
                    <footer className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 border-t border-slate-200">
                        <div className="flex flex-col sm:flex-row justify-between items-center gap-3 text-xs text-slate-400">
                            <span>© 2025 DiagTertiaire · Marque blanche pour les professionnels du tertiaire</span>
                            <div className="flex items-center gap-4">
                                <a href="#" className="hover:text-slate-700 transition-colors">RGPD</a>
                                <a href="#" className="hover:text-slate-700 transition-colors">CGU</a>
                                <a href="#" className="hover:text-slate-700 transition-colors">Contact</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        /* ===== MAIN APP (Logique de routing et d'assemblage) ===== */
        const ProApp = () => {
            // ALL hooks at the top - no conditional hooks (React rules)
            const [sharedReport, setSharedReport] = useState(null);
            const [auth, setAuth] = useState(false);
            const [page, setPage] = useState('cases');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isDemoModalOpen, setIsDemoModalOpen] = useState(false);

            // Detect shared report from URL hash
            useEffect(() => {
                if (window.location.hash.startsWith('#report=')) {
                    try {
                        let dataStr = window.location.hash.replace('#report=', '');
                        // Handle URI encoding
                        try { dataStr = decodeURIComponent(escape(atob(dataStr))); } catch (e) { dataStr = atob(dataStr); }
                        const parsed = JSON.parse(dataStr);
                        if (parsed && parsed.formData) {
                            setSharedReport(parsed);
                            localStorage.setItem('newDiagnosticLatestReport', JSON.stringify(parsed));
                        }
                    } catch (e) {
                        console.error('Invalid report hash', e);
                    }
                }
            }, []);

            // Check auth on mount
            useEffect(() => {
                const isAuth = localStorage.getItem('proAuth') === 'true';
                if (isAuth) {
                    setAuth(true);
                    initializeMockProCases();
                }
            }, []);

            const openDemoModal = () => setIsDemoModalOpen(true);
            const closeDemoModal = () => setIsDemoModalOpen(false);

            // Shared report view - no auth required, no sidebar
            if (sharedReport) {
                return <ProReport cId={sharedReport.id || 'shared'} sharedCase={sharedReport} setPage={() => { window.location.hash = ''; setSharedReport(null); }} />;
            }

            if (!auth) {
                return (
                    <>
                        <ProLanding onGrantAccess={() => setAuth(true)} />
                    </>
                );
            }

            const handleLogout = () => {
                localStorage.removeItem('proAuth');
                setAuth(false);
            };

            const toggleMobile = () => setIsMobileMenuOpen(!isMobileMenuOpen);
            const closeMobile = () => setIsMobileMenuOpen(false);

            const renderPage = () => {
                if (page === 'dashboard') return <ProDashboard setPage={setPage} openDemo={openDemoModal} />;
                if (page === 'cases') return <ProCases setPage={setPage} />;
                if (page === 'new') return <ProNewDiag setPage={setPage} />;
                if (page === 'settings') return <ProSettings />;
                if (page === 'plans') return <ProPlans onDemoClick={openDemoModal} />;
                if (page.startsWith('case-report-')) return <ProReport cId={page.replace('case-report-', '')} setPage={setPage} />;
                if (page.startsWith('report-')) return <ProReport cId={page.replace('report-', '')} setPage={setPage} />;
                return <ProDashboard setPage={setPage} openDemo={openDemoModal} />;
            };

            const titles = {
                dashboard: "Vue globale du parc",
                cases: "Dossiers clients",
                new: "Nouveau diagnostic",
                settings: "Configuration",
                plans: "Plans & Tarification"
            };
            const currentTitle = (page.startsWith('report-') || page.startsWith('case-report-')) ? "Rapport détaillé" : (titles[page] || "");

            return (
                <div className="flex bg-[#F8FAFC]">
                    <ProSidebar
                        curPage={page}
                        setPage={setPage}
                        isMobileOpen={isMobileMenuOpen}
                        closeMobile={closeMobile}
                        onLogout={handleLogout}
                    />
                    <div className="pro-content flex-1 max-w-full">
                        <ProTopbar title={currentTitle} toggleMobile={toggleMobile} />
                        <main className="min-h-[calc(100vh-73px)]">
                            {renderPage()}
                        </main>
                        <footer className="py-6 text-center text-slate-400 text-xs font-semibold border-t border-slate-200 bg-white">
                            © 2024 DiagTertiaire Pro | Environnement de démonstration B2B
                        </footer>
                    </div>
                    <ChatbotWidget />
                    <DemoModal isOpen={isDemoModalOpen} onClose={closeDemoModal} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('pro-root'));
        root.render(<ProApp />);
    </script>
</body>

</html>
