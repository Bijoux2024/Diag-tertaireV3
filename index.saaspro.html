                                        style={{ borderLeft: `3px solid ${item.accentColor}`, transitionDelay: `${i * 100}ms` }}
                                    >
                                        <p className="text-[15px] text-slate-600 leading-7 italic mb-4">"{item.quote}"</p>
                                        <div className="text-sm font-black text-slate-900">{item.name}</div>
                                        <div className="text-xs text-slate-500 mt-0.5">{item.role}</div>
                                    </div>
                                ))}
                            </div>
                            <p className="text-xs text-slate-500 text-center mt-6">{copy.proof.disclaimer}</p>
                        </div>
                    </section>

                    {/* ===== BENEFITS ===== */}
                    <section className="reveal max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-14">
                        <SectionHeader eyebrow={copy.meta.benefitsEyebrow} title={copy.benefits.title} centered={true} />
                        <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mt-8">
                            {copy.benefits.items.map(item => (
                                <div key={item.kpi} className="rounded-xl border border-slate-200 bg-white p-4 sm:p-5 shadow-sm shadow-slate-200/30">
                                    <div className="text-[1.7rem] font-black tracking-[-0.03em]" style={{ fontFamily: "'Inter', sans-serif", color: item.kpiColor }}>{item.kpi}</div>
                                    <h3 className="text-[15px] font-black text-slate-900 mt-3 tracking-tight leading-6">{item.title}</h3>
                                    <p className="text-sm text-slate-600 mt-2 leading-6">{item.text}</p>
                                </div>
                            ))}
                        </div>
                    </section>
                    {/* ===== FOOTER ===== */}
                    <footer className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 border-t border-slate-200">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 text-xs text-slate-400">
                            <span className="max-w-xs sm:max-w-none">© 2025 DiagTertiaire · Marque blanche pour les professionnels du tertiaire</span>
                            <div className="flex flex-wrap justify-start sm:justify-end gap-x-4 gap-y-2">
                                <button type="button" onClick={() => onOpenLegalModal?.('mentions')} className="hover:text-slate-700 transition-colors">Mentions légales</button>
                                <button type="button" onClick={() => onOpenLegalModal?.('privacy')} className="hover:text-slate-700 transition-colors">Politique de confidentialité</button>
                                <a href="./conditions-generales-utilisation.html" className="hover:text-slate-700 transition-colors">CGU</a>
                                <a href="./cookies.html" className="hover:text-slate-700 transition-colors">Cookies</a>
                                <button type="button" onClick={() => window.dtCookies && window.dtCookies.open()} className="hover:text-slate-700 transition-colors">Gestion des cookies</button>
                                <button type="button" onClick={onClearPersonalData} className="hover:text-slate-700 transition-colors">Effacer mes données</button>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        /* ===== MAIN APP (Logique de routing et d'assemblage) ===== */
        const ProApp = () => {
            // ALL hooks at the top - no conditional hooks (React rules)
            const [sharedReport, setSharedReport] = useState(() => parseSharedReportFromHash());
            const [auth, setAuth] = useState(false);
            const [authReady, setAuthReady] = useState(false);
            const [authError, setAuthError] = useState(null);
            const [authUserId, setAuthUserId] = useState(null);
            const [authRecovery, setAuthRecovery] = useState({ active: false, email: '', mode: '' });
            const [page, setPage] = useState('cases');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isDemoModalOpen, setIsDemoModalOpen] = useState(false);
            const [legalModalKey, setLegalModalKey] = useState('');
            const [onboardingPromptOpen, setOnboardingPromptOpen] = useState(false);
            const [suppressOnboardingPrompt, setSuppressOnboardingPrompt] = useState(false);
            const [tourStep, setTourStep] = useState(0);
            const [tourActive, setTourActive] = useState(false);
            const [showChecklistCompletionNotice, setShowChecklistCompletionNotice] = useState(false);
            const [isRefreshingChecklist, setIsRefreshingChecklist] = useState(false);
            const [workspaceToast, setWorkspaceToast] = useState(null);
            const forceRecoveryFlowRef = useRef(false);
            const checklistCompletionPendingRef = useRef(false);
            const checklistCompletionTimeoutRef = useRef(null);
            const workspaceToastTimeoutRef = useRef(null);
            const workspaceRef = useRef(null);
            const authUserIdRef = useRef(null);
            const [workspace, setWorkspace] = useState(() => ({
                ...DEFAULT_WORKSPACE_DATA,
                profile: null
            }));
            const toggleMobile = () => setIsMobileMenuOpen(!isMobileMenuOpen);
            const closeMobile = () => setIsMobileMenuOpen(false);
            const openMobile = () => setIsMobileMenuOpen(true);

            const reportsByCaseId = useMemo(() => buildReportsByCaseId(workspace.reports), [workspace.reports]);
            const onboardingChecklist = useMemo(() => resolveOnboardingChecklistState({
                cases: workspace.cases,
                reports: workspace.reports,
                settings: workspace.settings,
                branding: workspace.branding,
                userWorkspaceState: workspace.userWorkspaceState
            }), [workspace.cases, workspace.reports, workspace.settings, workspace.branding, workspace.userWorkspaceState]);

            // Detect shared report from URL hash
            useEffect(() => {
                const syncSharedReport = () => {
                    setSharedReport(parseSharedReportFromHash());
                };

                syncSharedReport();
                window.addEventListener('hashchange', syncSharedReport);
                return () => window.removeEventListener('hashchange', syncSharedReport);
            }, []);

            useEffect(() => {
                workspaceRef.current = workspace;
            }, [workspace]);

            useEffect(() => {
                authUserIdRef.current = authUserId;
            }, [authUserId]);

            useEffect(() => () => {
                if (checklistCompletionTimeoutRef.current) {
                    window.clearTimeout(checklistCompletionTimeoutRef.current);
                    checklistCompletionTimeoutRef.current = null;
                }

                if (workspaceToastTimeoutRef.current) {
                    window.clearTimeout(workspaceToastTimeoutRef.current);
                    workspaceToastTimeoutRef.current = null;
                }
            }, []);

            useEffect(() => {
                if (!workspaceToast?.message) {
                    return undefined;
                }

                if (workspaceToastTimeoutRef.current) {
                    window.clearTimeout(workspaceToastTimeoutRef.current);
                }

                workspaceToastTimeoutRef.current = window.setTimeout(() => {
                    setWorkspaceToast(null);
                    workspaceToastTimeoutRef.current = null;
                }, 4000);

                return () => {
                    if (workspaceToastTimeoutRef.current) {
                        window.clearTimeout(workspaceToastTimeoutRef.current);
                        workspaceToastTimeoutRef.current = null;
                    }
                };
            }, [workspaceToast]);

            // Check auth on mount
            useEffect(() => {
                let isMounted = true;
                let authSubscription = null;
                const resetWorkspace = () => {
                    setWorkspace({
                        ...DEFAULT_WORKSPACE_DATA,
                        profile: null
                    });
                };

                const clearRecoveryState = () => {
                    forceRecoveryFlowRef.current = false;
                    setAuthRecovery({ active: false, email: '', mode: '' });
                };

                const activateRecoveryState = (session, mode = 'recovery') => {
                    const user = session?.user || null;
                    forceRecoveryFlowRef.current = mode === 'recovery';
                    setActiveProUserId(user?.id || null);
                    resetWorkspace();
                    setAuth(false);
                    setAuthUserId(null);
                    setPage('cases');
                    setAuthError(null);
                    setAuthRecovery({
                        active: !!user,
                        email: user?.email || '',
                        mode
                    });
                };

                const applySession = async (session) => {
                    const user = session?.user || null;
                    setActiveProUserId(user?.id || null);

                    if (!isMounted) return;

                    if (!user) {
                        clearRecoveryState();
                        resetWorkspace();
                        setAuth(false);
                        setAuthUserId(null);
                        setPage('cases');
                        return;
                    }

                    if (isUserPasswordSetupPending(user)) {
                        clearSupabaseAuthRedirectState();
                        activateRecoveryState(session, 'first_access');
                        return;
                    }

                    clearRecoveryState();
                    clearSupabaseAuthRedirectState();

                    const workspaceResult = await ensureUserWorkspace(user);
                    if (!isMounted) return;

                    if (!workspaceResult.ok) {
                        setActiveProUserId(null);
                        resetWorkspace();
                        setAuth(false);
                        setAuthUserId(null);
                        setPage('cases');
                        setAuthError(workspaceResult.error || "Impossible de préparer votre espace pour le moment.");
                        await signOutPro();
                        return;
                    }

                    try {
                        const hydratedWorkspace = await hydrateWorkspaceFromSupabase(user, workspaceResult.profile);
                        if (!isMounted) return;

                        setWorkspace({
                            ...DEFAULT_WORKSPACE_DATA,
                            ...hydratedWorkspace,
                            profile: workspaceResult.profile
                        });
                        setAuth(true);
                        setAuthUserId(user.id);
                        setAuthError(null);
                    } catch (error) {
                        console.error("Erreur lors du chargement du workspace Pro :", error);
                        setActiveProUserId(null);
                        resetWorkspace();
                        setAuth(false);
                        setAuthUserId(null);
                        setPage('cases');
                        setAuthError(error?.message || "Impossible de charger votre workspace pour le moment.");
                        await signOutPro();
                    }
                };

                const bootstrapAuth = async () => {
                    try {
                        const browserClient = await getSupabaseBrowserClient();

                        if (!browserClient) {
                            clearRecoveryState();
                            setAuth(false);
                            setAuthUserId(null);
                            return;
                        }

                        const initialRecoveryFlow = isPasswordRecoveryFlow();
                        const callbackSessionResult = await establishSupabaseSessionFromAuthCallback(browserClient);
                        let sessionResult = null;

                        if (callbackSessionResult.handled && callbackSessionResult.error) {
                            sessionResult = {
                                session: callbackSessionResult.session,
                                error: callbackSessionResult.error
                            };
                        } else if (callbackSessionResult.handled && callbackSessionResult.session) {
                            sessionResult = {
                                session: callbackSessionResult.session,
                                error: null
                            };
                        } else {
                            sessionResult = await getCurrentSession();
                        }

                        const session = sessionResult.session;
                        const error = sessionResult.error;

                        if (error) {
                            setAuth(false);
                            setAuthUserId(null);
                            setAuthError("Impossible de vérifier votre session pour le moment.");
                        } else if ((callbackSessionResult.flowType === 'recovery' || initialRecoveryFlow) && session?.user) {
                            forceRecoveryFlowRef.current = true;
                            activateRecoveryState(session, 'recovery');
                        } else {
                            await applySession(session);

                            if (
                                isMounted
                                && callbackSessionResult.usedDirectSessionTokens
                                && callbackSessionResult.flowType === 'signup'
                                && session?.user
                            ) {
                                setPage('dashboard');
                            }
                        }

                        const { data } = browserClient.auth.onAuthStateChange(async (event, nextSession) => {
                            const currentFlowType = getAuthFlowTypeFromLocation();
                            const shouldKeepRecoveryScreen = !!nextSession?.user && (
                                event === 'PASSWORD_RECOVERY'
                                || currentFlowType === 'recovery'
                                || forceRecoveryFlowRef.current
                            );

                            if (shouldKeepRecoveryScreen) {
                                forceRecoveryFlowRef.current = true;
                                activateRecoveryState(nextSession, 'recovery');
                                if (isMounted) {
                                    setAuthReady(true);
                                }
                                return;
                            }

                            if (!nextSession?.user) {
                                forceRecoveryFlowRef.current = false;
                            }

                            if (nextSession?.user && isUserPasswordSetupPending(nextSession.user)) {
                                activateRecoveryState(nextSession, 'first_access');
                                if (isMounted) {
                                    setAuthReady(true);
                                }
                                return;
                            }

                            await applySession(nextSession);
                            if (isMounted) {
                                setAuthReady(true);
                            }
                        });
                        authSubscription = data?.subscription || null;
                    } catch (error) {
                        console.error('Erreur lors de l\'initialisation de l\'authentification :', error);
                        setAuth(false);
                        setAuthUserId(null);
                        setAuthError("Impossible d'initialiser la connexion pour le moment.");
                    } finally {
                        if (isMounted) {
                            setAuthReady(true);
                        }
                    }
                };

                bootstrapAuth();

                return () => {
                    isMounted = false;
                    authSubscription?.unsubscribe?.();
                };
            }, []);

            const mergeWorkspaceUiStateLocally = (uiStatePatch = {}) => {
                setWorkspace(prev => {
                    const currentState = normalizeUserWorkspaceStateRecord(
                        prev.userWorkspaceState,
                        authUserIdRef.current,
                        prev.organization?.id || null
                    );
                    const nextUiState = {
                        ...currentState.uiState,
                        ...asPlainObject(uiStatePatch)
                    };

                    return {
                        ...prev,
                        userWorkspaceState: {
                            ...currentState,
                            uiState: {
                                ...nextUiState,
                                diagnosticDraftArchives: getDiagnosticDraftArchives(nextUiState)
                            }
                        }
                    };
                });
            };

            const persistWorkspaceUiStatePatch = async (uiStatePatch = {}, { silent = false } = {}) => {
                const currentWorkspace = workspaceRef.current;
                const currentUserId = authUserIdRef.current;
                const currentOrganizationId = currentWorkspace?.organization?.id || null;

                if (!currentUserId || !currentOrganizationId) {
                    if (silent) {
                        return currentWorkspace?.userWorkspaceState || DEFAULT_USER_WORKSPACE_STATE;
                    }

                    throw new Error("Workspace Pro non initialisé.");
                }

                try {
                    const savedState = await saveUserWorkspaceState({
                        userId: currentUserId,
                        organizationId: currentOrganizationId,
                        uiState: uiStatePatch,
                        mergeWith: currentWorkspace?.userWorkspaceState
                    });

                    setWorkspace(prev => ({
                        ...prev,
                        userWorkspaceState: savedState
                    }));

                    return savedState;
                } catch (error) {
                    if (silent) {
                        return currentWorkspace?.userWorkspaceState || DEFAULT_USER_WORKSPACE_STATE;
                    }

                    throw error;
                }
            };

            const markOnboardingSeen = async ({ silent = false } = {}) => {
                setSuppressOnboardingPrompt(true);
                setOnboardingPromptOpen(false);
                mergeWorkspaceUiStateLocally({ onboarding_seen: true });
                return persistWorkspaceUiStatePatch({ onboarding_seen: true }, { silent });
            };

            const stopOnboardingTour = async ({ persist = false } = {}) => {
                setTourActive(false);
                setTourStep(0);

                if (persist) {
                    await markOnboardingSeen({ silent: true });
                }
            };

            const startOnboardingTour = async () => {
                setOnboardingPromptOpen(false);
                setSuppressOnboardingPrompt(true);
                setTourStep(0);
                setTourActive(true);
                closeMobile();
                setPage(ONBOARDING_TOUR_STEPS[0]?.page || 'dashboard');
            };

            const advanceOnboardingTour = async () => {
                setTourStep(prev => {
                    const nextStep = prev + 1;
                    const nextStepData = ONBOARDING_TOUR_STEPS[nextStep];
                    if (nextStepData?.page) {
                        setPage(nextStepData.page);
                    }
                    return nextStep;
                });
            };

            const handleSkipOnboarding = async () => {
                setSuppressOnboardingPrompt(true);
                setOnboardingPromptOpen(false);
                await stopOnboardingTour({ persist: true });
            };

            useEffect(() => {
                if (!authUserId) {
                    setOnboardingPromptOpen(false);
                    setSuppressOnboardingPrompt(false);
                    setTourActive(false);
                    setTourStep(0);
                    setShowChecklistCompletionNotice(false);
                    setIsRefreshingChecklist(false);
                    checklistCompletionPendingRef.current = false;

                    if (checklistCompletionTimeoutRef.current) {
                        window.clearTimeout(checklistCompletionTimeoutRef.current);
                        checklistCompletionTimeoutRef.current = null;
                    }
                }
            }, [authUserId]);

            useEffect(() => {
                if (workspace.userWorkspaceState?.uiState?.onboarding_seen) {
                    setOnboardingPromptOpen(false);
                    setTourActive(false);
                }
            }, [workspace.userWorkspaceState?.uiState?.onboarding_seen]);

            useEffect(() => {
                if (!auth || sharedReport || !workspace.organization?.id) {
                    return undefined;
                }

                if (workspace.userWorkspaceState?.uiState?.onboarding_seen || suppressOnboardingPrompt || onboardingPromptOpen) {
                    return undefined;
                }

                if (page !== 'dashboard') {
                    setPage('dashboard');
                    return undefined;
                }

                const timeoutId = window.setTimeout(() => {
                    setOnboardingPromptOpen(true);
                }, 800);

                return () => window.clearTimeout(timeoutId);
            }, [
                auth,
                sharedReport,
                page,
                workspace.organization?.id,
                workspace.userWorkspaceState?.uiState?.onboarding_seen,
                suppressOnboardingPrompt,
                onboardingPromptOpen
            ]);

            useEffect(() => {
                if (!auth || !workspace.organization?.id) {
                    return undefined;
                }

                if (onboardingChecklist.done || !onboardingChecklist.allDone || checklistCompletionPendingRef.current) {
                    return undefined;
                }

                checklistCompletionPendingRef.current = true;
                let isCancelled = false;

                (async () => {
                    try {
                        await persistWorkspaceUiStatePatch({ onboarding_checklist_done: true });

                        if (isCancelled) {
                            return;
                        }

                        setShowChecklistCompletionNotice(true);
                        if (checklistCompletionTimeoutRef.current) {
                            window.clearTimeout(checklistCompletionTimeoutRef.current);
                        }
                        checklistCompletionTimeoutRef.current = window.setTimeout(() => {
                            setShowChecklistCompletionNotice(false);
                            checklistCompletionTimeoutRef.current = null;
                        }, 3000);
                    } catch (error) {
                    } finally {
                        checklistCompletionPendingRef.current = false;
                    }
                })();

                return () => {
                    isCancelled = true;
                };
            }, [auth, workspace.organization?.id, onboardingChecklist.allDone, onboardingChecklist.done]);

            const requireWorkspaceContext = () => {
                if (!authUserId || !workspace.organization?.id) {
                    throw new Error("Workspace Pro non initialisé.");
                }

                return {
                    userId: authUserId,
                    organizationId: workspace.organization.id
                };
            };

            const handleSaveSettings = async ({ accent, brandName }) => {
                const { organizationId } = requireWorkspaceContext();
                const savedSettings = await saveOrganizationSettings({
                    organizationId,
                    accent,
                    brandName
                });

                setWorkspace(prev => ({
                    ...prev,
                    settings: savedSettings
                }));

                return savedSettings;
            };

            const handleSaveBranding = async ({ logoStoragePath, logoFileName, logoPreviewUrl }) => {
                const { userId, organizationId } = requireWorkspaceContext();
                const savedBranding = normalizeOrganizationBrandingRecord({
                    logo_storage_path: logoStoragePath || null,
                    logo_file_name: logoFileName || null
                }, logoPreviewUrl || '');
                const shouldClearLogoPending = !!logoStoragePath || (logoFileName === null && logoPreviewUrl === '');
                const savedWorkspaceState = shouldClearLogoPending
                    ? await saveUserWorkspaceState({
                        userId,
                        organizationId,
                        uiState: { logoMigrationPending: false },
                        mergeWith: workspace.userWorkspaceState
                    })
                    : workspace.userWorkspaceState;

                setWorkspace(prev => ({
                    ...prev,
                    branding: {
                        ...savedBranding,
                        logoPreviewUrl: logoPreviewUrl === undefined ? prev.branding.logoPreviewUrl : logoPreviewUrl
                    },
                    userWorkspaceState: savedWorkspaceState
                }));

                return savedBranding;
            };

            const refreshWorkspaceCasesAndReports = async ({ userId, organizationId }) => {
                const [cases, reports, userWorkspaceState] = await Promise.all([
                    listProCases(organizationId),
                    listProReports(organizationId),
                    loadUserWorkspaceState(userId, organizationId)
                ]);
                const nextCases = injectDisplayOnlyExampleCases({
                    organizationId,
                    cases,
                    userWorkspaceState
                });

                setWorkspace(prev => ({
                    ...prev,
                    cases: nextCases,
                    reports,
                    userWorkspaceState
                }));

                return { cases: nextCases, reports, userWorkspaceState };
            };

            const handleRefreshChecklist = async () => {
                const { userId, organizationId } = requireWorkspaceContext();
                setIsRefreshingChecklist(true);

                try {
                    await refreshWorkspaceCasesAndReports({ userId, organizationId });
                } catch (error) {
                    warnWorkspaceSchemaIssue("L'actualisation manuelle de la checklist a rencontré un problème de schéma.", error);
                } finally {
                    setIsRefreshingChecklist(false);
                }
            };

            const handleSaveDraft = async (nextDraftPayload) => {
                const { userId, organizationId } = requireWorkspaceContext();
                const savedState = await saveUserWorkspaceState({
                    userId,
                    organizationId,
                    draftPayload: nextDraftPayload,
                    mergeWith: workspace.userWorkspaceState
                });

                setWorkspace(prev => ({
                    ...prev,
                    userWorkspaceState: savedState
                }));

                return savedState;
            };

            const handleArchiveCurrentDraft = async (currentDraftPayload) => {
                const { userId, organizationId } = requireWorkspaceContext();
                const nextArchives = archiveDiagnosticDraft(
                    workspace.userWorkspaceState?.uiState?.diagnosticDraftArchives,
                    currentDraftPayload
                );
                const savedState = await saveUserWorkspaceState({
                    userId,
                    organizationId,
                    draftPayload: {},
                    uiState: { diagnosticDraftArchives: nextArchives },
                    mergeWith: workspace.userWorkspaceState
                });

                setWorkspace(prev => ({
                    ...prev,
                    userWorkspaceState: savedState
                }));

                return savedState;
            };

            const handleRestoreArchivedDraft = async (archiveId, activeDraftPayload) => {
                const { userId, organizationId } = requireWorkspaceContext();
                const currentArchives = getDiagnosticDraftArchives(workspace.userWorkspaceState?.uiState);
                const archiveToRestore = currentArchives.find(entry => entry.id === archiveId);

                if (!archiveToRestore) {
                    throw new Error("Brouillon sauvegarde introuvable.");
                }

                let nextArchives = currentArchives.filter(entry => entry.id !== archiveId);

                if (hasMeaningfulDraftPayload(activeDraftPayload) && !areDraftPayloadsEqual(activeDraftPayload, archiveToRestore.formPayload)) {
                    nextArchives = archiveDiagnosticDraft(nextArchives, activeDraftPayload);
                }

                const restoredDraftPayload = buildDraftFormState(PRO_NEW_DIAG_INITIAL_FORM, archiveToRestore.formPayload);
                const savedState = await saveUserWorkspaceState({
                    userId,
                    organizationId,
                    draftPayload: restoredDraftPayload,
                    uiState: { diagnosticDraftArchives: nextArchives },
                    mergeWith: workspace.userWorkspaceState
                });

                setWorkspace(prev => ({
                    ...prev,
                    userWorkspaceState: savedState
                }));

                return restoredDraftPayload;
            };

            const handleDeleteArchivedDraft = async (archiveId) => {
                const { userId, organizationId } = requireWorkspaceContext();
                const currentArchives = getDiagnosticDraftArchives(workspace.userWorkspaceState?.uiState);
                const nextArchives = currentArchives.filter(entry => entry.id !== archiveId);
                const savedState = await saveUserWorkspaceState({
                    userId,
                    organizationId,
                    uiState: { diagnosticDraftArchives: nextArchives },
                    mergeWith: workspace.userWorkspaceState
                });
                setWorkspace(prev => ({ ...prev, userWorkspaceState: savedState }));
            };

            const handleGenerateCase = async (caseData) => {
                const { userId, organizationId } = requireWorkspaceContext();
                const savedCase = await createOrUpdateProCase({
                    organizationId,
                    userId,
                    caseData
                });
                const savedReport = await createOrUpdateProReport({
                    organizationId,
                    userId,
                    caseId: savedCase.id,
                    reportPayload: savedCase,
                    reportName: savedCase.projectName || savedCase.clientName || 'Rapport'
                });
                const savedWorkspaceState = await saveUserWorkspaceState({
                    userId,
                    organizationId,
                    draftPayload: {},
                    mergeWith: workspace.userWorkspaceState
                });

                setWorkspace(prev => ({
                    ...prev,
                    cases: upsertCaseInCollection(prev.cases, savedCase),
                    reports: upsertReportInCollection(prev.reports, savedReport),
                    userWorkspaceState: savedWorkspaceState
                }));

                return savedCase;
            };

            const handleDeleteCase = async (caseId) => {
                const existingCase = workspace.cases.find(item => item.id === caseId);

                if (existingCase?._isLocalExample) {
                    const currentState = normalizeUserWorkspaceStateRecord(
                        workspace.userWorkspaceState,
                        authUserId,
                        workspace.organization?.id || null
                    );
                    const nextDismissedExamples = Array.from(new Set([
                        ...getDismissedExampleIds(currentState),
                        caseId
                    ]));
                    const nextUiState = {
                        ...currentState.uiState,
                        dismissed_examples: nextDismissedExamples
                    };
                    const remainingLocalExamples = workspace.cases.filter(item => item._isLocalExample && item.id !== caseId).length;

                    setWorkspace(prev => ({
                        ...prev,
                        cases: prev.cases.filter(item => item.id !== caseId),
                        reports: prev.reports.filter(item => item.caseId !== caseId),
                        userWorkspaceState: {
                            ...currentState,
                            uiState: {
                                ...nextUiState,
                                diagnosticDraftArchives: getDiagnosticDraftArchives(nextUiState)
                            }
                        }
                    }));

                    if (page === `report-${caseId}` || page === `case-report-${caseId}`) {
                        setPage('cases');
                    }

                    if (remainingLocalExamples === 0) {
                        setWorkspaceToast({
                            tone: 'info',
                            message: "Tous les dossiers exemples ont été supprimés. Créez votre premier vrai dossier avec Nouveau diagnostic."
                        });
                    }

                    try {
                        const savedWorkspaceState = await saveUserWorkspaceState({
                            userId: authUserId,
                            organizationId: workspace.organization?.id,
                            uiState: { dismissed_examples: nextDismissedExamples },
                            mergeWith: {
                                ...currentState,
                                uiState: nextUiState
                            }
                        });

                        setWorkspace(prev => ({
                            ...prev,
                            userWorkspaceState: savedWorkspaceState
                        }));
                    } catch (error) {
                        warnWorkspaceSchemaIssue("La persistance des dossiers exemples masqués a rencontré un problème de schéma.", error);
                    }

                    return { localExampleDismissed: true };
                }

                const deletionResult = await requestSecureCaseDeletion(caseId);

                setWorkspace(prev => ({
                    ...prev,
                    cases: prev.cases.filter(item => item.id !== caseId),
                    reports: prev.reports.filter(item => item.caseId !== caseId)
                }));

                if (page === `report-${caseId}` || page === `case-report-${caseId}`) {
                    setPage('cases');
                }

                if (deletionResult?.storage_cleanup_status === 'partial') {
                    window.alert(deletionResult?.message || "Dossier supprime, nettoyage des fichiers a finaliser.");
                }

                return deletionResult;
            };

            const handleUpdateCaseNote = async (caseId, noteInterne) => {
                const { userId, organizationId } = requireWorkspaceContext();
                const existingCase = workspace.cases.find(item => item.id === caseId);

                if (!existingCase) {
                    throw new Error("Dossier introuvable.");
                }

                const savedCase = await createOrUpdateProCase({
                    organizationId,
                    userId,
                    caseData: {
                        ...existingCase,
                        noteInterne
                    }
                });
                const savedReport = await createOrUpdateProReport({
                    organizationId,
                    userId,
                    caseId: savedCase.id,
                    reportPayload: {
                        ...(reportsByCaseId[caseId] || savedCase),
                        ...savedCase,
                        noteInterne
                    },
                    reportName: savedCase.projectName || savedCase.clientName || 'Rapport'
                });

                setWorkspace(prev => ({
                    ...prev,
                    cases: upsertCaseInCollection(prev.cases, savedCase),
                    reports: upsertReportInCollection(prev.reports, savedReport)
                }));

                return savedCase;
            };

            const handleSyncReportPdfMetadata = async (reportId, generationResult = null) => {
                const { organizationId } = requireWorkspaceContext();
                const synced = await syncReportPdfMetadata({
                    reportId,
                    organizationId,
                    generationResult
                });

                setWorkspace(prev => ({
                    ...prev,
                    reports: upsertReportInCollection(prev.reports, synced.report)
                }));

                return synced;
            };

            const openDemoModal = () => setIsDemoModalOpen(true);
            const closeDemoModal = () => setIsDemoModalOpen(false);
            const handleClearPersonalData = () => {
                clearProPersonalLocalData(authUserId);
                setLegalModalKey('');
                window.alert('Les données locales du navigateur ont été effacées pour cet appareil.');
            };

            // Shared report view - no auth required, no sidebar
            if (sharedReport) {
                return <ProReport cId={sharedReport.id || 'shared'} sharedCase={sharedReport} setPage={() => { window.location.hash = ''; setSharedReport(null); }} />;
            }

            if (!authReady) {
                return (
                    <div className="min-h-screen bg-[#FAFAF8] flex items-center justify-center px-6">
                        <div className="bg-white border border-slate-200 rounded-3xl shadow-sm px-8 py-10 text-center max-w-md w-full">
                            <div className="w-14 h-14 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center mx-auto mb-5">
                                <Icon icon="solar:shield-check-bold" style={{ fontSize: '28px' }} />
                            </div>
                            <h1 className="text-2xl font-black text-slate-900 tracking-tight" style={{ fontFamily: "'Inter', sans-serif" }}>Vérification de la session</h1>
                            <p className="text-sm text-slate-600 leading-6 mt-3">Chargement de votre accès professionnel sécurisé…</p>
                        </div>
                    </div>
                );
            }

            if (!auth) {
                return (
                    <>
                        <ProLanding
                            authError={authError}
                            recoveryState={authRecovery}
                            onOpenLegalModal={setLegalModalKey}
                            onClearPersonalData={handleClearPersonalData}
                        />
                        <ProLegalModal modalKey={legalModalKey} onClose={() => setLegalModalKey('')} onClearPersonalData={handleClearPersonalData} />
                    </>
                );
            }

            const handleLogout = async () => {
                setAuthError(null);
                await signOutPro();
                setWorkspace({
                    ...DEFAULT_WORKSPACE_DATA,
                    profile: null
                });
                setAuth(false);
                setAuthUserId(null);
                setPage('cases');
            };

            const renderPage = () => {
                if (page === 'dashboard') return <ProDashboard setPage={setPage} openDemo={openDemoModal} cases={workspace.cases} activeDraftPayload={workspace.userWorkspaceState?.draftPayload} archivedDraftCount={(workspace.userWorkspaceState?.uiState?.diagnosticDraftArchives || []).length} />;
                if (page === 'cases') return <ProCases setPage={setPage} cases={workspace.cases} onDeleteCase={handleDeleteCase} onUpdateCaseNote={handleUpdateCaseNote} />;
                if (page === 'new') return <ProNewDiag
                    setPage={setPage}
                    draftPayload={workspace.userWorkspaceState.draftPayload}
                    draftArchives={workspace.userWorkspaceState?.uiState?.diagnosticDraftArchives}
                    onSaveDraft={handleSaveDraft}
                    onArchiveCurrentDraft={handleArchiveCurrentDraft}
                    onRestoreArchivedDraft={handleRestoreArchivedDraft}
                    onDeleteArchivedDraft={handleDeleteArchivedDraft}
                    onGenerateCase={handleGenerateCase}
                />;
                if (page === 'settings') return <ProSettings settings={workspace.settings} branding={workspace.branding} organization={workspace.organization} userWorkspaceState={workspace.userWorkspaceState} onSaveSettings={handleSaveSettings} onSaveBranding={handleSaveBranding} />;
                if (page === 'plans') return <ProPlans onDemoClick={openDemoModal} />;
                if (page.startsWith('case-report-')) return <ProReport cId={page.replace('case-report-', '')} setPage={setPage} cases={workspace.cases} reportsByCaseId={reportsByCaseId} settings={workspace.settings} branding={workspace.branding} organization={workspace.organization} onSyncReportPdfMetadata={handleSyncReportPdfMetadata} onDeleteCase={handleDeleteCase} />;
                if (page.startsWith('report-')) return <ProReport cId={page.replace('report-', '')} setPage={setPage} cases={workspace.cases} reportsByCaseId={reportsByCaseId} settings={workspace.settings} branding={workspace.branding} organization={workspace.organization} onSyncReportPdfMetadata={handleSyncReportPdfMetadata} onDeleteCase={handleDeleteCase} />;
                return <ProDashboard setPage={setPage} openDemo={openDemoModal} cases={workspace.cases} activeDraftPayload={workspace.userWorkspaceState?.draftPayload} archivedDraftCount={(workspace.userWorkspaceState?.uiState?.diagnosticDraftArchives || []).length} />;
            };

            const titles = {
                dashboard: "Vue globale du parc",
                cases: "Dossiers clients",
                new: "Nouveau diagnostic",
                settings: "Configuration",
                plans: "Plans & Tarification"
            };
            const currentTitle = (page.startsWith('report-') || page.startsWith('case-report-')) ? "Rapport détaillé" : (titles[page] || "");

            return (
                <div className="flex bg-[#FAFAF8]" data-auth-user={authUserId || ''}>
                    <ProSidebar
                        curPage={page}
                        setPage={setPage}
                        isMobileOpen={isMobileMenuOpen}
                        closeMobile={closeMobile}
                        onLogout={handleLogout}
                        profile={workspace.profile}
                        organization={workspace.organization}
                        authUserId={authUserId}
                        onboardingChecklist={onboardingChecklist}
                        showChecklistCompletionNotice={showChecklistCompletionNotice}
                        onRefreshChecklist={handleRefreshChecklist}
                        isRefreshingChecklist={isRefreshingChecklist}
                        onStartTour={startOnboardingTour}
                    />
                    <div className="pro-content flex-1 max-w-full">
                        <ProTopbar title={currentTitle} toggleMobile={toggleMobile} />
                        <main className="min-h-[calc(100vh-73px)]">
                            {renderPage()}
                        </main>
                        <footer className="py-6 text-center text-slate-400 text-xs font-semibold border-t border-slate-200 bg-white">
                            <div className="flex flex-col items-center gap-3 px-4">
                                <span>© 2024 DiagTertiaire Pro | Environnement de démonstration B2B</span>
                                <div className="flex flex-wrap items-center justify-center gap-4">
                                    <button type="button" onClick={() => setLegalModalKey('mentions')} className="hover:text-slate-600 transition-colors">Mentions légales</button>
                                    <button type="button" onClick={() => setLegalModalKey('privacy')} className="hover:text-slate-600 transition-colors">Politique de confidentialité</button>
                                    <a href="./conditions-generales-utilisation.html" className="hover:text-slate-600 transition-colors">CGU</a>
                                    <a href="./cookies.html" className="hover:text-slate-600 transition-colors">Cookies</a>
                                    <button type="button" onClick={() => window.dtCookies && window.dtCookies.open()} className="hover:text-slate-600 transition-colors">Gestion des cookies</button>
                                    <button type="button" onClick={handleClearPersonalData} className="hover:text-slate-600 transition-colors">Effacer mes données</button>
                                </div>
                            </div>
                        </footer>
                    </div>
                    <ChatbotWidget />
                    <OnboardingPromptModal
                        isOpen={onboardingPromptOpen}
                        onConfirm={startOnboardingTour}
                        onSkip={handleSkipOnboarding}
                    />
                    <OnboardingTour
                        isActive={tourActive}
                        currentStep={tourStep}
                        onNext={advanceOnboardingTour}
                        onClose={handleSkipOnboarding}
                        onComplete={handleSkipOnboarding}
                        onOpenMobile={openMobile}
                        onCloseMobile={closeMobile}
                    />
                    <DemoModal isOpen={isDemoModalOpen} onClose={closeDemoModal} />
                    <ProLegalModal modalKey={legalModalKey} onClose={() => setLegalModalKey('')} onClearPersonalData={handleClearPersonalData} />
                    {workspaceToast?.message && (
                        <div className="fixed bottom-6 right-6 z-[140] max-w-sm rounded-2xl border border-slate-200 bg-white px-4 py-4 shadow-2xl shadow-slate-900/15">
                            <div className="flex items-start gap-3">
                                <div className="mt-0.5 flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-blue-50 text-blue-600">
                                    <Icon icon="solar:info-circle-bold" className="text-lg" />
                                </div>
                                <div className="min-w-0">
                                    <div className="text-sm font-bold text-slate-900">Mise à jour de l’espace</div>
                                    <div className="mt-1 text-sm leading-6 text-slate-600">{workspaceToast.message}</div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('pro-root'));
        root.render(<ProApp />);
    </script>
</body>

</html>
