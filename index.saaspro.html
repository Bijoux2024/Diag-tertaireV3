<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagTertiaire Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: #F1F5F9;
            border-top: 1px solid #E2E8F0;
            color: #0F172A;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            overflow-x: hidden;
        }

        .fade-in {
            animation: fadeIn 0.35s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ===== LAYOUT ====== */
        .pro-sidebar {
            width: 250px;
            min-height: 100vh;
            background: #FFFFFF;
            border-right: 1px solid #E2E8F0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pro-content {
            margin-left: 250px;
            min-height: 100vh;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 1024px) {
            .pro-sidebar {
                transform: translateX(-100%);
                width: 260px;
            }

            /* Sidebar visible sur mobile quand la class .open est ajoutée via JS */
            .pro-sidebar.open {
                transform: translateX(0);
            }

            .pro-content {
                margin-left: 0;
            }
        }

        /* ===== SIDEBAR NAV ===== */
        .nav-item {

            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
            color: #64748B;
            margin: 4px 16px;
        }

        .nav-item:hover {
            background: #F1F5F9;
            border-top: 1px solid #E2E8F0;
            color: #0F172A;
        }

        .nav-item.active {
            background: #EFF6FF;
            color: #1D4ED8;
            font-weight: 700;
        }

        /* ===== BUTTONS ===== */
        .pro-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .pro-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .pro-btn-primary {
            background: #1D4ED8;
            color: white;
            box-shadow: 0 4px 12px rgba(29, 78, 216, 0.25);
        }

        .pro-btn-primary:not(:disabled):hover {
            background: #1E40AF;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(29, 78, 216, 0.35);
        }

        .pro-btn-secondary {
            background: white;
            color: #0F172A;
            border: 1px solid #E2E8F0;
        }

        .pro-btn-secondary:not(:disabled):hover {
            background: #F1F5F9;
            border-top: 1px solid #E2E8F0;
            border-color: #CBD5E1;
        }

        .pro-btn-ghost {
            background: transparent;
            color: #475569;
        }

        .pro-btn-ghost:not(:disabled):hover {
            background: #F1F5F9;
            color: #0F172A;
        }

        /* ===== BADGES ===== */
        .score-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }

        .score-A {
            background: #DCFCE7;
            color: #15803D;
        }

        .score-B {
            background: #D1FAE5;
            color: #059669;
        }

        .score-C {
            background: #FEF9C3;
            color: #A16207;
        }

        .score-D {
            background: #FEE2E2;
            color: #DC2626;
        }

        .score-E {
            background: #F3E8FF;
            color: #7C3AED;
        }

        .rel-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .rel-eleve {
            background: #DCFCE7;
            color: #15803D;
        }

        .rel-moyen {
            background: #FEF9C3;
            color: #92400E;
        }

        .rel-faible {
            background: #FEE2E2;
            color: #991B1B;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-nouveau {
            background: #EFF6FF;
            color: #1D4ED8;
        }

        .status-relancer {
            background: #FEF3C7;
            color: #D97706;
        }

        .status-projet {
            background: #F0FDF4;
            color: #16A34A;
        }

        .status-clos {
            background: #F1F5F9;
            border-top: 1px solid #E2E8F0;
            color: #64748B;
        }

        /* ===== INPUTS & CARDS ===== */
        .kpi-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid #E2E8F0;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.03);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        /* Hover unifié : élévation légère + ombre + bordure plus marquée */
        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06), 0 4px 10px rgba(15, 23, 42, 0.03);
            border-color: #CBD5E1;
        }

        .pro-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #CBD5E1;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
            background: white;
            color: #0F172A;
        }

        .pro-input::placeholder {
            color: #94A3B8;
        }

        .pro-input:focus {
            border-color: #1D4ED8;
            box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.15);
        }

        .pro-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        /* ===== TABLES ====== */
        .pro-table th {
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748B;
            font-size: 11px;
            font-weight: 700;
            padding: 12px 16px;
            border-bottom: 1px solid #E2E8F0;
            background: #F1F5F9;
            border-top: 1px solid #E2E8F0;
            text-align: left;
        }

        .pro-table td {
            padding: 12px 16px;
            color: #334155;
            font-size: 13px;
            border-bottom: 1px solid #F1F5F9;
        }

        .pro-table tr:last-child td {
            border-bottom: none;
        }

        .pro-table tbody tr:hover {
            background: #F1F5F9;
            border-top: 1px solid #E2E8F0;
        }

        /* ===== MODALS ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-box {
            background: white;
            border-radius: 20px;
            max-width: 540px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.25);
        }

        /* Diagnostic onboarding navigateur 2026-03-15 :
           .driver-popover = z-index 1000000000 / pointer-events auto
           .driver-popover-footer = z-index auto / pointer-events auto
           .driver-popover-footer button = z-index auto / pointer-events auto
           .pro-sidebar = z-index 50, topbar sticky = z-index 30
           .modal-overlay = z-index 100, modale légale = z-index 120
           Sonde directe sur .driver-overlay = z-index auto / position static / pointer-events auto
           driver.css appliquait pointer-events:none sous .driver-active puis restaurait auto sur .driver-popover et ses descendants. */
        .dt-tour-popover-shell {
            position: fixed;
            right: 24px;
            bottom: 24px;
            width: min(340px, calc(100vw - 32px));
            z-index: 9999;
            pointer-events: none;
        }

        .dt-tour-popover {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
            color: #0F172A;
            overflow: hidden;
            pointer-events: auto;
        }

        .dt-tour-popover-header {
            padding: 18px 20px 0;
        }

        .dt-tour-popover-step {
            color: #64748B;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .dt-tour-popover-title {
            color: #0F172A;
            font-size: 19px;
            font-weight: 800;
            line-height: 1.25;
            margin-top: 8px;
        }

        .dt-tour-popover-body {
            color: #475569;
            font-size: 14px;
            line-height: 1.7;
            padding: 12px 20px 0;
        }

        .dt-tour-popover-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 18px 20px 20px;
        }

        .dt-tour-popover-skip {
            background: transparent;
            border: none;
            color: #64748B;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            padding: 0;
        }

        .dt-tour-popover-skip:hover {
            color: #334155;
        }

        .dt-tour-popover-next {
            background: #1D4ED8;
            border: 1px solid #1D4ED8;
            border-radius: 12px;
            box-shadow: 0 12px 28px rgba(29, 78, 216, 0.24);
            color: #FFFFFF;
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            padding: 11px 18px;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .dt-tour-popover-next:hover {
            background: #1E40AF;
            transform: translateY(-1px);
        }

        .dt-tour-progress-track {
            background: #E2E8F0;
            height: 5px;
            width: 100%;
        }

        .dt-tour-progress-bar {
            background: #1D4ED8;
            height: 100%;
            transition: width 0.2s ease;
        }

        @media (max-width: 640px) {
            .dt-tour-popover-shell {
                right: 16px;
                bottom: 16px;
                width: calc(100vw - 32px);
            }
        }

        /* ===== CHATBOT ====== */
        .chatbot-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 90;
        }

        .chatbot-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #0B162C;
            border-right: 1px solid #1E293B;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: transform 0.2s;
        }

        .chatbot-btn:hover {
            transform: scale(1.05);
        }

        .chatbot-panel {
            position: absolute;
            bottom: 76px;
            right: 0;
            width: 340px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 12px 48px rgba(15, 23, 42, 0.15);
            border: 1px solid #E2E8F0;
            overflow: hidden;
            transform-origin: bottom right;
        }


        .timeline-line {
            position: relative;
            padding-left: 48px;
            padding-bottom: 8px;
        }

        .timeline-line::before {
            content: '';
            position: absolute;
            left: 18px;
            top: 28px;
            bottom: -8px;
            width: 2px;
            background: #E2E8F0;
        }

        .timeline-line:last-child::before {
            display: none;
        }

        .timeline-dot {
            position: absolute;
            left: 8px;
            top: 4px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #1D4ED8;
            color: white;
            font-size: 11px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== DIVERS ===== */
        .step-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border-radius: 12px;
            border: 1.5px solid #E2E8F0;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            text-align: left;
            width: 100%;
            font-size: 14px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 8px;
        }

        .step-option:hover {
            border-color: #94A3B8;
            background: #F1F5F9;
            border-top: 1px solid #E2E8F0;
        }

        .step-option.selected {
            border-color: #1D4ED8;
            background: #EFF6FF;
            color: #1D4ED8;
            box-shadow: 0 2px 8px rgba(29, 78, 216, 0.1);
        }

        .progress-bar-track {
            height: 6px;
            background: #E2E8F0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: #1D4ED8;
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .plan-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid #E2E8F0;
            flex: 1;
            display: flex;
            flex-direction: column;
            transition: all 0.2s;
        }

        .plan-card:hover {
            border-color: #CBD5E1;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.05);
        }

        .plan-card.featured {
            border: 2px solid #1D4ED8;
            box-shadow: 0 12px 32px rgba(29, 78, 216, 0.1);
            position: relative;
        }

        @media print {
            body {
                background: white !important;
            }

            .no-print,
            .pro-sidebar,
            .pro-topbar,
            #chatbot-widget {
                display: none !important;
            }

            .pro-content {
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                max-width: none !important;
            }

            .print-page {
                page-break-inside: avoid;
                margin-bottom: 2rem;
                border: none !important;
                box-shadow: none !important;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            @page {
                margin: 1.5cm;
                size: A4 portrait;
            }

            /* Force page breaks before key sections */
            .print-page:nth-child(2) {
                page-break-before: always;
            }

            /* Show collapsible annexe in print */
            .hidden.print-show {
                display: block !important;
            }

            /* Hide collapse button in print */
            button.no-print {
                display: none !important;
            }
        }

        /* === PROLANDING ANIMATIONS === */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: none;
        }

        .float-in {
            animation: floatIn 0.6s ease 0.8s both;
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.35;
            }
        }

        .pulse-dot {
            animation: pulse-dot 1.6s ease infinite;
        }

        /* === PROLANDING FONTS === */
        .pro-landing-typo {
            font-family: 'Inter', sans-serif;
        }

        .pro-landing-typo button,
        .pro-landing-typo input,
        .pro-landing-typo select,
        .pro-landing-typo textarea {
            font-family: inherit;
        }

        .font-display {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body>
    <div id="pro-root"></div>

            if (!normalizedSelector) {
                resolve(null);
                return;
            }

            const revealNode = (node) => {
                if (!node) {
                    resolve(null);
                    return true;
                }

                if (typeof node.scrollIntoView === 'function') {
                    node.scrollIntoView({
                        behavior: 'smooth',
                        block: 'center',
                        inline: 'nearest'
                    });
                }

                resolve(node);
                return true;
            };

            const existingNode = document.querySelector(normalizedSelector);
            if (existingNode) {
                revealNode(existingNode);
                return;
            }

            const startedAt = Date.now();
            const intervalId = window.setInterval(() => {
                const nextNode = document.querySelector(normalizedSelector);
                if (nextNode && revealNode(nextNode)) {
                    window.clearInterval(intervalId);
                    return;
                }

                if (Date.now() - startedAt >= timeoutMs) {
                    window.clearInterval(intervalId);
                    resolve(null);
                }
            }, 80);

                Array.from(bytes.slice(8, 10)),

            bytes[6] = (bytes[6] & 0x0f) | 0x40;

                    hasCallbackPayload: false
                };
            }

            const currentUrl = new URL(window.location.href);
            const rawHash = currentUrl.hash || '';
            const hashParams = rawHash && !rawHash.startsWith('#report=')
                ? new URLSearchParams(rawHash.slice(1))
                : new URLSearchParams();
            const type = currentUrl.searchParams.get('type')
                || hashParams.get('type')
                || '';
            const code = currentUrl.searchParams.get('code') || '';
            const accessToken = hashParams.get('access_token') || '';
            const refreshToken = hashParams.get('refresh_token') || '';

            return {
                type,
                code,
                accessToken,
                refreshToken,
                hasCallbackPayload: !!(type || code || accessToken || refreshToken)
            };
        };

        const establishSupabaseSessionFromAuthCallback = async (browserClient) => {
            if (!browserClient?.auth) {
                return {
                    session: null,
                    error: null,
                    flowType: '',
                    handled: false,
                    usedDirectSessionTokens: false
                };
            }

            const callbackParams = getAuthCallbackParamsFromLocation();
            const flowType = callbackParams.type;
            const shouldHandleSession = AUTH_CALLBACK_SESSION_FLOW_TYPES.includes(flowType)
                || !!callbackParams.code
                || !!callbackParams.accessToken;

            if (!shouldHandleSession) {
                return {
                    session: null,
                    error: null,
                    flowType,
                    handled: false,
                    usedDirectSessionTokens: false
                };
            }

            // Supabase email confirmation can return direct session tokens in the hash.
            // In this case we must not use exchangeCodeForSession(), which expects a PKCE code.
            if (callbackParams.accessToken && callbackParams.refreshToken && typeof browserClient.auth.setSession === 'function') {
                const { data, error } = await browserClient.auth.setSession({
                    access_token: callbackParams.accessToken,
                    refresh_token: callbackParams.refreshToken
                });

                return {
                    session: data?.session || null,
                    error: error || null,
                    flowType,
                    handled: true,
                    usedDirectSessionTokens: true
                };
            }

            if (callbackParams.code && typeof browserClient.auth.exchangeCodeForSession === 'function') {
                const { data, error } = await browserClient.auth.exchangeCodeForSession(callbackParams.code);
                return {
                    session: data?.session || null,
                    error: error || null,
                    flowType,
                    handled: true,
                    usedDirectSessionTokens: false
                };
            }

            const { data, error } = await browserClient.auth.getSession();
            return {
                session: data?.session || null,
                error: error || null,
                flowType,
                handled: true,
                usedDirectSessionTokens: false
            };
        };

        const clearSupabaseAuthRedirectState = () => {
            if (typeof window === 'undefined' || typeof window.history?.replaceState !== 'function') {
                return;
            }

            const currentUrl = new URL(window.location.href);
            let didChange = false;

            AUTH_CALLBACK_SEARCH_KEYS.forEach((key) => {
                if (currentUrl.searchParams.has(key)) {
                    currentUrl.searchParams.delete(key);
                    didChange = true;
                }
            });

            const rawHash = currentUrl.hash || '';
            if (rawHash && !rawHash.startsWith('#report=')) {
                const hashParams = new URLSearchParams(rawHash.slice(1));
                let hashDidChange = false;

                AUTH_CALLBACK_HASH_KEYS.forEach((key) => {
                    if (hashParams.has(key)) {
                        hashParams.delete(key);
                        hashDidChange = true;
                    }
                });

                if (hashDidChange) {
                    currentUrl.hash = hashParams.toString() ? `#${hashParams.toString()}` : '';
                    didChange = true;
                }
            }

            if (didChange) {

            if (source) {

                const initials = parts.map(part => part[0]?.toUpperCase() || '').join('');
                if (initials) {

                }
            }

            const emailPrefix = String(email || '').split('@')[0].replace(/[^a-zA-Z0-9]+/g, ' ').trim();
            const fallbackParts = emailPrefix.split(/\s+/).filter(Boolean).slice(0, 2);

            const browserClient = await getSupabaseBrowserClient();
            if (!browserClient) {

                    ok: false,

                };
            }

            try {
                const normalizedFullName = deriveFullName(user) || null;
                const normalizedEmail = user?.email || null;
                const { data: existingProfile, error: existingProfileError } = await browserClient
                    .from('profiles')
                    .select('id, organization_id, email, full_name')
                    .eq('id', user.id)
                    .maybeSingle();

                if (existingProfileError) {
                    throw existingProfileError;
                }

                if (existingProfile) {
                    const shouldPatchProfile = (
                        (normalizedEmail && existingProfile.email !== normalizedEmail)
                        || (normalizedFullName && existingProfile.full_name !== normalizedFullName)
                    );

                    if (shouldPatchProfile) {
                        const { data: patchedProfile, error: patchedProfileError } = await browserClient
                            .from('profiles')
                            .update({
                                email: normalizedEmail,
                                full_name: normalizedFullName
                            })
                            .eq('id', user.id)
                            .select('id, organization_id, email, full_name')
                            .single();

                        if (patchedProfileError) {
                            throw patchedProfileError;
                        }

                        return { ok: true, profile: patchedProfile };
                    }

                    return { ok: true, profile: existingProfile };
                }

                const { data: existingOrganization, error: existingOrganizationError } = await browserClient
                    .from('organizations')
                    .select('id, name')
                    .eq('owner_user_id', user.id)
                    .maybeSingle();

                if (existingOrganizationError) {
                    throw existingOrganizationError;
                }

                let organization = existingOrganization;

                        .from('organizations')
                        .insert({
                            name: deriveOrganizationName(user),
                            owner_user_id: user.id
                        })

                    if (insertOrganizationError) {
                        throw insertOrganizationError;

                    organization = insertedOrganization;

                    .insert({

                        email: normalizedEmail,
                        full_name: normalizedFullName,
                        organization_id: organization.id

                        .eq('id', user.id)
                        .maybeSingle();

                    if (!fallbackProfileError && fallbackProfile) {
                        return { ok: true, profile: fallbackProfile };
                    }

                    throw insertProfileError;

                return { ok: true, profile: insertedProfile };

            if (/^https?:\/\//i.test(storagePath) || storagePath.startsWith('data:image/')) {

            if (!browserClient) {

                if (throwOnError) {

                return '';

            const savingsValue = Number(engineResult.totalSavingsEur || source.estimatedSavingsPerYear || 0);

                ? `${Math.round(savingsValue).toLocaleString('fr-FR')} EUR / an`

            const roiLabel = roiValue > 0 ? `${String(roiValue).replace('.', ',')} ans` : '';

            if (typeof window === 'undefined') {

            try {
                return type === 'local' ? window.localStorage : window.sessionStorage;
            } catch (error) {
                return null;
            }
        };

        const getProFormAntiSpamKey = (kind, formKey) => `${PRO_FORM_ANTISPAM_STORAGE_PREFIX}:${kind}:${formKey}`;

        const readProFormAntiSpamTimestamp = (kind, formKey, type = 'session') => {
            const storage = getProFormAntiSpamStorage(type);
            if (!storage) {
                return null;
            }

            const rawValue = storage.getItem(getProFormAntiSpamKey(kind, formKey));
            const parsedValue = Number(rawValue);
            return Number.isFinite(parsedValue) && parsedValue > 0 ? parsedValue : null;
        };

        const writeProFormAntiSpamTimestamp = (kind, formKey, value, type = 'session') => {
            const storage = getProFormAntiSpamStorage(type);
            if (!storage) {
                return;
            }

            const storageKey = getProFormAntiSpamKey(kind, formKey);

            if (value === null || typeof value === 'undefined') {
                storage.removeItem(storageKey);
                return;
            }

            storage.setItem(storageKey, String(value));
        };

        const markProFormRendered = (formKey) => {
            const now = Date.now();
            writeProFormAntiSpamTimestamp('rendered', formKey, now, 'session');
            return now;
        };

        const ensureProFormRendered = (formKey) => (
            readProFormAntiSpamTimestamp('rendered', formKey, 'session') || markProFormRendered(formKey)
        );

        const hasProFormHoneypotValue = (value) => typeof value === 'string' && value.trim().length > 0;

        const isProFormSubmissionTooFast = (formKey, minimumDelayMs) => {
            if (!minimumDelayMs) {
                return false;
            }

            const renderedAt = ensureProFormRendered(formKey);
            return (Date.now() - renderedAt) < minimumDelayMs;
        };

        const getProFormCooldownRemainingMs = (formKey, cooldownMs) => {
            if (!cooldownMs) {
                return 0;
            }

            const cooldownStartedAt = readProFormAntiSpamTimestamp('cooldown', formKey, 'local');
            if (!cooldownStartedAt) {
                return 0;
            }

            return Math.max(0, cooldownMs - (Date.now() - cooldownStartedAt));
        };

        const setProFormCooldown = (formKey) => {

        function scoreMaturite(formData) {
            let score = 1;
            // FIX audit-2026-03-07 - champs alignés sur sortie alpha form (budget/horizon/objectif)
            const budget = formData.budget || formData.budget_travaux;
            const horizon = formData.horizon || formData.horizon_decision;
            const objectif = formData.objectif || formData.objectif_principal;

            if (['20k_80k', 'sup80k', 'sup_80k'].includes(budget)) score += 2;
            else if (budget === '5k_20k') score += 1;

            if (horizon === 'immediat') score += 2;
            else if (horizon === 'court' || horizon === 'court_terme') score += 1;

            if (objectif === 'conformite' || objectif === 'conformite_reglementaire') score += 1;

            return Math.min(score, 5);
        }

        function selectActions(formData, consommation, postes) {
            const activite = formData.activite || 'bureaux';
            const plafond = PLAFONDS_GAINS[activite] || 0.60;

            // 1. Filtrer par prérequis et travaux déjà réalisés
            let applicables = ACTIONS_LIBRARY.filter(action => {
                if (action.exclu_si.some(t => formData.travaux_realises?.includes(t)))
                    return false;

                for (const req of action.prerequis) {
                    if (req === 'chauffage_reseau_eau' &&
                        formData.chauffage_reseau !== 'eau_chaude') return false;
                    if (req === 'age_sup_10_ans' &&
                        formData.chauffage_age === 'moins_10_ans') return false;
                    if (req === 'eclairage_non_led' &&
                        formData.eclairage_type === 'led_complet') return false;
                    if (req === 'vmc_simple_flux' &&
                        !['simple_auto', 'simple_hygro'].includes(formData.vmc_type)) return false;
                    if (req === 'vmc_presente' &&
                        formData.vmc_type === 'naturelle') return false;
                    if (req === 'vmc_sans_recuperation' &&
                        formData.vmc_type === 'df_hr') return false;
                    if (req === 'ecs_presente' && !formData.ecs_presente) return false;
                    if (req === 'ecs_calorifugeage_incomplet' &&
                        formData.ecs_calorifugeage === 'oui') return false;
                    if (req === 'toiture_non_isolee' &&
                        formData.isolation_toiture === 'oui') return false;
                    if (req === 'chaudiere_presente' &&
                        ['convecteurs', 'plancher_elec', 'aucun'].includes(formData.chauffage_type)) return false;
                    // FIX #D audit-2026-03-07 - prerequis chauffage_regulation_horloge manquant
                    if (req === 'chauffage_regulation_horloge' &&
                        !formData.chauffage_regulation?.includes?.('horloge') &&
                        !formData.chauffage_regulation?.includes?.('gtb')) return false;
                }
                return true;
            });

            // 2. Calculer gain et ROI pour chaque action
            applicables = applicables.map(action => {
                const pct_poste = (postes[activite] && postes[activite][action.poste]) || 15;
                const conso_poste = consommation.total_kwh * (pct_poste / 100);
                const gain_kwh = conso_poste * action.gain.med;
                const energieKey = formData.energie_principale || Object.keys(PRIX_ENERGIE)[0];
                const gain_eur = gain_kwh * (PRIX_ENERGIE[energieKey] || PRIX_ENERGIE.electricite);

                let capex = action.capex.med;
                if (action.capex_m2) {
                    capex = action.capex_m2 * (formData.surface || 100);
                }
                if (capex < action.capex.low) capex = action.capex.low;
                if (capex > action.capex.high) capex = action.capex.high;

                const roi = capex > 0 ? capex / gain_eur : 0;
                return { ...action, conso_poste, gain_kwh, gain_eur, capex, roi };
            });

            // 3. Trier par ROI croissant
            applicables.sort((a, b) => a.roi - b.roi);

            // 4. Sélectionner avec plafonnement
            let gains_cumules = 0;
            const retenues = [];
            for (const action of applicables) {
                if (gains_cumules + action.gain.med <= plafond) {
                    retenues.push(action);
                    gains_cumules += action.gain.med;
                }
                if (retenues.length >= 5) break;
            }

            return { actions: retenues, gains_pct_total: gains_cumules };
        }

        function projection10ans(cout_annuel, economies_annuelles, capex) {
            const inflation = 0.03;
            const points = [];
            let cumul_sans = 0;
            let cumul_avec = capex; // Bug #4 corrigé

            for (let an = 0; an <= 10; an++) { // Bug #5 corrigé: de 0 à 10
                const facteur = Math.pow(1 + inflation, an);
                if (an > 0) {
                    cumul_sans += cout_annuel * facteur;
                    cumul_avec += (cout_annuel - economies_annuelles) * facteur;
                }
                points.push({
                    label: an === 0 ? 'Auj.' : `A+${an}`,
                    sans_travaux: Math.round(cumul_sans),
                    avec_travaux: Math.round(cumul_avec),
                    economies_nettes: Math.round(cumul_sans - cumul_avec),
                });
            }
            // Point ROI = première année où economies_nettes > 0
            const annee_roi = points.find(p => p.economies_nettes > 0)?.label || 'N/A';
            return { points, annee_roi };
        }

                    return { ...a, gainKwh: Math.round(gainKwh), gainEur: Math.round(gainEur), capex: Math.round(capex), roi: parseFloat(roi.toFixed(1)), gain_kwh: Math.round(gainKwh), gain_eur: Math.round(gainEur) };
                }).sort((a, b) => a.roi - b.roi);

                for (const a of pool) {
                    if (selectedActions.length >= 5) break;
                    if (cumulGainPct + (a.gainRange[1] / 100) * (postesBase[a.scope] || 30) / 100 > plafond) continue;
                    cumulGainPct += (a.gainRange[1] / 100) * (postesBase[a.scope] || 30) / 100;
                    selectedActions.push(a);
                }

                const totalSavingsKwh = selectedActions.reduce((s, a) => s + a.gainKwh, 0);
                const totalSavingsEur = selectedActions.reduce((s, a) => s + a.gainEur, 0);
                const totalCapexBrut = selectedActions.reduce((s, a) => s + a.capex, 0);

                // === AIDES ===
                let aidesTotal = 0;
                for (const a of selectedActions) {
                    if (a.cee) aidesTotal += a.capex * 0.015;
                    aidesTotal += a.capex * (0.20 - 0.055) / 1.20;
                }
                aidesTotal = Math.round(aidesTotal);
                const totalCapexNet = Math.max(0, totalCapexBrut - aidesTotal);

                // === ROI GLOBAL ===
                const roiGlobal = totalSavingsEur > 0 ? totalCapexNet / totalSavingsEur : 999;
                const graphiquePubliable = roiGlobal >= 0.5 && roiGlobal <= 20 && totalSavingsEur > 0;

                // === INFLATION PONDÉRÉE ===
                const partElec = kwhTotal > 0 ? kwhElec / kwhTotal : 0.5;
                const partGaz = kwhTotal > 0 ? kwhGaz / kwhTotal : 0.5;
                const tauxInflation = partElec * this.inflationTaux.elec + partGaz * this.inflationTaux.gaz;

                // === PROJECTION ===
                const horizonAns = roiGlobal > 10 && roiGlobal <= 20 ? 15 : 10;
                const projectionData = [{ annee: 'Auj.', sans_travaux: 0, avec_travaux: totalCapexNet, economies_nettes: -totalCapexNet }];
                let cumulSans = 0, cumulAvec = totalCapexNet;
                for (let an = 1; an <= horizonAns; an++) {
                    const f = Math.pow(1 + tauxInflation, an);
                    cumulSans += totalBill * f;
                    cumulAvec += (totalBill - totalSavingsEur) * f;
                    projectionData.push({
                        annee: `A+${an}`,
                        sans_travaux: Math.round(cumulSans),
                        avec_travaux: Math.round(cumulAvec),
                        economies_nettes: Math.round(cumulSans - cumulAvec),
                    });
                }

                // === SCORE MATURITÉ ===
                const mainGoal = data.mainGoal || data.objectif || data.objectif_principal || '';
                const horizon = data.timeHorizon || data.horizon || data.horizon_decision || '';
                const budget = data.budget || data.budget_travaux || '';
                let scoreMat = 0;
                if (horizon === 'immediat') scoreMat += 2;
                else if (horizon === 'moyen' || horizon === 'court' || horizon === 'court_terme') scoreMat += 1;
                if (budget && budget !== 'non_defini') scoreMat += 1;
                if (mainGoal === 'facture' || mainGoal === 'conformite' || mainGoal === 'conformite_reglementaire') scoreMat += 1;
                scoreMat = Math.min(5, scoreMat);

                const co2Apres = Math.round(co2Total * (1 - totalSavingsKwh / Math.max(kwhTotal, 1)));

                return {
                    // Calcul de base
                    id: data.id || ('DT-' + new Date().getFullYear() + '-' + Math.floor(Math.random() * 100000)),
                    date: data.date || new Date().toLocaleDateString(),
                    kwhTotal: Math.round(kwhTotal),
                    kwhElec: Math.round(kwhElec),
                    kwhGaz: Math.round(kwhGaz),
                    elecCost: Math.round(kwhElec * implicitElec),
                    gasCost: Math.round(kwhGaz * implicitGaz),
                    intensity: Math.round(intensity),
                    isFallback,
                    zone,
                    anneeCorr,
                    score,
                    positioning,
                    ratio: parseFloat(ratio.toFixed(2)),
                    ref,
                    activityKey,
                    // Financier
                    totalBill,
                    estimatedBill: totalBill,
                    avgPrice: parseFloat(avgPrice.toFixed(4)),
                    // Postes
                    postes,
                    // Actions
                    topActions: selectedActions,
                    totalSavingsEur: Math.round(totalSavingsEur),
                    totalSavingsKwh,
                    totalCapex: totalCapexBrut,
                    totalCapexBrut,
                    totalCapexNet,
                    aidesTotal,
                    // ROI et graphiques
                    roiGlobal: parseFloat(roiGlobal.toFixed(1)),
                    graphiquePubliable,
                    horizonAns,
                    projectionData,
                    tauxInflation: parseFloat(tauxInflation.toFixed(4)),
                    // CO2
                    co2Total,
                    emissionsActuelles: co2Total,
                    co2Evite: Math.round(co2Total - co2Apres),
                    co2Apres,
                    // Dashboard pro
                    scoreMaturite: scoreMat,

                    isKwhPrioritaire,
                    badgeConfiance: isKwhPrioritaire ? 'Élevé' : isFallback ? 'Estimé' : 'Moyen',
                    // backward compat
                    formData: data,
                };
            }
        };

            const energiePrincipale = c.energiePrincipale || 'electricite';
            const co2Factor = facteursCO2[energiePrincipale] || 0.079;
            const co2Total = Math.round((c.annualConsumption || 0) * co2Factor);
            const savingsKwh = c.annualConsumption > 0

            const co2Apres = Math.round(co2Total * (1 - (c.estimatedSavingsPercent || 0) / 100));
            const topActions = (c.actions || []).map(a => ({

            const score = (benchmarkMedian > 0 && intensity > 0) ? scoring.score : (c.score || scoring.score);

        // CO2 equivalences - ADEME 2023
        const CO2_ARBRE_KG_AN = 22;
        const CO2_VOITURE_KG_AN = 2100;
        const CO2_VOITURE_KM = 0.193;
        function getCO2Equivalences(co2KgEvite) {
            const arbres = Math.round(co2KgEvite / CO2_ARBRE_KG_AN);
            const voitures = (co2KgEvite / CO2_VOITURE_KG_AN).toFixed(1);
            const km = Math.round(co2KgEvite / CO2_VOITURE_KM);
            return { arbres, voitures, km };
        }

        function getSectorialThresholds(ref) {
            if (!ref || !ref.med) return null;
            const med = ref.med;
            // Flat values used in THRESHOLD_LABELS: A=seuil max A, B=seuil max B, etc.
            return {
                A: Math.round(med * 0.60),
                B: Math.round(med * 0.90),
                C: Math.round(med * 1.20),
                D: Math.round(med * 1.70),
                E: '> ' + Math.round(med * 1.70),
            };
        }

        function computeScoreFromIntensity(intensityValue, medianValue) {
            const intensity = parseFloat(intensityValue) || 0;
            const median = parseFloat(medianValue) || 0;
            const ratioRaw = median > 0 ? intensity / median : 1;
            // Évite les effets de flottants sur les seuils (ex: 1.1999999)
            const ratio = parseFloat(ratioRaw.toFixed(4));
            if (ratio < 0.6) return { score: 'A', positioning: 'Très performant', ratio };
            if (ratio < 0.9) return { score: 'B', positioning: 'Performant', ratio };
            if (ratio < 1.2) return { score: 'C', positioning: 'Dans la médiane', ratio };
            if (ratio < 1.7) return { score: 'D', positioning: 'Surconsommation notable', ratio };
            return { score: 'E', positioning: 'Très énergivore', ratio };
        }

        function parseSurfaceValue(raw) {
            if (raw === null || raw === undefined) return 0;
            if (typeof raw === 'number') return raw > 0 ? raw : 0;
            if (typeof raw !== 'string') return 0;
            const normalized = raw.replace(/\s/g, '').replace(',', '.');
            const cleaned = normalized.replace(/[^\d.]/g, '');
            const parsed = parseFloat(cleaned);
            return Number.isFinite(parsed) && parsed > 0 ? parsed : 0;
        }

        function extractSurfaceValue(caseData) {
            if (!caseData) return 0;
            const fd = caseData.formData || {};
            const direct = parseSurfaceValue(
                fd.surface ||
                fd.surface_utile ||
                fd.area ||
                caseData.buildingArea ||
                caseData.surface
            );
            if (direct > 0) return direct;

            const label = caseData.surfaceLabel;
            if (typeof label === 'string' && label.toLowerCase().includes('m²')) {
                return parseSurfaceValue(label);
            }
            return 0;
        }

            return [

            if (!result) return null;

            const scoring = computeScoreFromIntensity(result.intensity, median);
            return {
                ...result,
                score: scoring.score,
                positioning: scoring.positioning,
                ratio: parseFloat(scoring.ratio.toFixed(2)),
                ref: {

        function getCapexBrutValue(source) {
            if (!source) return 0;
            const explicit = Number(source.totalCapexBrut ?? source.totalCapex);
            if (Number.isFinite(explicit) && explicit > 0) return Math.round(explicit);

            const net = Number(source.totalCapexNet);
            const aides = Number(source.aidesTotal ?? source.aidesEstimees);
            if (Number.isFinite(net) && Number.isFinite(aides) && (net > 0 || aides > 0)) {
                return Math.max(0, Math.round(net + aides));
            }

            const actions = source.topActions || source.actions || [];
            const fromActions = actions.reduce((sum, a) => sum + (Number(a?.capex) || 0), 0);
            if (fromActions > 0) return Math.round(fromActions);

            if (Number.isFinite(net) && net > 0) return Math.round(net);
            return 0;
        }

                return { ...c, _computed: computed, _actLabel: actLabel, _area: area, _displayName: displayName };
            }), [cases]);

            const activityLabels = [...new Set(casesWithData.map(c => c._actLabel))];
            const filtered = casesWithData.filter(c => {
                const q = searchQuery.toLowerCase();
                const name = (c._displayName || '').toLowerCase();
                return (!q || name.includes(q)) && (!filterActivity || c._actLabel === filterActivity);
            });
            const firstExampleCaseId = filtered.find(c => c.isExample)?.id || '';
            const firstVisibleCaseId = filtered[0]?.id || '';

            const deleteCase = async (id) => {
                try {
                    if (!window.confirm('Supprimer ce dossier, ses rapports et le PDF officiel lie ?')) return;

            const mainContent = (
                <div className="p-8 max-w-7xl mx-auto fade-in">

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden" data-tour="cases-list">

                            <select className="pro-input bg-white w-full sm:w-48" value={filterActivity} onChange={e => setFilterActivity(e.target.value)}>

                        <div className="overflow-x-auto">
                            <table className="w-full pro-table min-w-[1100px]">
                                <thead>
                                    <tr>
                                        <th>Projet / Client</th>
                                        <th>Activité</th>
                                        <th>Surface</th>
                                        <th>Score</th>
                                        <th>Après travaux</th>
                                        <th>Qualification</th>

                                        <th style={{ textAlign: 'right' }}>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filtered.map(c => {
                                        const comp = c._computed;
                                        const isFirstExampleCase = c.id === firstExampleCaseId;

                                        return (
                                            <tr key={c.id} className="group transition-colors">
                                                <td>
                                                    <div className="flex items-center gap-2 flex-wrap">
                                                        <div className="font-bold text-slate-800 leading-tight">{c._displayName}</div>

                                                            <span className="inline-flex items-center rounded-full border border-amber-200 bg-amber-50 px-2 py-0.5 text-[10px] font-bold uppercase tracking-[0.08em] text-amber-700">
                                                                Exemple

                                                </td>
                                                <td><span className="text-sm text-slate-600 font-medium">{c._actLabel}</span></td>
                                                <td>
                                                    {c._area > 0 ? <><span className="font-semibold text-slate-700">{c._area.toLocaleString('fr-FR')}</span><span className="text-xs text-slate-400 ml-1">m²</span></> : <span className="text-slate-400 text-xs">-</span>}
                                                </td>
                                                <td>{comp ? <ScoreBadge score={comp.score} /> : (c.score ? <ScoreBadge score={c.score} /> : <span className="text-slate-400 text-xs">-</span>)}</td>
                                                <td>
                                                    {c.scoreApresTravauxLabel ? (
                                                        <div className="flex items-center gap-1.5">
                                                            <Icon icon="solar:arrow-right-line-duotone" className="text-green-500 text-xs" />
                                                            <ScoreBadge score={c.scoreApresTravauxLabel} />
                                                        </div>
                                                    ) : (
                                                        <span className="text-xs text-slate-300">-</span>

                                                <td>

                                                            <div className="font-semibold text-slate-700">{comp.kwhTotal.toLocaleString('fr-FR')} kWh</div>
                                                            <div className="text-xs text-slate-400">{comp.intensity} kWh/m²</div>

                                                        <div>
                                                            <div className="font-semibold text-slate-700">{(c.annualConsumption || 0).toLocaleString('fr-FR')} kWh</div>
                                                            <div className="text-xs text-slate-400">{c.intensityPerSqm || '-'} kWh/m²</div>
                                                        </div>

                                                </td>
                                                <td>
                                                    {comp ? <div className="font-bold text-green-600">{comp.totalSavingsEur.toLocaleString('fr-FR')} €/an</div>

                                                            : (c.annualSavingsLabel ? <span className="text-slate-500 text-xs">{c.annualSavingsLabel}</span> : <span className="text-slate-400 text-xs">-</span>)}

                                                        </button>
                                                        <button

                                                            className={`w-7 h-7 flex items-center justify-center rounded-lg transition-colors ${c.noteInterne ? 'text-indigo-400 hover:text-indigo-600 hover:bg-indigo-50' : 'text-slate-200 hover:text-indigo-400 hover:bg-indigo-50'}`}

            );
            const noteModal = editingNoteId ? (() => {
                const saveNote = async () => {
                    try {

                return (
                    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm" onClick={() => setEditingNoteId(null)}>
                        <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md mx-4" onClick={e => e.stopPropagation()}>
                            <div className="flex items-center gap-2 mb-1">
                                <Icon icon="solar:lock-bold" className="text-indigo-500" />
                                <h3 className="font-bold text-slate-800">Note interne</h3>
                            </div>
                            <p className="text-xs text-indigo-400 mb-4 flex items-center gap-1">
                                <Icon icon="solar:eye-closed-linear" style={{ fontSize: '11px' }} />
                                Jamais partagée avec le client
                            </p>
                            <textarea
                                className="pro-input w-full resize-none"
                                rows={5}
                                placeholder="Ex: Très motivé, budget validé. Rappeler avant fin avril…"

                                onChange={e => setEditingNoteValue(e.target.value)}
                                autoFocus
                            />
                            <div className="flex gap-2 mt-4 justify-end">
                                <button onClick={() => setEditingNoteId(null)} className="pro-btn pro-btn-ghost">Annuler</button>
                                <button onClick={saveNote} className="pro-btn pro-btn-primary">Enregistrer</button>
                            </div>
                        </div>
                    </div>
                );
            })() : null;
            return <React.Fragment>{mainContent}{noteModal}</React.Fragment>;
        };

        /* ===== RAPPORT DOSSIER - redirige vers ProReport ===== */
        /* ===== ProCaseReport - Rapport pour dossiers générés via le wizard 7 modules ===== */
        const ProCaseReport = ({
            caseId,
            setPage,
            sharedCase,
            cases = [],
            reportsByCaseId = {},
            settings = DEFAULT_ORGANIZATION_SETTINGS,
            branding = DEFAULT_ORGANIZATION_BRANDING,
            organization = null,
            onSyncReportPdfMetadata
        }) => {
            // Hooks avant tout return conditionnel (règle des hooks React)
            const c = sharedCase || resolveWorkspaceCaseForReport(caseId, cases, reportsByCaseId);
            const isProAuth = !sharedCase && !!getActiveProUserId();
            const [officialPdfPending, setOfficialPdfPending] = useState(false);
            const [officialPdfError, setOfficialPdfError] = useState('');
            const [officialPdfSuccess, setOfficialPdfSuccess] = useState('');
            const [officialPdfUrl, setOfficialPdfUrl] = useState('');
            const [officialPdfFile, setOfficialPdfFile] = useState(null);
            const [officialPdfOpenBlocked, setOfficialPdfOpenBlocked] = useState(false);

            useEffect(() => {
                let isCancelled = false;

                const hydrateOfficialPdfAccess = async () => {
                    if (!isProAuth || sharedCase || !c?.latestPdfFileId || !organization?.id) {
                        if (!isCancelled) {
                            setOfficialPdfUrl('');
                            setOfficialPdfFile(null);
                            setOfficialPdfOpenBlocked(false);
                        }
                        return;
                    }

                    try {
                        const access = await resolveStoredPdfAccess({
                            report: c,
                            organizationId: organization.id,
                            latestPdfFile: officialPdfFile && officialPdfFile.id === c.latestPdfFileId
                                ? officialPdfFile
                                : null
                        });

                        if (!isCancelled) {
                            setOfficialPdfUrl(access.url || '');
                            setOfficialPdfFile(access.fileRecord || null);
                        }
                    } catch (error) {
                        if (!isCancelled) {
                            setOfficialPdfUrl('');
                            setOfficialPdfFile(null);
                        }
                        console.warn('Impossible de préparer l\'accès au PDF officiel :', error);
                    }
                };

                hydrateOfficialPdfAccess();

                return () => {
                    isCancelled = true;
                };
            }, [isProAuth, sharedCase, organization?.id, c?.latestPdfFileId, c?.reportRecordId]);

            if (!c) return (
                <div className="p-8 text-center">
                    <div className="text-red-500 font-bold text-lg mb-4">Rapport introuvable.</div>
                    <p className="text-slate-500 mb-6">Ce dossier n'existe pas ou a été supprimé.</p>
                    <button onClick={() => setPage('cases')} className="pro-btn pro-btn-secondary">
                        <span className="flex items-center gap-2">
                            <Icon icon="solar:alt-arrow-left-linear" />
                            Retour aux dossiers
                        </span>
                    </button>
                </div>
            );

            const rawResult = c.engineResult
                || (c.formData ? ENGINE_PRO.compute(c.formData) : null)
                || buildEngineResultFromMock(c);
            const r = normalizeEngineResult(rawResult, c.benchmark?.median || c.benchmark?.med || 0);
            const reportNarrative = buildCanonicalReportNarrative(c, r);

            const proLogoImg = isProAuth ? resolveBrandPreviewUrl(branding) : '';
            const proLogoName = isProAuth ? resolveBrandName(settings, organization) : DEFAULT_WORKSPACE_BRAND_NAME;
            const hasCustomBranding = !!(proLogoImg || proLogoName !== DEFAULT_WORKSPACE_BRAND_NAME);
            const canGenerateOfficialPdf = isProAuth && !sharedCase && !!c.reportRecordId && !!organization?.id;
            const hasOfficialPdfAvailable = !!(c.latestPdfFileId || officialPdfUrl);
            const isOfficialPdfBusy = officialPdfPending || c.pdfStatus === 'generating';
            const effectivePdfError = officialPdfError || c.pdfError || '';
            const effectivePdfSuccess = officialPdfSuccess || (
                c.pdfStatus === 'ready' && c.latestPdfGeneratedAtLabel
                    ? `PDF officiel enregistré le ${c.latestPdfGeneratedAtLabel}.`
                    : ''
            );

            const openOfficialPdfWindow = () => {
                const pdfWindow = window.open('', '_blank');
                if (!pdfWindow) {
                    return null;
                }

                try {
                    pdfWindow.opener = null;
                    pdfWindow.document.title = 'Preparation du PDF officiel';
                    pdfWindow.document.body.innerHTML = `
                        <div style="margin:0;padding:32px;font-family:Inter,Arial,sans-serif;background:#f8fafc;color:#0f172a;">
                            <div style="max-width:480px;margin:0 auto;background:#ffffff;border:1px solid #e2e8f0;border-radius:20px;padding:24px;box-shadow:0 10px 30px rgba(15,23,42,0.08);">
                                <div style="font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#64748b;margin-bottom:12px;">DiagTertiaire Pro</div>
                                <h1 style="margin:0 0 12px;font-size:22px;line-height:1.2;">Preparation du PDF officiel...</h1>
                                <p style="margin:0;font-size:14px;line-height:1.7;color:#475569;">Le document va s'ouvrir automatiquement des qu'il est pret.</p>
                            </div>
                        </div>
                    `;
                    pdfWindow.document.close();
                } catch (error) {
                    console.warn('Impossible de preparer la fenetre PDF officielle :', error);
                }

                return pdfWindow;
            };

            const closeOfficialPdfWindow = (pdfWindow) => {
                if (!pdfWindow || pdfWindow.closed) {
                    return;
                }

                try {
                    pdfWindow.close();
                } catch (error) {
                    console.warn('Impossible de fermer la fenetre PDF officielle :', error);
                }
            };

            const navigateOfficialPdfWindow = (pdfWindow, url) => {
                if (!url) {
                    return false;
                }

                if (pdfWindow && !pdfWindow.closed) {
                    try {
                        pdfWindow.location.replace(url);
                        return true;
                    } catch (error) {
                        console.warn('Impossible de rediriger la fenetre PDF officielle :', error);
                    }
                }

                const openedWindow = window.open(url, '_blank', 'noopener,noreferrer');
                return !!openedWindow;
            };

            const handlePrintPdf = () => {
                const orig = document.title;
                document.title = `Rapport_${c.clientName || c.id}`;
                window.print();
                document.title = orig;
            };

            const handleGenerateOfficialPdf = async () => {
                if (!canGenerateOfficialPdf || isOfficialPdfBusy) {
                    return;
                }

                const pdfWindow = openOfficialPdfWindow();
                setOfficialPdfPending(true);
                setOfficialPdfError('');
                setOfficialPdfSuccess('');
                setOfficialPdfOpenBlocked(false);

                try {
                    const generationResult = await requestOfficialPdfGeneration(c.reportRecordId);
                    const syncedResult = await (onSyncReportPdfMetadata
                        ? onSyncReportPdfMetadata(c.reportRecordId, generationResult)
                        : syncReportPdfMetadata({
                            reportId: c.reportRecordId,
                            organizationId: organization.id,
                            generationResult
                        }));

                    const access = await resolveStoredPdfAccess({
                        report: syncedResult.report,
                        organizationId: organization.id,
                        latestPdfFile: syncedResult.latestPdfFile
                    });

                    setOfficialPdfFile(access.fileRecord || syncedResult.latestPdfFile || null);
                    setOfficialPdfUrl(access.url || '');
                    setOfficialPdfSuccess('PDF officiel généré et sauvegardé dans votre espace privé.');

                    const didOpen = navigateOfficialPdfWindow(pdfWindow, access.url || '');
                    if (!didOpen) {
                        setOfficialPdfOpenBlocked(true);
                        setOfficialPdfError("Le navigateur a bloqué l'ouverture automatique. Utilisez le bouton ci-dessous pour ouvrir le PDF officiel.");
                    }
                } catch (error) {
                    closeOfficialPdfWindow(pdfWindow);
                    try {
                        await (onSyncReportPdfMetadata
                            ? onSyncReportPdfMetadata(c.reportRecordId)
                            : syncReportPdfMetadata({
                                reportId: c.reportRecordId,
                                organizationId: organization.id
                            }));
                    } catch (syncError) {
                        console.warn('Impossible de rafraîchir les métadonnées PDF après échec :', syncError);
                    }

                    setOfficialPdfError(error?.message || "Impossible de générer le PDF officiel.");
                } finally {
                    setOfficialPdfPending(false);
                }
            };

            const handleOpenOfficialPdf = async () => {
                if (!canGenerateOfficialPdf) {
                    return;
                }

                const pdfWindow = openOfficialPdfWindow();
                setOfficialPdfError('');
                setOfficialPdfSuccess('');
                setOfficialPdfOpenBlocked(false);

                try {
                    const access = await resolveStoredPdfAccess({
                        report: c,
                        organizationId: organization.id,
                        latestPdfFile: officialPdfFile && officialPdfFile.id === c.latestPdfFileId
                            ? officialPdfFile
                            : null
                    });

                    if (!access.url) {
                        throw new Error("Aucun PDF officiel sauvegardé n'est disponible pour ce rapport.");
                    }

                    setOfficialPdfFile(access.fileRecord || null);
                    setOfficialPdfUrl(access.url);

                    const didOpen = navigateOfficialPdfWindow(pdfWindow, access.url);
                    if (!didOpen) {
                        setOfficialPdfOpenBlocked(true);
                        setOfficialPdfError("Le navigateur a bloqué l'ouverture automatique. Utilisez le bouton ci-dessous pour ouvrir le PDF officiel.");
                    }
                } catch (error) {
                    closeOfficialPdfWindow(pdfWindow);
                    setOfficialPdfError(error?.message || "Impossible d'ouvrir le PDF officiel.");
                }
            };

            const handleShare = () => {
                const { phone, email, contact_telephone, telephone, contact_email, ...publicData } = c.formData || {};
                const shareData = { ...c, id: c.id, clientName: c.clientName, engineResult: r, formData: publicData };
                delete shareData.phone;
                delete shareData.email;
                // Données pro - JAMAIS dans le lien partagé
                delete shareData.noteInterne;
                delete shareData.scoreMaturite;
                delete shareData.urgenceVerbatim;
                if (shareData.contact) {
                    const { phone: contactPhone, email: contactEmail, ...safeContact } = shareData.contact;
                    shareData.contact = safeContact;
                }
                let encoded;
                try { encoded = btoa(unescape(encodeURIComponent(JSON.stringify(shareData)))); } catch (e) { encoded = btoa(JSON.stringify(shareData)); }
                const url = window.location.href.split('#')[0] + '#report=' + encoded;
                if (navigator.clipboard) navigator.clipboard.writeText(url).then(() => alert('Lien copié !')).catch(() => prompt('Lien :', url));
                else prompt('Lien :', url);
            };

            const COLORS = { chauffage: '#F97316', clim: '#06B6D4', ventil: '#3B82F6', eclairage: '#F59E0B', ecs: '#8B5CF6', autres: '#94A3B8' };
            const LABELS = { chauffage: 'Chauffage', clim: 'Climatisation', ventil: 'Ventilation', eclairage: 'Éclairage', ecs: 'ECS', autres: 'Autres' };
            const OBJECTIF_LABELS = { reduction_charges: 'Reduction des charges', conformite_reglementaire: 'Conformite reglementaire (Decret Tertiaire)', valorisation_patrimoine: 'Valorisation du patrimoine', confort_occupants: 'Amelioration du confort', demarche_rse: 'Demarche RSE', facture: 'Reduction des charges', conformite: 'Conformite reglementaire', valo: 'Valorisation patrimoine' };
            const HORIZON_LABELS = { immediat: 'Immediat (moins de 3 mois)', court_terme: 'Court terme (3-12 mois)', '1an': 'Court terme (3-12 mois)', moyen: 'Moyen terme (1-3 ans)', long: 'Long terme (plus de 3 ans)', '3ans': 'Moyen terme', '5ans': 'Long terme' };
            const BUDGET_LABELS = { moins_5k: 'Moins de 5 000 euros', '5k_20k': '5 000 a 20 000 euros', '10k-30k': '10 000 a 30 000 euros', '20k_50k': '20 000 a 50 000 euros', '30k-100k': '30 000 a 100 000 euros', '50k_200k': '50 000 a 200 000 euros', plus_100k: 'Plus de 100 000 euros', plus_200k: 'Plus de 200 000 euros', non_defini: 'Non defini', plus_50k: 'Plus de 50 000 euros' };

            return (
                <div className="p-4 md:p-8 max-w-5xl mx-auto">
                    {/* Barre navigation */}
                    <div className="no-print flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-6 bg-white p-3 sm:p-4 rounded-xl border border-slate-200 shadow-sm sticky top-0 z-40">
                        {isProAuth ? (
                            <button onClick={() => setPage('cases')} className="inline-flex items-center gap-2 text-slate-500 hover:text-blue-600 font-bold text-sm px-3 py-2 hover:bg-slate-50 rounded-lg transition-colors">
                                <Icon icon="solar:round-alt-arrow-left-bold" className="text-lg" />
                                <span className="hidden sm:inline">Retour Dossiers</span>
                                <span className="sm:hidden">Retour</span>
                            </button>
                        ) : (
                            <button onClick={() => setPage('cases')} className="inline-flex items-center gap-2 text-slate-500 hover:text-blue-600 font-bold text-sm px-3 py-2 hover:bg-slate-50 rounded-lg transition-colors">
                                <Icon icon="solar:round-alt-arrow-left-bold" className="text-lg" />
                                <span className="hidden sm:inline">Retour</span>
                                <span className="sm:hidden">Retour</span>
                            </button>
                        )}
                        <div className="flex gap-2 w-full sm:w-auto flex-wrap">
                            {canGenerateOfficialPdf && hasOfficialPdfAvailable ? (
                                <button onClick={handleOpenOfficialPdf} className="pro-btn pro-btn-primary flex-1 sm:flex-none text-sm px-3 py-2">
                                    <Icon icon="solar:download-bold" />
                                    <span className="hidden sm:inline">Ouvrir le PDF officiel</span>
                                    <span className="sm:hidden">Ouvrir</span>
                                </button>
                            ) : canGenerateOfficialPdf ? (
                                <button
                                    onClick={handleGenerateOfficialPdf}
                                    disabled={isOfficialPdfBusy}
                                    className={`pro-btn pro-btn-primary flex-1 sm:flex-none text-sm px-3 py-2 ${isOfficialPdfBusy ? 'opacity-70 cursor-wait' : ''}`}
                                >
                                    <Icon icon={isOfficialPdfBusy ? "solar:refresh-bold" : "solar:file-download-bold"} className={isOfficialPdfBusy ? 'animate-spin' : ''} />
                                    <span className="hidden sm:inline">
                                        {isOfficialPdfBusy ? 'Generation en cours...' : 'Generer le PDF officiel'}
                                    </span>

                                        {isOfficialPdfBusy ? 'Maj...' : 'Maj'}
                                    </span>

                            <button onClick={handlePrintPdf} className="pro-btn border border-slate-200 bg-white text-slate-700 hover:bg-slate-50 flex-1 sm:flex-none text-sm px-3 py-2">

                                    <Icon icon="solar:link-bold" />

                                    <span className="sm:hidden">Lien</span>
                                </button>

                    {/* En-tête */}

                                <div className="min-w-0">
                                    <div className="text-xs font-bold uppercase tracking-[0.12em] text-slate-500">PDF officiel sauvegarde</div>
                                    <div className="text-sm text-slate-700 mt-1">
                                        {effectivePdfSuccess || (
                                            hasOfficialPdfAvailable
                                                ? "Le PDF officiel est pret. Utilisez le bouton principal pour l'ouvrir, ou la regeneration pour le mettre a jour. L export local reste un secours."

                                        )}

                    <div className="bg-gradient-to-br from-slate-900 to-blue-900 text-white rounded-2xl p-8 mb-8 print-page">

                                <div className="flex items-center gap-3">
                                    {proLogoImg
                                        ? <img src={proLogoImg} alt="Logo" className="h-10 max-w-[180px] object-contain" />
                                        : <div className="text-white font-bold text-lg">{proLogoName}</div>
                                    }
                                </div>
                                <div className="text-blue-300 text-xs font-semibold uppercase tracking-wider">
                                    Pre-diagnostic energetique
                                </div>
                            </div>

                        <div className="flex flex-col gap-4 md:flex-row justify-between">

                                    </div>

                            </div>

                                </div>
