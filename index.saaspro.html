                                                <div className="w-7 h-7 rounded flex items-center justify-center font-extrabold text-sm shrink-0"
                                                    style={{ background: cfg.color, color: 'white', opacity: isActive ? 1 : 0.3 }}>
                                                    {s}
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    {isActive ? (
                                                        <div className="text-white">
                                                            <div className="text-sm font-bold leading-tight">{intensite} kWh/m2/an</div>
                                                            <div className="text-xs opacity-80">{cfg.text}</div>
                                                        </div>
                                                    ) : (
                                                        <div className="text-xs text-slate-400 font-medium truncate">
                                                            {THRESHOLD_LABELS[s] || ''}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <div className="bg-slate-50 px-3 py-1 text-xs text-slate-400 italic border-t border-slate-100">

                                </div>
                            );

                        if (!shouldShowScoreBands) return null;
                        return (
                            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 mb-8">
                                <h3 className="text-lg font-bold text-slate-800 mb-1 flex items-center gap-2">
                                    <Icon icon="solar:tag-price-bold" style={{ color: reportAccent }} /> Indice DiagTertiaire - avant / après travaux
                                </h3>
                                <p className="text-xs text-slate-400 mb-6">Indicateur indicatif, non opposable, hors cadre OPERAT.</p>

                                    <EtiquetteBande score={r.score} intensite={r.intensity} label="Indice actuel" sectorRef={r.ref} />

                                        <Icon icon="solar:arrow-right-bold" className="text-3xl text-emerald-500" />

                                    </div>
                                    <EtiquetteBande score={scoreApres} intensite={intensiteApres} label="Indice après travaux estimé" sectorRef={r.ref} />
                                </div>
                            </div>

                    })()}

                    {/* GRAPHIQUES */}
                    {r && (() => {
                        const postesData = Object.entries(r.postes || {})

                            .map(([k, v]) => ({ name: LABELS[k] || k, value: v.kwh, eur: v.eur, pct: v.pct, fill: COLORS[k] || '#94A3B8', scope: k }));

                        const benchmarkData = buildCompactBenchmarkData(r.intensity, r.ref?.med || 0);

                        const isMobile = typeof window !== 'undefined' && window.innerWidth < 640;
                        const roiData = (r.topActions || [])
                            .filter(a => a.roi > 0 && a.roi <= 20)

                                name: a.title.length > 28 ? a.title.substring(0, 25) + '…' : a.title,
                                roi: parseFloat(a.roi),
                                investissement: a.capex,
                                economie: a.gainEur,
                                fill: a.roi <= 3 ? '#059669' : a.roi <= 7 ? '#F59E0B' : '#EF4444',
                            }));

                        return (
                            <div className="space-y-8 mb-10">
                                {/* G1 - Décomposition postes */}

                                    <h3 className="text-lg font-bold text-slate-800 mb-1 flex items-center gap-2">
                                        <Icon icon="solar:pie-chart-2-bold" style={{ color: reportAccent }} /> Répartition des consommations par poste
                                    </h3>
                                    <p className="text-xs text-slate-400 mb-5">Estimation statistique basée sur l'activité. Zone {r.zone} · Correctif année ×{r.anneeCorr}</p>

                                        <Recharts.ResponsiveContainer width="100%" height={240}>
                                            <Recharts.PieChart>
                                                <Recharts.Pie data={postesData} cx="50%" cy="50%" innerRadius={55} outerRadius={95} dataKey="value" nameKey="name" paddingAngle={2}>

                                                </Recharts.Pie>
                                                <Recharts.Tooltip formatter={(v, n, p) => [`${p.payload.eur?.toLocaleString('fr-FR')} €/an (${p.payload.pct}%)`, n]} />
                                            </Recharts.PieChart>
                                        </Recharts.ResponsiveContainer>
                                        <div className="space-y-2">
                                            {postesData.slice().sort((a, b) => b.value - a.value).map((d, i) => (
                                                <div key={i} className="flex items-center gap-5 text-sm py-0.5">
                                                    <div className="w-3 h-3 rounded-full shrink-0" style={{ background: d.fill }} />
                                                    <span className="flex-1 font-medium text-slate-700">{d.name}</span>
                                                    <span className="w-14 text-right text-slate-500 tabular-nums">{d.pct}%</span>
                                                    <span className="font-bold text-slate-800 w-28 text-right tabular-nums">{d.eur?.toLocaleString('fr-FR')} €</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* G2 - Benchmark */}
                                <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">

                                        <Icon icon="solar:chart-square-bold" style={{ color: reportAccent }} /> Benchmark sectoriel
                                    </h3>
                                    <p className="text-xs text-slate-400 mb-5">{r.ref?.unit} - {r.ref?.scope} - Source : ADEME / Enquête ECNA 2022</p>
                                    <Recharts.ResponsiveContainer width="100%" height={220}>
                                        <Recharts.BarChart data={benchmarkData} layout="vertical" margin={{ top: 5, right: isMobile ? 10 : 80, bottom: 5, left: 10 }} barSize={26}>
                                            <Recharts.CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" horizontal={false} />
                                            <Recharts.XAxis type="number" tickFormatter={v => `${v} kWh`} tick={{ fontSize: 11 }} />
                                            <Recharts.YAxis type="category" dataKey="name" tick={{ fontSize: 12, fontWeight: 600 }} width={isMobile ? 80 : 120} />
                                            <Recharts.Tooltip formatter={v => [`${v} kWh/m²/an`]} />
                                            <Recharts.Bar dataKey="value" radius={[0, 6, 6, 0]}>
                                                {benchmarkData.map((d, i) => <Recharts.Cell key={i} fill={d.fill} />)}
                                                {!isMobile && <Recharts.LabelList dataKey="value" position="right" formatter={v => `${v} kWh/m²/an`} style={{ fontSize: 11, fill: '#64748B', fontWeight: 600 }} />}
                                            </Recharts.Bar>
                                        </Recharts.BarChart>
                                    </Recharts.ResponsiveContainer>
                                    <p className="text-xs text-slate-400 mt-3">Note : indice DiagTertiaire estimatif. Ne constitue pas une classe OPERAT réglementaire.</p>
                                </div>

                                {/* Actions recommandées */}
                                {r.topActions?.length > 0 && (
                                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
                                        <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                                            <Icon icon="solar:magic-stick-3-bold" style={{ color: reportAccent }} /> Actions recommandées ({r.topActions.length})

                                        <div className="space-y-3">
                                            {r.topActions.map((a, i) => (
                                                <div key={i} className="flex flex-col md:flex-row md:items-center gap-3 p-4 rounded-xl bg-slate-50 border border-slate-100">

                                                        {a.fiches?.length > 0 && <div className="text-xs text-slate-400 mt-0.5">Fiche CEE : {a.fiches.join(', ')}</div>}
                                                    </div>
                                                    <div className="flex flex-wrap sm:flex-nowrap gap-4 text-sm shrink-0">
                                                        <div className="text-center min-w-[64px]">
                                                            <div className="text-xs text-slate-500">Investissement</div>
                                                            <div className="font-bold text-slate-800">{a.capex?.toLocaleString('fr-FR')} €</div>
                                                        </div>
                                                        <div className="text-center min-w-[64px]">
                                                            <div className="text-xs text-slate-500">Économies/an</div>

                                                            <div className="text-xs text-slate-500">ROI</div>
                                                            <div className={`font-bold ${a.roi <= 3 ? 'text-emerald-600' : a.roi <= 7 ? 'text-amber-600' : 'text-red-600'}`}>{a.roi} ans</div>

                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-4 p-4 rounded-xl border text-xs text-slate-700" style={{ backgroundColor: reportAccentSoft, borderColor: reportAccentBorder }}>

                                            <strong> Aides estimées :</strong> {(Math.round(Number(r.aidesTotal || 0))).toLocaleString('fr-FR')} € ·
                                            <strong> Invest. net :</strong> {r.totalCapexNet?.toLocaleString('fr-FR')} €

                                        </div>
                                    </div>
                                )}

                                {/* G3 - ROI par action */}
                                {roiData.length > 0 && (

                                            <Icon icon="solar:chart-bold" style={{ color: reportAccent }} /> Retour sur investissement par action
                                        </h3>

                                        <Recharts.ResponsiveContainer width="100%" height={roiData.length * 52 + 40}>

                                                <Recharts.CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" horizontal={false} />
                                                <Recharts.XAxis type="number" domain={[0, Math.max(15, ...roiData.map(d => d.roi)) + 1]} tickFormatter={v => `${v} ans`} tick={{ fontSize: 11 }} />
                                                <Recharts.YAxis type="category" dataKey="name" tick={{ fontSize: 11 }} width={isMobile ? 100 : 175} />
                                                <Recharts.Tooltip content={({ payload }) => {
                                                    if (!payload?.length) return null;
                                                    const d = payload[0].payload;
                                                    return React.createElement('div', { className: 'bg-white border border-slate-200 rounded-lg p-3 shadow text-sm' },
                                                        React.createElement('div', { className: 'font-bold text-slate-800 mb-1' }, d.name),
                                                        React.createElement('div', null, `ROI : ${d.roi} ans`),
                                                        React.createElement('div', null, `Investissement : ${d.investissement?.toLocaleString('fr-FR')} €`),
                                                        React.createElement('div', { className: 'text-green-600 font-bold' }, `Économie : ${d.economie?.toLocaleString('fr-FR')} €/an`),
                                                    );
                                                }} />
                                                <Recharts.Bar dataKey="roi" radius={[0, 4, 4, 0]}>
                                                    {roiData.map((d, i) => <Recharts.Cell key={i} fill={d.fill} />)}
                                                    {!isMobile && <Recharts.LabelList dataKey="investissement" position="right" formatter={v => `${v?.toLocaleString('fr-FR')} €`} style={{ fontSize: 11, fill: '#64748B' }} />}
                                                </Recharts.Bar>
                                                <Recharts.ReferenceLine x={7} stroke="#94A3B8" strokeDasharray="4 2" />
                                            </Recharts.BarChart>
                                        </Recharts.ResponsiveContainer>
                                        <div className="flex flex-wrap gap-4 mt-3 text-xs font-semibold">
                                            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-emerald-600 inline-block" /> ROI &lt; 3 ans - Prioritaire</span>
                                            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-amber-500 inline-block" /> 3–7 ans - Recommandé</span>
                                            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-red-500 inline-block" /> &gt; 7 ans - Long terme</span>
                                        </div>
                                    </div>
                                )}

                                {/* G4 - Projection financière */}
                                {r.graphiquePubliable && r.projectionData?.length > 2 && (
                                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
                                        <h3 className="text-lg font-bold text-slate-800 mb-1 flex items-center gap-2">
                                            <Icon icon="solar:graph-new-up-bold" style={{ color: reportAccent }} /> Projection financière sur {r.horizonAns} ans
                                        </h3>
                                        <p className="text-xs text-slate-400 mb-1">Inflation pondérée : {(r.tauxInflation * 100).toFixed(1)}%/an</p>
                                        <p className="text-xs text-slate-400 mb-5">Aides estimées déduites : TVA 5,5% + CEE plancher ({r.aidesTotal?.toLocaleString('fr-FR')} € estimés).</p>
                                        <Recharts.ResponsiveContainer width="100%" height={300}>
                                            <Recharts.ComposedChart data={r.projectionData} margin={{ top: 20, right: isMobile ? 10 : 30, bottom: 10, left: 10 }}>
                                                <defs>
                                                    <linearGradient id="zoneEco" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="5%" stopColor="#10B981" stopOpacity={0.2} />
                                                        <stop offset="95%" stopColor="#10B981" stopOpacity={0.02} />
                                                    </linearGradient>
                                                </defs>
                                                <Recharts.CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" />
                                                <Recharts.XAxis dataKey="annee" tick={{ fontSize: 11 }} />
                                                <Recharts.YAxis tickFormatter={v => v >= 1000 ? `${(v / 1000).toFixed(0)}k€` : `${v}€`} tick={{ fontSize: 11 }} domain={['auto', 'auto']} />

                                </h3>
                                <ul className="space-y-3 text-sm text-slate-600">
                                    {reportNarrative.providerQuestions.map((item, index) => (
                                        <li key={index} className="flex items-start gap-3">
                                            <span className="mt-1 h-2 w-2 shrink-0 rounded-full bg-slate-400"></span>
                                            <span>{item}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                    )}

                    <div className="text-center text-xs text-slate-400 mt-8 mb-4">
                        DiagTertiaire Pro · Rapport généré le {c.createdAt} · Estimation directionnelle - ne se substitue pas à un audit réglementaire.
                    </div>
                </div>
            );
        };

        /* ===== NOUVEAU DIAGNOSTIC - Wizard 7 modules ===== */
        const ProNewDiag = ({ setPage, draftPayload, draftArchives = [], onSaveDraft, onArchiveCurrentDraft, onRestoreArchivedDraft, onDeleteArchivedDraft, onGenerateCase }) => {
            const initialDraftState = buildDraftFormState(PRO_NEW_DIAG_INITIAL_FORM, draftPayload);
            const skipNextDraftSyncRef = useRef(false);
            const didMountRef = useRef(false);
            const [form, setForm] = React.useState(initialDraftState);
            const [isGenerating, setIsGenerating] = React.useState(false);
            const [isDraftActionPending, setIsDraftActionPending] = React.useState(false);
            const [draftError, setDraftError] = React.useState('');
            const [draftSaveStatus, setDraftSaveStatus] = React.useState('idle'); // 'idle' | 'saving' | 'saved' | 'error'
            const [generationError, setGenerationError] = React.useState('');
            const archivedDrafts = Array.isArray(draftArchives) ? draftArchives : [];
            const hasActiveDraft = hasMeaningfulDraftPayload(form);

            const [showResume, setShowResume] = React.useState(() => hasMeaningfulDraftPayload(initialDraftState));
            const handleResume = () => setShowResume(false); // garde le form chargé tel quel
            const handleStartFresh = async () => {
                try {
                    setDraftError('');
                    setValidationError('');
                    setIsDraftActionPending(true);
                    await onArchiveCurrentDraft?.(form);
                    skipNextDraftSyncRef.current = true;
                    setForm(PRO_NEW_DIAG_INITIAL_FORM);
                    setShowResume(false);
                    window.scrollTo(0, 0);
                } catch (error) {
                    setDraftError(error?.message || "Impossible de sauvegarder le brouillon avant de lancer un nouveau diagnostic.");
                } finally {
                    setIsDraftActionPending(false);
                }
            };

            const handleAbandonDraft = async () => {
                if (!window.confirm('Abandonner ce brouillon ? Les données saisies seront définitivement perdues.')) return;
                try {
                    setDraftError('');
                    setValidationError('');
                    setIsDraftActionPending(true);
                    skipNextDraftSyncRef.current = true;
                    setForm(PRO_NEW_DIAG_INITIAL_FORM);
                    setShowResume(false);
                    await onSaveDraft?.(PRO_NEW_DIAG_INITIAL_FORM);
                    window.scrollTo(0, 0);
                } catch (error) {
                    setDraftError(error?.message || 'Impossible d\'abandonner le brouillon.');
                } finally {
                    setIsDraftActionPending(false);
                }
            };

            const handleRestoreArchived = async (archiveId) => {
                try {
                    setDraftError('');
                    setValidationError('');
                    setIsDraftActionPending(true);
                    const restoredDraftPayload = await onRestoreArchivedDraft?.(archiveId, form);
                    skipNextDraftSyncRef.current = true;
                    setForm(buildDraftFormState(PRO_NEW_DIAG_INITIAL_FORM, restoredDraftPayload));
                    setShowResume(false);
                    window.scrollTo(0, 0);
                } catch (error) {
                    setDraftError(error?.message || "Impossible de reprendre ce brouillon sauvegarde pour le moment.");
                } finally {
                    setIsDraftActionPending(false);
                }
            };

            const handleDeleteArchived = async (archiveId) => {
                try {
                    setDraftError('');
                    setIsDraftActionPending(true);
                    await onDeleteArchivedDraft?.(archiveId);
                } catch (error) {
                    setDraftError(error?.message || "Impossible de supprimer ce brouillon.");
                } finally {
                    setIsDraftActionPending(false);
                }
            };

            React.useEffect(() => {
                if (!didMountRef.current) {
                    didMountRef.current = true;
                    return;
                }

                if (skipNextDraftSyncRef.current) {
                    skipNextDraftSyncRef.current = false;
                    return;
                }

                setDraftSaveStatus('saving');
                const timeoutId = window.setTimeout(async () => {
                    try {
                        await onSaveDraft?.(form);
                        setDraftError('');
                        setDraftSaveStatus('saved');
                        // Repasse à idle après 2s
                        window.setTimeout(() => setDraftSaveStatus('idle'), 2000);
                    } catch (error) {
                        setDraftError(error?.message || "Impossible d'enregistrer le brouillon automatiquement.");
                        setDraftSaveStatus('error');
                    }
                }, 450);

                return () => window.clearTimeout(timeoutId);
            }, [form]);

            const set = (field, val) => setForm(p => ({ ...p, [field]: val }));
            const toggleArr = (field, val) => setForm(p => ({
                ...p,
                [field]: p[field].includes(val) ? p[field].filter(x => x !== val) : [...p[field], val],
            }));
            const REQUIRED_BY_STEP = {
                1: [{ field: 'contactName', label: 'Nom du contact', check: v => v && v.trim() !== '', alt: 'company' }],
                2: [
                    { field: 'activity', label: 'Activité principale', check: v => v && v !== '' },
                    { field: 'surface', label: 'Surface utile', check: v => v && parseFloat(v) > 0 },
                ],
            };
            const [validationError, setValidationError] = React.useState('');

            const next = () => {
                const reqs = REQUIRED_BY_STEP[form.step] || [];
                for (const r of reqs) {
                    const val = form[r.field];
                    const valid = r.check(val);
                    const altValid = r.alt ? r.check(form[r.alt]) : false;
                    if (!valid && !altValid) {
                        setValidationError(r.label + ' est obligatoire.');
                        return;
                    }
                }
                setValidationError('');
                if (form.step < 7) setForm(p => ({ ...p, step: p.step + 1 }));
                window.scrollTo(0, 0);
            };
            const prev = () => {
                setValidationError('');
                if (form.step > 1) setForm(p => ({ ...p, step: p.step - 1 }));
                window.scrollTo(0, 0);
            };

            const handleGenerate = () => {
                setGenerationError('');
                setIsGenerating(true);
                setTimeout(async () => {
                    const result = ENGINE_PRO.compute(form);
                    const savingsPct = result.kwhTotal > 0 ? result.totalSavingsKwh / result.kwhTotal : 0;
                    const intensiteApresTravaux = Math.round(result.intensity * (1 - savingsPct));
                    const scoreApresTravaux = computeScoreFromIntensity(intensiteApresTravaux, result.ref?.med || 0).score;
                    const newCase = {
                        id: generateUuid(),
                        legacyId: 'PRO-' + Date.now(),
                        clientName: form.contactName || form.company || 'Nouveau dossier',
                        company: form.company,
                        email: form.email,
                        phone: form.phone,
                        activity: form.activity,
                        activityLabel: getProActivityLabel(form.activity),
                        surfaceLabel: (form.surface || '-') + ' m²',
                        postalCode: form.postalCode,
                        city: '',
                        status: 'nouveau',
                        createdAt: new Date().toLocaleDateString('fr-FR'),
                        score: result.score,
                        scoreApresTravauxLabel: scoreApresTravaux,
                        scoreConfidence: result.badgeConfiance,
                        intensityPerSqm: result.intensity,
                        annualEnergyCostLabel: result.totalBill.toLocaleString('fr-FR') + ' € / an',
                        annualSavingsLabel: Math.round(result.totalSavingsEur * 0.85).toLocaleString('fr-FR') + ' à ' + Math.round(result.totalSavingsEur * 1.15).toLocaleString('fr-FR') + ' € / an',
                        engineResult: result,
                        formData: { ...form },
                        scoreMaturite: result.scoreMaturite,
                        noteInterne: form.noteInterne || '',
                        urgenceVerbatim: form.urgence,
                        objectif: form.objectif,
                        horizon: form.horizon,
                        budget: form.budget,
                        reliability: result.badgeConfiance === 'Élevé' ? 'élevé' : result.badgeConfiance === 'Estimé' ? 'faible' : 'moyen',
                        attention: result.score === 'D' || result.score === 'E' ? 'à surveiller' : 'faible',
                        benchmark: { q1: result.ref.q1, median: result.ref.med, q3: result.ref.q3 },
                        summary: result.score === 'A' || result.score === 'B'
                            ? 'Bâtiment bien géré. Les marges de progression se situent sur des leviers ciblés.'
                            : result.score === 'C'
                                ? 'Niveau de performance dans la médiane du secteur. Des gains accessibles sur l\'exploitation.'
                                : 'Surconsommation notable. Des actions prioritaires permettent des gains significatifs.',
                        priorities: result.topActions.slice(0, 3).map(a => ({
                            title: a.title,
                            description: a.sourceWarning || 'Action prioritaire identifiée sur ce périmètre.',
                            costRange: a.capex.toLocaleString('fr-FR') + ' €',
                            savingsRange: a.gainEur.toLocaleString('fr-FR') + ' €/an',
                            timeline: a.roi <= 3 ? 'Court terme' : a.roi <= 7 ? 'Moyen terme' : 'Long terme',
                        })),
                        resultBasis: result.isKwhPrioritaire
                            ? ['Consommations réelles saisies (kWh)', 'Activité et surface connues', 'Correctifs zone et année appliqués']
                            : ['Surface et activité connues', 'Estimation sectorielle (ratio ADEME/ECNA)', 'Consommations non saisies - précision limitée'],
                        actionPlan: result.actionPlan || [],
                        providerQuestions: result.providerQuestions || [],
                        technicalCompleteness: result.technicalCompleteness,
                        totalCapex: result.totalCapex,
                        totalCapexNet: result.totalCapexNet,
                        aidesEstimees: result.aidesTotal,
                        roiGlobal: result.roiGlobal,
                        projectionData: result.projectionData,
                        tauxInflation: result.tauxInflation,
                        horizonAns: result.horizonAns,
                        graphiquePubliable: result.graphiquePubliable,
                        co2Total: result.co2Total,
                        co2Evite: result.co2Evite,
                        emissionsActuelles: result.emissionsActuelles,
                    };
                    try {
                        const savedCase = await onGenerateCase?.(newCase);
                        skipNextDraftSyncRef.current = true;
                        setPage('report-' + (savedCase?.id || newCase.id));
                    } catch (error) {
                        setGenerationError(error?.message || "Impossible d'enregistrer le diagnostic pour le moment.");
                        setIsGenerating(false);
                    }
                }, 1800);
            };

            const Opt = ({ label, field, value, icon, sub }) => {
                const sel = form[field] === value;
                return (
                    <div className={`step-option ${sel ? 'selected' : ''}`} onClick={() => set(field, value)}>
                        {icon && <div className={`w-9 h-9 rounded-full flex items-center justify-center shrink-0 ${sel ? 'bg-blue-50 text-blue-700' : 'bg-slate-50 text-slate-400'}`}>
                            <Icon icon={icon} style={{ fontSize: '18px' }} />
                        </div>}
                        <div className="flex-1">
                            <div className="font-semibold text-slate-700 text-sm">{label}</div>
                            {sub && <div className="text-xs text-slate-400 mt-0.5">{sub}</div>}
                        </div>
                        {sel && <Icon icon="solar:check-circle-bold" className="text-blue-600 text-lg shrink-0" />}
                    </div>
                );
            };

            const Tag = ({ label, field, value }) => {
                const sel = (form[field] || []).includes(value);
                return (
                    <button type="button" onClick={() => toggleArr(field, value)}
                        className={`px-3 py-1.5 rounded-lg text-xs font-semibold border transition-all ${sel ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-200 hover:border-blue-300'}`}>
                        {label}
                    </button>
                );
            };

            const STEPS = ['Identification', 'Bâtiment', 'Enveloppe', 'Systèmes', 'Consommations', 'Usage', 'Travaux & Budget'];

            return (
                <div className="p-4 md:p-10 max-w-3xl mx-auto fade-in">
                    {showResume && (
                        <div className="mb-6 bg-blue-50 border border-blue-200 rounded-xl px-5 py-3 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
                            <div className="flex items-center gap-2 text-sm text-blue-800 font-medium">
                                <Icon icon="solar:diskette-bold" className="text-blue-500 shrink-0" />
                                Vous avez un diagnostic en cours (étape {form.step}/7).
                            </div>
                            <div className="flex gap-2 shrink-0">
                                <button type="button" onClick={handleResume} disabled={isDraftActionPending}
                                    className="px-3 py-1.5 text-xs font-bold bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                                    Reprendre
                                </button>
                                <button type="button" onClick={handleStartFresh} disabled={isDraftActionPending}
                                    className="px-3 py-1.5 text-xs font-semibold text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors">
                                    Nouveau diagnostic
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="mb-8 text-center">
                        <h2 className="text-3xl font-extrabold text-slate-900 mb-4 tracking-tight">Nouveau diagnostic assisté</h2>
                        {!showResume && hasActiveDraft && (
                            <div className="mb-4 inline-flex max-w-xl flex-col items-center gap-3 rounded-2xl border border-slate-200 bg-white px-5 py-4 shadow-sm shadow-slate-200/40">
                                <div className="text-sm text-slate-600">
                                    Le formulaire en cours est sauvegardé automatiquement et peut être archivé avant d'ouvrir un nouveau diagnostic.
                                </div>
                                <div className="flex flex-col sm:flex-row items-center gap-2 w-full justify-center">
                                    <button type="button" onClick={handleStartFresh} disabled={isDraftActionPending || isGenerating}
                                        className="pro-btn pro-btn-secondary text-sm">
                                        <Icon icon="solar:add-square-bold" />
                                        {isDraftActionPending ? 'Sauvegarde...' : 'Sauvegarder et commencer un autre'}
                                    </button>
                                    <button type="button" onClick={handleAbandonDraft} disabled={isDraftActionPending || isGenerating}
                                        className="pro-btn text-sm px-4 py-2 rounded-xl border border-red-200 bg-red-50 text-red-600 hover:bg-red-100 transition-colors font-semibold flex items-center gap-1.5">
                                        <Icon icon="solar:trash-bin-trash-linear" />
                                        Abandonner ce brouillon
                                    </button>
                                </div>
                            </div>
                        )}
                        <div className="max-w-lg mx-auto">
                            <div className="flex justify-between text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider gap-2">
                                <span className="truncate">{STEPS[form.step - 1]}</span>
                                <span className="shrink-0">Étape {form.step} / 7</span>
                            </div>
                            <div className="progress-bar-track">
                                <div className="progress-bar-fill" style={{ width: `${(form.step / 7) * 100}%` }} />
                            </div>
                            <div className="flex justify-between mt-2">
                                {STEPS.map((s, i) => (
                                    <div key={i} className={`w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full transition-all ${i < form.step ? 'bg-blue-600' : 'bg-slate-200'}`} />
                                ))}
                            </div>
                        </div>
                    </div>

                    {archivedDrafts.length > 0 && (
                        <div className="mb-6 bg-white rounded-2xl border border-slate-200 px-5 py-5 shadow-sm shadow-slate-200/40">
                            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                                <div>
                                    <div className="text-sm font-bold text-slate-800">Brouillons sauvegardes</div>
                                    <p className="text-sm text-slate-500 mt-1">Reprenez un formulaire abandonne sans perdre le diagnostic actuellement ouvert.</p>
                                </div>
                                <div className="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">
                                    {archivedDrafts.length} sauvegarde{archivedDrafts.length > 1 ? 's' : ''}
                                </div>
                            </div>
                            <div className="mt-4 space-y-3">
                                {archivedDrafts.map((archive) => (
                                    <div
                                        key={archive.id}
                                        className="rounded-xl border border-slate-200 bg-slate-50 px-4 py-3"
                                    >
                                        <div className="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
                                            <div className="flex-1 min-w-0">
                                                <div className="font-semibold text-slate-800">{archive.title}</div>
                                                <div className="text-sm text-slate-500 mt-1">{archive.summary}</div>
                                                <div className="text-xs text-slate-400 mt-1">
                                                    Sauvegardé le {formatDateTimeForUi(archive.lastSavedAt)}
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2 shrink-0">
                                                <button
                                                    type="button"
                                                    onClick={() => handleRestoreArchived(archive.id)}
                                                    disabled={isDraftActionPending || isGenerating}
                                                    className="px-3 py-1.5 rounded-lg bg-blue-600 text-white text-xs font-semibold hover:bg-blue-700 transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
                                                >
                                                    Reprendre
                                                </button>
                                                <button
                                                    type="button"
                                                    onClick={() => handleDeleteArchived(archive.id)}
                                                    disabled={isDraftActionPending || isGenerating}
                                                    className="px-3 py-1.5 rounded-lg border border-red-200 bg-white text-red-600 text-xs font-semibold hover:bg-red-50 transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
                                                >
                                                    Abandonner
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-8 md:p-10 min-h-[500px] relative">

                        {/* MODULE 1 */}
                        {form.step === 1 && (
                            <div className="fade-in space-y-6">
                                <h3 className="text-xl font-bold text-slate-800 mb-6 border-b pb-4 flex items-center gap-2">
                                    <Icon icon="solar:user-id-bold" className="text-blue-600" /> Identification du dossier
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    <div><label className="pro-label">Nom du contact <span className="text-red-500">*</span></label><input className="pro-input" placeholder="Jean Martin" value={form.contactName} onChange={e => set('contactName', e.target.value)} /></div>
                                    <div><label className="pro-label">Société / Raison sociale <span className="text-red-500">*</span></label><input className="pro-input" placeholder="Dupont & Associés" value={form.company} onChange={e => set('company', e.target.value)} /></div>
                                    <div><label className="pro-label">Email</label><input type="email" className="pro-input" placeholder="j.martin@exemple.fr" value={form.email} onChange={e => set('email', e.target.value)} /></div>
                                    <div><label className="pro-label">Téléphone</label><input type="tel" className="pro-input" placeholder="06 12 34 56 78" value={form.phone} onChange={e => set('phone', e.target.value)} /></div>
                                    <div><label className="pro-label">Code postal du bâtiment <span className="text-red-500">*</span></label><input className="pro-input" placeholder="75001" maxLength={5} value={form.postalCode} onChange={e => set('postalCode', e.target.value)} /></div>
                                    <div><label className="pro-label">Statut occupant</label>
                                        <select className="pro-input" value={form.statut} onChange={e => set('statut', e.target.value)}>
                                            <option value="">Sélectionner</option>
                                            <option value="proprietaire_occupant">Propriétaire occupant</option>
                                            <option value="proprietaire_bailleur">Propriétaire bailleur</option>
                                            <option value="locataire_exploitant">Locataire exploitant</option>
                                            <option value="gestionnaire">Gestionnaire / Syndic</option>
                                        </select>
                                    </div>
                                </div>
                                <div>
                                    <label className="pro-label mb-3 block">Objectif principal</label>
                                    <div className="grid grid-cols-1 gap-2">
                                        <Opt label="Réduction des charges (facture trop lourde)" field="objectif" value="facture" icon="solar:wallet-bold" />
                                        <Opt label="Conformité réglementaire (Décret Tertiaire, vente)" field="objectif" value="conformite" icon="solar:document-text-bold" />
                                        <Opt label="Valorisation du bien / Green Value" field="objectif" value="valo" icon="solar:leaf-bold" />
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    <div><label className="pro-label">Horizon de décision</label>
                                        <select className="pro-input" value={form.horizon} onChange={e => set('horizon', e.target.value)}>
                                            <option value="">Sélectionner</option>
                                            <option value="immediat">Immédiat (- 3 mois)</option>
                                            <option value="moyen">Moyen terme (3–12 mois)</option>
                                            <option value="long">Long terme (+ 1 an)</option>
                                        </select>
                                    </div>
                                    <div><label className="pro-label">Urgence / contexte (libre)</label><input className="pro-input" placeholder="Ex: Bail à renouveler en septembre" value={form.urgence} onChange={e => set('urgence', e.target.value)} /></div>
                                </div>
                                {/* NOTE INTERNE - jamais affichée dans le rapport client */}
                                <div className="border border-dashed border-indigo-200 bg-indigo-50/30 rounded-xl p-4 mt-2">
                                    <label className="pro-label text-indigo-700 flex items-center gap-2 mb-1">
                                        <Icon icon="solar:lock-bold" style={{ fontSize: '14px' }} />
                                        Note interne (jamais transmise au client)
                                    </label>
                                    <textarea
                                        className="pro-input mt-1 resize-none bg-white"
                                        rows={3}
                                        placeholder="Ex: Décideur direct, budget validé. Rappeler avant fin avril. Concurrence en cours…"
                                        value={form.noteInterne || ''}
                                        onChange={e => set('noteInterne', e.target.value)}
                                    />
                                    <p className="text-xs text-indigo-400 mt-1.5 flex items-center gap-1">
                                        <Icon icon="solar:eye-closed-linear" style={{ fontSize: '11px' }} />
                                        Visible uniquement dans votre espace pro - jamais incluse dans le lien de partage
                                    </p>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 flex items-start gap-3">
                                    <input type="checkbox" id="multi" className="mt-1 w-4 h-4" checked={form.isMulti} onChange={e => set('isMulti', e.target.checked)} />
                                    <label htmlFor="multi" className="cursor-pointer text-sm text-slate-700 font-medium">Portefeuille multi-sites - le rapport aura une approche consolidée</label>
                                </div>
                            </div>
                        )}

                        {/* MODULE 2 */}
                        {form.step === 2 && (
                            <div className="fade-in space-y-6">
                                <h3 className="text-xl font-bold text-slate-800 mb-6 border-b pb-4 flex items-center gap-2">
                                    <Icon icon="solar:buildings-bold" className="text-blue-600" /> Profil du bâtiment
                                </h3>
                                <div>
                                    <label className="pro-label mb-3 block">Activité principale <span className="text-red-500">*</span></label>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                        <Opt label="Bureaux / Services" field="activity" value="bureau" icon="solar:laptop-bold" />
                                        <Opt label="Commerce (sans froid)" field="activity" value="commerce_non_alim" icon="solar:shop-bold" />
                                        <Opt label="Commerce (avec froid)" field="activity" value="commerce_alim" icon="solar:fridge-bold" />
                                        <Opt label="Entrepôt chauffé" field="activity" value="entrepot_chauffe" icon="solar:box-bold" />
                                        <Opt label="Entrepôt non chauffé" field="activity" value="entrepot_non_chauffe" icon="solar:box-minimalistic-bold" />
                                        <Opt label="Restauration" field="activity" value="restauration" icon="solar:cup-hot-bold" />
                                        <Opt label="Hôtellerie" field="activity" value="hotel" icon="solar:bed-bold" />
                                        <Opt label="Santé / Soins" field="activity" value="sante" icon="solar:heart-angle-bold" />
                                        <Opt label="Enseignement" field="activity" value="enseignement" icon="solar:book-bold" />
                                    </div>
