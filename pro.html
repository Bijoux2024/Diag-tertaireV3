<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagTertiaire - Espace Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #F1F5F9;
            border-top: 1px solid #E2E8F0;
            color: #0F172A;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            overflow-x: hidden;
        }

        .fade-in {
            animation: fadeIn 0.35s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        /* ===== LAYOUT ====== */
        .pro-sidebar {
            width: 250px;
            min-height: 100vh;
            background: #FFFFFF;
            border-right: 1px solid #E2E8F0;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pro-content {
            margin-left: 250px;
            min-height: 100vh;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 1024px) {
            .pro-sidebar {
                transform: translateX(-100%);
                width: 260px;
            }

            .pro-sidebar.open {
                transform: translateX(0);
            }

            .pro-content {
                margin-left: 0;
            }
        }

        /* ===== SIDEBAR NAV ===== */
        .nav-item {

            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
            color: #64748B;
            margin: 4px 16px;
        }

        .nav-item:hover {
            background: #F1F5F9;
            border-top: 1px solid #E2E8F0;
            color: #0F172A;
        }

        .nav-item.active {
            background: #EFF6FF;
            color: #1D4ED8;
            font-weight: 700;
        }

        /* ===== BUTTONS ===== */
        .pro-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .pro-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .pro-btn-primary {
            background: #1D4ED8;
            color: white;
            box-shadow: 0 4px 12px rgba(29, 78, 216, 0.25);
        }

        .pro-btn-primary:not(:disabled):hover {
            background: #1E40AF;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(29, 78, 216, 0.35);
        }

        .pro-btn-secondary {
            background: white;
            color: #0F172A;
            border: 1px solid #E2E8F0;
        }

        .pro-btn-secondary:not(:disabled):hover {
            background: #F1F5F9;
            border-top: 1px solid #E2E8F0;
            border-color: #CBD5E1;
        }

        .pro-btn-ghost {
            background: transparent;
            color: #475569;
        }

        .pro-btn-ghost:not(:disabled):hover {
            background: #F1F5F9;
            color: #0F172A;
        }

        /* ===== BADGES ===== */
        .score-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }

        .score-A {
            background: #DCFCE7;
            color: #15803D;
        }

        .score-B {
            background: #D1FAE5;
            color: #059669;
        }

        .score-C {
            background: #FEF9C3;
            color: #A16207;
        }

        .score-D {
            background: #FEE2E2;
            color: #DC2626;
        }

        .score-E {
            background: #F3E8FF;
            color: #7C3AED;
        }

        .rel-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .rel-eleve {
            background: #DCFCE7;
            color: #15803D;
        }

        .rel-moyen {
            background: #FEF9C3;
            color: #92400E;
        }

        .rel-faible {
            background: #FEE2E2;
            color: #991B1B;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-nouveau {
            background: #DBEAFE;
            color: #1E40AF;
            border: 1px solid #BFDBFE;
        }

        .status-relancer {
            background: #FEF3C7;
            color: #B45309;
            border: 1px solid #FDE68A;
        }

        .status-projet {
            background: #DCFCE7;
            color: #15803D;
            border: 1px solid #BBF7D0;
        }

        .status-clos {
            background: #F1F5F9;
            color: #475569;
            border: 1px solid #E2E8F0;
        }

        /* ===== INPUTS & CARDS ===== */
        .kpi-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid #E2E8F0;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .kpi-card-blue {
            background: #EFF6FF;
            border-color: #BFDBFE;
        }

        .kpi-card-green {
            background: #F0FDF4;
            border-color: #BBF7D0;
        }

        .kpi-card-purple {
            background: #F5F3FF;
            border-color: #DDD6FE;
        }

        .kpi-card-amber {
            background: #FFFBEB;
            border-color: #FDE68A;
        }

        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        .pro-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #CBD5E1;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
            background: white;
            color: #0F172A;
        }

        .pro-input::placeholder {
            color: #94A3B8;
        }

        .pro-input:focus {
            border-color: #1D4ED8;
            box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.15);
        }

        .pro-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }

        /* ===== TABLES ====== */
        .pro-table th {
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #475569;
            font-size: 11px;
            font-weight: 700;
            padding: 12px 16px;
            border-bottom: 2px solid #E2E8F0;
            background: #F8FAFC;
            text-align: left;
        }

        .pro-table td {
            padding: 14px 16px;
            color: #334155;
            font-size: 13px;
            border-bottom: 1px solid #F1F5F9;
        }

        .pro-table tr:last-child td {
            border-bottom: none;
        }

        .pro-table tbody tr:nth-child(even) {
            background: #FAFBFC;
        }

        .pro-table tbody tr:hover {
            background: #EFF6FF;
        }

        /* ===== MODALS ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-box {
            background: white;
            border-radius: 20px;
            max-width: 540px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.25);
        }

        /* ===== CHATBOT ====== */
        .chatbot-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 90;
        }

        .chatbot-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #0B162C;
            border-right: 1px solid #1E293B;
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: transform 0.2s;
        }

        .chatbot-btn:hover {
            transform: scale(1.05);
        }

        .chatbot-panel {
            position: absolute;
            bottom: 76px;
            right: 0;
            width: 340px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 12px 48px rgba(15, 23, 42, 0.15);
            border: 1px solid #E2E8F0;
            overflow: hidden;
            transform-origin: bottom right;
        }


        .timeline-line {
            position: relative;
            padding-left: 48px;
            padding-bottom: 8px;
        }

        .timeline-line::before {
            content: '';
            position: absolute;
            left: 18px;
            top: 28px;
            bottom: -8px;
            width: 2px;
            background: #E2E8F0;
        }

        .timeline-line:last-child::before {
            display: none;
        }

        .timeline-dot {
            position: absolute;
            left: 8px;
            top: 4px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #1D4ED8;
            color: white;
            font-size: 11px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== DIVERS ===== */
        .step-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border-radius: 12px;
            border: 1.5px solid #E2E8F0;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            text-align: left;
            width: 100%;
            font-size: 14px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 8px;
        }

        .step-option:hover {
            border-color: #94A3B8;
            background: #F1F5F9;
            border-top: 1px solid #E2E8F0;
        }

        .step-option.selected {
            border-color: #1D4ED8;
            background: #EFF6FF;
            color: #1D4ED8;
            box-shadow: 0 2px 8px rgba(29, 78, 216, 0.1);
        }

        .progress-bar-track {
            height: 6px;
            background: #E2E8F0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: #1D4ED8;
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .plan-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid #E2E8F0;
            flex: 1;
            display: flex;
            flex-direction: column;
            transition: all 0.2s;
        }

        .plan-card:hover {
            border-color: #CBD5E1;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.05);
        }

        .plan-card.featured {
            border: 2px solid #1D4ED8;
            box-shadow: 0 12px 32px rgba(29, 78, 216, 0.1);
            position: relative;
        }
    </style>
</head>

<body>
    <div id="pro-root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* ===== CONFIG ===== */

        /* ═══════════════════════════════════════════════════════════════════════════
           ENGINE_PRO : MOTEUR COMMUN DE CALCUL (Gratuit + SaaS)
           ═══════════════════════════════════════════════════════════════════════════ */
        const ENGINE_PRO = {
            benchmarks: {
                "Bureau": { q1: 120, med: 180, q3: 280, unit: 'kWh EF/m²/an', scope: 'Tous usages, hors process IT' },
                "Hôtel": { q1: 200, med: 280, q3: 420, unit: 'kWh EF/m²/an', scope: 'Hors blanchisserie industrielle, hors restauration' },
                "Restauration": { q1: 350, med: 500, q3: 800, unit: 'kWh EF/m²/an', scope: 'Cuisson incluse' },
                "Santé": { q1: 160, med: 220, q3: 350, unit: 'kWh EF/m²/an', scope: 'Ventilation réglementaire incluse, cabinets < 500m²' },
                "Enseignement": { q1: 100, med: 150, q3: 220, unit: 'kWh EF/m²/an', scope: 'Primaire/secondaire, hors université' },
                "Entrepôt-Chauffé": { q1: 50, med: 80, q3: 130, unit: 'kWh EF/m²/an', scope: 'Chauffage + éclairage' },
                "Entrepôt-NonChauffé": { q1: 25, med: 45, q3: 70, unit: 'kWh EF/m²/an', scope: 'Éclairage seul' },
                "Commerce_Froid": { q1: 450, med: 650, q3: 900, unit: 'kWh EF/m²/an', scope: 'Avec froid intégré' },
                "Commerce_SansFroid": { q1: 200, med: 320, q3: 500, unit: 'kWh EF/m²/an', scope: 'Hors froid commercial' },
                "Autre": { q1: 100, med: 150, q3: 250 }
            },
            prices: {
                elec: 0.20,
                gaz: 0.105,
                reseau: 0.08,
                autre: 0.12
            },
            actions: [
                { id: "opti_horaires", title: "Optimisation horaires chauffage", scope: "total", gainRange: [3, 7, 12], capRange: [0, 300, 1500], capexType: "forfait" },
                { id: "regul_chauff", title: "Régulation chauffage central", scope: "chauffage", gainRange: [8, 15, 25], capRange: [1200, 2500, 6000], capexType: "forfait" },
                { id: "reduit_inocc", title: "Réduit hors occupation / consignes", scope: "total", gainRange: [2, 5, 10], capRange: [0, 500, 2000], capexType: "forfait" },
                { id: "vent_modul", title: "Ventilation hors occupation / modulation", scope: "ventilation", gainRange: [10, 20, 35], capRange: [300, 1500, 5000], capexType: "forfait_zone" },
                { id: "led", title: "Relamping LED ciblé", scope: "eclairage", gainRange: [20, 35, 55], capRange: [25, 50, 90], capexType: "point_lumineux" },
                { id: "detect_pres", title: "Détection présence éclairage", scope: "eclairage", gainRange: [10, 20, 35], capRange: [120, 250, 500], capexType: "zone" },
                { id: "calorifugeage", title: "Calorifugeage ECS / réseaux", scope: "ecs", gainRange: [5, 12, 25], capRange: [20, 40, 70], capexType: "ml" },
                { id: "isotoit", title: "Isolation opportuniste toiture", scope: "total", gainRange: [5, 12, 20], capRange: [25, 60, 140], capexType: "m2" }
            ],

            compute: function (data) {
                // Mappages depuis les IDs du form gratuit (offices, retail, etc.) ou form PRO (Bureau, Commerce, etc.)
                let actMapping = {
                    'offices': 'Bureau',
                    'retail': 'Commerce_SansFroid',
                    'hotel': 'Hôtel',
                    'restaurant': 'Restauration',
                    'health_local': 'Santé',
                    'education': 'Enseignement',
                    'light_warehouse': 'Entrepôt-NonChauffé',
                    'mixed': 'Bureau' // Simplifié si mixte
                };

                let activityKey = actMapping[data.activity] || data.activity;

                // Gestion dynamique ciblée sur les gates PRO
                if (data.activity === 'Commerce' || data.activity === 'retail') {
                    activityKey = data.commerceFroid ? 'Commerce_Froid' : 'Commerce_SansFroid';
                }
                if (data.activity === 'Entrepôt' || data.activity === 'light_warehouse') {
                    activityKey = data.entrepotChauffe ? 'Entrepôt-Chauffé' : 'Entrepôt-NonChauffé';
                }

                if (!this.benchmarks[activityKey]) activityKey = 'Autre';
                const ref = this.benchmarks[activityKey];
                const area = parseFloat(data.surface || data.area) || 100;

                let kwhTotal = 0;
                let isKwhPrioritaire = false;

                const getKwhFromInput = (valKwh, valEur, priceRef) => {
                    if (valKwh && parseFloat(valKwh) > 0) { isKwhPrioritaire = true; return parseFloat(valKwh); }
                    if (valEur && parseFloat(valEur) > 0) return parseFloat(valEur) / priceRef;
                    return 0;
                };

                // Compatibilité avec les champs index.html (elecKwh/gasKwh) et index.saaspro.html (elec/gaz kwh)
                let kwhElec = getKwhFromInput(data.elecKwh || data.elec_kwh, data.elecEuro || data.elec_eur, this.prices.elec);
                let kwhGaz = getKwhFromInput(data.gasKwh || data.gaz_kwh, data.gasEuro || data.gaz_eur, this.prices.gaz);

                kwhTotal = kwhElec + kwhGaz;

                if (kwhTotal === 0 && data._fallbackKwh) {
                    // Seulement utilisé si vraiment vide en dev local / mock initial
                    kwhTotal = data._fallbackKwh;
                } else if (kwhTotal === 0) {
                    kwhTotal = ref.med * area;
                }

                const intensity = kwhTotal / area;

                // Score OPERAT-like
                let score = "C";
                let positioning = "Dans la médiane";
                if (intensity <= ref.q1) { score = "A"; positioning = "Très performant (Top 25%)"; }
                else if (intensity > ref.q1 && intensity <= ref.med * 0.9) { score = "B"; positioning = "Performant"; }
                else if (intensity > ref.med * 0.9 && intensity <= ref.med * 1.1) { score = "C"; positioning = "Dans la médiane"; }
                else if (intensity > ref.med * 1.1 && intensity <= ref.q3) { score = "D"; positioning = "Surconsommation (Q3)"; }
                else { score = "E"; positioning = "Très énergivore (Bottom 25%)"; }

                // Sélection des actions pro
                let actionPool = [...this.actions];

                // Gates contextuels
                if (!data.hasCooling && data.hasClim === false) actionPool = actionPool.filter(a => a.id !== 'vent_modul');

                let remainingKwh = kwhTotal;
                let globalSavingsKwh = 0;
                let usedScopes = {};

                let selectedActions = actionPool.slice(0, 3).map(a => {
                    let gainFactor = (a.gainRange[1] / 100);
                    if (usedScopes[a.scope]) gainFactor *= 0.5; // Recouvrement
                    usedScopes[a.scope] = true;

                    let scopeWeight = 1;
                    let mainHeating = data.mainHeating || data.heating || 'electric';
                    if (a.scope === 'chauffage' && mainHeating.includes('elec')) scopeWeight = 0.5;
                    if (a.scope === 'chauffage' && mainHeating.includes('gas')) scopeWeight = 0.8;
                    if (a.scope === 'eclairage') scopeWeight = 0.15;
                    if (a.scope === 'ecs') scopeWeight = 0.10;

                    const actionSavings = remainingKwh * scopeWeight * gainFactor;
                    remainingKwh -= actionSavings;
                    globalSavingsKwh += actionSavings;

                    let capex = a.capRange[1];
                    if (a.capexType === 'm2') capex *= area;
                    if (a.capexType === 'ml') capex *= 50;
                    if (a.capexType === 'point_lumineux') capex *= (area / 15);
                    if (a.capexType === 'zone') capex *= (area / 50);

                    const billElecUsed = parseFloat(data.elecEuro || data.elec_eur) || 0;
                    const billGazUsed = parseFloat(data.gasEuro || data.gaz_eur) || 0;
                    const totalBill = billElecUsed + billGazUsed;

                    let implicitElecPrice = (kwhElec > 0 && billElecUsed > 0) ? (billElecUsed / kwhElec) : this.prices.elec;
                    let implicitGazPrice = (kwhGaz > 0 && billGazUsed > 0) ? (billGazUsed / kwhGaz) : this.prices.gaz;

                    let mixPrice = this.prices.elec; // fallback default
                    if (kwhTotal > 0) {
                        mixPrice = (kwhElec / kwhTotal) * implicitElecPrice + (kwhGaz / kwhTotal) * implicitGazPrice;
                    }

                    const savEur = actionSavings * mixPrice;

                    return {
                        id: a.id,
                        title: a.title,
                        savingsEur: Math.round(savEur),
                        savingsKwh: Math.round(actionSavings),
                        capex: Math.round(capex),
                        roi: savEur > 0 ? (capex / savEur).toFixed(1) : 0
                    };
                });

                const billSub = (parseFloat(data.elecSubscriptionYearly) || 0) + (parseFloat(data.gasSubscriptionYearly) || 0);

                return {
                    kwhTotal: Math.round(kwhTotal),
                    intensity: Math.round(intensity),
                    score: score,
                    positioning: positioning,
                    ref: ref,
                    isKwhPrioritaire: isKwhPrioritaire,
                    totalSavingsEur: Math.round(selectedActions.reduce((acc, a) => acc + a.savingsEur, 0)),
                    totalCapex: Math.round(selectedActions.reduce((acc, a) => acc + a.capex, 0)),
                    topActions: selectedActions.sort((a, b) => b.savingsEur - a.savingsEur),
                    estimatedBill: Math.round(kwhElec * this.prices.elec + kwhGaz * this.prices.gaz + billSub)
                };
            }
        };

        const PRO_CONFIG = {
            APP_NAME: "DiagTertiaire Pro",
            ACCESS_CODE: "test.demo",
        };

        /* ===== DONNÉES MOCK CORRIGÉES (ZÉRO ERREUR D'ENCODAGE, ZÉRO TIRET LONG) ===== */

        function getTemplateForCase(c) {
            const activ = c.activity;
            const isHigh = c.score === "D" || c.score === "E";
            const isMulti = activ === "Multi-sites";
            const isRestauHotel = activ === "Restauration" || activ === "Hôtel";
            const isBureau = activ === "Bureau" || activ === "Services";

            const execSummary = isMulti
                ? ["Le périmètre reste hétérogène et appelle une lecture prudente.", "Le niveau de fiabilité est limité par la qualité des informations disponibles.", "La suite recommandée consiste à mieux qualifier les sites avant toute décision plus engageante."]

                            </button>
                        </div>

                        <nav className="flex-1 flex flex-col gap-1 overflow-y-auto px-2">
                            {navs.map(n => {
                                const isActive = curPage === n.id || (curPage.startsWith('report') && n.id === 'cases');
                                return (
                                    <div key={n.id} className={`nav-item ${isActive ? 'active' : ''}`} onClick={() => { setPage(n.id); closeMobile(); }}>
                                        <Icon icon={n.icon} style={{ fontSize: '20px' }} />
                                        {n.label}
                                    </div>
                                );
                            })}
                        </nav>

                        {/* Profil Footer Premium */}
                        <div className="p-4 border-t border-slate-100 mt-4 bg-slate-50/50">
                            <div className="flex items-center gap-3 mb-4 px-2">
                                <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-xs shadow-inner">SL</div>
                                <div className="overflow-hidden">
                                    <div className="text-sm font-bold text-slate-800 truncate">Sophie Laurent</div>
                                    <div className="text-[10px] text-blue-400 uppercase tracking-widest font-black">Admin</div>
                                </div>
                            </div>

                            <div className="flex flex-col gap-2">
                                <a href="index.html" className="flex items-center justify-center gap-2 text-xs font-semibold text-slate-500 hover:text-blue-600 px-3 py-2 rounded-lg hover:bg-blue-50 transition-all text-center">
                                    <Icon icon="solar:round-alt-arrow-left-bold" /> Retour au site public
                                </a>
                                <button type="button" onClick={onLogout} className="flex items-center justify-center gap-2 text-xs font-semibold text-red-400 hover:text-red-300 px-3 py-2 rounded-lg hover:bg-red-500/10 border border-transparent hover:border-red-500/20 transition-all w-full">
                                    <Icon icon="solar:logout-2-bold" /> Déconnexion
                                </button>
                            </div>
                        </div>
                    </div>
                </>
            );
        };

        const ProTopbar = ({ title, toggleMobile }) => (
            <div className="bg-white border-b border-slate-200 px-4 md:px-8 py-4 flex items-center justify-between sticky top-0 z-30 shadow-sm shadow-slate-200/40">
                <div className="flex items-center gap-3">
                    <button type="button" onClick={toggleMobile} className="lg:hidden w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-200 transition-colors">
                        <Icon icon="solar:hamburger-menu-linear" style={{ fontSize: '22px' }} />
                    </button>
                    <h1 className="text-xl font-bold text-slate-800 tracking-tight hidden sm:block">{title}</h1>
                </div>

                <div className="flex items-center gap-4">
                    <a href="index.html" className="text-sm font-semibold text-blue-600 hover:text-blue-800 transition-colors hidden sm:flex items-center gap-1.5">
                        Site public <Icon icon="solar:square-top-down-linear" className="rotate-90 mt-0.5" />
                    </a>
                </div>
            </div>
        );

        /* ===== LOGIN PRO (Mise en avant SaaS) ===== */
        const ProLogin = ({ onLogin, openDemo }) => {
            const [email, setEmail] = useState('demo@cabinet-conseil.fr');
            const [code, setCode] = useState('test.demo');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = (e) => {
                e.preventDefault();
                setError('');
                if (code !== PRO_CONFIG.ACCESS_CODE) {
                    setError('Code d\'accès incorrect. Pour cette démo, utilisez : test.demo');
                    return;
                }
                setLoading(true);
                setTimeout(() => {
                    localStorage.setItem('proAuth', 'true');
                    onLogin();
                }, 800);
            };

            return (
                <div className="min-h-screen bg-[#F8FAFC] flex items-center justify-center p-4 relative overflow-hidden">
                    <div className="absolute -top-40 -right-40 w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-[120px] opacity-20 animate-pulse"></div>
                    <div className="absolute -bottom-40 -left-40 w-96 h-96 bg-indigo-400 rounded-full mix-blend-multiply filter blur-[120px] opacity-20 animate-pulse"></div>

                    <div className="w-full max-w-[420px] relative z-10 fade-in">
                        <div className="text-center mb-8">
                            <a href="index.html" className="inline-flex items-center gap-2 text-slate-500 hover:text-blue-600 mb-6 text-sm font-semibold transition-colors">
                                <Icon icon="solar:round-alt-arrow-left-bold" /> Retour au site public
                            </a>
                            <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-blue-500/20">
                                <Icon icon="solar:buildings-2-bold" className="text-blue-600 text-3xl" />
                            </div>
                            <h2 className="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">Espace Professionnel</h2>
                            <p className="text-slate-400">Gérez vos diagnostics et vos clients de manière centralisée.</p>
                        </div>

                        <div className="bg-white rounded-2xl p-8 shadow-2xl shadow-black/40 border border-slate-100/10">
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div>
                                    <label className="pro-label text-slate-700">Adresse email pro</label>
                                    <input
                                        type="email"
                                        required
                                        className="pro-input bg-slate-50"
                                        placeholder="vous@cabinet.fr"
                                        value={email}
                                        onChange={e => setEmail(e.target.value)}
                                    />
                                </div>
                                <div>
                                    <div className="flex justify-between mb-1">
                                        <label className="pro-label text-slate-700 mb-0">Code d'accès Démo</label>
                                        <span className="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full uppercase tracking-wider">MVP</span>
                                    </div>
                                    <input
                                        type="password"
                                        required
                                        className="pro-input font-mono bg-slate-50 tracking-widest text-center"
                                        placeholder="········"
                                        value={code}
                                        onChange={e => setCode(e.target.value)}
                                    />
                                </div>

                                {error && (
                                    <div className="p-3 bg-red-50 border border-red-100 rounded-xl flex items-start gap-2 text-red-700 text-sm font-semibold fade-in shadow-inner">
                                        <Icon icon="solar:danger-triangle-bold" className="shrink-0 mt-0.5 text-red-500" />
                                        <span>{error}</span>
                                    </div>
                                )}

                                <button type="submit" disabled={loading} className="pro-btn pro-btn-primary w-full justify-center py-3.5 mt-2">
                                    {loading ? (
                                        <Icon icon="solar:refresh-circle-bold" className="animate-spin text-xl" />
                                    ) : (
                                        <span className="flex items-center gap-2">Accéder à l'espace pro <Icon icon="solar:arrow-right-linear" /></span>
                                    )}
                                </button>
                            </form>
                        </div>

                        <div className="mt-8 text-center px-4">
                            <p className="text-slate-500 text-sm mb-4 font-medium">Vous n'avez pas encore d'accès démo ?</p>
                            <button type="button" onClick={openDemo} className="inline-flex items-center gap-2 text-blue-400 font-bold hover:text-blue-300 transition-colors">
                                Demander une démonstration <Icon icon="solar:arrow-right-line-duotone" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        /* ===== MAIN APP (Logique de routing et d'assemblage) ===== */
        const ProApp = () => {
            const [auth, setAuth] = useState(false);
            const [page, setPage] = useState('cases');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isDemoModalOpen, setIsDemoModalOpen] = useState(false);

            useEffect(() => {
                const isAuth = localStorage.getItem('proAuth') === 'true';
                if (isAuth) setAuth(true);
            }, []);

            const openDemoModal = () => setIsDemoModalOpen(true);
            const closeDemoModal = () => setIsDemoModalOpen(false);

            if (!auth) {
                return (
                    <>
                        <ProLogin onLogin={() => setAuth(true)} openDemo={openDemoModal} />
                        <DemoModal isOpen={isDemoModalOpen} onClose={closeDemoModal} />
                    </>
                );
            }

            const handleLogout = () => {
                localStorage.removeItem('proAuth');
                setAuth(false);
            };

            const toggleMobile = () => setIsMobileMenuOpen(!isMobileMenuOpen);
            const closeMobile = () => setIsMobileMenuOpen(false);

            const renderPage = () => {
                if (page === 'dashboard') return <ProDashboard setPage={setPage} openDemo={openDemoModal} />;
                if (page === 'cases') return <ProDashboard setPage={setPage} openDemo={openDemoModal} />;
                if (page === 'new') return <ProNewDiag setPage={setPage} />;
                if (page === 'settings') return <ProSettings />;
                if (page.startsWith('report-')) return <ProReport cId={page.replace('report-', '')} setPage={setPage} openDemo={openDemoModal} />;
                return <ProDashboard setPage={setPage} openDemo={openDemoModal} />;
            };

            const titles = {
                dashboard: "Vue globale du parc",
                cases: "Dossiers clients",
                new: "Nouveau diagnostic",
                settings: "Configuration"
            };
            const currentTitle = page.startsWith('report-') ? "Rapport détaillé" : titles[page];

            return (
                <div className="flex bg-[#F8FAFC]">
                    <ProSidebar
                        curPage={page}
                        setPage={setPage}
                        isMobileOpen={isMobileMenuOpen}
                        closeMobile={closeMobile}
                        onLogout={handleLogout}
                    />
                    <div className="pro-content flex-1 max-w-full">
                        <ProTopbar title={currentTitle} toggleMobile={toggleMobile} />
                        <main className="min-h-[calc(100vh-73px)]">
                            {renderPage()}
                        </main>
                        <footer className="py-6 text-center text-slate-400 text-xs font-semibold border-t border-slate-200 bg-white">
                            © 2024 DiagTertiaire Pro | Environnement de démonstration B2B
                        </footer>
                    </div>
                    <ChatbotWidget />
                    <DemoModal isOpen={isDemoModalOpen} onClose={closeDemoModal} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('pro-root'));
        root.render(<ProApp />);
    </script>
    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>

</body>

</html>
