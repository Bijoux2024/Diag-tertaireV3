<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiagTertiaire — Rapport PDF</title>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <style>
    /* ═══════════════════════════════════════
       PAGE SETUP — A4 PRINT
       Puppeteer pdfOptions margins take precedence over @page margins.
       Reference: top 16mm / right 14mm / bottom 14mm / left 14mm
         → A4 usable width = 210mm – 14mm – 14mm = 182mm ≈ 688 CSS px
         → Section padding 22px × 2 → content area ≈ 644 CSS px
         → CHART_W = 636 fits safely within content area
    ═══════════════════════════════════════ */
    @page {
      size: A4 portrait;
      margin: 16mm 14mm 14mm 14mm;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      background: #fff;
      font-family: 'Helvetica Neue', Arial, Helvetica, sans-serif;
      font-size: 12px;
      line-height: 1.55;
      color: #0F172A;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      orphans: 3;
      widows: 3;
    }

    @media print {
      html, body { background: #fff; }
    }

    /* ═══════════════════════════════════════
       PAGINATION RULES
       Keep these here — never inline in JSX.
    ═══════════════════════════════════════ */

    /* Blocks that must never be split across pages */
    .pba {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* Section title must stick to the first content line below it */
    .section-title {
      break-after: avoid;
      page-break-after: avoid;
    }

    /*
      Recharts injects .recharts-wrapper itself.
      overflow: visible prevents any parent clip from hiding SVG content.
      break-inside: avoid keeps the chart on one page.
    */
    .recharts-wrapper {
      overflow: visible !important;
      break-inside: avoid !important;
      page-break-inside: avoid !important;
    }

    /* Rows & grids that must stay whole */
    .kpi-row   { break-inside: avoid; page-break-inside: avoid; }
    .budget-row{ break-inside: avoid; page-break-inside: avoid; }
    .cols-2    { break-inside: avoid; page-break-inside: avoid; }

    /* Orphan / widow control */
    p, li { orphans: 2; widows: 2; }

    /* Chart host: ensure no clip and sufficient space */
    .chart-host {
      width: 100%;
      overflow: visible;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;
    const RC = window.Recharts || {};
    const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, Legend } = RC;
    // NOTE: ResponsiveContainer is intentionally NOT used in the print page.
    // It depends on ResizeObserver which does not fire reliably in Puppeteer
    // print-media mode → charts render with width=0 → empty SVG paths.
    // Fixed dimensions guarantee a fully rendered chart on the first paint.
    const CHART_W = 636; // calibrated: 688px usable - 2×22px section padding = 644 → 636 safe
    const CHART_H = 280;

    /* ═══════════════════════════════════════════════════════
       DATA HELPERS
       @sync — keep in sync with ENGINE_PUBLIC in index.html
       whenever score thresholds, aides ratio or inflation
       rate change.
    ═══════════════════════════════════════════════════════ */

    const obj = v => (v && typeof v === 'object' && !Array.isArray(v)) ? v : {};
    const arr = v => Array.isArray(v) ? v : [];
    const num = (v, fb = 0) => { const n = Number(v); return isFinite(n) ? n : fb; };

    const fmtEur = v => `${Math.round(num(v, 0)).toLocaleString('fr-FR')} €`;
    const fmtInt = (v, u = '') => {
      const s = Math.round(num(v, 0)).toLocaleString('fr-FR');
      return u ? `${s}\u00a0${u}` : s;
    };
    const fmtDate = v => {
      const d = v ? new Date(v) : new Date();
      return isNaN(d.getTime()) ? '' : d.toLocaleDateString('fr-FR');
    };

    // @sync — score thresholds
    const SCORE_MAP = {
      A: { color: '#15803D', bg: '#DCFCE7', border: '#86EFAC', label: 'Très performant' },
      B: { color: '#16A34A', bg: '#F0FDF4', border: '#86EFAC', label: 'Performant' },
      C: { color: '#D97706', bg: '#FEF3C7', border: '#FDE68A', label: 'Dans la médiane' },
      D: { color: '#EA580C', bg: '#FFF7ED', border: '#FED7AA', label: 'Surconsommation' },
      E: { color: '#DC2626', bg: '#FEE2E2', border: '#FCA5A5', label: 'Très énergivore' },
    };

    const scoreConf = l => SCORE_MAP[String(l || 'C').toUpperCase()] || SCORE_MAP['C'];

    // Normalise site name vs address — prevents duplicate display in hero
    const normalizeSiteDisplay = (rawSiteName, address, postalCode) => {
      const sn   = String(rawSiteName || '').trim();
      const addr = String(address     || '').trim();
      const cp   = String(postalCode  || '').trim();
      const norm = s => s.toLowerCase().replace(/[\s,]+/g, ' ').trim();
      const isFragment = sn.length > 0 &&
        (norm(addr).length > 0 && (norm(addr).startsWith(norm(sn)) || norm(sn) === norm(addr)));
      const addrHasCp = cp && addr.includes(cp);
      const fullAddr  = addr
        ? (addrHasCp || !cp ? addr : addr + ', ' + cp)
        : (cp || '');
      if (!sn || isFragment) {
        return { displayTitle: fullAddr || 'Bâtiment diagnostiqué', addressLine: null };
      }
      return { displayTitle: sn, addressLine: fullAddr || null };
    };

    // @sync — thresholds: A<0.6 B<0.9 C<1.2 D<1.7 E≥1.7
    const computeScore = (intensity, median) => {
      const r = num(intensity) / Math.max(1, num(median, 1));
      return r < 0.6 ? 'A' : r < 0.9 ? 'B' : r < 1.2 ? 'C' : r < 1.7 ? 'D' : 'E';
    };

    // @sync — use per-action aid_amount.value when available (matches web newDiagnosticBuildProgramBudget)
    // Fallback: TVA 5.5% formula (≈12.08%) + optional CEE plancher
    const estimateAides = (actions) =>
      Math.round(arr(actions).reduce((s, a) => {
        const aidVal = a?.aid_amount?.value;
        if (aidVal != null && num(aidVal) >= 0) return s + num(aidVal);
        const capVal = num(a?.capex?.value);
        let v = capVal * (0.20 - 0.055) / 1.20; // TVA 5.5%
        if (arr(a?.aid_tags).includes('CEE')) v += capVal * 0.015;
        return s + v;
      }, 0));

    const buildBudget = (actions, annualEuro) => {
      const safeActs = arr(actions);
      const capexBrut = safeActs.reduce((s, a) => s + num(a?.capex?.value), 0);
      const aides    = estimateAides(safeActs);
      const capexNet = Math.max(0, Math.round(capexBrut - aides));
      const savings  = Math.max(0, Math.round(num(annualEuro)));
      const roi      = savings > 0 ? capexNet / savings : null;
      return {
        capexBrut: Math.round(capexBrut), aides, capexNet, savings,
        roiYears: roi !== null ? Math.round(roi * 10) / 10 : null
      };
    };

    // @sync — inflation rates from index.html INFLATION_ENERGIE (élec 3.5%, gaz 4.5%)
    // @sync — energy prices from NEW_DIAGNOSTIC_ENERGY_PRICES (élec 0.206, gaz 0.108)
    const INFLATION_ELEC  = 0.035;
    const INFLATION_GAZ   = 0.045;
    const ELEC_PRICE_KWH  = 0.206;
    const GAS_PRICE_KWH   = 0.108;

    // @sync — cumulative projection matching newDiagnosticBuildProjectionData in index.html
    // Y-axis = total € spent since year 0 (including initial investment), same as web chart
    const buildProjection = ({ totalCostEuroAn, annualEuro, actions, elecKwh = 0, gasKwh = 0 }) => {
      const safeActs = arr(actions);

      // Per-action aids (use aid_amount.value from payload — same as web projection)
      const aidesTotal = Math.round(safeActs.reduce((s, a) => {
        const v = a?.aid_amount?.value;
        return s + (v != null && num(v) >= 0 ? num(v) : 0);
      }, 0));
      const capexBrut = safeActs.reduce((s, a) => s + num(a?.capex?.value), 0);
      const capexNet  = Math.max(0, Math.round(capexBrut - aidesTotal));

      // Weighted inflation by elec/gas mix (matches index.html logic)
      const elecEur   = num(elecKwh) * ELEC_PRICE_KWH;
      const gazEur    = num(gasKwh)  * GAS_PRICE_KWH;
      const totalBase = Math.max(elecEur + gazEur, 1);
      const partElec  = elecEur / totalBase;
      const partGaz   = gazEur  / totalBase;
      const taux      = partElec * INFLATION_ELEC + partGaz * INFLATION_GAZ
                        + Math.max(0, 1 - partElec - partGaz) * INFLATION_ELEC;
      const tauxPct   = +(taux * 100).toFixed(1);

      // Light scenario (tier=light or untiered small capex)
      const lightActs     = safeActs.filter(a => a?.tier === 'light' || (!a?.tier && num(a?.capex?.value) < 3000));
      const lightSav      = lightActs.reduce((s, a) => s + num(a?.gain_euro_an?.value), 0);
      const lightAides    = Math.round(lightActs.reduce((s, a) => {
        const v = a?.aid_amount?.value;
        return s + (v != null && num(v) >= 0 ? num(v) : 0);
      }, 0));
      const lightCapexNet = Math.max(0, Math.round(lightActs.reduce((s, a) => s + num(a?.capex?.value), 0) - lightAides));
      const hasLight      = lightActs.length > 0 && lightActs.length < safeActs.length;

      const base    = num(totalCostEuroAn);
      const savings = num(annualEuro);

      // Cumulative data — same structure as index.html (data[0]='Auj.', data[1]='A+1', …, data[10]='A+10')
      const data = [{
        annee: 'Auj.',
        sans_travaux: 0,
        avec_travaux: Math.round(capexNet),
        avec_actions_rapides: hasLight ? Math.round(lightCapexNet) : undefined,
      }];
      let cumSans = 0, cumAvec = capexNet, cumLight = lightCapexNet;
      let roiAnnee = null;
      for (let an = 1; an <= 10; an++) {
        const f   = Math.pow(1 + taux, an);
        cumSans  += base * f;
        cumAvec  += Math.max(0, base - savings) * f;
        cumLight += Math.max(0, base - lightSav) * f;
        const ecoNettes = Math.round(cumSans - cumAvec);
        if (!roiAnnee && ecoNettes > 0) roiAnnee = `A+${an}`;
        data.push({
          annee: `A+${an}`,
          sans_travaux: Math.round(cumSans),
          avec_travaux: Math.round(cumAvec),
          avec_actions_rapides: hasLight ? Math.round(cumLight) : undefined,
        });
      }

      console.log('[print] projection cumul pts:', data.length,
        '| A+1:', JSON.stringify(data[1]),
        '| A+10:', JSON.stringify(data[10]));
      return { data, taux: tauxPct, roiAnnee, hasLight, aidesTotal, capexNet, capexBrut: Math.round(capexBrut) };
    };

    const TIER_CONF = {
      quick_win:  { label: 'Action rapide', bg: '#F0FDF4', color: '#15803D', border: '#86EFAC' },
      equipment:  { label: 'Équipement',    bg: '#EFF6FF', color: '#1D4ED8', border: '#BFDBFE' },
      structural: { label: 'Structurel',    bg: '#FEF3C7', color: '#92400E', border: '#FDE68A' },
    };

    /* ═══════════════════════════════════════════════════════
       ENERGY LABEL MINI — DPE-style, dark-hero version
    ═══════════════════════════════════════════════════════ */
    const EnergyLabelMini = ({ letter, intensity, title }) => {
      const cfg = scoreConf(letter);
      return (
        <div style={{
          flex: 1,
          background: 'rgba(255,255,255,0.11)',
          border: '1.5px solid ' + cfg.border,
          borderRadius: 10,
          padding: '10px 12px',
          textAlign: 'center',
        }}>
          <div style={{
            fontSize: 9, fontWeight: 700, textTransform: 'uppercase',
            letterSpacing: '0.08em', color: 'rgba(255,255,255,0.6)', marginBottom: 4,
          }}>{title}</div>
          <div style={{ fontSize: 46, fontWeight: 900, color: cfg.color, lineHeight: 1 }}>
            {letter}
          </div>
          <div style={{ fontSize: 10, color: '#fff', marginTop: 4 }}>{cfg.label}</div>
          {num(intensity) > 0 && (
            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.55)', marginTop: 2 }}>
              {Math.round(num(intensity))}&nbsp;kWh/m²/an
            </div>
          )}
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════════════ */
    const T = {
      navy:     '#0A1928',
      blue:     '#1D4ED8',
      slate600: '#475569',
      slate400: '#94A3B8',
      slate200: '#E2E8F0',
      slate100: '#F1F5F9',
      slate50:  '#F8FAFC',
      radius:   14,
      radiusLg: 18,
    };

    /* ═══════════════════════════════════════════════════════
       SECTION WRAPPER
    ═══════════════════════════════════════════════════════ */
    const Section = ({ title, sub, children, mb = 18, avoidBreak = false }) => (
      <div
        className={avoidBreak ? 'pba' : ''}
        style={{
          background: '#fff',
          border: `1px solid ${T.slate200}`,
          borderRadius: T.radiusLg,
          marginBottom: mb,
          overflow: 'hidden',
        }}
      >
        {/* Coloured top bar */}
        <div style={{ height: 3, background: `linear-gradient(90deg, ${T.blue} 0%, #6366F1 100%)` }} />
        <div style={{ padding: '20px 24px 22px' }}>
          <div className="section-title" style={{
            fontSize: 16, fontWeight: 800, color: T.navy,
            letterSpacing: '-0.3px', marginBottom: sub ? 4 : 16,
          }}>{title}</div>
          {sub && (
            <div style={{ fontSize: 11, color: T.slate600, marginBottom: 16, lineHeight: 1.6 }}>
              {sub}
            </div>
          )}
          {children}
        </div>
      </div>
    );

    /* ═══════════════════════════════════════════════════════
       COVER IMAGE — print-safe building photo block
    ═══════════════════════════════════════════════════════ */
    const CoverImageBlock = ({ url }) => {
      if (!url) return null;
      return (
        <div className="pba" style={{
          marginBottom: 18, borderRadius: 14, overflow: 'hidden',
          border: '1px solid ' + T.slate200, position: 'relative',
        }}>
          <img
            src={url}
            alt="Photo du bâtiment"
            data-report-image="true"
            style={{ width: '100%', height: '190px', objectFit: 'cover', display: 'block' }}
            onError={(e) => {
              try {
                const block = e.target.closest && e.target.closest('.pba');
                if (block) block.style.display = 'none';
                else if (e.target.parentNode) e.target.parentNode.style.display = 'none';
              } catch (_) {}
            }}
          />
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0,
            background: 'linear-gradient(to top, rgba(10,25,40,0.65) 0%, transparent 100%)',
            padding: '10px 16px 12px',
          }}>
            <div style={{
              fontSize: 9, fontWeight: 700, textTransform: 'uppercase',
              letterSpacing: '0.1em', color: 'rgba(255,255,255,0.85)',
            }}>Vue du bâtiment</div>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════
       KPI CARD — 2×2 grid, generous size
    ═══════════════════════════════════════════════════════ */
    const KpiCard = ({ label, value, sub, accent = T.blue }) => (
      <div className="pba" style={{
        background: '#fff',
        border: `1px solid ${T.slate200}`,
        borderRadius: T.radius,
        padding: '20px 22px',
        borderTop: `3px solid ${accent}`,
      }}>
        <div style={{
          fontSize: 9, fontWeight: 800, textTransform: 'uppercase',
          letterSpacing: '0.1em', color: accent, marginBottom: 8,
        }}>{label}</div>
        <div style={{ fontSize: 28, fontWeight: 900, color: T.navy, lineHeight: 1, marginBottom: 5 }}>
          {value}
        </div>
        {sub && <div style={{ fontSize: 11, color: T.slate400, lineHeight: 1.4 }}>{sub}</div>}
      </div>
    );

    /* ═══════════════════════════════════════════════════════
       ACTION ROW
    ═══════════════════════════════════════════════════════ */
    const ActionRow = ({ action, index }) => {
      const tier = TIER_CONF[action.tier] || TIER_CONF.equipment;
      const roi  = action.roi_years?.value != null
        ? `${String(action.roi_years.value).replace('.', ',')} ans`
        : 'À confirmer';
      const gainEuro = num(action.gain_euro_an?.value);
      const capex    = num(action.capex?.value);

      return (
        <div className="pba" style={{
          display: 'flex', gap: 14,
          padding: '16px 18px',
          background: T.slate50,
          borderRadius: 12,
          border: `1px solid ${T.slate200}`,
          marginBottom: 12,
        }}>
          {/* Number badge */}
          <div style={{
            width: 30, height: 30, borderRadius: '50%',
            background: T.blue, color: '#fff',
            fontSize: 13, fontWeight: 800,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexShrink: 0, marginTop: 1,
          }}>{index + 1}</div>

          <div style={{ flex: 1 }}>
            {/* Name + tier badge */}
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 5, flexWrap: 'wrap' }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: T.navy }}>
                {action.name || 'Action recommandée'}
              </div>
              <span style={{
                padding: '2px 8px', borderRadius: 20,
                fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.04em',
                background: tier.bg, color: tier.color, border: `1px solid ${tier.border}`,
                flexShrink: 0,
              }}>{tier.label}</span>
            </div>
            {/* Metrics row */}
            <div style={{ display: 'flex', gap: 22, fontSize: 11, color: T.slate600, flexWrap: 'wrap' }}>
              <span>
                Gain annuel&nbsp;
                <strong style={{ color: '#15803D', fontWeight: 800 }}>{fmtEur(gainEuro)}/an</strong>
              </span>
              <span>
                Investissement&nbsp;
                <strong style={{ color: T.navy }}>{fmtEur(capex)}</strong>
              </span>
              <span>
                Retour&nbsp;
                <strong style={{ color: T.navy }}>{roi}</strong>
              </span>
            </div>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════
       PROJECTION CHART
       ─────────────────────────────────────────────────────
       WHY FIXED DIMENSIONS (no ResponsiveContainer):
         ResponsiveContainer uses ResizeObserver to measure its
         parent. In Puppeteer with mediaType='print', ResizeObserver
         callbacks do not fire — the chart receives width=0 and renders
         an empty SVG. Fixed dimensions bypass ResizeObserver entirely
         and guarantee a fully painted chart on the first render pass.

       CHART_W = 636 is calibrated for A4 with Puppeteer margins
       (top:16mm right:14mm bottom:14mm left:14mm):
         182mm usable × (96px/25.4mm) ≈ 688px
         − 2 × 24px section padding = 640px → 636 adds 4px safety margin.

       isAnimationActive={false} on both Areas:
         Recharts animations are async; without this Puppeteer may
         snapshot mid-animation yielding paths with no 'd' attribute.
    ═══════════════════════════════════════════════════════ */
    const ProjectionChart = ({ data, hasLight }) => {
      if (!AreaChart || !data || data.length === 0) {
        console.warn('[print] ProjectionChart: AreaChart unavailable or no data');
        return null;
      }
      const fmtTick = v => `${Math.round(v / 1000)}k€`;
      const { RC: _RC, Line, LineChart } = window.Recharts || {};
      return (
        <div className="chart-host pba">
          <AreaChart
            width={CHART_W}
            height={CHART_H}
            data={data}
            margin={{ top: 8, right: 16, left: 0, bottom: 4 }}
          >
            <defs>
              <linearGradient id="gSans" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%"  stopColor="#EA580C" stopOpacity={0.14} />
                <stop offset="95%" stopColor="#EA580C" stopOpacity={0} />
              </linearGradient>
              <linearGradient id="gAvec" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%"  stopColor={T.blue} stopOpacity={0.14} />
                <stop offset="95%" stopColor={T.blue} stopOpacity={0} />
              </linearGradient>
              <linearGradient id="gLight" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%"  stopColor="#F59E0B" stopOpacity={0.12} />
                <stop offset="95%" stopColor="#F59E0B" stopOpacity={0} />
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke={T.slate200} />
            <XAxis dataKey="annee" tick={{ fontSize: 10, fill: T.slate600 }} />
            <YAxis tickFormatter={fmtTick} tick={{ fontSize: 10, fill: T.slate600 }} width={48} />
            <Tooltip formatter={v => fmtEur(v)} />
            <Legend wrapperStyle={{ fontSize: 10, paddingTop: 8 }} />
            <Area type="monotone" dataKey="sans_travaux" name="Situation actuelle"
                  stroke="#EA580C" strokeWidth={2.2} strokeDasharray="6 3"
                  fill="url(#gSans)" isAnimationActive={false} />
            {hasLight && (
              <Area type="monotone" dataKey="avec_actions_rapides" name="Actions sans travaux"
                    stroke="#F59E0B" strokeWidth={2.2} strokeDasharray="8 3"
                    fill="url(#gLight)" isAnimationActive={false} />
            )}
            <Area type="monotone" dataKey="avec_travaux" name="Actions légères + travaux"
                  stroke={T.blue} strokeWidth={2.5} fill="url(#gAvec)"
                  isAnimationActive={false} />
          </AreaChart>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════
       USAGE BREAKDOWN — inline SVG donut, no Recharts
    ═══════════════════════════════════════════════════════ */
    const USAGE_KEYS = [
      { k: 'heating_pct',        label: 'Chauffage',     color: '#EF4444' },
      { k: 'cooling_pct',        label: 'Climatisation', color: '#3B82F6' },
      { k: 'dhw_pct',            label: 'ECS',           color: '#F59E0B' },
      { k: 'lighting_pct',       label: 'Éclairage',     color: '#EAB308' },
      { k: 'vent_aux_pct',       label: 'Ventilation',   color: '#8B5CF6' },
      { k: 'other_specific_pct', label: 'Autres',        color: '#94A3B8' },
    ];

    const UsageDonut = ({ usageBreakdown }) => {
      const rawBd = obj(usageBreakdown);
      const bpRaw = (rawBd.breakdown_pct && typeof rawBd.breakdown_pct === 'object')
        ? rawBd.breakdown_pct : rawBd;

      const rawEntries = USAGE_KEYS.map(uk => {
        const v = bpRaw[uk.k];
        const pct = typeof v === 'number' ? v : (v && typeof v.value === 'number' ? v.value : 0);
        return { ...uk, pct };
      }).filter(e => e.pct > 0).sort((a, b) => b.pct - a.pct);

      if (rawEntries.length === 0) return null;

      const total = rawEntries.reduce((s, e) => s + e.pct, 0);
      const entries = rawEntries.map(e => ({ ...e, pct: Math.round((e.pct / total) * 100) }));
      const dominant = entries[0];

      // Build SVG donut geometry (static, no runtime dependency)
      const CX = 70, CY = 70, R = 56, r = 36;
      let a = -Math.PI / 2;
      const slices = entries.map(e => {
        const sweep = (e.pct / 100) * 2 * Math.PI;
        const x1 = CX + R * Math.cos(a),     y1 = CY + R * Math.sin(a);
        const xi1 = CX + r * Math.cos(a),    yi1 = CY + r * Math.sin(a);
        a += sweep;
        const x2 = CX + R * Math.cos(a),     y2 = CY + R * Math.sin(a);
        const xi2 = CX + r * Math.cos(a),    yi2 = CY + r * Math.sin(a);
        const lg = sweep > Math.PI ? 1 : 0;
        const path =
          'M' + x1.toFixed(1) + ',' + y1.toFixed(1) +
          ' A' + R + ',' + R + ',0,' + lg + ',1,' + x2.toFixed(1) + ',' + y2.toFixed(1) +
          ' L' + xi2.toFixed(1) + ',' + yi2.toFixed(1) +
          ' A' + r + ',' + r + ',0,' + lg + ',0,' + xi1.toFixed(1) + ',' + yi1.toFixed(1) + ' Z';
        return { ...e, path };
      });

      return (
        <Section title="Répartition par usage" sub="Estimation indicative des postes énergétiques selon l'activité et le profil du bâtiment." avoidBreak={true}>
          <div style={{ display: 'flex', gap: 20, alignItems: 'center', flexWrap: 'wrap' }}>
            {/* SVG Donut — fully deterministic, print-safe */}
            <div style={{ flexShrink: 0 }}>
              <svg width="140" height="140" viewBox="0 0 140 140">
                {slices.map((s, i) => (
                  <path key={i} d={s.path} fill={s.color} />
                ))}
                <text x="70" y="65" textAnchor="middle"
                  style={{ fontSize: '17px', fontWeight: 900, fill: T.navy,
                    fontFamily: 'Helvetica Neue, Arial, sans-serif' }}>
                  {dominant.pct}%
                </text>
                <text x="70" y="80" textAnchor="middle"
                  style={{ fontSize: '9px', fill: T.slate600,
                    fontFamily: 'Helvetica Neue, Arial, sans-serif' }}>
                  {dominant.label}
                </text>
              </svg>
            </div>
            {/* Legend */}
            <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px 16px', minWidth: 160 }}>
              {entries.map(e => (
                <div key={e.k} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 3, background: e.color, flexShrink: 0 }} />
                  <div>
                    <span style={{ fontSize: 11, fontWeight: 700, color: T.navy }}>{e.label}</span>
                    <span style={{ fontSize: 11, color: T.slate400, marginLeft: 5 }}>{e.pct}%</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div style={{
            marginTop: 12, fontSize: 11, color: T.slate600,
            background: T.slate50, border: '1px solid ' + T.slate200,
            borderRadius: 8, padding: '8px 12px',
          }}>
            Poste dominant&nbsp;:&nbsp;
            <strong style={{ color: T.navy }}>{dominant.label}</strong>
            &nbsp;({dominant.pct}% des consommations estimées).{' '}
            Lecture indicative avant audit approfondi.
          </div>
        </Section>
      );
    };

    /* ═══════════════════════════════════════════════════════
       MAIN REPORT RENDER
       @sync — keep in sync with ENGINE_PUBLIC in index.html
       whenever score thresholds, aides ratio or inflation
       rate change.
    ═══════════════════════════════════════════════════════ */
    const ReportPrint = ({ reportPayload: rp, printAssets }) => {
      const coverImageUrl = (printAssets && printAssets.cover_image_url) || null;
      const inputs    = obj(rp.inputs_summary);
      const bench     = obj(rp.benchmark_result);
      const composite = obj(rp.composite_savings);
      const calc      = obj(rp.calculation_results);
      const conf      = obj(rp.confidence);
      const actions   = arr(rp.top_actions).slice(0, 6);
      const assumes   = arr(rp.assumptions).slice(0, 8);
      const limits    = arr(rp.limits).slice(0, 8);

      const siteName   = String(inputs.site_name  || 'Bâtiment diagnostiqué');
      const activity   = String(inputs.activity   || '');
      const address    = String(inputs.address    || '');
      const postalCode = String(inputs.postal_code || inputs.postalCode || '');
      const surface    = num(inputs.surface?.value || inputs.surface);

      const { displayTitle, addressLine } = normalizeSiteDisplay(siteName, address, postalCode);

      const siteI    = num(bench.site_intensity?.value);
      const benchMed = num(bench.benchmark_median?.value);
      const annualEuro = num(composite.annual_euro?.value);
      const annualKwh  = num(composite.annual_kwh?.value);
      const totalCost  = num(calc.total_cost_euro_an?.value);

      const score       = computeScore(siteI, benchMed);
      const targetI     = Math.max(0, Math.round(siteI - (surface > 0 ? annualKwh / surface : 0)));
      const targetScore = computeScore(targetI, benchMed);
      const sCfg        = scoreConf(score);
      const tCfg        = scoreConf(targetScore);

      const budget     = buildBudget(actions, annualEuro);
      const projection = buildProjection({ totalCostEuroAn: totalCost, annualEuro, actions });

      // ── CO₂ impact ────────────────────────────────────────────────────────
      const elecKwhPr   = num(calc.elec_kwh_an?.value);
      const gasKwhPr    = num(calc.gas_kwh_an?.value);
      const totKnownPr  = elecKwhPr + gasKwhPr;
      const co2FactorPr = totKnownPr > 0
        ? (elecKwhPr / totKnownPr) * 0.079 + (gasKwhPr / totKnownPr) * 0.227
        : 0.12;
      const co2EvitePr  = Math.max(0, Math.round(annualKwh * co2FactorPr));
      const co2ArbPr    = Math.round(co2EvitePr / 22);
      const co2VoitPr   = Math.round((co2EvitePr / 2100) * 10) / 10;

      const locationMeta = [activity, surface > 0 ? fmtInt(surface, 'm²') : null].filter(Boolean).join(' · ');
      const heroSubLine  = [locationMeta, addressLine].filter(Boolean).join(' · ');

      /* ── KPI data ─────────────────────────────────────────────── */
      const kpis = [
        {
          label: 'Facture énergétique estimée',
          value: fmtEur(totalCost),
          sub:   'Charges énergie / an',
          accent: T.blue,
        },
        {
          label: 'Économies potentielles',
          value: fmtEur(annualEuro),
          sub:   `${fmtInt(annualKwh, 'kWh')} évités / an`,
          accent: '#15803D',
        },
        {
          label: 'Budget net indicatif',
          value: fmtEur(budget.capexNet),
          sub:   `dont aides déduites : ${fmtEur(budget.aides)}`,
          accent: '#6366F1',
        },
        {
          label: 'Retour sur investissement',
          value: budget.roiYears !== null
            ? `${String(budget.roiYears).replace('.', ',')} ans`
            : 'À confirmer',
          sub:   `${actions.length} action${actions.length > 1 ? 's' : ''} analysée${actions.length > 1 ? 's' : ''}`,
          accent: '#D97706',
        },
      ];

      /* ── Budget recap cells ──────────────────────────────────── */
      const budgetCells = [
        { label: 'Travaux bruts',    value: fmtEur(budget.capexBrut), bg: T.slate50,  bd: T.slate200, c: T.navy    },
        { label: 'Aides CEE / MPR', value: `– ${fmtEur(budget.aides)}`, bg: '#EFF6FF', bd: '#BFDBFE', c: T.blue   },
        { label: 'Reste à charge',  value: fmtEur(budget.capexNet),  bg: '#EEF2FF',  bd: '#C7D2FE', c: '#4338CA' },
        { label: 'Économies / an',  value: fmtEur(budget.savings),   bg: '#F0FDF4',  bd: '#86EFAC', c: '#15803D' },
      ];

      return (
        <div style={{ width: '100%', paddingBottom: 24 }}>

          {/* ══════════════════════════════════════════════════
              HERO — dark gradient, never split
          ═════════════════════════════════════════════════ */}
          <div className="pba" style={{
            background: `linear-gradient(135deg, ${T.navy} 0%, #1D4ED8 60%, #0F2236 100%)`,
            color: '#fff',
            borderRadius: 20,
            padding: '28px 30px',
            marginBottom: 18,
          }}>
            {/* Top label */}
            <div style={{
              fontSize: 9, fontWeight: 700, textTransform: 'uppercase',
              letterSpacing: '0.16em', opacity: 0.55, marginBottom: 6,
            }}>
              Pré-diagnostic énergétique tertiaire · DiagTertiaire
            </div>

            {/* Two-column layout: info left / score badge right */}
            <div style={{ display: 'flex', gap: 18, alignItems: 'stretch' }}>

              {/* Left: site info + intensity mini-cards */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  fontSize: 26, fontWeight: 900, lineHeight: 1.1,
                  letterSpacing: '-0.6px', marginBottom: 6,
                }}>{displayTitle}</div>

                <div style={{
                  fontSize: 12, color: 'rgba(255,255,255,0.70)',
                  lineHeight: 1.7, marginBottom: 18,
                }}>
                  {heroSubLine}{heroSubLine ? ' · ' : ''}Généré le {fmtDate(rp.generated_at)}
                </div>

                {/* Positioning summary */}
                <div style={{
                  background: 'rgba(255,255,255,0.09)',
                  border: '1px solid rgba(255,255,255,0.12)',
                  borderRadius: 12,
                  padding: '14px 18px',
                }}>
                  <div style={{
                    fontSize: 10, fontWeight: 700, textTransform: 'uppercase',
                    letterSpacing: '0.08em', color: 'rgba(255,255,255,0.5)', marginBottom: 12,
                  }}>Positionnement énergétique</div>
                  <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                    {[
                      { label: 'Conso actuelle',  value: fmtInt(siteI,    'kWh/m²/an') },
                      { label: 'Médiane secteur', value: fmtInt(benchMed, 'kWh/m²/an') },
                      { label: 'Cible estimée',   value: fmtInt(targetI,  'kWh/m²/an') },
                      { label: 'Économies/an',    value: fmtEur(annualEuro)             },
                    ].map(ic => (
                      <div key={ic.label} style={{
                        flex: '1 1 90px',
                        background: 'rgba(255,255,255,0.08)',
                        border: '1px solid rgba(255,255,255,0.1)',
                        borderRadius: 9, padding: '9px 12px',
                      }}>
                        <div style={{
                          fontSize: 8, fontWeight: 700, textTransform: 'uppercase',
                          color: 'rgba(255,255,255,0.45)', marginBottom: 5,
                        }}>{ic.label}</div>
                        <div style={{ fontSize: 14, fontWeight: 800, color: '#fff', lineHeight: 1 }}>
                          {ic.value}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Right: score badge */}
              <div style={{
                width: 136, flexShrink: 0,
                background: sCfg.bg,
                border: `2px solid ${sCfg.border}`,
                borderRadius: 16,
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center',
                padding: '18px 14px', textAlign: 'center',
              }}>
                <div style={{
                  fontSize: 10, fontWeight: 700, textTransform: 'uppercase',
                  letterSpacing: '0.08em', color: sCfg.color, marginBottom: 4,
                }}>Indice</div>
                <div style={{
                  fontSize: 72, fontWeight: 900, color: sCfg.color,
                  lineHeight: 1, margin: '2px 0 8px',
                }}>{score}</div>
                <div style={{
                  fontSize: 11, fontWeight: 700, color: '#0F172A',
                  marginBottom: 8,
                }}>{sCfg.label}</div>
                <div style={{
                  fontSize: 10, color: '#475569',
                  background: 'rgba(255,255,255,0.6)',
                  padding: '4px 10px', borderRadius: 20,
                  border: '1px solid rgba(0,0,0,0.06)',
                }}>
                  Après travaux&nbsp;
                  <strong style={{ color: tCfg.color }}>{targetScore}</strong>
                </div>
              </div>
            </div>

            {/* Energy labels: before → after */}
            <div style={{ marginTop: 14, display: 'flex', gap: 10, alignItems: 'stretch' }}>
              <EnergyLabelMini letter={score} intensity={siteI} title="Étiquette actuelle" />
              <div style={{
                width: 32, flexShrink: 0,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                  <path d="M3 9h12m-5-5 5 5-5 5"
                    stroke="rgba(255,255,255,0.65)" strokeWidth="2"
                    strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </div>
              <EnergyLabelMini letter={targetScore} intensity={targetI} title="Après travaux" />
            </div>

            {/* Potential highlight bar */}
            <div style={{
              marginTop: 18,
              background: 'rgba(255,255,255,0.10)',
              border: '1px solid rgba(255,255,255,0.14)',
              borderRadius: 10,
              padding: '11px 18px',
              display: 'flex', alignItems: 'center', gap: 10,
            }}>
              <div style={{
                width: 8, height: 8, borderRadius: '50%', background: '#6EE7B7', flexShrink: 0,
              }} />
              <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.85)' }}>
                Potentiel d'économies estimé&nbsp;
                <strong style={{ color: '#6EE7B7', fontSize: 14 }}>{fmtEur(annualEuro)}/an</strong>
                {annualKwh > 0 && (
                  <span style={{ opacity: 0.7 }}> · {fmtInt(annualKwh, 'kWh')} évités</span>
                )}
                {budget.roiYears !== null && (
                  <span style={{ opacity: 0.7 }}> · retour estimé {String(budget.roiYears).replace('.', ',')} ans</span>
                )}
              </div>
            </div>
          </div>

          {/* ══════════════════════════════════════════════════
              COVER IMAGE — building photo (if available)
          ═════════════════════════════════════════════════ */}
          <CoverImageBlock url={coverImageUrl} />

          {/* ══════════════════════════════════════════════════
              KPI GRID — 2×2, large numbers, never split
          ═════════════════════════════════════════════════ */}
          <div className="kpi-row" style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(2, 1fr)',
            gap: 14,
            marginBottom: 18,
          }}>
            {kpis.map(k => (
              <KpiCard key={k.label} label={k.label} value={k.value} sub={k.sub} accent={k.accent} />
            ))}
          </div>

          {/* ══════════════════════════════════════════════════
              POSITIONNEMENT SECTORIEL
          ═════════════════════════════════════════════════ */}
          {benchMed > 0 && (() => {
            const bLow  = num(bench.benchmark_low?.value);
            const bHigh = num(bench.benchmark_high?.value);
            if (!bLow || !bHigh) return null;
            const gMin  = Math.max(0, bLow * 0.7);
            const gMax  = Math.max(bHigh * 1.35, siteI, targetI);
            const gSpan = Math.max(1, gMax - gMin);
            const gp    = v => Math.min(100, Math.max(0, ((v - gMin) / gSpan) * 100));
            const refs  = [
              { pos: gp(bLow),    label: 'Bas secteur', sub: `${Math.round(bLow)}\u00a0kWh/m²`,    color: '#059669' },
              { pos: gp(benchMed),label: 'Médiane',     sub: `${Math.round(benchMed)}\u00a0kWh/m²`, color: '#D97706' },
              { pos: gp(bHigh),   label: 'Haut secteur',sub: `${Math.round(bHigh)}\u00a0kWh/m²`,   color: '#DC2626' },
            ];
            const gapText = siteI > benchMed
              ? `+${Math.round(siteI - benchMed)}\u00a0kWh/m²/an au-dessus de la médiane sectorielle.`
              : siteI < benchMed
                ? `${Math.round(benchMed - siteI)}\u00a0kWh/m²/an en dessous de la médiane sectorielle.`
                : 'Au niveau de la médiane sectorielle.';
            return (
              <Section title="Positionnement sectoriel" mb={18} avoidBreak={true}>
                <div style={{ fontSize: 12, fontWeight: 700, color: T.navy, marginBottom: 10 }}>{gapText}</div>
                <div style={{ position: 'relative', paddingTop: 44, paddingBottom: 2 }}>
                  {/* Reference labels above bar */}
                  <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 40 }}>
                    {refs.map((m, i) => (
                      <div key={i} style={{ position: 'absolute', left: `${m.pos}%`, transform: 'translateX(-50%)', textAlign: 'center' }}>
                        <div style={{ fontSize: 9, fontWeight: 700, color: m.color, whiteSpace: 'nowrap' }}>{m.label}</div>
                        <div style={{ fontSize: 8, color: T.slate400, whiteSpace: 'nowrap' }}>{m.sub}</div>
                        <div style={{ width: 1, height: 8, background: m.color, opacity: 0.5, margin: '2px auto 0' }} />
                      </div>
                    ))}
                  </div>
                  {/* Gradient bar */}
                  <div style={{
                    height: 18, borderRadius: 999, position: 'relative', overflow: 'visible',
                    background: 'linear-gradient(to right, #DCFCE7 0%, #FEF3C7 50%, #FEE2E2 100%)',
                    border: `1px solid ${T.slate200}`,
                  }}>
                    <div style={{ position: 'absolute', top: '50%', left: `${gp(siteI)}%`, transform: 'translate(-50%, -50%)' }}>
                      <div style={{ width: 16, height: 16, borderRadius: '50%', background: T.navy, border: '2px solid white', boxShadow: '0 1px 4px rgba(0,0,0,0.22)' }} />
                    </div>
                    <div style={{ position: 'absolute', top: '50%', left: `${gp(targetI)}%`, transform: 'translate(-50%, -50%)' }}>
                      <div style={{ width: 16, height: 16, borderRadius: '50%', background: '#059669', border: '2px solid white', boxShadow: '0 1px 4px rgba(0,0,0,0.22)' }} />
                    </div>
                  </div>
                  {/* Labels below markers */}
                  <div style={{ position: 'relative', minHeight: 42, marginTop: 2 }}>
                    <div style={{ position: 'absolute', left: `${gp(siteI)}%`, transform: 'translateX(-50%)', textAlign: 'center' }}>
                      <div style={{ width: 1, height: 5, background: T.navy, margin: '0 auto' }} />
                      <div style={{ fontSize: 9, fontWeight: 800, whiteSpace: 'nowrap', background: T.navy, color: '#fff', padding: '1px 5px', borderRadius: 3, marginTop: 1 }}>
                        {Math.round(siteI)}&nbsp;kWh/m²/an
                      </div>
                      <div style={{ fontSize: 8, color: T.slate400, marginTop: 2 }}>Niveau actuel</div>
                    </div>
                    <div style={{ position: 'absolute', left: `${gp(targetI)}%`, transform: 'translateX(-50%)', textAlign: 'center' }}>
                      <div style={{ width: 1, height: 5, background: '#059669', margin: '0 auto' }} />
                      <div style={{ fontSize: 9, fontWeight: 800, whiteSpace: 'nowrap', background: '#059669', color: '#fff', padding: '1px 5px', borderRadius: 3, marginTop: 1 }}>
                        {Math.round(targetI)}&nbsp;kWh/m²/an
                      </div>
                      <div style={{ fontSize: 8, color: '#059669', marginTop: 2, fontWeight: 700 }}>Cible estimée</div>
                    </div>
                  </div>
                </div>
                <div style={{ fontSize: 10, color: T.slate400, marginTop: 4 }}>
                  Source\u00a0: {String(bench.source_ref || 'Références sectorielles')}
                </div>
              </Section>
            );
          })()}

          {/* ══════════════════════════════════════════════════
              REPARTITION PAR USAGE
          ═════════════════════════════════════════════════ */}
          <UsageDonut usageBreakdown={rp.usage_breakdown} />

          {/* ══════════════════════════════════════════════════
              ACTIONS — may span multiple pages
          ═════════════════════════════════════════════════ */}
          <Section
            title="Actions prioritaires recommandées"
            sub="Classement par gain économique rapporté au coût. Estimations indicatives avant audit approfondi."
          >
            {actions.length === 0 ? (
              <p style={{ fontSize: 12, color: T.slate600 }}>
                Aucune action exploitable avec ce niveau de données.
              </p>
            ) : (
              actions.map((a, i) => <ActionRow key={i} action={a} index={i} />)
            )}

            {/* Budget recap */}
            <div className="budget-row" style={{
              display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)',
              gap: 10, marginTop: 18,
            }}>
              {budgetCells.map(cell => (
                <div key={cell.label} className="pba" style={{
                  borderRadius: 10, padding: '14px 16px',
                  background: cell.bg, border: `1px solid ${cell.bd}`,
                }}>
                  <div style={{
                    fontSize: 9, fontWeight: 700, textTransform: 'uppercase',
                    letterSpacing: '0.06em', color: cell.c, marginBottom: 6,
                  }}>{cell.label}</div>
                  <div style={{ fontSize: 18, fontWeight: 900, color: cell.c }}>
                    {cell.value}
                  </div>
                </div>
              ))}
            </div>
          </Section>

          {/* ══════════════════════════════════════════════════
              PROJECTION — chart must stay whole on one page.
              Section overflow:hidden clips the chart if CHART_W
              exceeds content area; CHART_W=636 fits within ~644px.
          ═════════════════════════════════════════════════ */}
          <Section
            title="Projection financière sur 10 ans"
            sub={
              `3 scénarios : Situation actuelle · Actions sans travaux · Actions légères + travaux · Inflation : ${projection.taux}%/an`
            }
          >
            <ProjectionChart data={projection.data} hasLight={projection.hasLight} />
            {/* Résumé chiffré A+1 / A+3 / A+10 */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10, marginTop: 14 }}>
              {[
                { label: 'Année 1 · sans action', st: projection.data[1]?.sans_travaux, av: projection.data[1]?.avec_travaux },
                { label: 'Année 3 · sans action', st: projection.data[3]?.sans_travaux, av: projection.data[3]?.avec_travaux },
                { label: 'Année 10 · sans action', st: projection.data[10]?.sans_travaux, av: projection.data[10]?.avec_travaux },
                { label: 'Gain cumulé 10 ans', special: fmtEur(Math.max(0, (projection.data[10]?.sans_travaux || 0) - (projection.data[10]?.avec_travaux || 0))), roi: projection.roiAnnee },
              ].map((c, i) => (
                <div key={i} className="pba" style={{
                  background: i === 3 ? '#F0FDF4' : T.slate50,
                  border: `1px solid ${i === 3 ? '#86EFAC' : T.slate200}`,
                  borderRadius: 10, padding: '10px 12px',
                }}>
                  <div style={{ fontSize: 8, fontWeight: 700, textTransform: 'uppercase', color: i === 3 ? '#15803D' : T.slate400, marginBottom: 6 }}>{c.label}</div>
                  {c.special ? (
                    <>
                      <div style={{ fontSize: 16, fontWeight: 900, color: '#15803D' }}>{c.special}</div>
                      {c.roi && <div style={{ fontSize: 10, color: T.blue, marginTop: 4, fontWeight: 700 }}>Rentabilité : {c.roi}</div>}
                    </>
                  ) : (
                    <>
                      <div style={{ fontSize: 13, fontWeight: 800, color: '#374151' }}>{fmtEur(c.st)}</div>
                      <div style={{ fontSize: 11, fontWeight: 700, color: '#059669', marginTop: 3 }}>Avec actions : {fmtEur(c.av)}</div>
                    </>
                  )}
                </div>
              ))}
            </div>
          </Section>

          {/* ══════════════════════════════════════════════════
              IMPACT ÉCOLOGIQUE
          ═════════════════════════════════════════════════ */}
          {co2EvitePr > 0 && (
            <Section title="Impact écologique estimé" sub="À gains constants, ce plan réduit aussi les émissions liées à l'exploitation du site." mb={18} avoidBreak={true}>
              <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 0.8fr', gap: 14 }}>
                {/* CO₂ principal */}
                <div style={{ background: '#F0FDF4', border: '2px solid #86EFAC', borderRadius: 14, padding: '18px 20px' }}>
                  <div style={{ fontSize: 9, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '0.1em', color: '#16A34A', marginBottom: 8 }}>
                    CO₂ évité estimé / an
                  </div>
                  <div style={{ fontSize: 28, fontWeight: 900, color: T.navy, lineHeight: 1 }}>
                    {co2EvitePr.toLocaleString('fr-FR')}&nbsp;kgCO₂e
                  </div>
                  <div style={{ fontSize: 11, color: T.slate600, marginTop: 8, lineHeight: 1.5 }}>
                    Réduction annuelle indicative associée aux actions prioritaires du plan.
                  </div>
                </div>
                {/* Équivalences */}
                <div style={{ display: 'grid', gap: 10 }}>
                  {/* Arbres */}
                  <div style={{ background: '#fff', border: `1px solid ${T.slate200}`, borderRadius: 12, padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 12 }}>
                    <div style={{ width: 40, height: 40, borderRadius: 10, background: '#F0FDF4', border: '1px solid #BBF7D0', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                      <svg width="22" height="22" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="14,2 20,11 17,11 21,19 16.5,19 16.5,26 11.5,26 11.5,19 7,19 11,11 8,11" fill="#16a34a"/>
                      </svg>
                    </div>
                    <div>
                      <div style={{ fontSize: 20, fontWeight: 900, color: T.navy, lineHeight: 1 }}>{co2ArbPr.toLocaleString('fr-FR')}</div>
                      <div style={{ fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: T.slate600, marginTop: 3 }}>Arbres équiv. / an</div>
                      <div style={{ fontSize: 9, color: T.slate400, marginTop: 2 }}>séquestration ADEME</div>
                    </div>
                  </div>
                  {/* Voitures */}
                  <div style={{ background: '#fff', border: `1px solid ${T.slate200}`, borderRadius: 12, padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 12 }}>
                    <div style={{ width: 40, height: 40, borderRadius: 10, background: T.slate50, border: `1px solid ${T.slate200}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                      <svg width="22" height="22" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="14" width="22" height="7" rx="2" fill="#334155"/>
                        <path d="M8 14L10 9h10l2 5H8z" fill="#475569"/>
                        <circle cx="9" cy="21" r="3.5" fill="#0f172a"/>
                        <circle cx="9" cy="21" r="1.4" fill="#94a3b8"/>
                        <circle cx="20" cy="21" r="3.5" fill="#0f172a"/>
                        <circle cx="20" cy="21" r="1.4" fill="#94a3b8"/>
                      </svg>
                    </div>
                    <div>
                      <div style={{ fontSize: 20, fontWeight: 900, color: T.navy, lineHeight: 1 }}>{co2VoitPr.toLocaleString('fr-FR', { minimumFractionDigits: 1 })}</div>
                      <div style={{ fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: T.slate600, marginTop: 3 }}>Voitures retirées / an</div>
                      <div style={{ fontSize: 9, color: T.slate400, marginTop: 2 }}>émissions moy. annuelles</div>
                    </div>
                  </div>
                </div>
              </div>
            </Section>
          )}

          {/* ══════════════════════════════════════════════════
              HYPOTHESES + LIMITES — 2-col, avoid split
          ═════════════════════════════════════════════════ */}
          <div className="cols-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 18 }}>

            {/* Hypothèses */}
            <div className="pba" style={{
              background: '#fff',
              border: `1px solid ${T.slate200}`,
              borderRadius: T.radiusLg,
              overflow: 'hidden',
            }}>
              <div style={{ height: 3, background: '#6366F1' }} />
              <div style={{ padding: '18px 20px 20px' }}>
                <div className="section-title" style={{
                  fontSize: 14, fontWeight: 800, color: T.navy, marginBottom: 4,
                }}>Hypothèses de calcul</div>
                <div style={{ fontSize: 11, color: T.slate600, marginBottom: 12, lineHeight: 1.5 }}>
                  À affiner lors d'un audit sur site.
                </div>
                <ul style={{ listStyle: 'none' }}>
                  {(assumes.length ? assumes : ['Hypothèses à confirmer sur site.']).map((item, i) => (
                    <li key={i} className="pba" style={{
                      display: 'flex', gap: 9, fontSize: 11, color: '#475569',
                      lineHeight: 1.55, marginBottom: 7,
                    }}>
                      <span style={{
                        width: 6, height: 6, borderRadius: '50%',
                        background: '#818CF8', flexShrink: 0, marginTop: 4,
                      }} />
                      <span>{item}</span>
                    </li>
                  ))}
                </ul>
              </div>
            </div>

            {/* Limites */}
            <div className="pba" style={{
              background: '#fff',
              border: `1px solid ${T.slate200}`,
              borderRadius: T.radiusLg,
              overflow: 'hidden',
            }}>
              <div style={{ height: 3, background: '#F97316' }} />
              <div style={{ padding: '18px 20px 20px' }}>
                <div className="section-title" style={{
                  fontSize: 14, fontWeight: 800, color: T.navy, marginBottom: 4,
                }}>Limites de lecture</div>
                <div style={{ fontSize: 11, color: T.slate600, marginBottom: 12, lineHeight: 1.5 }}>
                  Ce pré-diagnostic est indicatif et non opposable.
                </div>
                <ul style={{ listStyle: 'none' }}>
                  {(limits.length ? limits : ['Limites à confirmer avec un expert.']).map((item, i) => (
                    <li key={i} className="pba" style={{
                      display: 'flex', gap: 9, fontSize: 11, color: '#475569',
                      lineHeight: 1.55, marginBottom: 7,
                    }}>
                      <span style={{
                        width: 6, height: 6, borderRadius: '50%',
                        background: '#FB923C', flexShrink: 0, marginTop: 4,
                      }} />
                      <span>{item}</span>
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          </div>

          {/* ══════════════════════════════════════════════════
              FOOTER
          ═════════════════════════════════════════════════ */}
          <div style={{
            textAlign: 'center', fontSize: 10, color: T.slate400,
            paddingTop: 16, borderTop: `1px solid ${T.slate200}`,
          }}>
            <strong style={{ color: T.slate600 }}>DiagTertiaire</strong>
            {' '}· Pré-diagnostic énergétique indicatif · Lecture selon activité déclarée
            {rp.report_id ? ` · Rapport ${rp.report_id}` : ''} · {fmtDate(rp.generated_at)}<br />
            Pour un audit certifié, contactez un bureau d'études RGE agréé. Ce document est à usage informatif.
          </div>

        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════
       APP — FETCH + MULTI-STEP READY SIGNAL

       Protocol (all steps run only if chart data present):
         1. document.fonts.ready    → polices chargées (no FOUT)
         2. Poll .recharts-wrapper  → Recharts wrapper exists in DOM
         3. getBoundingClientRect   → wrapper has positive dimensions
                                      (w ≥ 100, h ≥ 100)
         4. Poll svg path[d]        → AreaChart data lines are drawn
         5. 80ms stabilization      → final repaint has settled
         6. Double rAF              → layout engine settled
         7. Hard ceiling 4 s        → fallback if something hangs
    ═══════════════════════════════════════════════════════ */
    const App = () => {
      const [reportPayload, setReportPayload] = useState(null);
      const [printAssets, setPrintAssets]     = useState({});
      const [error, setError]                 = useState(null);
      const readyFired = useRef(false);

      /* Fetch report payload from secure API */
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const id    = params.get('public_report_id') || '';
        const token = params.get('token') || '';

        if (!id || !token) {
          setError('Paramètres URL manquants (public_report_id, token)');
          return;
        }

        fetch(
          `/api/public-report-view?public_report_id=${encodeURIComponent(id)}&token=${encodeURIComponent(token)}`
        )
          .then(r => {
            if (!r.ok) return r.json().then(d => { throw new Error(d.error || `HTTP ${r.status}`); });
            return r.json();
          })
          .then(data => {
            const rp     = data.report_payload || {};
            const assets = data.print_assets   || {};
            console.log('[print] report_payload keys:', Object.keys(rp).join(', '));
            console.log('[print] print_assets keys:',   Object.keys(assets).join(', '));
            setReportPayload(rp);
            setPrintAssets(assets);
          })
          .catch(err  => setError(err.message || 'Erreur de chargement'));
      }, []);

      /* Multi-step ready signal */
      useEffect(() => {
        if (!reportPayload || readyFired.current) return;

        let cancelled = false;

        const doFire = () => {
          if (cancelled || readyFired.current) return;
          readyFired.current = true;
          window.__REPORT_READY__ = true;
          console.log('[print] __REPORT_READY__ fired');
        };

        const maxTimer = setTimeout(() => {
          console.warn('[print] hard ceiling reached — firing ready');
          doFire();
        }, 4000);

        const run = async () => {
          try {
            // Step 1: Web fonts
            if (document.fonts?.ready) await document.fonts.ready;
            if (cancelled || readyFired.current) return;

            // Step 2+3: Poll for .recharts-wrapper with positive dimensions
            // With fixed-width AreaChart, this should succeed on the first poll.
            let wrapperReady = false;
            for (let i = 0; i < 30 && !cancelled && !readyFired.current; i++) {
              const wrapper = document.querySelector('.recharts-wrapper');
              if (wrapper) {
                const rect = wrapper.getBoundingClientRect();
                if (rect.width >= 100 && rect.height >= 100) {
                  wrapperReady = true;
                  console.log('[print] recharts-wrapper ready:', Math.round(rect.width), '×', Math.round(rect.height));
                  break;
                }
              }
              await new Promise(r => setTimeout(r, 80));
            }
            if (!wrapperReady) {
              console.warn('[print] recharts-wrapper not visible — proceeding anyway');
            }
            if (cancelled || readyFired.current) return;

            // Step 4: Poll for drawn SVG path elements (data lines)
            let pathsFound = false;
            for (let i = 0; i < 15 && !cancelled && !readyFired.current; i++) {
              const paths = document.querySelectorAll('.recharts-wrapper svg path[d]');
              if (paths.length > 0) {
                pathsFound = true;
                console.log('[print] SVG paths found:', paths.length);
                break;
              }
              await new Promise(r => setTimeout(r, 80));
            }
            if (!pathsFound) {
              console.warn('[print] SVG paths not found — firing ready anyway');
            }
            if (cancelled || readyFired.current) return;

            // Step 4.5: Wait for [data-report-image] images to load and decode
            const reportImages = Array.from(document.querySelectorAll('[data-report-image]'));
            if (reportImages.length > 0) {
              console.log('[print] waiting for', reportImages.length, 'report image(s)...');
              try {
                await Promise.race([
                  Promise.all(reportImages.map(img => {
                    if (img.complete && img.naturalHeight > 0) {
                      return (img.decode ? img.decode().catch(() => {}) : Promise.resolve());
                    }
                    return new Promise(res => {
                      const done = () =>
                        (img.decode ? img.decode().catch(() => {}) : Promise.resolve()).then(res);
                      img.addEventListener('load',  done, { once: true });
                      img.addEventListener('error', res,  { once: true });
                      setTimeout(res, 3500);
                    });
                  })),
                  new Promise(res => setTimeout(res, 4000))
                ]);
              } catch (_) {}
              console.log('[print] report images: done');
            }
            if (cancelled || readyFired.current) return;

            // Step 5: Short stabilization wait
            await new Promise(r => setTimeout(r, 80));

            // Step 6: Double rAF — layout engine settled
            await new Promise(r => requestAnimationFrame(r));
            await new Promise(r => requestAnimationFrame(r));

            clearTimeout(maxTimer);
            doFire();
          } catch (e) {
            console.warn('[print] Ready signal error:', e?.message);
            clearTimeout(maxTimer);
            if (!cancelled) doFire();
          }
        };

        run();
        return () => { cancelled = true; clearTimeout(maxTimer); };
      }, [reportPayload]);

      /* Signal Puppeteer on fetch error — prevents indefinite hang */
      useEffect(() => {
        if (!error || readyFired.current) return;
        readyFired.current = true;
        window.__REPORT_ERROR__ = error;
        window.__REPORT_READY__ = true;
        console.error('[print] __REPORT_ERROR__:', error);
      }, [error]);

      if (error) {
        return (
          <div style={{ padding: 48, textAlign: 'center', fontFamily: 'Arial,sans-serif' }}>
            <div style={{ color: '#DC2626', fontSize: 18, fontWeight: 700, marginBottom: 10 }}>
              Erreur de chargement
            </div>
            <div style={{ color: '#64748B', fontSize: 14 }}>{error}</div>
          </div>
        );
      }

      if (!reportPayload) {
        return (
          <div style={{ padding: 48, textAlign: 'center', fontFamily: 'Arial,sans-serif', color: '#64748B' }}>
            Chargement du rapport…
          </div>
        );
      }

      return <ReportPrint reportPayload={reportPayload} printAssets={printAssets} />;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
