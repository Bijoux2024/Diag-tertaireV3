<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiagTertiaire — Rapport PDF</title>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <style>
    /* ═══════════════════════════════════════
       PAGE SETUP — A4 PRINT
       Puppeteer pdfOptions margins take precedence over @page margins.
       Reference: top 16mm / right 14mm / bottom 14mm / left 14mm
         → A4 usable width = 210mm – 14mm – 14mm = 182mm ≈ 688 CSS px
         → Section padding 22px × 2 → content area ≈ 644 CSS px
         → CHART_W = 636 fits safely within content area
    ═══════════════════════════════════════ */
    @page {
      size: A4 portrait;
      margin: 16mm 14mm 14mm 14mm;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      background: #fff;
      font-family: 'Helvetica Neue', Arial, Helvetica, sans-serif;
      font-size: 12px;
      line-height: 1.55;
      color: #0F172A;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      orphans: 3;
      widows: 3;
    }

    @media print {
      html, body { background: #fff; }
    }

    /* ═══════════════════════════════════════
       PAGINATION RULES
       Keep these here — never inline in JSX.
    ═══════════════════════════════════════ */

    /* Blocks that must never be split across pages */
    .pba {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* Section title must stick to the first content line below it */
    .section-title {
      break-after: avoid;
      page-break-after: avoid;
    }

    /*
      Recharts injects .recharts-wrapper itself.
      overflow: visible prevents any parent clip from hiding SVG content.
      break-inside: avoid keeps the chart on one page.
    */
    .recharts-wrapper {
      overflow: visible !important;
      break-inside: avoid !important;
      page-break-inside: avoid !important;
    }

    /* Rows & grids that must stay whole */
    .kpi-row   { break-inside: avoid; page-break-inside: avoid; }
    .budget-row{ break-inside: avoid; page-break-inside: avoid; }
    .cols-2    { break-inside: avoid; page-break-inside: avoid; }

    /* Orphan / widow control */
    p, li { orphans: 2; widows: 2; }

    /* Chart host: ensure no clip and sufficient space */
    .chart-host {
      width: 100%;
      overflow: visible;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;
    const RC = window.Recharts || {};
    const { AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, Legend } = RC;
    // NOTE: ResponsiveContainer is intentionally NOT used in the print page.
    // It depends on ResizeObserver which does not fire reliably in Puppeteer
    // print-media mode → charts render with width=0 → empty SVG paths.
    // Fixed dimensions guarantee a fully rendered chart on the first paint.
    const CHART_W = 636; // calibrated: 688px usable - 2×22px section padding = 644 → 636 safe
    const CHART_H = 280;

    /* ═══════════════════════════════════════════════════════
       DATA HELPERS
       @sync — keep in sync with ENGINE_PUBLIC in index.html
       whenever score thresholds, aides ratio or inflation
       rate change.
    ═══════════════════════════════════════════════════════ */

    const obj = v => (v && typeof v === 'object' && !Array.isArray(v)) ? v : {};
    const arr = v => Array.isArray(v) ? v : [];
    const num = (v, fb = 0) => { const n = Number(v); return isFinite(n) ? n : fb; };

    const fmtEur = v => `${Math.round(num(v, 0)).toLocaleString('fr-FR')} €`;
    const fmtInt = (v, u = '') => {
      const s = Math.round(num(v, 0)).toLocaleString('fr-FR');
      return u ? `${s}\u00a0${u}` : s;
    };
    const fmtDate = v => {
      const d = v ? new Date(v) : new Date();
      return isNaN(d.getTime()) ? '' : d.toLocaleDateString('fr-FR');
    };

    // @sync — score thresholds
    const SCORE_MAP = {
      A: { color: '#15803D', bg: '#DCFCE7', border: '#86EFAC', label: 'Très performant' },
      B: { color: '#16A34A', bg: '#F0FDF4', border: '#86EFAC', label: 'Performant' },
      C: { color: '#D97706', bg: '#FEF3C7', border: '#FDE68A', label: 'Dans la médiane' },
      D: { color: '#EA580C', bg: '#FFF7ED', border: '#FED7AA', label: 'Surconsommation' },
      E: { color: '#DC2626', bg: '#FEE2E2', border: '#FCA5A5', label: 'Très énergivore' },
    };

    const scoreConf = l => SCORE_MAP[String(l || 'C').toUpperCase()] || SCORE_MAP['C'];

    // @sync — thresholds: A<0.6 B<0.9 C<1.2 D<1.7 E≥1.7
    const computeScore = (intensity, median) => {
      const r = num(intensity) / Math.max(1, num(median, 1));
      return r < 0.6 ? 'A' : r < 0.9 ? 'B' : r < 1.2 ? 'C' : r < 1.7 ? 'D' : 'E';
    };

    // @sync — aides: 12% of gross capex (CEE / MPR indicatif)
    const buildBudget = (actions, annualEuro) => {
      const capexBrut = arr(actions).reduce((s, a) => s + num(a?.capex?.value), 0);
      const aides    = Math.round(capexBrut * 0.12);
      const capexNet = Math.max(0, Math.round(capexBrut - aides));
      const savings  = Math.max(0, Math.round(num(annualEuro)));
      const roi      = savings > 0 ? capexNet / savings : null;
      return {
        capexBrut: Math.round(capexBrut), aides, capexNet, savings,
        roiYears: roi !== null ? Math.round(roi * 10) / 10 : null
      };
    };

    // @sync — energy inflation: 4%/year
    const buildProjection = ({ totalCostEuroAn, annualEuro, actions }) => {
      const taux       = 0.04;
      const safeActs   = arr(actions);
      const capexBrut  = safeActs.reduce((s, a) => s + num(a?.capex?.value), 0);
      const aides      = Math.round(capexBrut * 0.12);
      const capexNet   = Math.max(0, Math.round(capexBrut - aides));
      const base       = num(totalCostEuroAn);
      const savings    = num(annualEuro);

      // Scénario 2 : actions rapides seulement (tier=light)
      const lightActs  = safeActs.filter(a => a?.tier === 'light' || (!a?.tier && num(a?.capex?.value) < 3000));
      const lightSav   = lightActs.reduce((s, a) => s + num(a?.gain_euro_an?.value), 0);
      const lightCapex = Math.max(0, Math.round(lightActs.reduce((s, a) => s + num(a?.capex?.value), 0) * 0.88));
      const hasLight   = lightActs.length > 0 && lightActs.length < safeActs.length;

      const data = [];
      for (let i = 0; i <= 10; i++) {
        const f = Math.pow(1 + taux, i);
        const row = {
          annee: `A+${i}`,
          sans_travaux: Math.round(base * f),
          avec_travaux: i === 0
            ? Math.round(base + capexNet)
            : Math.round(Math.max(0, base - savings) * f),
        };
        if (hasLight) {
          row.avec_actions_rapides = i === 0
            ? Math.round(base + lightCapex)
            : Math.round(Math.max(0, base - lightSav) * f);
        }
        data.push(row);
      }
      const roiIdx = data.findIndex((d, i) => i > 0 && d.avec_travaux <= d.sans_travaux);
      console.log('[print] projection points:', data.length,
        '| A+0:', JSON.stringify(data[0]),
        '| A+5:', JSON.stringify(data[5]));
      return { data, taux: taux * 100, roiAnnee: roiIdx > 0 ? roiIdx : null, hasLight };
    };

    const TIER_CONF = {
      quick_win:  { label: 'Action rapide', bg: '#F0FDF4', color: '#15803D', border: '#86EFAC' },
      equipment:  { label: 'Équipement',    bg: '#EFF6FF', color: '#1D4ED8', border: '#BFDBFE' },
      structural: { label: 'Structurel',    bg: '#FEF3C7', color: '#92400E', border: '#FDE68A' },
    };

    /* ═══════════════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════════════ */
    const T = {
      navy:     '#0A1928',
      blue:     '#1D4ED8',
      slate600: '#475569',
      slate400: '#94A3B8',
      slate200: '#E2E8F0',
      slate100: '#F1F5F9',
      slate50:  '#F8FAFC',
      radius:   14,
      radiusLg: 18,
    };

    /* ═══════════════════════════════════════════════════════
       SECTION WRAPPER
    ═══════════════════════════════════════════════════════ */
    const Section = ({ title, sub, children, mb = 18, avoidBreak = false }) => (
      <div
        className={avoidBreak ? 'pba' : ''}
        style={{
          background: '#fff',
          border: `1px solid ${T.slate200}`,
          borderRadius: T.radiusLg,
          marginBottom: mb,
          overflow: 'hidden',
        }}
      >
        {/* Coloured top bar */}
        <div style={{ height: 3, background: `linear-gradient(90deg, ${T.blue} 0%, #6366F1 100%)` }} />
        <div style={{ padding: '20px 24px 22px' }}>
          <div className="section-title" style={{
            fontSize: 16, fontWeight: 800, color: T.navy,
            letterSpacing: '-0.3px', marginBottom: sub ? 4 : 16,
          }}>{title}</div>
          {sub && (
            <div style={{ fontSize: 11, color: T.slate600, marginBottom: 16, lineHeight: 1.6 }}>
              {sub}
            </div>
          )}
          {children}
        </div>
      </div>
    );

    /* ═══════════════════════════════════════════════════════
       KPI CARD — 2×2 grid, generous size
    ═══════════════════════════════════════════════════════ */
    const KpiCard = ({ label, value, sub, accent = T.blue }) => (
      <div className="pba" style={{
        background: '#fff',
        border: `1px solid ${T.slate200}`,
        borderRadius: T.radius,
        padding: '20px 22px',
        borderTop: `3px solid ${accent}`,
      }}>
        <div style={{
          fontSize: 9, fontWeight: 800, textTransform: 'uppercase',
          letterSpacing: '0.1em', color: accent, marginBottom: 8,
        }}>{label}</div>
        <div style={{ fontSize: 28, fontWeight: 900, color: T.navy, lineHeight: 1, marginBottom: 5 }}>
          {value}
        </div>
        {sub && <div style={{ fontSize: 11, color: T.slate400, lineHeight: 1.4 }}>{sub}</div>}
      </div>
    );

    /* ═══════════════════════════════════════════════════════
       ACTION ROW
    ═══════════════════════════════════════════════════════ */
    const ActionRow = ({ action, index }) => {
      const tier = TIER_CONF[action.tier] || TIER_CONF.equipment;
      const roi  = action.roi_years?.value != null
        ? `${String(action.roi_years.value).replace('.', ',')} ans`
        : 'À confirmer';
      const gainEuro = num(action.gain_euro_an?.value);
      const capex    = num(action.capex?.value);

      return (
        <div className="pba" style={{
          display: 'flex', gap: 14,
          padding: '14px 16px',
          background: T.slate50,
          borderRadius: 12,
          border: `1px solid ${T.slate200}`,
          marginBottom: 10,
        }}>
          {/* Number badge */}
          <div style={{
            width: 30, height: 30, borderRadius: '50%',
            background: T.blue, color: '#fff',
            fontSize: 13, fontWeight: 800,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexShrink: 0, marginTop: 1,
          }}>{index + 1}</div>

          <div style={{ flex: 1 }}>
            {/* Name + tier badge */}
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 5, flexWrap: 'wrap' }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: T.navy }}>
                {action.name || 'Action recommandée'}
              </div>
              <span style={{
                padding: '2px 8px', borderRadius: 20,
                fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.04em',
                background: tier.bg, color: tier.color, border: `1px solid ${tier.border}`,
                flexShrink: 0,
              }}>{tier.label}</span>
            </div>
            {/* Metrics row */}
            <div style={{ display: 'flex', gap: 22, fontSize: 11, color: T.slate600, flexWrap: 'wrap' }}>
              <span>
                Gain annuel&nbsp;
                <strong style={{ color: '#15803D', fontWeight: 800 }}>{fmtEur(gainEuro)}/an</strong>
              </span>
              <span>
                Investissement&nbsp;
                <strong style={{ color: T.navy }}>{fmtEur(capex)}</strong>
              </span>
              <span>
                Retour&nbsp;
                <strong style={{ color: T.navy }}>{roi}</strong>
              </span>
            </div>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════
       PROJECTION CHART
       ─────────────────────────────────────────────────────
       WHY FIXED DIMENSIONS (no ResponsiveContainer):
         ResponsiveContainer uses ResizeObserver to measure its
         parent. In Puppeteer with mediaType='print', ResizeObserver
         callbacks do not fire — the chart receives width=0 and renders
         an empty SVG. Fixed dimensions bypass ResizeObserver entirely
         and guarantee a fully painted chart on the first render pass.

       CHART_W = 636 is calibrated for A4 with Puppeteer margins
       (top:16mm right:14mm bottom:14mm left:14mm):
         182mm usable × (96px/25.4mm) ≈ 688px
         − 2 × 24px section padding = 640px → 636 adds 4px safety margin.

       isAnimationActive={false} on both Areas:
         Recharts animations are async; without this Puppeteer may
         snapshot mid-animation yielding paths with no 'd' attribute.
    ═══════════════════════════════════════════════════════ */
    const ProjectionChart = ({ data, hasLight }) => {
      if (!AreaChart || !data || data.length === 0) {
        console.warn('[print] ProjectionChart: AreaChart unavailable or no data');
        return null;
      }
      const fmtTick = v => `${Math.round(v / 1000)}k€`;
      const { RC: _RC, Line, LineChart } = window.Recharts || {};
      return (
        <div className="chart-host pba">
          <AreaChart
            width={CHART_W}
            height={CHART_H}
            data={data}
            margin={{ top: 8, right: 16, left: 0, bottom: 4 }}
          >
            <defs>
              <linearGradient id="gSans" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%"  stopColor="#EA580C" stopOpacity={0.14} />
                <stop offset="95%" stopColor="#EA580C" stopOpacity={0} />
              </linearGradient>
              <linearGradient id="gAvec" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%"  stopColor={T.blue} stopOpacity={0.14} />
                <stop offset="95%" stopColor={T.blue} stopOpacity={0} />
              </linearGradient>
              <linearGradient id="gLight" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%"  stopColor="#F59E0B" stopOpacity={0.12} />
                <stop offset="95%" stopColor="#F59E0B" stopOpacity={0} />
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke={T.slate200} />
            <XAxis dataKey="annee" tick={{ fontSize: 10, fill: T.slate600 }} />
            <YAxis tickFormatter={fmtTick} tick={{ fontSize: 10, fill: T.slate600 }} width={48} />
            <Tooltip formatter={v => fmtEur(v)} />
            <Legend wrapperStyle={{ fontSize: 10, paddingTop: 8 }} />
            <Area type="monotone" dataKey="sans_travaux" name="Sans action"
                  stroke="#EA580C" strokeWidth={2.2} strokeDasharray="6 3"
                  fill="url(#gSans)" isAnimationActive={false} />
            {hasLight && (
              <Area type="monotone" dataKey="avec_actions_rapides" name="Actions rapides seulement"
                    stroke="#F59E0B" strokeWidth={1.8} strokeDasharray="3 2"
                    fill="url(#gLight)" isAnimationActive={false} />
            )}
            <Area type="monotone" dataKey="avec_travaux" name="Avec toutes les actions"
                  stroke={T.blue} strokeWidth={2.5} fill="url(#gAvec)"
                  isAnimationActive={false} />
          </AreaChart>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════
       MAIN REPORT RENDER
    ═══════════════════════════════════════════════════════ */
    const ReportPrint = ({ reportPayload: rp }) => {
      const inputs    = obj(rp.inputs_summary);
      const bench     = obj(rp.benchmark_result);
      const composite = obj(rp.composite_savings);
      const calc      = obj(rp.calculation_results);
      const conf      = obj(rp.confidence);
      const actions   = arr(rp.top_actions).slice(0, 6);
      const assumes   = arr(rp.assumptions).slice(0, 8);
      const limits    = arr(rp.limits).slice(0, 8);

      const siteName   = String(inputs.site_name  || 'Bâtiment diagnostiqué');
      const activity   = String(inputs.activity   || '');
      const address    = String(inputs.address    || '');
      const postalCode = String(inputs.postal_code || inputs.postalCode || '');
      const surface    = num(inputs.surface?.value || inputs.surface);

      const siteI    = num(bench.site_intensity?.value);
      const benchMed = num(bench.benchmark_median?.value);
      const annualEuro = num(composite.annual_euro?.value);
      const annualKwh  = num(composite.annual_kwh?.value);
      const totalCost  = num(calc.total_cost_euro_an?.value);

      const score       = computeScore(siteI, benchMed);
      const targetI     = Math.max(0, Math.round(siteI - (surface > 0 ? annualKwh / surface : 0)));
      const targetScore = computeScore(targetI, benchMed);
      const sCfg        = scoreConf(score);
      const tCfg        = scoreConf(targetScore);

      const budget     = buildBudget(actions, annualEuro);
      const projection = buildProjection({ totalCostEuroAn: totalCost, annualEuro, actions });

      const location = [activity, surface > 0 ? fmtInt(surface, 'm²') : null,
        address || null, postalCode || null].filter(Boolean).join(' · ');

      /* ── KPI data ─────────────────────────────────────────────── */
      const kpis = [
        {
          label: 'Facture énergétique estimée',
          value: fmtEur(totalCost),
          sub:   'Charges énergie / an',
          accent: T.blue,
        },
        {
          label: 'Économies potentielles',
          value: fmtEur(annualEuro),
          sub:   `${fmtInt(annualKwh, 'kWh')} évités / an`,
          accent: '#15803D',
        },
        {
          label: 'Budget net indicatif',
          value: fmtEur(budget.capexNet),
          sub:   `dont aides déduites : ${fmtEur(budget.aides)}`,
          accent: '#6366F1',
        },
        {
          label: 'Retour sur investissement',
          value: budget.roiYears !== null
            ? `${String(budget.roiYears).replace('.', ',')} ans`
            : 'À confirmer',
          sub:   `${actions.length} action${actions.length > 1 ? 's' : ''} analysée${actions.length > 1 ? 's' : ''}`,
          accent: '#D97706',
        },
      ];

      /* ── Budget recap cells ──────────────────────────────────── */
      const budgetCells = [
        { label: 'Travaux bruts',    value: fmtEur(budget.capexBrut), bg: T.slate50,  bd: T.slate200, c: T.navy    },
        { label: 'Aides CEE / MPR', value: `– ${fmtEur(budget.aides)}`, bg: '#EFF6FF', bd: '#BFDBFE', c: T.blue   },
        { label: 'Reste à charge',  value: fmtEur(budget.capexNet),  bg: '#EEF2FF',  bd: '#C7D2FE', c: '#4338CA' },
        { label: 'Économies / an',  value: fmtEur(budget.savings),   bg: '#F0FDF4',  bd: '#86EFAC', c: '#15803D' },
      ];

      return (
        <div style={{ width: '100%', paddingBottom: 24 }}>

          {/* ══════════════════════════════════════════════════
              HERO — dark gradient, never split
          ═════════════════════════════════════════════════ */}
          <div className="pba" style={{
            background: `linear-gradient(135deg, ${T.navy} 0%, #1D4ED8 60%, #0F2236 100%)`,
            color: '#fff',
            borderRadius: 20,
            padding: '28px 30px',
            marginBottom: 18,
          }}>
            {/* Top label */}
            <div style={{
              fontSize: 9, fontWeight: 700, textTransform: 'uppercase',
              letterSpacing: '0.16em', opacity: 0.55, marginBottom: 6,
            }}>
              Pré-diagnostic énergétique tertiaire · DiagTertiaire
            </div>

            {/* Two-column layout: info left / score badge right */}
            <div style={{ display: 'flex', gap: 18, alignItems: 'stretch' }}>

              {/* Left: site info + intensity mini-cards */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{
                  fontSize: 26, fontWeight: 900, lineHeight: 1.1,
                  letterSpacing: '-0.6px', marginBottom: 6,
                }}>{siteName}</div>

                <div style={{
                  fontSize: 12, color: 'rgba(255,255,255,0.70)',
                  lineHeight: 1.7, marginBottom: 18,
                }}>
                  {location}{location ? ' · ' : ''}Généré le {fmtDate(rp.generated_at)}
                </div>

                {/* Positioning summary */}
                <div style={{
                  background: 'rgba(255,255,255,0.09)',
                  border: '1px solid rgba(255,255,255,0.12)',
                  borderRadius: 12,
                  padding: '14px 18px',
                }}>
                  <div style={{
                    fontSize: 10, fontWeight: 700, textTransform: 'uppercase',
                    letterSpacing: '0.08em', color: 'rgba(255,255,255,0.5)', marginBottom: 12,
                  }}>Positionnement énergétique</div>
                  <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                    {[
                      { label: 'Conso actuelle',  value: fmtInt(siteI,    'kWh/m²/an') },
                      { label: 'Médiane secteur', value: fmtInt(benchMed, 'kWh/m²/an') },
                      { label: 'Cible estimée',   value: fmtInt(targetI,  'kWh/m²/an') },
                      { label: 'Précision',        value: conf.label || 'Moyenne'       },
                    ].map(ic => (
                      <div key={ic.label} style={{
                        flex: '1 1 90px',
                        background: 'rgba(255,255,255,0.08)',
                        border: '1px solid rgba(255,255,255,0.1)',
                        borderRadius: 9, padding: '9px 12px',
                      }}>
                        <div style={{
                          fontSize: 8, fontWeight: 700, textTransform: 'uppercase',
                          color: 'rgba(255,255,255,0.45)', marginBottom: 5,
                        }}>{ic.label}</div>
                        <div style={{ fontSize: 14, fontWeight: 800, color: '#fff', lineHeight: 1 }}>
                          {ic.value}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Right: score badge */}
              <div style={{
                width: 136, flexShrink: 0,
                background: sCfg.bg,
                border: `2px solid ${sCfg.border}`,
                borderRadius: 16,
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center',
                padding: '18px 14px', textAlign: 'center',
              }}>
                <div style={{
                  fontSize: 10, fontWeight: 700, textTransform: 'uppercase',
                  letterSpacing: '0.08em', color: sCfg.color, marginBottom: 4,
                }}>Indice</div>
                <div style={{
                  fontSize: 72, fontWeight: 900, color: sCfg.color,
                  lineHeight: 1, margin: '2px 0 8px',
                }}>{score}</div>
                <div style={{

                  background: 'rgba(255,255,255,0.6)',

                  <strong style={{ color: tCfg.color }}>{targetScore}</strong>

              </div>

            {/* Potential highlight bar */}
            <div style={{
              marginTop: 18,
              background: 'rgba(255,255,255,0.10)',
              border: '1px solid rgba(255,255,255,0.14)',
              borderRadius: 10,
              padding: '11px 18px',
              display: 'flex', alignItems: 'center', gap: 10,
            }}>
              <div style={{
                width: 8, height: 8, borderRadius: '50%', background: '#6EE7B7', flexShrink: 0,

              <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.85)' }}>
                Potentiel d'économies estimé&nbsp;
                <strong style={{ color: '#6EE7B7', fontSize: 14 }}>{fmtEur(annualEuro)}/an</strong>
                {annualKwh > 0 && (
                  <span style={{ opacity: 0.7 }}> · {fmtInt(annualKwh, 'kWh')} évités</span>

                {budget.roiYears !== null && (
                  <span style={{ opacity: 0.7 }}> · retour estimé {String(budget.roiYears).replace('.', ',')} ans</span>

          </div>

          {/* ══════════════════════════════════════════════════
              KPI GRID — 2×2, large numbers, never split
          ═════════════════════════════════════════════════ */}
          <div className="kpi-row" style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(2, 1fr)',
            gap: 14,
            marginBottom: 18,
          }}>
            {kpis.map(k => (
              <KpiCard key={k.label} label={k.label} value={k.value} sub={k.sub} accent={k.accent} />
            ))}
          </div>

          {/* ══════════════════════════════════════════════════
              ACTIONS — may span multiple pages
          ═════════════════════════════════════════════════ */}
          <Section
            title="Actions prioritaires recommandées"
            sub="Classement par gain économique rapporté au coût. Estimations indicatives avant audit approfondi."
          >
            {actions.length === 0 ? (
              <p style={{ fontSize: 12, color: T.slate600 }}>
                Aucune action exploitable avec ce niveau de données.
              </p>
            ) : (
              actions.map((a, i) => <ActionRow key={i} action={a} index={i} />)
            )}

            {/* Budget recap */}
            <div className="budget-row" style={{
              display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)',
              gap: 10, marginTop: 18,
            }}>
              {budgetCells.map(cell => (
                <div key={cell.label} className="pba" style={{
                  borderRadius: 10, padding: '14px 16px',
                  background: cell.bg, border: `1px solid ${cell.bd}`,
                }}>
                  <div style={{
                    fontSize: 9, fontWeight: 700, textTransform: 'uppercase',
                    letterSpacing: '0.06em', color: cell.c, marginBottom: 6,
                  }}>{cell.label}</div>
                  <div style={{ fontSize: 18, fontWeight: 900, color: cell.c }}>
                    {cell.value}
                  </div>
                </div>
              ))}
            </div>
          </Section>

          {/* ══════════════════════════════════════════════════
              PROJECTION — chart must stay whole on one page.
              Section overflow:hidden clips the chart if CHART_W
              exceeds content area; CHART_W=636 fits within ~644px.
          ═════════════════════════════════════════════════ */}
          <Section
            title="Projection financière — 10 ans"
            sub={
              `3 scénarios comparés · Inflation énergie estimée : ${projection.taux}%/an · ` +
              (projection.roiAnnee
                ? `Rentabilité estimée à A+${projection.roiAnnee}`
                : 'Rentabilité non atteinte sur la période simulée')
            }
          >
            <ProjectionChart data={projection.data} hasLight={projection.hasLight} />
            {/* Résumé chiffré A+1 / A+3 / A+10 */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10, marginTop: 14 }}>
              {[
                { label: 'A+1 — coût annuel', st: projection.data[1]?.sans_travaux, av: projection.data[1]?.avec_travaux },
                { label: 'A+3 — coût annuel', st: projection.data[3]?.sans_travaux, av: projection.data[3]?.avec_travaux },
                { label: 'A+10 — coût annuel', st: projection.data[10]?.sans_travaux, av: projection.data[10]?.avec_travaux },
                { label: 'Point de rentabilité', special: projection.roiAnnee ? `Année ${projection.roiAnnee}` : 'À confirmer' },
              ].map((c, i) => (
                <div key={i} className="pba" style={{
                  background: i === 3 ? '#EFF6FF' : T.slate50,
                  border: `1px solid ${i === 3 ? '#BFDBFE' : T.slate200}`,
                  borderRadius: 10, padding: '10px 12px',
                }}>
                  <div style={{ fontSize: 8, fontWeight: 700, textTransform: 'uppercase', color: T.slate400, marginBottom: 6 }}>{c.label}</div>
                  {c.special ? (
                    <div style={{ fontSize: 16, fontWeight: 900, color: T.blue }}>{c.special}</div>
                  ) : (
                    <>
                      <div style={{ fontSize: 13, fontWeight: 800, color: '#374151' }}>{fmtEur(c.st)}</div>
                      <div style={{ fontSize: 11, fontWeight: 700, color: '#059669', marginTop: 3 }}>→ {fmtEur(c.av)} avec actions</div>
                    </>
                  )}
                </div>
              ))}
            </div>
          </Section>

          {/* ══════════════════════════════════════════════════
              HYPOTHESES + LIMITES — 2-col, avoid split
          ═════════════════════════════════════════════════ */}
          <div className="cols-2" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 18 }}>

            {/* Hypothèses */}
            <div className="pba" style={{
              background: '#fff',
              border: `1px solid ${T.slate200}`,
              borderRadius: T.radiusLg,
              overflow: 'hidden',
            }}>
              <div style={{ height: 3, background: '#6366F1' }} />
              <div style={{ padding: '18px 20px 20px' }}>
                <div className="section-title" style={{
                  fontSize: 14, fontWeight: 800, color: T.navy, marginBottom: 4,
                }}>Hypothèses de calcul</div>
                <div style={{ fontSize: 11, color: T.slate600, marginBottom: 12, lineHeight: 1.5 }}>
                  À affiner lors d'un audit sur site.
                </div>
                <ul style={{ listStyle: 'none' }}>
                  {(assumes.length ? assumes : ['Hypothèses à confirmer sur site.']).map((item, i) => (
                    <li key={i} className="pba" style={{
                      display: 'flex', gap: 9, fontSize: 11, color: '#475569',
                      lineHeight: 1.55, marginBottom: 7,
                    }}>
                      <span style={{
                        width: 6, height: 6, borderRadius: '50%',
                        background: '#818CF8', flexShrink: 0, marginTop: 4,
                      }} />
                      <span>{item}</span>
                    </li>
                  ))}
                </ul>
              </div>
            </div>

            {/* Limites */}
            <div className="pba" style={{
              background: '#fff',
              border: `1px solid ${T.slate200}`,
              borderRadius: T.radiusLg,
              overflow: 'hidden',
            }}>
              <div style={{ height: 3, background: '#F97316' }} />
              <div style={{ padding: '18px 20px 20px' }}>
                <div className="section-title" style={{
                  fontSize: 14, fontWeight: 800, color: T.navy, marginBottom: 4,
                }}>Limites de lecture</div>
                <div style={{ fontSize: 11, color: T.slate600, marginBottom: 12, lineHeight: 1.5 }}>
                  Ce pré-diagnostic est indicatif et non opposable.
                </div>
                <ul style={{ listStyle: 'none' }}>
                  {(limits.length ? limits : ['Limites à confirmer avec un expert.']).map((item, i) => (
                    <li key={i} className="pba" style={{
                      display: 'flex', gap: 9, fontSize: 11, color: '#475569',
                      lineHeight: 1.55, marginBottom: 7,
                    }}>
                      <span style={{
                        width: 6, height: 6, borderRadius: '50%',
                        background: '#FB923C', flexShrink: 0, marginTop: 4,
                      }} />
                      <span>{item}</span>
                    </li>
                  ))}
                </ul>
              </div>
            </div>
          </div>

          {/* ══════════════════════════════════════════════════
              FOOTER
          ═════════════════════════════════════════════════ */}
          <div style={{
            textAlign: 'center', fontSize: 10, color: T.slate400,
            paddingTop: 16, borderTop: `1px solid ${T.slate200}`,
          }}>
            <strong style={{ color: T.slate600 }}>DiagTertiaire</strong>
            {' '}— Pré-diagnostic énergétique indicatif, non opposable
            {rp.report_id ? ` · Rapport ${rp.report_id}` : ''} · {fmtDate(rp.generated_at)}<br />
            Pour un audit certifié, contactez un bureau d'études RGE agréé. Ce document est à usage informatif.
          </div>

        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════
       APP — FETCH + MULTI-STEP READY SIGNAL

       Protocol (all steps run only if chart data present):
         1. document.fonts.ready    → polices chargées (no FOUT)
         2. Poll .recharts-wrapper  → Recharts wrapper exists in DOM
         3. getBoundingClientRect   → wrapper has positive dimensions
                                      (w ≥ 100, h ≥ 100)
         4. Poll svg path[d]        → AreaChart data lines are drawn
         5. 80ms stabilization      → final repaint has settled
         6. Double rAF              → layout engine settled
         7. Hard ceiling 4 s        → fallback if something hangs
    ═══════════════════════════════════════════════════════ */
    const App = () => {
      const [reportPayload, setReportPayload] = useState(null);
      const [error, setError]                 = useState(null);
      const readyFired = useRef(false);

      /* Fetch report payload from secure API */
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const id    = params.get('public_report_id') || '';
        const token = params.get('token') || '';

        if (!id || !token) {
          setError('Paramètres URL manquants (public_report_id, token)');
          return;
        }

        fetch(
          `/api/public-report-view?public_report_id=${encodeURIComponent(id)}&token=${encodeURIComponent(token)}`
        )
          .then(r => {
            if (!r.ok) return r.json().then(d => { throw new Error(d.error || `HTTP ${r.status}`); });
            return r.json();
          })
          .then(data => {
            const rp = data.report_payload || {};
            console.log('[print] report_payload keys:', Object.keys(rp).join(', '));
            setReportPayload(rp);
          })
          .catch(err  => setError(err.message || 'Erreur de chargement'));
      }, []);

      /* Multi-step ready signal */
      useEffect(() => {
        if (!reportPayload || readyFired.current) return;

        let cancelled = false;

        const doFire = () => {
          if (cancelled || readyFired.current) return;
          readyFired.current = true;
          window.__REPORT_READY__ = true;
          console.log('[print] __REPORT_READY__ fired');
        };

        const maxTimer = setTimeout(() => {
          console.warn('[print] hard ceiling reached — firing ready');
          doFire();
        }, 4000);

        const run = async () => {
          try {
            // Step 1: Web fonts
            if (document.fonts?.ready) await document.fonts.ready;
            if (cancelled || readyFired.current) return;

            // Step 2+3: Poll for .recharts-wrapper with positive dimensions
            // With fixed-width AreaChart, this should succeed on the first poll.
            let wrapperReady = false;
            for (let i = 0; i < 30 && !cancelled && !readyFired.current; i++) {
              const wrapper = document.querySelector('.recharts-wrapper');
              if (wrapper) {
                const rect = wrapper.getBoundingClientRect();
                if (rect.width >= 100 && rect.height >= 100) {
                  wrapperReady = true;
                  console.log('[print] recharts-wrapper ready:', Math.round(rect.width), '×', Math.round(rect.height));
                  break;
                }
              }
              await new Promise(r => setTimeout(r, 80));
            }
            if (!wrapperReady) {
              console.warn('[print] recharts-wrapper not visible — proceeding anyway');
            }
            if (cancelled || readyFired.current) return;

            // Step 4: Poll for drawn SVG path elements (data lines)
            let pathsFound = false;
            for (let i = 0; i < 15 && !cancelled && !readyFired.current; i++) {
              const paths = document.querySelectorAll('.recharts-wrapper svg path[d]');
              if (paths.length > 0) {
                pathsFound = true;
                console.log('[print] SVG paths found:', paths.length);
                break;
              }
              await new Promise(r => setTimeout(r, 80));
            }
            if (!pathsFound) {
              console.warn('[print] SVG paths not found — firing ready anyway');
            }
            if (cancelled || readyFired.current) return;

            // Step 5: Short stabilization wait
            await new Promise(r => setTimeout(r, 80));

            // Step 6: Double rAF — layout engine settled
            await new Promise(r => requestAnimationFrame(r));
            await new Promise(r => requestAnimationFrame(r));

            clearTimeout(maxTimer);
            doFire();
          } catch (e) {
            console.warn('[print] Ready signal error:', e?.message);
            clearTimeout(maxTimer);
            if (!cancelled) doFire();
          }
        };

        run();
        return () => { cancelled = true; clearTimeout(maxTimer); };
      }, [reportPayload]);

      /* Signal Puppeteer on fetch error — prevents indefinite hang */
      useEffect(() => {
        if (!error || readyFired.current) return;
        readyFired.current = true;
        window.__REPORT_ERROR__ = error;
        window.__REPORT_READY__ = true;
        console.error('[print] __REPORT_ERROR__:', error);
      }, [error]);

      if (error) {
        return (
          <div style={{ padding: 48, textAlign: 'center', fontFamily: 'Arial,sans-serif' }}>
            <div style={{ color: '#DC2626', fontSize: 18, fontWeight: 700, marginBottom: 10 }}>
              Erreur de chargement
            </div>
            <div style={{ color: '#64748B', fontSize: 14 }}>{error}</div>
          </div>
        );
      }

      if (!reportPayload) {
        return (
          <div style={{ padding: 48, textAlign: 'center', fontFamily: 'Arial,sans-serif', color: '#64748B' }}>
            Chargement du rapport…
          </div>
        );
      }

      return <ReportPrint reportPayload={reportPayload} />;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
