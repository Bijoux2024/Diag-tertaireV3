<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiagTertiaire - Rapport PDF</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#2563EB">

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    if (typeof PropTypes === 'undefined') window.PropTypes = { func: () => {}, bool: () => {}, node: () => {}, string: () => {}, number: () => {}, object: () => {}, array: () => {}, any: () => {}, arrayOf: () => () => {}, objectOf: () => () => {}, oneOf: () => () => {}, oneOfType: () => () => {}, shape: () => () => {}, exact: () => () => {}, instanceOf: () => () => {}, element: () => {}, elementType: () => {}, checkPropTypes: () => {} };
    if (typeof React !== 'undefined' && !React.PropTypes) React.PropTypes = window.PropTypes;
  </script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <style>
    /* ═══════════════════════════════════════
       PAGE SETUP — A4 PRINT
       Puppeteer pdfOptions margins take precedence over @page margins.
       Reference: top 16mm / right 14mm / bottom 14mm / left 14mm
         → A4 usable width = 210mm – 14mm – 14mm = 182mm ≈ 688 CSS px
         → Section padding 22px × 2 → content area ≈ 644 CSS px
         → CHART_W = 636 fits safely within content area
    ═══════════════════════════════════════ */
    @page {
      size: A4 portrait;
      margin: 16mm 14mm 14mm 14mm;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      background: #fff;
      font-family: 'Helvetica Neue', Arial, Helvetica, sans-serif;
      font-size: 11.5px;
      line-height: 1.5;
      color: #0F172A;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      orphans: 3;
      widows: 3;
    }

    @media print {
      html, body { background: #fff; }
    }

    /* ═══════════════════════════════════════
       PAGINATION RULES
       Keep these here — never inline in JSX.
    ═══════════════════════════════════════ */

    /* Blocks that must never be split across pages */
    .pba {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* Section title must stick to the first content line below it */
    .section-title {
      break-after: avoid;
      page-break-after: avoid;
    }

    /*
      Recharts injects .recharts-wrapper itself.
      overflow: visible prevents any parent clip from hiding SVG content.
      break-inside: avoid keeps the chart on one page.
    */
    .recharts-wrapper {
      overflow: visible !important;
      break-inside: avoid !important;
      page-break-inside: avoid !important;
    }

    /* Keep only the section opening together; let the rest flow naturally */
    .kpi-row   { break-inside: avoid; page-break-inside: avoid; }
    .budget-row,
    .cols-2,
    .section-group,
    .section-summary,
    .section-head,
    .section-first-block,
    .section-intro {
      break-inside: auto;
      page-break-inside: auto;
    }
    .section-start {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* Orphan / widow control */
    p, li { orphans: 2; widows: 2; }

    /* Chart host: ensure no clip and sufficient space */
    .chart-host {
      width: 100%;
      overflow: visible;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;
    // NOTE: ResponsiveContainer is intentionally NOT used in the print page.
    // It depends on ResizeObserver which does not fire reliably in Puppeteer
    // print-media mode → charts render with width=0 → empty SVG paths.
    // Fixed dimensions guarantee a fully rendered chart on the first paint.
    const CHART_W = 636; // calibrated: 688px usable - 2×22px section padding = 644 → 636 safe
    const CHART_H = 280;

    /* ═══════════════════════════════════════════════════════
       DATA HELPERS
       @sync — keep in sync with ENGINE_PUBLIC in index.html
       whenever score thresholds, aides ratio or inflation
       rate change.
    ═══════════════════════════════════════════════════════ */

    const obj = v => (v && typeof v === 'object' && !Array.isArray(v)) ? v : {};
    const arr = v => Array.isArray(v) ? v : [];
    const num = (v, fb = 0) => { const n = Number(v); return isFinite(n) ? n : fb; };
    const bool = (v) => v === true || ['true', '1', 'yes'].includes(String(v ?? '').trim().toLowerCase());

    const fmtEur = v => `${Math.round(num(v, 0)).toLocaleString('fr-FR')} €`;
    const fmtInt = (v, u = '') => {
      const s = Math.round(num(v, 0)).toLocaleString('fr-FR');
      return u ? `${s}\u00a0${u}` : s;
    };
    const fmtDate = v => {
      const d = v ? new Date(v) : new Date();
      return isNaN(d.getTime()) ? '' : d.toLocaleDateString('fr-FR');
    };

    // @sync — score thresholds
    const SCORE_MAP = {
      A: { color: '#15803D', bg: '#DCFCE7', border: '#86EFAC', label: 'Très performant' },
      B: { color: '#16A34A', bg: '#F0FDF4', border: '#86EFAC', label: 'Performant' },
      C: { color: '#D97706', bg: '#FEF3C7', border: '#FDE68A', label: 'Dans la médiane' },
      D: { color: '#EA580C', bg: '#FFF7ED', border: '#FED7AA', label: 'Surconsommation' },
      E: { color: '#DC2626', bg: '#FEE2E2', border: '#FCA5A5', label: 'Très énergivore' },
    };

    const scoreConf = l => SCORE_MAP[String(l || 'C').toUpperCase()] || SCORE_MAP['C'];
    const SCORE_ORDER = ['A', 'B', 'C', 'D', 'E'];

    // Normalise site name vs address — prevents duplicate display in hero
    const normalizeSiteDisplay = (rawSiteName, address, postalCode) => {
      const sn   = String(rawSiteName || '').trim();
      const addr = String(address     || '').trim();
      const cp   = String(postalCode  || '').trim();
      const norm = s => s.toLowerCase().replace(/[\s,]+/g, ' ').trim();
      const isFragment = sn.length > 0 &&
        (norm(addr).length > 0 && (norm(addr).startsWith(norm(sn)) || norm(sn) === norm(addr)));
      const addrHasCp = cp && addr.includes(cp);
      const fullAddr  = addr
        ? (addrHasCp || !cp ? addr : addr + ', ' + cp)
        : (cp || '');
      if (!sn || isFragment) {
        return { displayTitle: fullAddr || 'Bâtiment diagnostiqué', addressLine: null };
      }
      return { displayTitle: sn, addressLine: fullAddr || null };
    };

    // @sync — thresholds: A<0.6 B<0.9 C<1.2 D<1.7 E≥1.7
    const computeScore = (intensity, median) => {
      const r = num(intensity) / Math.max(1, num(median, 1));
      return r < 0.6 ? 'A' : r < 0.9 ? 'B' : r < 1.2 ? 'C' : r < 1.7 ? 'D' : 'E';
    };

    // @sync — use per-action aid_amount.value when available (matches web newDiagnosticBuildProgramBudget)
    // Fallback: TVA 5.5% formula (≈12.08%) + optional CEE plancher
    const estimateAides = (actions) =>
      Math.round(arr(actions).reduce((s, a) => {
        const aidVal = a?.aid_amount?.value;
        if (aidVal != null && num(aidVal) >= 0) return s + num(aidVal);
        const capVal = num(a?.capex?.value);
        let v = capVal * (0.20 - 0.055) / 1.20; // TVA 5.5%
        if (arr(a?.aid_tags).includes('CEE')) v += capVal * 0.015;
        return s + v;
      }, 0));

    const buildBudget = (actions, annualEuro) => {
      const safeActs = arr(actions);
      const capexBrut = safeActs.reduce((s, a) => s + num(a?.capex?.value), 0);
      const aides    = estimateAides(safeActs);
      const capexNet = Math.max(0, Math.round(capexBrut - aides));
      const savings  = Math.max(0, Math.round(num(annualEuro)));
      const roi      = savings > 0 ? capexNet / savings : null;
      return {
        capexBrut: Math.round(capexBrut), aides, capexNet, savings,
        roiYears: roi !== null ? Math.round(roi * 10) / 10 : null
      };
    };

    // @sync — inflation rates from index.html INFLATION_ENERGIE (élec 3.5%, gaz 4.5%)
    // @sync — energy prices from NEW_DIAGNOSTIC_ENERGY_PRICES (élec 0.1960, gaz 0.108)
    const INFLATION_ELEC  = 0.035;
    const INFLATION_GAZ   = 0.045;
    const ELEC_PRICE_KWH  = 0.1960;
    const GAS_PRICE_KWH   = 0.108;

    // @sync — cumulative projection matching newDiagnosticBuildProjectionData in index.html
    // Y-axis = total € spent since year 0 (including initial investment), same as web chart
    const buildProjection = ({ totalCostEuroAn, annualEuro, actions, elecKwh = 0, gasKwh = 0 }) => {
      const safeActs = arr(actions);

      // Per-action aids (use aid_amount.value from payload — same as web projection)
      const aidesTotal = Math.round(safeActs.reduce((s, a) => {
        const v = a?.aid_amount?.value;
        return s + (v != null && num(v) >= 0 ? num(v) : 0);
      }, 0));
      const capexBrut = safeActs.reduce((s, a) => s + num(a?.capex?.value), 0);
      const capexNet  = Math.max(0, Math.round(capexBrut - aidesTotal));

      // Weighted inflation by elec/gas mix (matches index.html logic)
      const elecEur   = num(elecKwh) * ELEC_PRICE_KWH;
      const gazEur    = num(gasKwh)  * GAS_PRICE_KWH;
      const totalBase = Math.max(elecEur + gazEur, 1);
      const partElec  = elecEur / totalBase;
      const partGaz   = gazEur  / totalBase;
      const taux      = partElec * INFLATION_ELEC + partGaz * INFLATION_GAZ
                        + Math.max(0, 1 - partElec - partGaz) * INFLATION_ELEC;
      const tauxPct   = +(taux * 100).toFixed(1);

      // Light scenario (tier=light or untiered small capex)
      const lightActs     = safeActs.filter(a => a?.tier === 'light' || (!a?.tier && num(a?.capex?.value) < 3000));
      const lightSav      = lightActs.reduce((s, a) => s + num(a?.gain_euro_an?.value), 0);
      const lightAides    = Math.round(lightActs.reduce((s, a) => {
        const v = a?.aid_amount?.value;
        return s + (v != null && num(v) >= 0 ? num(v) : 0);
      }, 0));
      const lightCapexNet = Math.max(0, Math.round(lightActs.reduce((s, a) => s + num(a?.capex?.value), 0) - lightAides));
      const hasLight      = lightActs.length > 0 && lightActs.length < safeActs.length;

      const base    = num(totalCostEuroAn);
      const savings = num(annualEuro);

      // Cumulative data — same structure as index.html (data[0]='Auj.', data[1]='A+1', …, data[10]='A+10')
      const data = [{
        annee: 'Auj.',
        sans_travaux: 0,
        avec_travaux: Math.round(capexNet),
        avec_actions_rapides: hasLight ? Math.round(lightCapexNet) : undefined,
      }];
      let cumSans = 0, cumAvec = capexNet, cumLight = lightCapexNet;
      let roiAnnee = null;
      for (let an = 1; an <= 10; an++) {
        const f   = Math.pow(1 + taux, an);
        cumSans  += base * f;
        cumAvec  += Math.max(0, base - savings) * f;
        cumLight += Math.max(0, base - lightSav) * f;
        const ecoNettes = Math.round(cumSans - cumAvec);
        if (!roiAnnee && ecoNettes > 0) roiAnnee = `A+${an}`;
        data.push({
          annee: `A+${an}`,
          sans_travaux: Math.round(cumSans),
          avec_travaux: Math.round(cumAvec),
          avec_actions_rapides: hasLight ? Math.round(cumLight) : undefined,
        });
      }

      console.log('[print] projection cumul pts:', data.length,
        '| A+1:', JSON.stringify(data[1]),
        '| A+10:', JSON.stringify(data[10]));
      return { data, taux: tauxPct, roiAnnee, hasLight, aidesTotal, capexNet, capexBrut: Math.round(capexBrut) };
    };

    // @sync — decision cards matching newDiagnosticBuildDecisionReadout in index.html
    const buildDecisionReadout = (rp) => {
      const benchmark  = obj(rp.benchmark_result);
      const composite  = obj(rp.composite_savings);
      const confidence = obj(rp.confidence);
      const totalPct   = num(composite.total_pct?.value);
      const position   = String(benchmark.position || 'in_range');

      let diagnostic = 'Le site est globalement dans la référence du secteur, avec des gains encore accessibles.';
      if (position === 'far_above_range')
        diagnostic = 'Le site est nettement au-dessus des références du secteur et doit être repriorisé.';
      else if (position === 'above_range')
        diagnostic = 'Le site se situe au-dessus de la référence sectorielle, sans être hors contrôle.';
      else if (position === 'below_range')
        diagnostic = 'Le site est bien positionné ; la suite repose surtout sur une optimisation ciblée.';

      let risk = 'Le risque principal est de laisser des gains rapides non captés faute d\'ordre d\'action.';
      if (position === 'far_above_range' || position === 'above_range')
        risk = 'Sans plan gradué, la hausse des charges peut repousser les arbitrages utiles.';
      else if (position === 'below_range')
        risk = 'Le risque est surtout de perdre ce niveau de performance sans pilotage continu.';
      if (confidence.level === 'low')
        risk = 'Le risque immédiat est de décider sur des données encore trop approximatives.';

      let opportunity = `Un plan progressif peut capter environ ${Math.round(totalPct)}% d'économies estimées, sans engager d'emblée des travaux lourds.`;
      if (totalPct >= 30)
        opportunity = `Le potentiel est élevé (~${Math.round(totalPct)}%) ; un échange expert permet surtout de confirmer le bon ordre d'action.`;
      else if (totalPct <= 15)
        opportunity = 'Le potentiel est ciblé ; la valeur vient surtout d\'un tri fin des actions sans regret.';

      return { diagnostic, risk, opportunity };
    };

    const TIER_CONF = {
      light:      { label: 'Action rapide',  bg: '#F0FDF4', color: '#15803D', border: '#86EFAC' },
      heavy:      { label: 'Investissement', bg: '#FEF3C7', color: '#92400E', border: '#FDE68A' },
      quick_win:  { label: 'Action rapide',  bg: '#F0FDF4', color: '#15803D', border: '#86EFAC' },
      equipment:  { label: 'Équipement',     bg: '#EFF6FF', color: '#1D4ED8', border: '#BFDBFE' },
      structural: { label: 'Structurel',     bg: '#FEF3C7', color: '#92400E', border: '#FDE68A' },
    };

    /* ═══════════════════════════════════════════════════════
       ENERGY LABEL MINI — DPE-style, dark-hero version
    ═══════════════════════════════════════════════════════ */
    const EnergyLabelMini = ({ letter, intensity, title }) => {
      const cfg = scoreConf(letter);
      return (
        <div style={{
          flex: 1,
          background: 'rgba(255,255,255,0.11)',
          border: '1.5px solid ' + cfg.border,
          borderRadius: 9,
          padding: '8px 10px',
          textAlign: 'center',
        }}>
          <div style={{
            fontSize: 8, fontWeight: 700, textTransform: 'uppercase',
            letterSpacing: '0.06em', color: 'rgba(255,255,255,0.6)', marginBottom: 3, whiteSpace: 'nowrap',
          }}>{title}</div>
          <div style={{ fontSize: 40, fontWeight: 900, color: cfg.color, lineHeight: 1 }}>
            {letter}
          </div>
          <div style={{ fontSize: 9, color: '#fff', marginTop: 3 }}>{cfg.label}</div>
          {num(intensity) > 0 && (
            <div style={{ fontSize: 9, color: 'rgba(255,255,255,0.55)', marginTop: 2 }}>
              {Math.round(num(intensity))}&nbsp;kWh/m²/an
            </div>
          )}
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════════════ */
    const T = {
      navy:     '#0A1928',
      blue:     '#1D4ED8',
      slate600: '#475569',
      slate400: '#94A3B8',
      slate200: '#E2E8F0',
      slate100: '#F1F5F9',
      slate50:  '#F8FAFC',
      radius:   14,
      radiusLg: 18,
    };
    const DIAGTERTIAIRE_LOGO_SVG = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="7" fill="#1D4ED8"/><path d="M6 25V11l10-3.5L26 11v14" stroke="white" stroke-width="1.9" stroke-linejoin="round" fill="none"/><rect x="13" y="17" width="6" height="8" rx="1.2" fill="white" opacity="0.95"/><path d="M6 14h20" stroke="white" stroke-width="1.1" opacity="0.35"/><circle cx="10" cy="18" r="1.1" fill="white" opacity="0.65"/><circle cx="22" cy="18" r="1.1" fill="white" opacity="0.65"/></svg>';
    const DiagTertiairePrintBrand = ({ dark = true, size = 26 }) => (
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
        <span
          style={{ width: size, height: size, flexShrink: 0, display: 'inline-block' }}
          dangerouslySetInnerHTML={{ __html: DIAGTERTIAIRE_LOGO_SVG }}
        />
        <span style={{
          fontWeight: 800,
          fontSize: 18,
          letterSpacing: '-0.03em',
          lineHeight: 1,
          color: dark ? '#FFFFFF' : T.navy,
        }}>
          DiagTertiaire
        </span>
      </span>
    );

    /* ═══════════════════════════════════════════════════════
       SECTION WRAPPER
    ═══════════════════════════════════════════════════════ */
    const Section = ({ title, sub, intro = null, children, mb = 18, avoidBreak = false }) => {
      const childList = React.Children.toArray(children).filter(Boolean);
      const firstChild = !intro && avoidBreak ? (childList.shift() || null) : null;
      const titleNode = (
        <div className="section-title" style={{
          fontSize: 14, fontWeight: 800, color: T.navy,
          letterSpacing: '-0.28px', marginBottom: sub ? 3 : 12,
        }}>{title}</div>
      );
      const subNode = sub ? (
        <div style={{ fontSize: 10, color: T.slate600, marginBottom: 12, lineHeight: 1.55 }}>
          {sub}
        </div>
      ) : null;
      const leadNode = intro ? (
        <div className="section-intro">
          {titleNode}
          {subNode}
          {intro}
        </div>
      ) : firstChild ? (
        <div className="section-first-block">
          {titleNode}
          {subNode}
          {firstChild}
        </div>
      ) : (
        <div className="section-head">
          {titleNode}
          {subNode}
        </div>
      );

      return (
        <div
          style={{
            background: '#fff',
            border: `1px solid ${T.slate200}`,
            borderRadius: T.radiusLg,
            marginBottom: mb,
            overflow: 'visible',
          }}
        >
          <div className="section-start">
            <div style={{ height: 3, background: `linear-gradient(90deg, ${T.blue} 0%, #6366F1 100%)`, borderRadius: `${T.radiusLg}px ${T.radiusLg}px 0 0` }} />
            <div style={{ padding: `16px 18px ${childList.length ? 12 : 18}px` }}>
              {leadNode}
            </div>
          </div>
          {childList.length > 0 && (
            <div style={{ padding: '0 18px 18px' }}>
              {childList}
            </div>
          )}
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════
       COVER IMAGE — print-safe building photo block
    ═══════════════════════════════════════════════════════ */
    const COVER_SOURCE_LABELS = {
      upload: 'Photo téléversée',
      panoramax: 'Vue façade',
      google_streetview: 'Street View',
      aerial: 'Vue aérienne',
      plan: 'Plan cadastral',
      storage: 'Image enregistrée',
      url: 'Image distante'
    };
    const CoverImageBlock = ({ selected, url, source, path }) => {
      const [hasError, setHasError] = useState(false);
      const sourceLabel = COVER_SOURCE_LABELS[String(source || '').trim()] || 'Image de couverture';

      useEffect(() => {
        if (!selected || url) return;
        const message = 'Cover selected but no printable URL available';
        window.__REPORT_COVER_ERROR__ = message;
        console.error('[print] ' + message, { source: source || null, path: path || null });
      }, [selected, url, source, path]);

      useEffect(() => {
        if (!selected || !hasError) return;
        const message = 'Cover selected but failed to load for print';
        window.__REPORT_COVER_ERROR__ = message;
        console.error('[print] ' + message, { source: source || null, path: path || null, url: url || null });
      }, [selected, hasError, source, path, url]);

      if (!selected) return null;

      if (!url || hasError) {
        return (
          <div className="pba" style={{
            marginBottom: 18,
            borderRadius: 14,
            border: '1px solid ' + T.slate200,
            background: 'linear-gradient(135deg, #F8FAFC 0%, #EEF2FF 100%)',
            padding: '20px 22px',
          }}>
            <div style={{ fontSize: 10, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '0.08em', color: T.blue, marginBottom: 8 }}>
              Image de couverture
            </div>
            <div style={{ fontSize: 15, fontWeight: 800, color: T.navy, marginBottom: 6 }}>
              Le visuel sélectionné n'a pas pu être chargé pour l'impression.
            </div>
            <div style={{ fontSize: 11, color: T.slate600, lineHeight: 1.6 }}>
              Source : {sourceLabel}
            </div>
          </div>
        );
      }

      return (
        <div className="pba" style={{
          marginBottom: 18, borderRadius: 14, overflow: 'hidden',
          border: '1px solid ' + T.slate200, position: 'relative',
        }}>
          <img
            src={url}
            alt="Photo du bâtiment"
            data-report-image="true"
            data-report-image-critical="true"
            style={{ width: '100%', height: '210px', objectFit: 'cover', display: 'block' }}
            onError={() => setHasError(true)}
          />
          <div style={{
            position: 'absolute', bottom: 0, left: 0, right: 0,
            background: 'linear-gradient(to top, rgba(10,25,40,0.70) 0%, rgba(10,25,40,0.05) 100%)',
            padding: '10px 16px 12px',
          }}>
            <div style={{
              fontSize: 9, fontWeight: 700, textTransform: 'uppercase',
              letterSpacing: '0.1em', color: 'rgba(255,255,255,0.82)', marginBottom: 3,
            }}>Vue du bâtiment</div>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#FFFFFF' }}>{sourceLabel}</div>
          </div>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════
       KPI CARD — 2×2 grid, generous size
    ═══════════════════════════════════════════════════════ */
    const KpiCard = ({ label, value, sub, accent = T.blue }) => (
      <div className="pba" style={{
        background: '#fff',
        border: `1px solid ${T.slate200}`,
        borderRadius: T.radius,
        padding: '15px 16px',
        borderTop: `2.5px solid ${accent}`,
      }}>
        <div style={{
          fontSize: 8, fontWeight: 800, textTransform: 'uppercase',
          letterSpacing: '0.09em', color: accent, marginBottom: 6,
        }}>{label}</div>
        <div style={{ fontSize: 24, fontWeight: 900, color: T.navy, lineHeight: 1, marginBottom: 4 }}>

    /* ═══════════════════════════════════════════════════════
       ACTION ROW — with per-action aids (aligned with web)

                <div>Surplus revendu : {Math.round(action.pv_surplus_kwh_an).toLocaleString('fr-FR')} kWh, soit {Math.round(action.pv_surplus_revenue_euro_an).toLocaleString('fr-FR')} €/an</div>

    /* ═══════════════════════════════════════════════════════
       PROJECTION CHART
       ─────────────────────────────────────────────────────
       WHY FIXED DIMENSIONS (no ResponsiveContainer):
         ResponsiveContainer uses ResizeObserver to measure its
         parent. In Puppeteer with mediaType='print', ResizeObserver
         callbacks do not fire — the chart receives width=0 and renders
         an empty SVG. Fixed dimensions bypass ResizeObserver entirely
         and guarantee a fully painted chart on the first render pass.

       CHART_W = 636 is calibrated for A4 with Puppeteer margins
       (top:16mm right:14mm bottom:14mm left:14mm):
         182mm usable × (96px/25.4mm) ≈ 688px
         − 2 × 24px section padding = 640px → 636 adds 4px safety margin.

       isAnimationActive={false} on both Areas:
         Recharts animations are async; without this Puppeteer may
         snapshot mid-animation yielding paths with no 'd' attribute.
    ═══════════════════════════════════════════════════════ */
    const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
    const formatProjectionTick = (value) => {
      const safe = Math.max(0, num(value));
      if (safe >= 1_000_000) {
        return `${(safe / 1_000_000).toLocaleString('fr-FR', { maximumFractionDigits: 1 })} M€`;
      }
      return `${Math.round(safe / 1000)}k€`;
    };
    const getNiceTickStep = (maxValue, tickCount = 4) => {
      const safeMax = Math.max(1, num(maxValue));
      const rough = safeMax / Math.max(1, tickCount);
      const magnitude = Math.pow(10, Math.floor(Math.log10(rough)));
      const residual = rough / magnitude;
      const nice =
        residual > 5 ? 10 :
        residual > 2 ? 5 :
        residual > 1 ? 2 : 1;
      return nice * magnitude;
    };
    const buildSvgLinePath = (points) => {
      if (!Array.isArray(points) || points.length === 0) return '';
      return points.map((point, index) => `${index === 0 ? 'M' : 'L'}${point.x},${point.y}`).join(' ');
    };
    const buildSvgAreaPath = (points, baselineY) => {
      if (!Array.isArray(points) || points.length === 0) return '';
      const linePath = buildSvgLinePath(points);
      const first = points[0];
      const last = points[points.length - 1];
      return `${linePath} L${last.x},${baselineY} L${first.x},${baselineY} Z`;
    };
    const getGaugeLabelLayout = (pos, distance = 40) => {
      if (pos <= 10) {
        return { transform: `translateX(${distance}px)`, textAlign: 'left', alignItems: 'flex-start' };
      }
      if (pos >= 90) {
        return { transform: `translateX(-${distance}px)`, textAlign: 'right', alignItems: 'flex-end' };
      }
      return { transform: 'translateX(0)', textAlign: 'center', alignItems: 'center' };
    };
    const ProjectionChart = ({ data, hasLight, roiLabel }) => {
      const safeData = arr(data);
      if (safeData.length === 0) {
        console.warn('[print] ProjectionChart: no data');
        return null;
      }

      const width = CHART_W;
      const height = CHART_H;
      const margin = { top: 18, right: 22, bottom: 40, left: 62 };
      const plotWidth = width - margin.left - margin.right;
      const plotHeight = height - margin.top - margin.bottom;
      const allValues = safeData.flatMap(point => [
        num(point.sans_travaux),
        num(point.avec_actions_rapides),
        num(point.avec_travaux)
      ]).filter(value => value > 0);

      if (!allValues.length) {
        console.warn('[print] ProjectionChart: no positive values');
        return null;
      }

      const tickStep = getNiceTickStep(Math.max(...allValues), 4);
      const yMax = Math.max(tickStep, Math.ceil(Math.max(...allValues) / tickStep) * tickStep);
      const yTicks = [];
      for (let tick = 0; tick <= yMax; tick += tickStep) {
        yTicks.push(tick);
      }

      const getX = (index) => (
        margin.left + (safeData.length <= 1 ? plotWidth / 2 : (index / (safeData.length - 1)) * plotWidth)
      );
      const getY = (value) => margin.top + plotHeight - (clamp(num(value), 0, yMax) / yMax) * plotHeight;
      const baseLineY = margin.top + plotHeight;
      const seriesMeta = [
        { key: 'sans_travaux', label: 'Situation actuelle', stroke: '#EA580C', dash: '6 4', fill: 'url(#printProjSans)' },
        ...(hasLight ? [{ key: 'avec_actions_rapides', label: 'Actions sans travaux', stroke: '#F59E0B', dash: '9 4', fill: null }] : []),
        { key: 'avec_travaux', label: 'Actions légères + travaux', stroke: '#059669', dash: null, fill: 'url(#printProjAvec)' },
      ];
      const series = seriesMeta.map(meta => ({
        ...meta,
        points: safeData.map((point, index) => ({ x: getX(index), y: getY(point[meta.key]), value: num(point[meta.key]) }))
      }));
      const roiIndex = safeData.findIndex(point => point.annee === roiLabel);
      const roiX = roiIndex >= 0 ? getX(roiIndex) : null;

      return (
        <div className="chart-host" data-report-chart="projection">
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 14, marginBottom: 10, alignItems: 'center' }}>
            {series.map(meta => (
              <div key={meta.key} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span style={{
                  width: 24,
                  height: 0,
                  borderTop: `2.5px ${meta.dash ? 'dashed' : 'solid'} ${meta.stroke}`,
                  opacity: 0.95,
                }} />
                <span style={{ fontSize: 10, fontWeight: 700, color: T.slate600 }}>{meta.label}</span>
              </div>
            ))}
            <span style={{ marginLeft: 'auto', fontSize: 10, color: T.slate400 }}>
              Cumul dépenses + investissement initial
            </span>
          </div>

          <svg
            width={width}
            height={height}
            viewBox={`0 0 ${width} ${height}`}
            role="img"
            aria-label="Projection financière sur 10 ans"
          >
            <defs>
              <linearGradient id="printProjSans" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#EA580C" stopOpacity="0.16" />
                <stop offset="100%" stopColor="#EA580C" stopOpacity="0.02" />
              </linearGradient>
              <linearGradient id="printProjAvec" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#059669" stopOpacity="0.18" />
                <stop offset="100%" stopColor="#059669" stopOpacity="0.02" />
              </linearGradient>
            </defs>

            <rect x={margin.left} y={margin.top} width={plotWidth} height={plotHeight} rx="12" fill={T.slate50} />

            {yTicks.map((tick) => {
              const y = getY(tick);
              return (
                <g key={tick}>
                  <line x1={margin.left} y1={y} x2={margin.left + plotWidth} y2={y} stroke={T.slate200} strokeDasharray="3 4" />
                  <text x={margin.left - 10} y={y + 4} textAnchor="end" fontSize="10" fill={T.slate600}>
                    {formatProjectionTick(tick)}
                  </text>
                </g>
              );
            })}

            <line x1={margin.left} y1={baseLineY} x2={margin.left + plotWidth} y2={baseLineY} stroke={T.slate200} />

            {safeData.map((point, index) => {
              const x = getX(index);
              return (
                <g key={point.annee}>
                  <line x1={x} y1={margin.top} x2={x} y2={baseLineY} stroke={index === 0 || index === safeData.length - 1 ? T.slate200 : T.slate100} />
                  <text x={x} y={height - 10} textAnchor="middle" fontSize="10" fill={T.slate600}>
                    {point.annee}
                  </text>
                </g>
              );
            })}

            {series.filter(meta => meta.fill).map(meta => (
              <path key={`${meta.key}-area`} d={buildSvgAreaPath(meta.points, baseLineY)} fill={meta.fill} stroke="none" />
            ))}

            {series.map(meta => (
              <path
                key={`${meta.key}-line`}
                d={buildSvgLinePath(meta.points)}
                fill="none"
                stroke={meta.stroke}
                strokeWidth={meta.key === 'avec_travaux' ? 3 : 2.5}
                strokeDasharray={meta.dash || undefined}
                strokeLinecap="round"
                strokeLinejoin="round"
              />
            ))}

            {series.map(meta => {
              const lastPoint = meta.points[meta.points.length - 1];
              if (!lastPoint) return null;
              return (
                <g key={`${meta.key}-last`}>
                  <circle cx={lastPoint.x} cy={lastPoint.y} r="4" fill={meta.stroke} stroke="#fff" strokeWidth="2" />
                </g>
              );
            })}

            {roiX !== null && (
              <g>
                <line x1={roiX} y1={margin.top} x2={roiX} y2={baseLineY} stroke="#059669" strokeWidth="1.5" strokeDasharray="4 4" />
                <rect x={clamp(roiX - 44, margin.left, margin.left + plotWidth - 88)} y={6} width="88" height="20" rx="10" fill="#D1FAE5" stroke="#6EE7B7" />
                <text x={clamp(roiX, margin.left + 44, margin.left + plotWidth - 44)} y={20} textAnchor="middle" fontSize="10" fontWeight="700" fill="#047857">
                  Rentabilité : {roiLabel}
                </text>
              </g>
            )}
          </svg>
        </div>
      );
    };

    /* ═══════════════════════════════════════════════════════
       USAGE BREAKDOWN — inline SVG donut, no Recharts
    ═══════════════════════════════════════════════════════ */
    const USAGE_KEYS = [
      { k: 'heating_pct',        label: 'Chauffage',     color: '#EF4444' },
      { k: 'cooling_pct',        label: 'Climatisation', color: '#3B82F6' },
      { k: 'dhw_pct',            label: 'Eau chaude',    color: '#F59E0B' },
      { k: 'lighting_pct',       label: 'Éclairage',     color: '#EAB308' },
      { k: 'vent_aux_pct',       label: 'Ventilation',   color: '#8B5CF6' },
      { k: 'cooking_pct',        label: 'Cuisson',       color: '#F97316' },
      { k: 'other_specific_pct', label: 'Autres',        color: '#94A3B8' },
    ];

    const UsageDonut = ({ usageBreakdown }) => {
      const rawBd = obj(usageBreakdown);
      const bpRaw = (rawBd.breakdown_pct && typeof rawBd.breakdown_pct === 'object')
        ? rawBd.breakdown_pct : rawBd;

      const rawEntries = USAGE_KEYS.map(uk => {
        const v = bpRaw[uk.k];
        const pct = typeof v === 'number' ? v : (v && typeof v.value === 'number' ? v.value : 0);
        return { ...uk, pct };
      }).filter(e => e.pct > 0).sort((a, b) => b.pct - a.pct);

      if (rawEntries.length === 0) return null;

      const total = rawEntries.reduce((s, e) => s + e.pct, 0);
      const entries = rawEntries.map(e => ({ ...e, pct: Math.round((e.pct / total) * 100) }));
      const dominant = entries[0];

      // Build SVG donut geometry (static, no runtime dependency)
      const CX = 70, CY = 70, R = 56, r = 36;
      let a = -Math.PI / 2;
      const slices = entries.map(e => {
        const sweep = (e.pct / 100) * 2 * Math.PI;
        const x1 = CX + R * Math.cos(a),     y1 = CY + R * Math.sin(a);
        const xi1 = CX + r * Math.cos(a),    yi1 = CY + r * Math.sin(a);
        a += sweep;
        const x2 = CX + R * Math.cos(a),     y2 = CY + R * Math.sin(a);
        const xi2 = CX + r * Math.cos(a),    yi2 = CY + r * Math.sin(a);
        const lg = sweep > Math.PI ? 1 : 0;
        const path =
          'M' + x1.toFixed(1) + ',' + y1.toFixed(1) +
          ' A' + R + ',' + R + ',0,' + lg + ',1,' + x2.toFixed(1) + ',' + y2.toFixed(1) +
          ' L' + xi2.toFixed(1) + ',' + yi2.toFixed(1) +
          ' A' + r + ',' + r + ',0,' + lg + ',0,' + xi1.toFixed(1) + ',' + yi1.toFixed(1) + ' Z';
        return { ...e, path };
      });

      return (
        <Section title="Répartition par usage" sub="Estimation indicative des postes énergétiques selon l'activité et le profil du bâtiment." avoidBreak={true}>
          <div style={{ display: 'flex', gap: 20, alignItems: 'center', flexWrap: 'wrap' }}>
            {/* SVG Donut — fully deterministic, print-safe */}
            <div style={{ flexShrink: 0 }}>
              <svg width="140" height="140" viewBox="0 0 140 140">
                {slices.map((s, i) => (
                  <path key={i} d={s.path} fill={s.color} />
                ))}
                <text x="70" y="65" textAnchor="middle"
                  style={{ fontSize: '16px', fontWeight: 900, fill: T.navy,
                    fontFamily: 'Helvetica Neue, Arial, sans-serif' }}>
                  {dominant.pct}%
                </text>
                <text x="70" y="80" textAnchor="middle"
                  style={{ fontSize: '9px', fill: T.slate600,
                    fontFamily: 'Helvetica Neue, Arial, sans-serif' }}>
                  {dominant.label}
                </text>
              </svg>
            </div>
            {/* Legend */}
            <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px 16px', minWidth: 160 }}>
              {entries.map(e => (
                <div key={e.k} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 3, background: e.color, flexShrink: 0 }} />
                  <div>
                    <span style={{ fontSize: 11, fontWeight: 700, color: T.navy }}>{e.label}</span>
                    <span style={{ fontSize: 11, color: T.slate400, marginLeft: 5 }}>{e.pct}%</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div style={{
            marginTop: 12, fontSize: 11, color: T.slate600,
            background: T.slate50, border: '1px solid ' + T.slate200,
            borderRadius: 8, padding: '8px 12px',
          }}>
            Poste dominant&nbsp;:&nbsp;
            <strong style={{ color: T.navy }}>{dominant.label}</strong>
            &nbsp;({dominant.pct}% des consommations estimées).{' '}
            Lecture indicative avant audit approfondi.
          </div>
        </Section>
      );
    };

    /* ═══════════════════════════════════════════════════════
       MAIN REPORT RENDER
       @sync — keep in sync with ENGINE_PUBLIC in index.html
       whenever score thresholds, aides ratio or inflation
       rate change.
    ═══════════════════════════════════════════════════════ */
    const ReportPrint = ({ reportPayload: rp, printAssets }) => {
      const inputs    = obj(rp.inputs_summary);
      const coverImageSelected = bool((printAssets && printAssets.cover_image_selected) ?? inputs.cover_image_selected);
      const coverImageUrl = (printAssets && printAssets.cover_image_url) || null;
      const coverImageSource = (printAssets && printAssets.cover_image_source) || inputs.cover_image_source || null;
      const coverImagePath = (printAssets && printAssets.cover_image_path) || inputs.cover_image_path || null;
      const bench     = obj(rp.benchmark_result);
      const composite = obj(rp.composite_savings);
      const calc      = obj(rp.calculation_results);
      const conf      = obj(rp.confidence);
      const actions   = arr(rp.top_actions).slice(0, 6);
      const assumes   = arr(rp.assumptions).slice(0, 8);
      const limits    = arr(rp.limits).slice(0, 8);

      const siteName   = String(inputs.site_name  || 'Bâtiment diagnostiqué');
      const activity   = String(inputs.activity   || '');
      const address    = String(inputs.address    || '');
      const postalCode = String(inputs.postal_code || inputs.postalCode || '');
      const surface    = num(inputs.surface?.value || inputs.surface);

      const { displayTitle, addressLine } = normalizeSiteDisplay(siteName, address, postalCode);

      const siteI    = num(bench.site_intensity?.value);
      const benchMed = num(bench.benchmark_median?.value);
      const annualEuro = num(composite.annual_euro?.value);
      const annualKwh  = num(composite.annual_kwh?.value);
      const totalCost  = num(calc.total_cost_euro_an?.value);
      const elecKwhPr    = num(calc.elec_kwh_an?.value);
      const gasKwhPr     = num(calc.gas_kwh_an?.value);
      const networkKwhPr = num(calc.network_kwh_an?.value);

      const score       = computeScore(siteI, benchMed);
      const targetI     = Math.max(0, Math.round(siteI - (surface > 0 ? annualKwh / surface : 0)));
      const targetScore = computeScore(targetI, benchMed);

      const budget     = buildBudget(actions, annualEuro);
      const projection = buildProjection({
        totalCostEuroAn: totalCost,
        annualEuro,
        actions,
        elecKwh: elecKwhPr,
        gasKwh: gasKwhPr + networkKwhPr
      });

      // ── CO₂ impact ────────────────────────────────────────────────────────
      // @sync heating-type-normalize: electric_pac / electric_convector = electrique pur
      const _mainHeatingPr = inputs.mainHeating || 'gas';
      const _nonElecCo2Pr = (_mainHeatingPr === 'fuel' || _mainHeatingPr === 'fioul')
        ? 0.324
        : (_mainHeatingPr === 'network')
            ? 0.100
            : 0.227;
      // Le kWh reseau de chaleur est compte dans le non-elec
      const nonElecKwhPr = gasKwhPr + networkKwhPr;
      const totKnownPr  = elecKwhPr + nonElecKwhPr;
      const co2FactorPr = totKnownPr > 0
        ? (elecKwhPr / totKnownPr) * 0.079 + (nonElecKwhPr / totKnownPr) * _nonElecCo2Pr
        : 0.12;
      const co2EvitePr  = Math.max(0, Math.round(annualKwh * co2FactorPr));
      const co2ArbPr    = Math.round(co2EvitePr / 22);
      const co2VoitPr   = Math.round((co2EvitePr / 2100) * 10) / 10;
      // @sync — NEW_DIAGNOSTIC_CO2_VOITURE_KM = 0.193 kg/km (index.html)
      const co2KmPr     = Math.round(co2EvitePr / 0.193);

      const locationMeta = [activity, surface > 0 ? fmtInt(surface, 'm²') : null].filter(Boolean).join(' · ');
      const heroSubLine  = [locationMeta, addressLine].filter(Boolean).join(' · ');
      const benchmarkLow = num(bench.benchmark_low?.value);
      const benchmarkGap = Math.round(siteI - benchMed);
      const benchmarkGapText = benchmarkGap > 0
        ? `Vous êtes à +${fmtInt(benchmarkGap)} kWh/m²/an au-dessus de la médiane sectorielle.`
        : benchmarkGap < 0
          ? `Vous êtes à ${fmtInt(Math.abs(benchmarkGap))} kWh/m²/an sous la médiane sectorielle.`
          : 'Vous êtes au niveau de la médiane sectorielle.';
      const benchmarkComment = targetI <= benchmarkLow
        ? 'La cible suggérée vous rapproche de la zone basse du secteur.'
        : targetI <= benchMed
          ? 'La cible suggérée vous rapproche du cœur de marché.'
          : "La cible suggérée réduit déjà significativement l'écart de performance.";
      const keyBusinessSentence = (score === 'A' || score === 'B')
        ? 'Le site est déjà bien placé. L’enjeu est de capter des gains ciblés sans surinvestir.'
        : score === 'C'
          ? 'Le site est dans la médiane. Un plan sélectif peut réduire durablement les charges.'
          : 'Le site est en retrait par rapport au marché. Les premiers leviers doivent être priorisés rapidement.';
      const currentRank = SCORE_ORDER.indexOf(score);
      const targetRank = SCORE_ORDER.indexOf(targetScore);
      const classGain = Math.max(0, currentRank - targetRank);
      const savingsPct = siteI > 0

            const refs  = [
              { pos: gp(bLow),    label: 'Bas secteur', sub: `${Math.round(bLow)}\u00a0kWh/m²`,    color: '#059669' },

            const eligible    = actions.filter(a => !a.roi_years?.value || num(a.roi_years.value) <= MAX_ROI);

                border: '#BBF7D0',
                actions: lightGroup
              } : null,
              heavyGroup.length > 0 ? {
                key: 'heavy',
                title: 'Actions structurantes',
                subtitle: 'Investissements rentables sur la durée · aides disponibles',
                bg: '#EFF6FF',
                border: '#BFDBFE',
                actions: heavyGroup

            const firstGroup = orderedGroups[0] || null;
            const firstGroupLeadAction = firstGroup && firstGroup.actions.length > 0 ? firstGroup.actions[0] : null;

              <div key={group.key} className="section-group" style={{ marginBottom: group.key === 'light' && heavyGroup.length > 0 ? 16 : 6 }}>

                {group.actions.map((a, i) => <ActionRow key={a.id || `${group.key}-${i}`} action={a} index={i} groupIndex={i} />)}
              </div>
            );

            return (
              <Section
                title="Plan d'actions recommandé"
                sub="Actions sélectionnées selon le rapport gain/effort et ROI ≤ 10 ans. Estimations indicatives avant audit."
                intro={firstGroup ? (
                  <div style={{ marginBottom: firstGroup.actions.length > 1 || orderedGroups.length > 1 ? 12 : 0 }}>
                    <GroupHeader title={firstGroup.title} subtitle={firstGroup.subtitle} bg={firstGroup.bg} border={firstGroup.border} />
                    {firstGroupLeadAction && (
                      <ActionRow action={firstGroupLeadAction} index={0} groupIndex={0} />
                    )}
                  </div>
                ) : null}
              >
                {!hasAny && (
                  <p style={{ fontSize: 12, color: T.slate600 }}>Aucune action exploitable avec ce niveau de données.</p>
                )}
                {firstGroup && firstGroup.actions.slice(1).map((action, index) => (

         3. getBoundingClientRect   → wrapper has positive dimensions

         4. Poll svg path[d]        → AreaChart data lines are drawn
         5. 80ms stabilization      → final repaint has settled

    const App = () => {

          if (!img) return false;
          if (img.complete) {
            if (img.naturalWidth > 0 && img.naturalHeight > 0) {
              if (img.decode) {
                try { await img.decode(); } catch (_) {}
              }
              return true;
            }
            return false;
          }

          return await new Promise((resolve) => {
            let settled = false;
            const finish = async (ok) => {
              if (settled) return;
              settled = true;
              if (ok && img.decode) {
                try { await img.decode(); } catch (_) {}
              }
              resolve(!!ok);
            };
            const timer = setTimeout(() => finish(false), timeoutMs);
            img.addEventListener('load', () => {
              clearTimeout(timer);
              finish(true);
            }, { once: true });
            img.addEventListener('error', () => {
              clearTimeout(timer);
              finish(false);
            }, { once: true });
          });
        };

        const run = async () => {
          try {
            const inputs = obj(reportPayload.inputs_summary);
            const coverSelected = bool((printAssets && printAssets.cover_image_selected) ?? inputs.cover_image_selected);
            const coverUrl = String((printAssets && printAssets.cover_image_url) || '').trim();

            if (document.fonts?.ready) await document.fonts.ready;
            if (cancelled || readyFired.current) return;

            const hasProjectionChart = arr(reportPayload.top_actions).length > 0;
            let projectionReady = false;
            if (hasProjectionChart) {
              for (let i = 0; i < 30 && !cancelled && !readyFired.current; i++) {
                const chart = document.querySelector('[data-report-chart="projection"] svg');
                if (chart) {
                  const rect = chart.getBoundingClientRect();
                  if (rect.width >= 100 && rect.height >= 100) {
                    projectionReady = true;
                    console.log('[print] projection svg ready:', Math.round(rect.width), '×', Math.round(rect.height));
                    break;
                  }
                }
                await new Promise(r => setTimeout(r, 80));
              }
              if (!projectionReady) {
                console.warn('[print] projection svg not visible — proceeding anyway');
              }
            } else {
              console.log('[print] no actions — skipping projection chart poll');
            }
            if (cancelled || readyFired.current) return;

            if (coverSelected && !coverUrl) {
              clearTimeout(maxTimer);
              fail('Cover sélectionnée sans URL exploitable pour l’impression');
              return;
            }

            const criticalImages = Array.from(document.querySelectorAll('[data-report-image-critical="true"]'));
            if (coverSelected) {
              if (!criticalImages.length) {
                clearTimeout(maxTimer);
                fail('Cover sélectionnée mais absente du DOM print');
                return;
              }
              console.log('[print] waiting for critical cover image...');
              const criticalResults = await Promise.all(criticalImages.map(img => waitForImage(img, 5000)));
              if (criticalResults.some(ok => !ok) || window.__REPORT_COVER_ERROR__) {
                clearTimeout(maxTimer);
                fail(window.__REPORT_COVER_ERROR__ || 'Cover sélectionnée non chargée avant capture PDF');
                return;
              }
              console.log('[print] critical cover image ready');
            }
            if (cancelled || readyFired.current) return;

            const reportImages = Array.from(document.querySelectorAll('[data-report-image]'))
              .filter(img => !img.hasAttribute('data-report-image-critical'));
            if (reportImages.length > 0) {
              console.log('[print] waiting for', reportImages.length, 'report image(s)...');
              await Promise.all(reportImages.map(img => waitForImage(img, 4000)));
              console.log('[print] report images: done');
            }
            if (cancelled || readyFired.current) return;

            await new Promise(r => setTimeout(r, 80));
            await new Promise(r => requestAnimationFrame(r));
            await new Promise(r => requestAnimationFrame(r));

            clearTimeout(maxTimer);
            doFire();
          } catch (e) {
            console.warn('[print] Ready signal error:', e?.message);
            clearTimeout(maxTimer);
            if (!cancelled) doFire();
          }
        };

        run();
        return () => { cancelled = true; clearTimeout(maxTimer); };
      }, [reportPayload, printAssets]);

      /* Signal Puppeteer on fetch error — prevents indefinite hang */
      useEffect(() => {
        if (!error || readyFired.current) return;
        readyFired.current = true;
        window.__REPORT_ERROR__ = error;
        window.__REPORT_READY__ = true;
        console.error('[print] __REPORT_ERROR__:', error);
      }, [error]);

      if (error) {
        return (
          <div style={{ padding: 48, textAlign: 'center', fontFamily: 'Arial,sans-serif' }}>
            <div style={{ color: '#DC2626', fontSize: 18, fontWeight: 700, marginBottom: 10 }}>
              Erreur de chargement
            </div>
            <div style={{ color: '#64748B', fontSize: 14 }}>{error}</div>
          </div>
        );
      }

      if (!reportPayload) {
        return (
          <div style={{ padding: 48, textAlign: 'center', fontFamily: 'Arial,sans-serif', color: '#64748B' }}>
            Chargement du rapport…
          </div>
        );
      }

      return <ReportPrint reportPayload={reportPayload} printAssets={printAssets} />;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
